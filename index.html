        if (!types.length) { container.innerHTML = '<p class="card-meta">רק ברירת מחדל (עגלה)</p>'; return; }
        container.innerHTML = types.map(t => `
          <div class="list-item">
            <div class="list-item-body"><div class="list-item-title">${esc(t)}</div></div>
            <div class="list-item-actions">
              <button class="btn-icon ec-delcontainertype-btn" data-type="${esc(t)}" title="מחק">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      function updateFormLabels() {
        const ct = tabContent.querySelector('#ec-containertype').value || 'עגלה';
        tabContent.querySelector('#ec-form-title').textContent = 'הוספת / עדכון ' + ct;
        tabContent.querySelector('#ec-save').textContent = 'שמור ' + ct;
      }

      // render list
      function renderList() {
        const list = tabContent.querySelector('#ec-list');
        const carts = DB.getAllCarts();
        if (!carts.length) {
          list.innerHTML = '<p class="card-meta">אין פריטים</p>';
          return;
        }
        list.innerHTML = carts.sort((a,b) => a.cartId.localeCompare(b.cartId)).map(c => {
          const parts = [c.location || 'ללא מיקום'];
          if (cartTotalCount(c)) parts.push(cartTotalCount(c) + ' פריטים');
          if (c.parentCartId) {
            const p = DB.getCart(c.parentCartId);
            parts.push('על ' + (p ? cartLabel(p) : c.parentCartId));
          }
          const childCount = DB.getChildCarts(c.cartId).length;
          if (childCount) parts.push(childCount + ' טעונות');
          const ctBadge = (c.containerType && c.containerType !== DEFAULT_CONTAINER)
            ? ` <span style="background:#E0E7FF;color:#3730A3;padding:1px 6px;border-radius:4px;font-size:0.75rem;margin-right:4px;">${esc(c.containerType)}</span>` : '';
          return `
          <div class="list-item">
            <div class="list-item-body">
              <div class="list-item-title">${ctBadge}${esc(cartLabel(c))}</div>
              <div class="list-item-sub">${parts.join(' · ')}</div>
            </div>
            <div class="list-item-actions">
              <button class="btn-icon ec-edit-btn" data-id="${esc(c.cartId)}" title="ערוך">✏️</button>
              <button class="btn-icon ec-del-btn"  data-id="${esc(c.cartId)}" title="מחק">🗑️</button>
            </div>
          </div>
        `}).join('');
      }

      function getDescendantIds(cartId) {
        const ids = new Set();
        const queue = [cartId];
        while (queue.length) {
          const pid = queue.shift();
          for (const ch of DB.getChildCarts(pid)) {
            if (!ids.has(ch.cartId)) { ids.add(ch.cartId); queue.push(ch.cartId); }
          }
        }
        return ids;
      }

      function renderParentOptions(excludeId) {
        const sel = tabContent.querySelector('#ec-parent');
        const carts = DB.getAllCarts();
        const exclude = new Set();
        if (excludeId) {
          exclude.add(excludeId);
          for (const id of getDescendantIds(excludeId)) exclude.add(id);
        }
        sel.innerHTML = '<option value="">— ללא —</option>' +
          carts.filter(c => !exclude.has(c.cartId))
               .sort((a,b) => a.cartId.localeCompare(b.cartId))
               .map(c => `<option value="${esc(c.cartId)}">${esc(cartLabel(c))}</option>`).join('');
      }

      renderList();
      renderCartTypeOptions();
      renderTypeList();
      renderContainerTypeOptions();
      renderContainerTypeList();
      renderParentOptions(null);
      updateFormLabels();
      makeAutocomplete(tabContent.querySelector('#ec-cartid'), () => DB.getMetadata().carts);
      tabContent.querySelector('#ec-containertype').addEventListener('change', updateFormLabels);
      setupLocationFields(
        tabContent.querySelector('#ec-loc'),
        tabContent.querySelector('#ec-subloc-group'),
        tabContent.querySelector('#ec-subloc')
      );

      // save
      tabContent.querySelector('#ec-save').addEventListener('click', () => {
        const cartId   = tabContent.querySelector('#ec-cartid').value.trim();
        if (!cartId) { Toast.show('יש להזין מספר מזהה', 'error'); return; }
        const containerType = tabContent.querySelector('#ec-containertype').value || 'עגלה';
        const cartType = tabContent.querySelector('#ec-carttype').value;
        const loc      = tabContent.querySelector('#ec-loc').value.trim();
        const subLoc   = tabContent.querySelector('#ec-subloc-group').hidden
          ? '' : tabContent.querySelector('#ec-subloc').value.trim();
        const parentCartId = tabContent.querySelector('#ec-parent').value || null;
        DB.upsertCart({ cartId, cartType, containerType, location: loc, subLocation: subLoc,
                        parentCartId,
                        isEmpty: false, itemCount: 0, itemIds: [], properties: {} });
        Toast.show(containerType + ' נשמרה', 'success');
        renderList();
        renderParentOptions(null);
        tabContent.querySelector('#ec-cartid').value = '';
        tabContent.querySelector('#ec-carttype').value = '';
        tabContent.querySelector('#ec-loc').value = '';
        tabContent.querySelector('#ec-subloc').value = '';
        tabContent.querySelector('#ec-parent').value = '';
      });

      // edit / delete delegation
      tabContent.querySelector('#ec-list').addEventListener('click', e => {
        const editBtn = e.target.closest('.ec-edit-btn');
        const delBtn  = e.target.closest('.ec-del-btn');
        if (editBtn) {
          const cart = DB.getCart(editBtn.dataset.id);
          if (!cart) return;
          tabContent.querySelector('#ec-containertype').value = cart.containerType || 'עגלה';
          updateFormLabels();
          tabContent.querySelector('#ec-cartid').value = cart.cartId;
          tabContent.querySelector('#ec-carttype').value = cart.cartType || '';
          const ecLoc = tabContent.querySelector('#ec-loc');
          ecLoc.value = cart.location || '';
          ecLoc.dispatchEvent(new Event('change', { bubbles: true }));
          tabContent.querySelector('#ec-subloc').value = cart.subLocation || '';
          renderParentOptions(cart.cartId);
          tabContent.querySelector('#ec-parent').value = cart.parentCartId || '';
          tabContent.querySelector('#ec-cartid').scrollIntoView({ behavior: 'smooth' });
        }
        if (delBtn) {
          const delCart = DB.getCart(delBtn.dataset.id) || { cartId: delBtn.dataset.id };
          const delCtName = containerName(delCart);
          Modal.open({
            title: 'מחיקת ' + delCtName,
            html: `<p>האם למחוק את ה${esc(delCtName)} <strong>${esc(cartLabel(delCart))}</strong>?</p>`,
            actions: [
              { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
                DB.deleteCart(delBtn.dataset.id);
                Modal.close();
                Toast.show(delCtName + ' נמחקה', 'info');
                renderList();
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
        }
      });

      // cart type add / delete
      tabContent.querySelector('#ec-addtype-btn').addEventListener('click', () => {
        const val = tabContent.querySelector('#ec-newtype').value.trim();
        if (!val) return;
        DB.addCartType(val);
        tabContent.querySelector('#ec-newtype').value = '';
        renderCartTypeOptions();
        renderTypeList();
        Toast.show('סוג נוסף', 'success');
      });

      tabContent.querySelector('#ec-type-list').addEventListener('click', e => {
        const delBtn = e.target.closest('.ec-deltype-btn');
        if (!delBtn) return;
        Modal.open({
          title: 'מחיקת סוג',
          html: `<p>האם למחוק את הסוג <strong>${esc(delBtn.dataset.type)}</strong>?</p>`,
          actions: [
            { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
              DB.deleteCartType(delBtn.dataset.type);
              Modal.close();
              renderCartTypeOptions();
              renderTypeList();
              Toast.show('סוג נמחק', 'info');
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
      });

      // container type add / delete
      tabContent.querySelector('#ec-addcontainertype-btn').addEventListener('click', () => {
        const val = tabContent.querySelector('#ec-newcontainertype').value.trim();
        if (!val) return;
        DB.addContainerType(val);
        tabContent.querySelector('#ec-newcontainertype').value = '';
        renderContainerTypeOptions();
        renderContainerTypeList();
        Toast.show('קטגוריה נוספה', 'success');
      });

      tabContent.querySelector('#ec-containertype-list').addEventListener('click', e => {
        const delBtn = e.target.closest('.ec-delcontainertype-btn');
        if (!delBtn) return;
        Modal.open({
          title: 'מחיקת קטגוריה',
          html: `<p>האם למחוק את הקטגוריה <strong>${esc(delBtn.dataset.type)}</strong>? פריטים מקטגוריה זו יוחזרו לעגלה.</p>`,
          actions: [
            { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
              DB.deleteContainerType(delBtn.dataset.type);
              Modal.close();
              renderContainerTypeOptions();
              renderContainerTypeList();
              renderList();
              Toast.show('קטגוריה נמחקה', 'info');
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
      });
    }

    // ── Locations Tab ──
    function renderLocationsTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">הוספת מיקום</div>
            <div class="form-group">
              <label class="form-label">שם מיקום</label>
              <input id="el-name" class="form-input" placeholder="משני">
            </div>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer">
              <input type="checkbox" id="el-inmap"> הצג במיפוי
            </label>
            <button id="el-save" class="btn btn-primary btn-full">שמור מיקום</button>
          </div>

          <div class="card mt-12">
            <div class="card-title">מיקומים קיימים</div>
            <div id="el-list"></div>
          </div>

          <div class="card mt-12">
            <div class="card-title">ניהול תתי-מיקומים</div>
            <div class="form-group">
              <label class="form-label">בחר מיקום</label>
              <select id="el-sub-loc-sel" class="form-select">
                <option value="">— בחר מיקום —</option>
              </select>
            </div>
            <div id="el-sub-list"></div>
            <div id="el-sub-add-row" class="prop-add-row" hidden>
              <input id="el-sub-input" class="form-input btn-sm" placeholder="שם תת-מיקום">
              <button id="el-sub-add" class="btn btn-outline btn-sm">הוסף</button>
            </div>
          </div>
        </div>
      `;

      function renderList() {
        const list = tabContent.querySelector('#el-list');
        const locs = DB.getMetadata().locations;
        if (!locs.length) { list.innerHTML = '<p class="card-meta">אין מיקומים</p>'; return; }
        list.innerHTML = locs.map(l => {
          const subs = (l.subLocations || []);
          const subStr = subs.length ? subs.join(', ') : '';
          return `
            <div class="list-item">
              <div class="list-item-body">
                <div class="list-item-title">${l.name}</div>
                <div class="list-item-sub">${l.inMap ? '✓ מוצג במיפוי' : ''}${subStr ? (l.inMap ? ' · ' : '') + subStr : ''}</div>
              </div>
              <div class="list-item-actions">
                <button class="btn-icon el-toggle-btn" data-name="${esc(l.name)}" title="${l.inMap ? 'הסר ממיפוי' : 'הוסף למיפוי'}">${l.inMap ? '🗺️' : '📍'}</button>
                <button class="btn-icon el-del-btn" data-name="${esc(l.name)}" title="מחק">🗑️</button>
              </div>
            </div>
          `;
        }).join('');
      }

      function refreshSubLocSelect() {
        const sel  = tabContent.querySelector('#el-sub-loc-sel');
        const locs = DB.getMetadata().locations;
        const prev = sel.value;
        sel.innerHTML = '<option value="">— בחר מיקום —</option>' +
          locs.map(l => `<option value="${esc(l.name)}" ${l.name === prev ? 'selected' : ''}>${esc(l.name)}</option>`).join('');
      }

      function renderSubList(locName) {
        const subList  = tabContent.querySelector('#el-sub-list');
        const addRow   = tabContent.querySelector('#el-sub-add-row');
        if (!locName) { subList.innerHTML = ''; addRow.hidden = true; return; }
        addRow.hidden = false;
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = (loc && loc.subLocations) || [];
        if (!subs.length) {
          subList.innerHTML = '<p class="card-meta" style="margin-bottom:8px">אין תתי-מיקומים</p>';
          return;
        }
        subList.innerHTML = subs.map(s => `
          <div class="prop-option-row">
            <span>• ${s}</span>
            <button class="btn-icon el-sub-del" data-loc="${esc(locName)}" data-sub="${esc(s)}">✕</button>
          </div>
        `).join('');
      }

      renderList();
      refreshSubLocSelect();

      tabContent.querySelector('#el-save').addEventListener('click', () => {
        const name  = tabContent.querySelector('#el-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מיקום', 'error'); return; }
        const inMap = tabContent.querySelector('#el-inmap').checked;
        DB.upsertLocation({ name, inMap });
        Toast.show('מיקום נשמר', 'success');
        renderList();
        refreshSubLocSelect();
        tabContent.querySelector('#el-name').value = '';
        tabContent.querySelector('#el-inmap').checked = false;
      });

      tabContent.querySelector('#el-list').addEventListener('click', e => {
        const toggleBtn = e.target.closest('.el-toggle-btn');
        const delBtn    = e.target.closest('.el-del-btn');
        if (toggleBtn) {
          const name = toggleBtn.dataset.name;
          const loc  = DB.getMetadata().locations.find(l => l.name === name);
          if (loc) { DB.upsertLocation({ name, inMap: !loc.inMap }); renderList(); }
        }
        if (delBtn) {
          DB.deleteLocation(delBtn.dataset.name);
          Toast.show('מיקום נמחק', 'info');
          renderList();
          refreshSubLocSelect();
          renderSubList(tabContent.querySelector('#el-sub-loc-sel').value);
        }
      });

      // sublocation select change
      tabContent.querySelector('#el-sub-loc-sel').addEventListener('change', e => {
        renderSubList(e.target.value);
      });

      // add sublocation
      tabContent.querySelector('#el-sub-add').addEventListener('click', () => {
        const locName = tabContent.querySelector('#el-sub-loc-sel').value;
        const input   = tabContent.querySelector('#el-sub-input');
        const sub     = input.value.trim();
        if (!locName) { Toast.show('יש לבחור מיקום', 'error'); return; }
        if (!sub)     { Toast.show('יש להזין שם תת-מיקום', 'error'); return; }
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = [...((loc && loc.subLocations) || [])];
        if (!subs.includes(sub)) {
          subs.push(sub);
          DB.upsertLocation({ name: locName, subLocations: subs });
          Toast.show('תת-מיקום נוסף', 'success');
        }
        input.value = '';
        renderSubList(locName);
        renderList();
      });

      // allow Enter in sublocation input
      tabContent.querySelector('#el-sub-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') tabContent.querySelector('#el-sub-add').click();
      });

      // delete sublocation (event delegation on the sub-list)
      tabContent.querySelector('#el-sub-list').addEventListener('click', e => {
        const delBtn = e.target.closest('.el-sub-del');
        if (!delBtn) return;
        const locName = delBtn.dataset.loc;
        const sub     = delBtn.dataset.sub;
        const loc     = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        const subs = (loc.subLocations || []).filter(s => s !== sub);
        DB.upsertLocation({ name: locName, subLocations: subs });
        renderSubList(locName);
        renderList();
      });
    }

    // ── Properties Tab ──
    function renderPropertiesTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">הוספת מאפיין</div>
            <div class="form-group">
              <label class="form-label">שם מאפיין</label>
              <input id="ep-name" class="form-input" placeholder="מרעום">

          <div class="card mt-12">
            <div class="card-title">מאפיינים קיימים</div>
            <div id="ep-list"></div>

            <div class="card-title">ייצוא / ייבוא הגדרות</div>

            </div>

        list.innerHTML = props.map(p => {

          const conds = normalizeConditions(p.condition);
          const condLabel = conds

                <strong>${esc(p.name)}</strong>
                ${condLabel ? `<span class="card-meta" style="margin-inline-start:8px;font-size:0.72rem">(${condLabel})</span>` : ''}
              </div>
              <button class="btn-icon ep-del-prop" data-prop="${esc(p.name)}" title="מחק מאפיין">✕</button>

            <div class="prop-options">

                ${conds ? `<button class="btn btn-outline btn-sm ep-condition-clear" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px;color:var(--danger);border-color:var(--danger);margin-inline-start:4px">הסר תנאי</button>` : ''}
              </div>

                  <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
                    <span>• ${esc(o)}</span>
                    <div style="display:flex;align-items:center;gap:4px">

                      <button class="btn-icon ep-del-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}">✕</button>

                  </div>
                  ${optAliases.length ? `<div style="width:100%;padding:2px 16px 0;font-size:0.75rem;color:var(--muted)">חלופיים: ${optAliases.map(a => esc(a)).join(', ')}</div>` : ''}

              <div class="prop-add-row">
                <input class="form-input btn-sm ep-opt-input" data-prop="${esc(p.name)}" placeholder="אפשרות חדשה">

        }).join('');
      }
      renderList();

      tabContent.querySelector('#ep-save').addEventListener('click', () => {
        const name = tabContent.querySelector('#ep-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מאפיין', 'error'); return; }
        DB.upsertProperty({ name, options: [] });
        Toast.show('מאפיין נוסף', 'success');
        renderList();
        tabContent.querySelector('#ep-name').value = '';
      });

      tabContent.querySelector('#ep-list').addEventListener('click', e => {
        // expand/collapse
        const header = e.target.closest('.prop-group-header');
        if (header && !e.target.closest('button')) {
          header.closest('.prop-group').classList.toggle('expanded');
          return;
        }
        // delete property
        const delProp = e.target.closest('.ep-del-prop');
        if (delProp) {
          DB.deleteProperty(delProp.dataset.prop);
          Toast.show('מאפיין נמחק', 'info');
          renderList();
          return;
        }
        // delete option
        const delOpt = e.target.closest('.ep-del-opt');
        if (delOpt) {
          DB.removePropertyOption(delOpt.dataset.prop, delOpt.dataset.opt);
          renderList();
          return;
        }
        // aliases button
        const aliasBtn = e.target.closest('.ep-aliases-btn');
        if (aliasBtn) {
          const propName = aliasBtn.dataset.prop;
          const optName = aliasBtn.dataset.opt;
          const currentAliases = DB.getOptionAliases(propName, optName);
          Modal.open({
            title: 'שמות חלופיים: ' + optName,
            html: `

              <div id="alias-list-container">
                ${currentAliases.map((a, i) => `
                  <div class="form-group" style="display:flex;gap:8px;margin-bottom:6px" data-alias-row>

                const inputs = document.querySelectorAll('#alias-list-container .alias-input');
                const aliases = Array.from(inputs).map(inp => inp.value.trim()).filter(Boolean);
                DB.setOptionAliases(propName, optName, aliases);
                Modal.close();
                renderList();
                // re-expand the group
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          // wire up add/remove buttons inside the modal
          setTimeout(() => {
            const container = document.getElementById('alias-list-container');
            const addRowBtn = document.getElementById('alias-add-row-btn');
            if (addRowBtn) {
              addRowBtn.addEventListener('click', () => {
                const row = document.createElement('div');
                row.className = 'form-group';
                row.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
                row.setAttribute('data-alias-row', '');
                row.innerHTML = '<input class="form-input alias-input" placeholder="שם חלופי" style="flex:1"><button class="btn btn-outline btn-sm alias-remove-btn" type="button">✕</button>';
                container.appendChild(row);
                row.querySelector('.alias-input').focus();
              });
            }
            if (container) {
              container.addEventListener('click', ev => {
                const removeBtn = ev.target.closest('.alias-remove-btn');
                if (removeBtn) removeBtn.closest('[data-alias-row]').remove();
              });
            }
          }, 50);
          return;
        }
        // add option
        const addOpt = e.target.closest('.ep-add-opt');
        if (addOpt) {
          const propName = addOpt.dataset.prop;
          const input = Array.from(tabContent.querySelectorAll('.ep-opt-input')).find(el => el.dataset.prop === propName);
          const val   = input ? input.value.trim() : '';
          if (!val) return;
          DB.addPropertyOption(propName, val);
          renderList();
          // re-expand the group
          const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
          if (group) group.classList.add('expanded');
          return;
        }
        // condition button
        const condBtn = e.target.closest('.ep-condition-btn');
        if (condBtn) {
          const propName = condBtn.dataset.prop;
          const allProps = DB.getMetadata().properties;
          const thisProp = allProps.find(p => p.name === propName);
          const otherProps = allProps.filter(p => p.name !== propName);
          if (!otherProps.length) { Toast.show('אין מאפיינים אחרים להגדרת תנאי', 'error'); return; }
          const currentConds = normalizeConditions(thisProp.condition) || [{ prop: '', value: '' }];
          Modal.open({
            title: 'תנאי להצגת: ' + propName,
            html: `
              <p class="card-meta" style="margin-bottom:10px">מאפיין זה יוצג כאשר לפחות אחד מהתנאים מתקיים (או).</p>
              <div id="cond-rows-container"></div>
              <button id="cond-add-row" class="btn btn-outline btn-sm" style="margin-top:8px;font-size:0.78rem">+ הוסף תנאי נוסף (או)</button>
            `,
            actions: [
              { id: 'save-cond', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const rows = document.querySelectorAll('.cond-row');
                const conditions = [];
                rows.forEach(row => {
                  const cp = row.querySelector('.cond-prop-sel').value;
                  const cv = row.querySelector('.cond-val-sel').value;
                  if (cp) conditions.push({ prop: cp, value: cv });
                });
                if (conditions.length) {
                  DB.upsertProperty({ name: propName, condition: conditions });
                } else {
                  const db2 = DB.getMetadata();
                  const p2 = db2.properties.find(pp => pp.name === propName);
                  if (p2) { delete p2.condition; DB.upsertProperty(p2); }
                }
                Modal.close();
                renderList();
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          setTimeout(() => {
            const container = document.getElementById('cond-rows-container');
            function makeCondRow(c) {
              const row = document.createElement('div');
              row.className = 'cond-row';
              row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:8px';
              row.innerHTML = `
                <select class="form-select cond-prop-sel" style="flex:1">
                  <option value="">— מאפיין —</option>
                  ${otherProps.map(op => `<option value="${esc(op.name)}" ${c.prop === op.name ? 'selected' : ''}>${esc(op.name)}</option>`).join('')}
                </select>
                <select class="form-select cond-val-sel" style="flex:1">
                  <option value="">— ערך —</option>
                </select>
                <button class="btn-icon cond-remove-row" title="הסר" style="flex-shrink:0">✕</button>
              `;
              const propSel = row.querySelector('.cond-prop-sel');
              const valSel = row.querySelector('.cond-val-sel');
              function updateValOpts() {
                const selProp = allProps.find(p => p.name === propSel.value);
                valSel.innerHTML = '<option value="">— ערך —</option>';
                if (selProp) {
                  selProp.options.forEach(o => {
                    const opt = document.createElement('option');
                    opt.value = o; opt.textContent = o;
                    if (propSel.value === c.prop && c.value === o) opt.selected = true;
                    valSel.appendChild(opt);
                  });
                }
              }
              updateValOpts();
              propSel.addEventListener('change', () => { c = { prop: '', value: '' }; updateValOpts(); });
              row.querySelector('.cond-remove-row').addEventListener('click', () => {
                row.remove();
                updateRemoveButtons();
              });
              container.appendChild(row);
              updateRemoveButtons();
            }
            function updateRemoveButtons() {
              const rows = container.querySelectorAll('.cond-row');
              rows.forEach(r => {
                r.querySelector('.cond-remove-row').style.visibility = rows.length <= 1 ? 'hidden' : 'visible';
              });
            }
            currentConds.forEach(c => makeCondRow(c));
            document.getElementById('cond-add-row').addEventListener('click', () => {
              makeCondRow({ prop: '', value: '' });
            });
          }, 50);
          return;
        }
        // clear condition
        const condClear = e.target.closest('.ep-condition-clear');
        if (condClear) {
          const propName = condClear.dataset.prop;
          const thisProp = DB.getMetadata().properties.find(p => p.name === propName);
          if (thisProp) { delete thisProp.condition; DB.upsertProperty(thisProp); }
          renderList();
          const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
          if (group) group.classList.add('expanded');
          return;
        }
      });

      // allow Enter in option input
      tabContent.querySelector('#ep-list').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const addBtn = e.target.closest('.ep-opt-input');
          if (addBtn) {
            const propName = addBtn.dataset.prop;
            const btn = Array.from(tabContent.querySelectorAll('.ep-add-opt')).find(el => el.dataset.prop === propName);
            if (btn) btn.click();
          }
        }
      });

      // export definitions (properties + non-map locations)
      tabContent.querySelector('#ep-export-defs').addEventListener('click', () => {
        const meta = DB.getMetadata();
        const defs = {
          properties: meta.properties || [],
          locations: (meta.locations || []).filter(l => !l.inMap)
        };
        const text = JSON.stringify(defs, null, 2);
        Utils.copyToClipboard(text)
          .then(() => Toast.show('הגדרות הועתקו ללוח', 'success'))
          .catch(() => Toast.show('שגיאה בהעתקה', 'error'));
      });

      // import definitions
      tabContent.querySelector('#ep-import-defs').addEventListener('click', () => {
        Modal.open({
          title: 'ייבוא הגדרות',
          html: `
            <p class="card-meta" style="margin-bottom:10px">הדבק כאן את טקסט ההגדרות שהועתק בייצוא:</p>
            <textarea id="ep-import-area" rows="6"
              style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                     font-size:0.82rem;font-family:monospace;direction:ltr;text-align:left;resize:vertical"></textarea>
          `,
          actions: [
            { id: 'do-import-defs', label: 'ייבא', cls: 'btn-primary', onClick: () => {
              let text = document.getElementById('ep-import-area').value.trim();
              if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
              // Sanitize pasted text: remove BOM, zero-width chars, directional marks, replace smart quotes
              text = text.replace(/[\uFEFF\u200B\u200C\u200D\u00A0\u200E\u200F\u202A-\u202E\u2066-\u2069\u061C]/g, '');
              text = text.replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"');
              text = text.replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'");
              try {
                const defs = JSON.parse(text);
                // merge properties
                (defs.properties || []).forEach(prop => {
                  const existing = DB.getMetadata().properties.find(p => p.name.toLowerCase() === prop.name.toLowerCase());
                  if (!existing) {
                    DB.upsertProperty({ name: prop.name, options: prop.options || [], aliases: prop.aliases || {} });
                  } else {
                    (prop.options || []).forEach(o => {
                      if (!existing.options.some(e => e.toLowerCase() === o.toLowerCase())) {
                        DB.addPropertyOption(existing.name, o);
                      }
                    });
                    // merge aliases
                    if (prop.aliases) {
                      Object.entries(prop.aliases).forEach(([opt, aliasList]) => {
                        const currentAliases = DB.getOptionAliases(existing.name, opt);
                        const merged = [...new Set([...currentAliases, ...aliasList])];
                        DB.setOptionAliases(existing.name, opt, merged);
                      });
                    }
                  }
                });
                // merge non-map locations
                (defs.locations || []).forEach(loc => {
                  const existing = DB.getMetadata().locations.find(l => l.name === loc.name);
                  if (!existing) {
                    DB.upsertLocation({ name: loc.name, inMap: false, subLocations: loc.subLocations || [] });
                  } else {
                    (loc.subLocations || []).forEach(s => {
                      if (!existing.subLocations) existing.subLocations = [];
                      if (!existing.subLocations.includes(s)) existing.subLocations.push(s);
                    });
                    DB.upsertLocation(existing);
                  }
                });
                Modal.close();
                Toast.show('הגדרות יובאו בהצלחה', 'success');
                renderList();
              } catch(err) {
                Toast.show('שגיאה: ' + err.message, 'error');
              }
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
      });
    }

    // ── Floor Items Tab ──────────────────────────────────────
    Router.register('edit', {
      onShow() { renderTab(activeTab); }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 6 — Screen: Transfer
  ════════════════════════════════════════════════════ -->
  <script>
  function initTransfer() {
    const screen = document.getElementById('screen-transfer');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔄</span>
        <h1>העברה / פריטים</h1>
      </div>
      <div class="p-screen">
        <div class="form-group">
          <div class="pill-toggle" id="tr-mode-toggle">
            <button class="active" data-mode="cart">עגלה</button>
            <button data-mode="floor">רצפה</button>
          </div>
        </div>

        <!-- cart mode -->
        <div id="tr-cart-section">
          <div id="tr-cart-form-host"></div>
        </div>

        <!-- floor mode: pick source by location + properties + batch transfer -->
        <div id="tr-floor-section" hidden>
          <div class="form-group">
            <label class="form-label">מיקום מקור</label>
            <input id="tr-floor-src-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div id="tr-floor-src-props" class="mt-12"></div>
          <div id="tr-floor-avail" class="card" style="margin:14px 0;" hidden></div>
          <div class="form-group">
            <label class="form-label">כמות להעברה</label>
            <input id="tr-floor-count" class="form-input" type="number" min="0" placeholder="0">
          </div>
          <div id="tr-floor-item-rows" class="item-rows"></div>
        </div>

        <!-- shared fields (destination + cart item fields) -->
        <div id="tr-shared-fields" hidden>
          <div id="tr-current-info" class="card" style="margin:0 0 14px;"></div>
          <button id="tr-empty-cart" class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger);margin-bottom:12px">ריקון עגלה</button>

          <div class="form-group">
            <label class="form-label">מיקום יעד</label>
            <input id="tr-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div class="form-group" id="tr-dest-subloc-group" hidden>
            <label class="form-label">תת-מיקום יעד</label>
            <input id="tr-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>

          <!-- cart-mode: count + item rows + properties -->
          <div id="tr-cart-item-fields">
            <div class="form-group">
              <label class="form-label">מספר פריטים</label>
              <input id="tr-count" class="form-input" type="number" min="0" placeholder="0">
            </div>
            <div id="tr-item-rows" class="item-rows"></div>
            <div id="tr-prop-fields" class="mt-12"></div>
          </div>

          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="tr-save-only-btn" class="btn btn-outline" style="flex:1">שמור</button>
            <button id="tr-save-btn" class="btn btn-primary" style="flex:2">שמור ושלח 💬</button>
          </div>
        </div>
      </div>
    `;

    let _mode = 'cart';       // 'cart' | 'floor'
    let _cartRef = null;      // CartForm instance
    let _currentData = null;  // current cart object (cart mode) or floor source info (floor mode)
    let _currentType = null;  // 'cart' | 'fi'

    // Set up destination location autocomplete
    setupLocationFields(
      screen.querySelector('#tr-dest-loc'),
      screen.querySelector('#tr-dest-subloc-group'),
      screen.querySelector('#tr-dest-subloc')
    );

    // Floor source: location + property pickers
    makeAutocomplete(screen.querySelector('#tr-floor-src-loc'),
      () => DB.getMetadata().locations.map(l => l.name));
    buildPropertyFields(screen.querySelector('#tr-floor-src-props'), {});

    function updateFloorDisplay() {
      const loc   = screen.querySelector('#tr-floor-src-loc').value.trim();
      const props = readPropertyFields(screen.querySelector('#tr-floor-src-props'));
      const avail = screen.querySelector('#tr-floor-avail');
      if (!loc) {
        avail.hidden = true; _currentData = null; _currentType = null;
        screen.querySelector('#tr-shared-fields').hidden = true; return;
      }
      const fi     = DB.findFloorItem(loc, props);
      const total  = fi ? (fi.itemCount || 0) : 0;
      const allIds = fi ? (fi.itemIds || []) : [];
      _currentData = { location: loc, properties: props, itemCount: total, itemIds: allIds };
      _currentType = 'fi';
      avail.hidden = false;
      avail.innerHTML = `<div class="card-title">נמצאו ${total} פריטים</div><div class="card-meta">${esc(loc)}</div>`;
      showSharedFields(_currentData, 'fi');
    }

    function renderFloorItemRows(n, existingIds) {
      const container = screen.querySelector('#tr-floor-item-rows');
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input floor-serial-input" placeholder="מספר סידורי" value="${esc(existingIds[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
      // add autocomplete for each serial input from source IDs
      if (_currentData && _currentData.itemIds) {
        const allIds = _currentData.itemIds;
        container.querySelectorAll('.floor-serial-input').forEach(inp => {
          makeAutocomplete(inp, () => allIds);
        });
      }
    }

    screen.querySelector('#tr-floor-count').addEventListener('input', () => {
      const n = parseInt(screen.querySelector('#tr-floor-count').value) || 0;
      const existing = [...screen.querySelectorAll('.floor-serial-input')].map(i => i.value);
      renderFloorItemRows(n, existing);
    });

    screen.querySelector('#tr-floor-src-loc').addEventListener('change', updateFloorDisplay);
    screen.querySelector('#tr-floor-src-props').addEventListener('change', updateFloorDisplay);

    function setMode(mode) {
      _mode = mode;
      screen.querySelectorAll('#tr-mode-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode));
      screen.querySelector('#tr-cart-section').hidden  = (mode !== 'cart');
      screen.querySelector('#tr-floor-section').hidden = (mode !== 'floor');
      screen.querySelector('#tr-shared-fields').hidden = true;
      screen.querySelector('#tr-cart-item-fields').hidden = (mode !== 'cart');
      _currentData = null; _currentType = null;
    }

    function showSharedFields(data, type) {
      _currentData = data;
      _currentType = type;
      const shared = screen.querySelector('#tr-shared-fields');
      shared.hidden = false;

      const info = screen.querySelector('#tr-current-info');
      if (type === 'cart') {
        info.innerHTML = `
          <div class="card-title">${esc(containerName(data))}: ${esc(cartLabel(data))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(data.location || 'לא ידוע')}</div>
          ${data.comment ? `<div class="card-meta" style="color:var(--muted);font-style:italic">${esc(data.comment)}</div>` : ''}
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = false;
        const countInput = screen.querySelector('#tr-count');
        countInput.value = data.itemCount || 0;
        renderItemRows(data.itemCount || 0, data.itemIds || []);
        buildPropertyFields(screen.querySelector('#tr-prop-fields'), data.properties || {});
      } else {
        const propStr = Object.values(data.properties || {}).filter(Boolean).join(' ');
        info.innerHTML = `
          <div class="card-title">[רצפה] ${esc(propStr)} · ${data.itemCount || 0} פריטים</div>
          <div class="card-meta">מיקום: ${esc(data.location || 'לא ידוע')}</div>
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = true;
      }
    }

    function renderItemRows(n, existing) {
      const container = screen.querySelector('#tr-item-rows');
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    // count input changes (cart mode)
    screen.querySelector('#tr-count').addEventListener('input', () => {
      const n = parseInt(screen.querySelector('#tr-count').value) || 0;
      const existing = [...screen.querySelectorAll('.item-id-input')].map(i => i.value);
      renderItemRows(n, existing);
    });

    // mode toggle
    screen.querySelector('#tr-mode-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-mode]');
      if (btn) setMode(btn.dataset.mode);
    });

    // cart form
    _cartRef = CartForm(screen.querySelector('#tr-cart-form-host'), {
      onCartLoaded(cart) {
        if (cart) {
          showSharedFields(cart, 'cart');
        } else {
          screen.querySelector('#tr-shared-fields').hidden = true;
        }
      }
    });

    // transfer save logic (returns msg or null on error)
    function doTransferSave() {
      if (!_currentData) { Toast.show('בחר עגלה או מקור רצפה', 'error'); return null; }
      const destLoc    = screen.querySelector('#tr-dest-loc').value.trim();
      const destSubLoc = screen.querySelector('#tr-dest-subloc-group').hidden
        ? '' : screen.querySelector('#tr-dest-subloc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return null; }

      let msg;

      if (_currentType === 'cart') {
        const count   = parseInt(screen.querySelector('#tr-count').value) || 0;
        const itemIds = [...screen.querySelectorAll('.item-id-input')].map(i => i.value.trim()).filter(Boolean);
        const props   = readPropertyFields(screen.querySelector('#tr-prop-fields'));
        DB.upsertCart({
          cartId:      _currentData.cartId,
          location:    destLoc,
          subLocation: destSubLoc,
          itemCount:   count,
          itemIds,
          properties:  props,
          isEmpty:     count === 0
        });
        DB.cascadeLocationUpdate(_currentData.cartId, destLoc, destSubLoc);
        const fromLabel = _currentData.subLocation || _currentData.location || '';
        const toLabel   = destSubLoc || destLoc;
        msg = Utils.copyMessage(cartLabel(_currentData), count, props, fromLabel, toLabel, _currentData.containerType, itemIds);
        Toast.show(containerName(_currentData) + ' הועברה', 'success');
      } else {
        const moveCount = parseInt(screen.querySelector('#tr-floor-count').value) || 0;
        if (moveCount <= 0) { Toast.show('יש להזין כמות להעברה', 'error'); return null; }
        const serials = [...screen.querySelectorAll('.floor-serial-input')].map(i => i.value.trim()).filter(Boolean);

        // Remove items from source
        const srcFI = DB.findFloorItem(_currentData.location, _currentData.properties);
        if (srcFI) {
          let remainIds = [...(srcFI.itemIds || [])];
          serials.forEach(s => {
            const idx = remainIds.indexOf(s);
            if (idx >= 0) remainIds.splice(idx, 1);
          });
          const remaining = Math.max(0, (srcFI.itemCount || 0) - moveCount);
          DB.upsertFloorItem({ location: _currentData.location, properties: _currentData.properties,
                               itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
        }

        // Add items to destination
        const destFI   = DB.findFloorItem(destLoc, _currentData.properties);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + moveCount;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), ...serials];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: _currentData.properties, isEmpty: false });

        const propStr = Object.values(_currentData.properties || {}).filter(Boolean).join(' ');
        const floorFrom = _currentData.subLocation || _currentData.location || '?';
        const floorTo   = destSubLoc || destLoc;
        const serialStr = serials.length ? '\n' + serials.join('\n') : '';
        msg = `[רצפה] ${moveCount} ${propStr}\nמ${floorFrom} ל${floorTo}${serialStr}`.trim();
        Toast.show(moveCount + ' פריטי רצפה הועברו', 'success');
        screen.querySelector('#tr-floor-count').value = '';
        screen.querySelector('#tr-floor-item-rows').innerHTML = '';
        updateFloorDisplay();
      }

      // Reset screen to initial state
      _currentData = null;
      _currentType = null;
      screen.querySelector('#tr-shared-fields').hidden = true;
      screen.querySelector('#tr-dest-loc').value = '';
      screen.querySelector('#tr-dest-subloc').value = '';
      if (_cartRef) _cartRef.clear();
      return msg;
    }

    // save + send
    screen.querySelector('#tr-save-btn').addEventListener('click', () => {
      const msg = doTransferSave();
      if (msg) Utils.shareOrCopy(msg);
    });

    // save only (no WhatsApp)
    screen.querySelector('#tr-save-only-btn').addEventListener('click', () => {
      doTransferSave();
    });

    // empty cart
    screen.querySelector('#tr-empty-cart').addEventListener('click', () => {
      if (!_currentData || _currentType !== 'cart') { Toast.show('בחר עגלה', 'error'); return; }
      DB.upsertCart({ cartId: _currentData.cartId, itemCount: 0, itemIds: [], properties: {}, isEmpty: true, extraItems: [] });
      Toast.show('עגלה רוקנה', 'success');
      screen.querySelector('#tr-shared-fields').hidden = true;
      _currentData = null; _currentType = null;
    });

    Router.register('transfer', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setMode('cart');
          setTimeout(() => _cartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setMode('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#tr-floor-src-loc').value = fi.location || '';
              screen.querySelector('#tr-floor-src-loc').dispatchEvent(new Event('change'));
              buildPropertyFields(screen.querySelector('#tr-floor-src-props'), fi.properties || {});
              updateFloorDisplay();
            }
          }, 50);
        } else {
          setMode(_mode);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 7 — Screen: Load/Unload
  ════════════════════════════════════════════════════ -->
  <script>

          </div>
        </div>

        <!-- ═══ CONTAINER ON CART SECTION ═══ -->
        <div id="lu-container-section" hidden>
          <div class="form-group">
            <label class="form-label">מספר משטח / מכולה</label>
            <input id="lu-ct-id" class="form-input" placeholder="מספר מזהה" autocomplete="off">
          </div>
          <div id="lu-ct-info" class="card" style="margin:0 0 14px;display:none"></div>
          <div id="lu-ct-slots-container"></div>
          <button id="lu-ct-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">טעינה על עגלה</label>
            <input id="lu-ct-parent-cart" class="form-input" placeholder="מספר עגלה" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">יעד העברה (אופציונלי)</label>
            <input id="lu-ct-move-dest" class="form-input" placeholder="העברה ל..." autocomplete="off">
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="lu-ct-save-only" class="btn btn-outline" style="flex:1">שמור</button>
