    function copyToClipboard(text) {
      const tryModern = (navigator.clipboard && navigator.clipboard.writeText)
        ? navigator.clipboard.writeText(text)
        : Promise.reject(new Error('no clipboard api'));

      return tryModern.catch(() => new Promise((resolve, reject) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        Object.assign(ta.style, { position: 'fixed', top: '0', left: '0',
                                   opacity: '0', pointerEvents: 'none' });
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          ok ? resolve() : reject(new Error('execCommand failed'));
        } catch(e) {
          document.body.removeChild(ta);
          reject(e);
        }
      }));
    }

    function shareViaWhatsApp(text) {
      const encoded = encodeURIComponent(text);
      window.open('https://wa.me/?text=' + encoded, '_blank');
    }

    function shareOrCopy(text) {
      copyToClipboard(text).catch(() => {});
      shareViaWhatsApp(text);
    }

    function generateOffMapText(db, label) {
      const now = formatDate(Date.now());
      const meta     = db.metadata || {};
      const carts    = db.carts || {};
      const fis      = db.floorItems || {};
      const propDefs = meta.properties || [];
      const locs     = (meta.locations || []).filter(l => !l.inMap);
      const title    = `מיפוי ${label || 'חיצוני'}`;

      if (!locs.length) return `${title}\n${now}\n(אין מיקומים חיצוניים)`;

      const childrenOf = {};
      Object.values(carts).forEach(c => {
        if (c.parentCartId) {
          if (!childrenOf[c.parentCartId]) childrenOf[c.parentCartId] = [];
          childrenOf[c.parentCartId].push(c);
        }
      });

      function cartLine(c) {
        const ctLabel = (c.containerType && c.containerType !== 'עגלה') ? `${c.containerType} ` : '';
        const displayId = /^#\d+$/.test(c.cartId) ? '#' : c.cartId;
        const idLabel = displayId + (c.cartType ? '(' + c.cartType + ')' : '');
        const hasChildren = (childrenOf[c.cartId] || []).length > 0;
        let line = (c.isEmpty || !c.itemCount)
          ? (hasChildren ? `${ctLabel}${idLabel}:` : `${ctLabel}${idLabel}: empty`)
          : (`${ctLabel}${idLabel}: ${c.itemCount} ${_orderedPropValues(c.properties, propDefs)}`).trim();
        if (c.comment) line += ` # ${c.comment}`;
        return line + '\n';
      }

      function emitCartWithChildren(c) {
        let s = cartLine(c);
        (c.extraItems || []).filter(ex => ex.itemCount).forEach(ex => {
          const ctLabel = (c.containerType && c.containerType !== 'עגלה') ? `${c.containerType} ` : '';
          const exId = (/^#\d+$/.test(c.cartId) ? '#' : c.cartId) + (c.cartType ? '(' + c.cartType + ')' : '');
          const pv = _orderedPropValues(ex.properties, propDefs);
          s += (`${ctLabel}${exId}: ${ex.itemCount}${pv ? ' ' + pv : ''}`).trim() + '\n';
        });
        (childrenOf[c.cartId] || []).forEach(ch => {
          const chCt = (ch.containerType && ch.containerType !== 'עגלה') ? `${ch.containerType} ` : '';
          const chId = ch.cartId + (ch.cartType ? '(' + ch.cartType + ')' : '');
          const pv = _orderedPropValues(ch.properties, propDefs);
          s += `    ${chCt}${chId}: ${(!ch.itemCount) ? 'empty' : ch.itemCount + (pv ? ' ' + pv : '')}\n`;
          (ch.extraItems || []).forEach(sl => {
            if (!sl.itemCount) return;
            const spv = _orderedPropValues(sl.properties, propDefs);
            s += `    ${chCt}${chId}: ${sl.itemCount}${spv ? ' ' + spv : ''}\n`;
          });
        });
        return s;
      }

      function emitGrouped(cartList, fiList) {
        const sections = [];
        const emptyCarts = cartList.filter(c => c.isEmpty || !c.itemCount);
        const fullCarts  = cartList.filter(c => !c.isEmpty && c.itemCount);
        const emptyByType = {};
        emptyCarts.forEach(c => {
          const key = /^#\d+$/.test(c.cartId) ? c.cartId : (c.cartType || '');
          (emptyByType[key] = emptyByType[key] || []).push(emitCartWithChildren(c));
        });
        Object.values(emptyByType).forEach(lines => sections.push(lines.join('')));
        const fullByProps = {};
        fullCarts.forEach(c => {
          const key = /^#\d+$/.test(c.cartId) ? c.cartId : Object.values(c.properties || {}).filter(Boolean).join(' ');
          (fullByProps[key] = fullByProps[key] || []).push(emitCartWithChildren(c));
        });
        Object.values(fullByProps).forEach(lines => sections.push(lines.join('')));
        const floorLines = fiList.filter(fi => !fi.isEmpty && fi.itemCount).map(fi =>
          `${_orderedPropValues(fi.properties, propDefs)} - ${fi.itemCount}`.trim() + '\n');
        if (floorLines.length) sections.push(floorLines.join(''));
        return sections.join('\n');
      }

      let out = `${title}\n${now}\n`;
      for (const loc of locs) {
        out += `\n${loc.name}:\n`;
        const subs = loc.subLocations || [];
        const noSubCarts = Object.values(carts).filter(c => c.location === loc.name && !c.parentCartId && !c.subLocation);
        const noSubFIs   = Object.values(fis).filter(fi => fi.location === loc.name && !fi.subLocation);
        out += emitGrouped(noSubCarts, noSubFIs);
        for (const sub of subs) {
          const subCarts = Object.values(carts).filter(c => c.location === loc.name && !c.parentCartId && c.subLocation === sub);
          const subFIs   = Object.values(fis).filter(fi => fi.location === loc.name && fi.subLocation === sub);
          if (!subCarts.length && !subFIs.length) continue;
          out += `\n${sub}:\n`;
          out += emitGrouped(subCarts, subFIs);
        }
        out += '==============================\n';
      }
      return out.trim();
    }

    return { base64Encode, base64Decode, formatDate, generateExportText,
             parseImportText, generateMapText, generateOffMapText, copyMessage,
             copyToClipboard, shareOrCopy, orderedPropValues: _orderedPropValues };
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════

  ════════════════════════════════════════════════════ -->
  <script>
  const Router = (() => {
    const _screens = {};
    let _current = null;

    function register(name, handlers) {
      _screens[name] = handlers;
    }

    function navigate(name, params) {
      const screenEl = document.getElementById('screen-' + name);
      if (!screenEl) return;

      // hide ALL other screens (robust against stale _current / tab restore)
      document.querySelectorAll('.screen').forEach(s => {
        s.hidden = (s !== screenEl);
      });

      screenEl.hidden = false;
      _current = name;

      // Reset scroll so the screen header is always visible at top
      const _sc = document.getElementById('screen-container');
      if (_sc) _sc.scrollTop = 0;

      // update nav active state
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.screen === name);
      });

      if (_screens[name] && _screens[name].onShow) {
        _screens[name].onShow(params || {});
      }
    }

    function getCurrent() { return _current; }

    window.addEventListener('hashchange', () => {
      const name = location.hash.replace('#','') || 'main';
      navigate(name);
    });

    return { register, navigate, getCurrent };
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════

  ════════════════════════════════════════════════════ -->
  <script>
  // ── Drag-and-drop reorder ──
  function _initReorder(container, opts) {
    const { handleSelector, itemSelector, onReorder } = opts;
    let _dragEl = null, _placeholder = null, _startY = 0, _longPressTimer = null;
    let _dragging = false, _items = [], _fromIdx = -1;

    function getItems() { return [...container.querySelectorAll(itemSelector)]; }

    function haptic() {
      if (navigator.vibrate) navigator.vibrate(15);
    }

    function startDrag(el, clientY) {
      _dragging = true;
      _dragEl = el;
      _items = getItems();
      _fromIdx = _items.indexOf(el);
      _startY = clientY;
      haptic();

      // Create placeholder
      _placeholder = document.createElement('div');
      _placeholder.className = 'reorder-placeholder';
      _placeholder.style.height = el.offsetHeight + 'px';
      el.parentNode.insertBefore(_placeholder, el);

      // Style dragged element
      el.classList.add('dragging');
      el.style.position = 'fixed';
      el.style.left = '0';
      el.style.right = '0';
      el.style.width = container.offsetWidth + 'px';
      const rect = _placeholder.getBoundingClientRect();
      el.style.top = rect.top + 'px';
      el.style.zIndex = '100';
      document.body.appendChild(el);
    }

    function moveDrag(clientY) {
      if (!_dragging || !_dragEl) return;
      const dy = clientY - _startY;
      const placeholderRect = _placeholder.getBoundingClientRect();
      _dragEl.style.top = (placeholderRect.top + dy) + 'px';

      // Find drop target
      const items = getItems();
      for (const item of items) {
        if (item === _dragEl) continue;
        const r = item.getBoundingClientRect();
        const midY = r.top + r.height / 2;
        if (clientY < midY) {
          item.parentNode.insertBefore(_placeholder, item);
          _startY = clientY;
          return;
        }
      }
      // Past last item
      if (items.length) {
        const last = items[items.length - 1];
        if (last !== _dragEl) {
          last.parentNode.insertAfter ? last.parentNode.insertAfter(_placeholder, last) :
            last.parentNode.insertBefore(_placeholder, last.nextSibling);
          _startY = clientY;
        }
      }
    }

    function endDrag() {
      if (!_dragging || !_dragEl) return;
      _dragging = false;

      // Insert element back at placeholder position
      _placeholder.parentNode.insertBefore(_dragEl, _placeholder);
      _placeholder.remove();
      _placeholder = null;

      // Reset styles
      _dragEl.classList.remove('dragging');
      _dragEl.style.position = '';
      _dragEl.style.left = '';
      _dragEl.style.right = '';
      _dragEl.style.width = '';
      _dragEl.style.top = '';
      _dragEl.style.zIndex = '';

      // Compute new index
      const newItems = getItems();
      const toIdx = newItems.indexOf(_dragEl);
      if (toIdx !== -1 && toIdx !== _fromIdx) {
        onReorder(_fromIdx, toIdx);
      }
      _dragEl = null;
    }

    function cancelLongPress() {
      if (_longPressTimer) { clearTimeout(_longPressTimer); _longPressTimer = null; }
    }

    container.addEventListener('pointerdown', e => {
      const handle = e.target.closest(handleSelector);
      if (!handle) return;
      const item = handle.closest(itemSelector);
      if (!item) return;
      e.preventDefault();

      const startY = e.clientY;
      _longPressTimer = setTimeout(() => {
        _longPressTimer = null;
        startDrag(item, startY);
      }, 200); // slightly longer than normal press

      const onMove = ev => {
        if (!_dragging) {
          // If moved too much before long press fires, cancel
          if (Math.abs(ev.clientY - startY) > 5) cancelLongPress();
          return;
        }
        ev.preventDefault();
        moveDrag(ev.clientY);
      };
      const onUp = () => {
        cancelLongPress();
        if (_dragging) endDrag();
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onUp);
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    });
  }

  // ── Autocomplete ──
  // makeAutocomplete(inputEl, getOptions)
  // getOptions: () => string[]  — called lazily on each keystroke
  function makeAutocomplete(input, getOptions) {
    // Remove any existing dropdown for this input (handles re-renders)
    const existId = input.id ? ('ac-' + input.id) : null;
    if (existId) { const old = document.getElementById(existId); if (old) old.remove(); }

    const dropdown = document.createElement('div');
    dropdown.className = 'ac-dropdown';
    if (existId) dropdown.id = existId;
    dropdown.style.cssText = 'position:fixed;z-index:300;display:none';
    document.body.appendChild(dropdown);

    let _isOpen = false;
    let _interacting = false; // true while user is touching/scrolling the dropdown
    let _didScroll = false;   // true if touchmove fired (scroll gesture, not tap)

    function position() {
      const r = input.getBoundingClientRect();
      dropdown.style.top   = r.bottom + 'px';
      dropdown.style.left  = r.left   + 'px';
      dropdown.style.width = r.width  + 'px';
    }

    function render() {
      const opts = getOptions();
      const q = input.value.trim().toLowerCase();
      const filtered = q ? opts.filter(o => String(o).toLowerCase().includes(q)) : opts;
      if (!filtered.length) { hide(); return; }
      position();
      dropdown.innerHTML = filtered.map(o => `<div class="ac-item">${esc(o)}</div>`).join('');
      dropdown.style.display = '';
      _isOpen = true;
      dropdown.querySelectorAll('.ac-item').forEach((item, i) => {
        const pick = () => {
          input.value = filtered[i];
          input.dispatchEvent(new Event('change', { bubbles: true }));
          hide();
        };
        item.addEventListener('mousedown', e => { e.preventDefault(); pick(); });
        item.addEventListener('touchend',  e => { if (_didScroll) return; e.preventDefault(); pick(); });
      });
    }

    function hide() { dropdown.style.display = 'none'; dropdown.innerHTML = ''; _isOpen = false; _interacting = false; }

    // Prevent dropdown's own scroll from closing it; only close on outside scroll
    dropdown.addEventListener('scroll', e => { e.stopPropagation(); }, { passive: true });
    // Track touch interaction on dropdown to prevent blur from closing it
    dropdown.addEventListener('touchstart', () => { _interacting = true; _didScroll = false; }, { passive: true });
    dropdown.addEventListener('touchmove', () => { _didScroll = true; }, { passive: true });
    dropdown.addEventListener('touchend', () => { setTimeout(() => { _interacting = false; }, 100); }, { passive: true });
    dropdown.addEventListener('mousedown', () => { _interacting = true; });
    dropdown.addEventListener('mouseup', () => { setTimeout(() => { _interacting = false; }, 100); });

    // Close dropdown on outside scroll — but not on the dropdown's own scroll
    function onOutsideScroll(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target)) return;
      // Reposition instead of hiding, so scrolling the page keeps the dropdown aligned
      position();
    }
    function addScrollListeners() {
      let el = input.parentElement;
      while (el) { el.addEventListener('scroll', onOutsideScroll, { passive: true }); el = el.parentElement; }
      window.addEventListener('scroll', onOutsideScroll, { passive: true });
    }
    function removeScrollListeners() {
      let el = input.parentElement;
      while (el) { el.removeEventListener('scroll', onOutsideScroll); el = el.parentElement; }
      window.removeEventListener('scroll', onOutsideScroll);
    }

    // Close on tap outside (not on the dropdown or input)
    function onDocumentTouch(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target) || input.contains(e.target)) return;
      hide();
    }
    function onDocumentMousedown(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target) || input.contains(e.target)) return;
      hide();
    }

    input.addEventListener('input', render);
    input.addEventListener('focus', () => {
      addScrollListeners();
      document.addEventListener('touchstart', onDocumentTouch, { passive: true });
      document.addEventListener('mousedown', onDocumentMousedown);
      render();
    });
    input.addEventListener('blur', () => {
      // Only hide if not interacting with the dropdown
      setTimeout(() => {
        if (!_interacting) hide();
        removeScrollListeners();
        document.removeEventListener('touchstart', onDocumentTouch);
        document.removeEventListener('mousedown', onDocumentMousedown);
      }, 200);
    });
    input.addEventListener('click', () => { if (!_isOpen) render(); });
    input.addEventListener('keydown', e => { if (e.key === 'Escape') hide(); });
  }

  // ── Location + conditional sublocation ──
  // For non-map locations: autocomplete also offers "loc / subloc" combined entries.
  // Selecting a combined entry auto-fills both fields.
  function locationSuggestions() {
    const locs = DB.getMetadata().locations;
    const out = [];
    for (const l of locs) {
      out.push(l.name);
      if (!l.inMap && l.subLocations && l.subLocations.length) {
        for (const sub of l.subLocations) out.push(`${l.name} / ${sub}`);
      }
    }
    return out;
  }

  // WhatsApp location label: inMap → always main location only; non-inMap → show only subLoc
  function waMsgLoc(locName, subLoc) {
    const loc = DB.getMetadata().locations.find(l => l.name === locName);
    if (!loc) return subLoc || locName || '';
    if (!loc.inMap && subLoc) return subLoc;
    return locName || '';
  }
  // Handle raw "loc / sub" strings from free-text inputs (e.g. per-item dest)
  function waMsgLocRaw(raw) {
    if (!raw) return '';
    const sep = raw.indexOf(' / ');
    if (sep !== -1) return waMsgLoc(raw.slice(0, sep).trim(), raw.slice(sep + 3).trim());
    return waMsgLoc(raw, '');
  }

  function setupLocationFields(locInput, subGroup, subInput, sub2Group, sub2Input) {
    makeAutocomplete(locInput, locationSuggestions);
    makeAutocomplete(subInput, () => {
      const loc = DB.getMetadata().locations.find(l => l.name === locInput.value.trim());
      return (loc && loc.subLocations) || [];
    });
    if (sub2Input) {
      makeAutocomplete(sub2Input, () => {
        const loc = DB.getMetadata().locations.find(l => l.name === locInput.value.trim());
        return (loc && loc.subLocations) || [];
      });
    }

    function updateSub() {
      let locName = locInput.value.trim();
      const sepIdx = locName.indexOf(' / ');
      if (sepIdx !== -1) {
        const mainLoc = locName.slice(0, sepIdx);
        const subVal  = locName.slice(sepIdx + 3);
        locInput.value = mainLoc;
        locName = mainLoc;
        subInput.value = subVal;
      }
      const loc     = DB.getMetadata().locations.find(l => l.name === locName);
      const subs    = loc && loc.subLocations && loc.subLocations.length;
      const offMap  = loc && !loc.inMap;
      subGroup.hidden = !subs;
      if (!subs) subInput.value = '';
      if (sub2Group) {
        sub2Group.hidden = !(subs && offMap);
        if (!(subs && offMap) && sub2Input) sub2Input.value = '';
      }
    }

    locInput.addEventListener('change', updateSub);
    locInput.addEventListener('input',  updateSub);
    updateSub();
  }

  // ── Bottom Nav ──

  // ── Modal ──

  // ── Toast ──

  // ── Container type helpers ──
  const DEFAULT_CONTAINER = 'עגלה';

  function containerName(cart) {
    return (cart && cart.containerType) || DEFAULT_CONTAINER;
  }

  // ── cartLabel ──
  // Returns "cartId(cartType)" or just "cartId", with container type badge if non-default
  function cartLabel(cart) {
    if (!cart) return '';
    let label = cart.cartId + (cart.cartType ? '(' + cart.cartType + ')' : '');
    if (cart.containerType && cart.containerType !== DEFAULT_CONTAINER) {
      label += ' [' + cart.containerType + ']';
    }
    return label;
  }

  // ── msgCartLabel ──
  // Like cartLabel but without the [containerType] bracket — for WhatsApp messages
  function msgCartLabel(cart) {
    if (!cart) return '';
    return cart.cartId + (cart.cartType ? '(' + cart.cartType + ')' : '');
  }

  // ── cartTotalCount ──
  // Total items across all slots (slot 0 + extraItems)
  function cartTotalCount(cart) {
    if (!cart) return 0;
    const slot0  = cart.itemCount || 0;
    const extras = (cart.extraItems || []).reduce((s, e) => s + (e.itemCount || 0), 0);
    return slot0 + extras;
  }

  // ── Cart validation helpers ──
  // Returns a warning string if cart slots violate homogeneity rule, else null.
  // Rule: at most 2 distinct property-value sets across all non-empty slots,
  // and those 2 sets must differ in at most 1 property.
  // Returns an array of warning strings (one per issue) for slot homogeneity violations,
  // each including full property details of every affected slot.
  function validateCartSlotsHomogeneity(cartData) {
    const propDefs = (typeof DB !== 'undefined' ? DB.getMetadata().properties : null) || [];
    const allSlots = [
      { count: cartData.itemCount || 0, props: cartData.properties || {}, idx: 1 },
      ...(cartData.extraItems || []).map((s, i) => ({ count: s.itemCount || 0, props: s.properties || {}, idx: i + 2 }))
    ].filter(s => s.count > 0);
    if (allSlots.length < 2) return null;

    function slotDesc(s) {
      const propStr = propDefs
        .map(p => s.props[p.name] ? `${p.name}: ${s.props[p.name]}` : null)
        .filter(Boolean).join(', ');
      return `סלוט ${s.idx}: ${s.count} פריטים${propStr ? ' | ' + propStr : ' | (ללא מאפיינים)'}`;
    }

    // Collapse mixing-pair values to a canonical form so they fingerprint identically
    function normVal(propName, val) {
      if (!val) return '';
      const pd = propDefs.find(p => p.name === propName);
      if (pd && pd.mixingPairs) {
        for (const [a, b] of pd.mixingPairs) {
          if (val === a || val === b) return '\x00' + [a, b].sort().join('\x01') + '\x00';
        }
      }
      return val;
    }
    const fingerprint = props => JSON.stringify(
      Object.fromEntries(Object.entries(props).filter(([,v]) => v).map(([k,v]) => [k, normVal(k,v)]).sort())
    );
    const byFp = new Map();
    allSlots.forEach(s => { if (!byFp.has(fingerprint(s.props))) byFp.set(fingerprint(s.props), s.props); });
    const uniqueSets = [...byFp.values()]; // original props, one per normalized group
    if (uniqueSets.length <= 1) return null;

    const slotDescs = allSlots.map(slotDesc).join('\n');
    if (uniqueSets.length > 2) {
      return `ישנם ${uniqueSets.length} סוגי פריטים שונים (מותר עד 2):\n${slotDescs}`;
    }
    const [a, b] = uniqueSets;
    const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
    // Only count diffs where normalized values also differ (mixing pairs are transparent)
    const diffs = [...allKeys].filter(k => normVal(k, a[k] || '') !== normVal(k, b[k] || ''));
    if (diffs.length > 1) {
      const diffNames = diffs.map(k => {
        const def = propDefs.find(p => p.name === k);
        const name = (def || {}).name || k;
        return `${name}: "${a[k] || '-'}" vs "${b[k] || '-'}"`;
      });
      return `2 סוגי הפריטים שונים ב-${diffs.length} מאפיינים (מותר הבדל במאפיין אחד בלבד):\n${diffNames.join('\n')}\n\nפרטי הסלוטים:\n${slotDescs}`;
    }
    return null;
  }

  // Returns a warning string if cartId already exists in DB with a different containerType.
  function checkCartTypeConflict(cartId, newContainerType) {
    if (!cartId) return null;
    const existing = DB.getCart(cartId);
    if (!existing) return null;
    const oldType = existing.containerType || DEFAULT_CONTAINER;
    const newType = newContainerType || DEFAULT_CONTAINER;
    if (oldType !== newType) {
      return `קיים כבר ${oldType} עם מספר "${cartId}" — לא ניתן להוסיף ${newType} עם אותו מספר`;
    }
    return null;
  }

  // Shows a modal listing validation issues with Cancel / Confirm-anyway actions.
  function showValidationWarning(issues, onConfirm, onCancel, title) {
    Modal.open({
      title: title || Lang.T('אזהרת נתונים', 'Advertencia de datos'),
      html: `<div style="font-weight:600;color:var(--danger);margin-bottom:8px">⚠ ${Lang.T('נמצאו בעיות:', '¡Se encontraron problemas!')}</div>
        <ul style="margin:0;padding-right:20px;color:var(--danger);line-height:1.8">
          ${issues.map(i => `<li style="white-space:pre-wrap">${esc(i)}</li>`).join('')}
        </ul>`,
      actions: [
        { id: 'vw-ok', label: Lang.T('אשר בכל זאת', 'Confirmar de todas formas'), cls: 'btn-danger', onClick: () => { Modal.close(); onConfirm(); } },
        { id: 'vw-cancel', label: Lang.T('ביטול', 'Cancelar'), cls: 'btn-outline', onClick: () => { Modal.close(); if (onCancel) onCancel(); } }
      ]
    });
  }

  // Shows the "already exists" duplicate cart warning with a strongly-worded message.
  function showDuplicateCartWarning(cartType, cartId, existingCart, onConfirm, onCancel) {
    const details = Lang.T(
      `${cartType} מספר "${cartId}" כבר קיים${existingCart && existingCart.location ? ` במיקום ${existingCart.location}` : ''}`,
      `${cartType} número "${cartId}" ya existe${existingCart && existingCart.location ? ` en ${existingCart.location}` : ''}`
    );
    Modal.open({

        ${Lang.T('אתה מטומטם? יש כבר עגלה כזאת', '¡¿¡¿¡QUE!?!?!\nEres pendejo, ya existe este carrito!!!')}
      </div>
      <div style="color:var(--danger)">${esc(details)}</div>`,
      actions: [
        { id: 'dup-ok', label: Lang.T('אשר בכל זאת', 'Confirmar de todas formas'), cls: 'btn-danger', onClick: () => { Modal.close(); onConfirm(); } },
        { id: 'dup-cancel', label: Lang.T('ביטול', 'Cancelar'), cls: 'btn-outline', onClick: () => { Modal.close(); if (onCancel) onCancel(); } }
      ]
    });
  }

  // Validate all carts in an importedDb object against existing DB. Returns array of issue strings.
  function collectImportValidationIssues(importedDb) {
    const issues = [];
    for (const [cartId, cart] of Object.entries(importedDb.carts || {})) {
      const sh = validateCartSlotsHomogeneity(cart);
      if (sh) issues.push(`${containerName(cart)} ${cartId}: ${sh}`);
    }
    return issues;
  }

  // ── Capacity Feature Helper ───────────────────────────────────────────────────
  // Returns { used, feat } for a location, or null if no capacity feature is configured.
  // Counts each non-child cart at the location: for each slot, adds feat.values[propVal].
  function _calcLocCapacityUsage(locName) {
    const feat = DB.getCapacityFeature();
    if (!feat || !feat.category || !feat.values) return null;
    const carts = DB.getAllCarts().filter(c => c.location === locName && !c.parentCartId);
    let used = 0;
    for (const cart of carts) {
      const slots = [cart.properties || {}, ...(cart.extraItems || []).map(e => e.properties || {})];
      for (const props of slots) {
        const val = props[feat.category];
        if (val && feat.values[val]) used += Number(feat.values[val]) || 0;
      }
    }
    return { used, feat };
  }

  // ── Map Health Check ─────────────────────────────────────────────────────────
  // Scans the whole DB after a map save and returns an array of issue objects.
  function scanMapIssues() {
    const issues = [];
    const meta = DB.getMetadata();
    const propDefs = meta.properties || [];
    const allCarts = DB.getAllCarts();

    // Build valid option sets per property (case-insensitive)
    const validOptions = {};
    propDefs.forEach(p => {
      if (p.options && p.options.length) {
        validOptions[p.name] = new Set(p.options.map(o => String(o).toLowerCase()));
      }
    });

    allCarts.forEach(cart => {
      const lbl = cartLabel(cart);

      // 1. Slot homogeneity
      const sh = validateCartSlotsHomogeneity(cart);
      if (sh) {
        issues.push({
          type: 'homogeneity', icon: '⚠️', groupLabel: Lang.T('חוסר אחידות בין משבצות', 'Inconsistencia entre slots'),
          label: lbl, description: sh.split('\n')[0],
          autoFix: null, editKey: cart.cartId,
        });
      }

      // 2. Invalid property values (only for props with defined option lists)
      const slots = [
        { props: cart.properties || {}, slot: Lang.T('משבצת 1', 'Slot 1') },
        ...(cart.extraItems || []).map((e, i) => ({ props: e.properties || {}, slot: Lang.T('משבצת ', 'Slot ') + (i + 2) }))
      ];
      slots.forEach(({ props, slot }) => {
        propDefs.forEach(p => {
          if (!validOptions[p.name]) return;
          const val = (props[p.name] || '').trim();
          if (!val) return;
          if (!validOptions[p.name].has(val.toLowerCase())) {
            issues.push({
              type: 'invalid-prop', icon: '❓', groupLabel: Lang.T('ערך מאפיין לא מוכר', 'Valor de atributo no reconocido'),
              label: lbl, description: `${slot}: "${p.name}" — "${val}"`,
              autoFix: null, editKey: cart.cartId,
            });
          }
        });
      });

      // 3. Orphaned child (parentCartId → non-existent cart)
      if (cart.parentCartId) {
        const parent = DB.getCart(cart.parentCartId);
        if (!parent) {
          const snap = Object.assign({}, cart);
          issues.push({
            type: 'orphaned-child', icon: '🔗', groupLabel: Lang.T('טעונה על הורה שאינו קיים', 'Cargado sobre padre inexistente'),
            label: lbl, description: Lang.T('מוגדרת כטעונה על "', 'Definido como cargado sobre "') + cart.parentCartId + '"',
            autoFix: () => DB.upsertCart(Object.assign({}, snap, { parentCartId: null })),
            autoFixLabel: Lang.T('נקה הורה', 'Limpiar padre'),
            editKey: null,
          });
        }
      }

      // 4. Max item count exceeded
      if (cart.cartType) {
        const maxItems = DB.getCartTypeMax(cart.cartType);
        if (maxItems !== null) {
          const total = cartTotalCount(cart);
          if (total > maxItems) {
            issues.push({
              type: 'over-max', icon: '🔢', groupLabel: Lang.T('חריגה ממקסימום פריטים', 'Excede máximo de ítems'),
              label: lbl, description: `${total} ${Lang.T('פריטים (מקסימום: ', 'ítems (máximo: ')}${maxItems})`,
              autoFix: null, editKey: cart.cartId,
            });
          }
        }
      }

      // 5. Child-parent location mismatch
      if (cart.parentCartId) {
        const parent = DB.getCart(cart.parentCartId);
        if (parent && (parent.location !== cart.location || (parent.subLocation || '') !== (cart.subLocation || ''))) {
          const snap = Object.assign({}, cart);
          const parentLoc = parent.location + (parent.subLocation ? ' / ' + parent.subLocation : '');
          const childLoc = cart.location + (cart.subLocation ? ' / ' + cart.subLocation : '');
          issues.push({
            type: 'loc-mismatch', icon: '📍', groupLabel: Lang.T('מיקום שונה מהורה', 'Ubicación distinta al padre'),
            label: lbl, description: `${childLoc} ← ${Lang.T('צפוי: ', 'esperado: ')}${parentLoc}`,
            autoFix: () => DB.upsertCart(Object.assign({}, snap, { location: parent.location, subLocation: parent.subLocation || '' })),
            autoFixLabel: Lang.T('יישר', 'Alinear'),
            editKey: null,
          });
        }
      }
    });

    // 5. Location over-capacity (count of top-level carts > location.maxPlaces)
    const locMeta = meta.locations || [];
    const locOccupied = {};
    allCarts.forEach(c => {
      if (c.location && !c.parentCartId) locOccupied[c.location] = (locOccupied[c.location] || 0) + 1;
    });
    locMeta.forEach(loc => {
      if (!loc.maxPlaces) return;
      const occ = locOccupied[loc.name] || 0;
      if (occ > loc.maxPlaces) {
        issues.push({
          type: 'loc-overcapacity', icon: '🏠', groupLabel: Lang.T('מיקום מעל קיבולת', 'Ubicación sobre capacidad'),
          label: loc.name,
          description: `${occ} ${Lang.T('עגלות (מקסימום: ', 'carretas (máximo: ')}${loc.maxPlaces})`,
          autoFix: null, editKey: null,
        });
      }
    });

    // 6. Capacity feature limit exceeded
    locMeta.forEach(loc => {
      if (!loc.capacityLimit) return;
      const cap = _calcLocCapacityUsage(loc.name);
      if (cap && cap.used > loc.capacityLimit) {
        const fname = cap.feat.name || 'תכונה';
        issues.push({

  function showMapReviewModal() {

      list.forEach((iss, i) => {

  // ── CartForm ──
  // Creates a cart ID input with autocomplete datalist inside `container`
  let _cartFormSeq = 0;
  function CartForm(container, { onCartLoaded, cartFilter } = {}) {
    const inputId = 'cart-id-input-' + (++_cartFormSeq);
    container.innerHTML = `
      <div class="form-group">
        <label class="form-label">מספר עגלה</label>
        <input id="${inputId}" class="form-input cart-id-input"
               placeholder="8-6(110)" autocomplete="off">
      </div>
    `;
    const input = container.querySelector('.cart-id-input');
    makeAutocomplete(input, () => {
      const all = DB.getAllCarts();
      return (cartFilter ? all.filter(cartFilter) : all).map(c => cartLabel(c));
    });

    function lookup() {
      const raw = input.value.trim();
      const id  = raw.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!id) { if (onCartLoaded) onCartLoaded(null); return; }
      // Only match if the input exactly equals cartLabel(cart) — no fuzzy/closest selection
      const all = DB.getAllCarts();
      const pool = cartFilter ? all.filter(cartFilter) : all;
      const cart = pool.find(c => cartLabel(c) === raw) || null;
      if (onCartLoaded) onCartLoaded(cart);
    }

    input.addEventListener('change', lookup);
    input.addEventListener('input', () => {
      // only auto-lookup if the value exactly matches a known cart label
      const raw = input.value.trim();
      const all = DB.getAllCarts();
      const pool = cartFilter ? all.filter(cartFilter) : all;
      if (pool.some(c => cartLabel(c) === raw)) lookup();
    });

    return {
      getValue: () => input.value.trim(),
      setValue(val) {
        input.value = val; // val may be "8" or "8(110)" — lookup strips suffix
        input.dispatchEvent(new Event('change', { bubbles: true }));
      },
      clear() { input.value = ''; },
      focus() { input.focus(); }
    };
  }

  // ── buildPropertyFields ──
  // Renders property dropdowns from metadata into a container element
  // Supports conditional visibility: if p.condition is an array of {prop, value},
  // the field is shown when ANY condition matches (OR logic).
  // Legacy single {prop, value} objects are normalized to an array.
  function normalizeConditions(cond) {
    if (!cond) return null;
    if (Array.isArray(cond)) return cond.length ? cond : null;
    if (cond.prop) return [cond];
    return null;
  }
  function buildPropertyFields(container, currentValues) {
    const props = DB.getMetadata().properties;
    if (!props.length) {
      container.innerHTML = '<p class="card-meta" style="padding:8px 0">אין מאפיינים מוגדרים. הוסף מאפיינים בלשונית עריכה.</p>';
      return;
    }
    container.innerHTML = props.map(p => {
      const conds = normalizeConditions(p.condition);
      const condAttr = conds ? `data-cond-json="${esc(JSON.stringify(conds))}"` : '';
      // Initially hidden if conditional and no condition met
      const isVisible = !conds || (currentValues && conds.some(c => c.value ? currentValues[c.prop] === c.value : !currentValues[c.prop]));
      return `
      <div class="form-group prop-field-group" data-field-name="${esc(p.name)}" ${condAttr} ${isVisible ? '' : 'hidden'}>
        <label class="form-label">${esc(p.name)}</label>
        <select class="form-select" name="${esc(p.name)}">
          <option value="">— בחר —</option>
          ${p.options.map(o => `<option value="${esc(o)}" ${(currentValues && currentValues[p.name] === o) ? 'selected' : ''}>${esc(o)}</option>`).join('')}
        </select>
      </div>`;
    }).join('');

    // Wire up conditional visibility: when a select changes, show/hide dependent fields
    function updateConditions() {
      container.querySelectorAll('.prop-field-group[data-cond-json]').forEach(group => {
        const conds = JSON.parse(group.dataset.condJson);
        const show = conds.some(c => {
          const depSel = container.querySelector(`select[name="${CSS.escape(c.prop)}"]`);
          if (!depSel) return false;
          return c.value ? depSel.value === c.value : !depSel.value;
        });
        group.hidden = !show;
        // Clear selection when hidden so it doesn't pollute saved data
        if (!show) {
          const sel = group.querySelector('select');
          if (sel) sel.value = '';
        }
      });
    }
    container.querySelectorAll('select').forEach(sel => {
      sel.addEventListener('change', updateConditions);
    });
  }

  // ── readPropertyFields ──
  function readPropertyFields(container) {
    const result = {};
    container.querySelectorAll('select[name]').forEach(sel => {
      if (sel.value) result[sel.name] = sel.value;
    });
    return result;
  }
  </script>

          for (const id of getDescendantIds(excludeId)) exclude.add(id);
        }
        sel.innerHTML = `<option value="">${Lang.T('— ללא —', '— Ninguno —')}</option>` +
          carts.filter(c => !exclude.has(c.cartId))
               .sort((a,b) => a.cartId.localeCompare(b.cartId))
               .map(c => `<option value="${esc(c.cartId)}">${esc(cartLabel(c))}</option>`).join('');
      }

      renderList();
      renderCartTypeOptions();
      renderTypeList();
      renderContainerTypeOptions();
      renderContainerTypeList();
      renderParentOptions(null);
      updateFormLabels();
      makeAutocomplete(tabContent.querySelector('#ec-cartid'), () => DB.getMetadata().carts);
      tabContent.querySelector('#ec-containertype').addEventListener('change', updateFormLabels);
      setupLocationFields(
        tabContent.querySelector('#ec-loc'),
        tabContent.querySelector('#ec-subloc-group'),
        tabContent.querySelector('#ec-subloc')
      );

      // save
      tabContent.querySelector('#ec-save').addEventListener('click', () => {
        const cartId   = tabContent.querySelector('#ec-cartid').value.trim();
        if (!cartId) { Toast.show(Lang.T('יש להזין מספר מזהה', 'Ingresa un número de ID'), 'error'); return; }
        const containerType = tabContent.querySelector('#ec-containertype').value || 'עגלה';
        const cartType = tabContent.querySelector('#ec-carttype').value;
        if (containerType === DEFAULT_CONTAINER && !cartType) { Toast.show(Lang.T('עגלה חייבת להיות עם סוג', 'La carreta requiere un tipo'), 'error'); return; }
        const loc      = tabContent.querySelector('#ec-loc').value.trim();
        const subLoc   = tabContent.querySelector('#ec-subloc-group').hidden
          ? '' : tabContent.querySelector('#ec-subloc').value.trim();
        const parentCartId = tabContent.querySelector('#ec-parent').value || null;
        const doCreate = () => {
          DB.upsertCart({ cartId, cartType, containerType, location: loc, subLocation: subLoc,
                          parentCartId,
                          isEmpty: false, itemCount: 0, itemIds: [], properties: {} });
          Toast.show(containerType + Lang.T(' נשמרה', ' guardada'), 'success');
          renderList();
          renderParentOptions(null);
          tabContent.querySelector('#ec-cartid').value = '';
          tabContent.querySelector('#ec-carttype').value = '';
          tabContent.querySelector('#ec-loc').value = '';
          tabContent.querySelector('#ec-subloc').value = '';
          tabContent.querySelector('#ec-parent').value = '';
        };
        const existing = DB.getCart(cartId);
        const existingType = existing ? (existing.containerType || DEFAULT_CONTAINER) : null;
        // Only warn if same cartId AND same container type AND same numeric cart type
        // (66(11a) and 66(14) are different carts: numeric types 11 ≠ 14)
        const sameNumericType = existing &&
          (existing.cartType || '').replace(/[a-zA-Z]+$/, '') === (cartType || '').replace(/[a-zA-Z]+$/, '');
        if (existing && existingType === (containerType || DEFAULT_CONTAINER) && sameNumericType) {
          showDuplicateCartWarning(containerType || DEFAULT_CONTAINER, cartId, existing, doCreate);
        } else {
          doCreate();
        }
      });

      // edit / delete delegation
      tabContent.querySelector('#ec-list').addEventListener('click', e => {
        const editBtn = e.target.closest('.ec-edit-btn');
        const delBtn  = e.target.closest('.ec-del-btn');
        if (editBtn) {
          const cart = DB.getCart(editBtn.dataset.id);
          if (!cart) return;
          tabContent.querySelector('#ec-containertype').value = cart.containerType || 'עגלה';
          updateFormLabels();
          tabContent.querySelector('#ec-cartid').value = cart.cartId;
          tabContent.querySelector('#ec-carttype').value = cart.cartType || '';
          const ecLoc = tabContent.querySelector('#ec-loc');
          ecLoc.value = cart.location || '';

          tabContent.querySelector('#ec-subloc').value = cart.subLocation || '';
          renderParentOptions(cart.cartId);
          tabContent.querySelector('#ec-parent').value = cart.parentCartId || '';
          tabContent.querySelector('#ec-cartid').scrollIntoView({ behavior: 'smooth' });
        }
        if (delBtn) {
          const delCart = DB.getCart(delBtn.dataset.id) || { cartId: delBtn.dataset.id };

          Modal.open({
            title: Lang.T('מחיקת ', 'Eliminar ') + delCtName,
            html: `<p>${Lang.T('האם למחוק את ה', '¿Eliminar ')}${esc(delCtName)} <strong>${esc(cartLabel(delCart))}</strong>${Lang.T('?', '?')}</p>`,
            actions: [

                DB.deleteCart(delBtn.dataset.id);

                Toast.show(delCtName + Lang.T(' נמחקה', ' eliminada'), 'info');
                renderList();

              { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }

          });

      // cart type add / delete
      tabContent.querySelector('#ec-addtype-btn').addEventListener('click', () => {

                renderCartTypeOptions(); renderTypeList(); renderList();
                Toast.show(Lang.T('סוג שונה', 'Tipo renombrado'), 'success');
              }},
              { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
            ]
          });
          return;
        }
        const delBtn = e.target.closest('.ec-deltype-btn');
        if (!delBtn) return;
        Modal.open({
          title: Lang.T('מחיקת סוג', 'Eliminar tipo'),
          html: `<p>האם למחוק את הסוג <strong>${esc(delBtn.dataset.type)}</strong>?</p>`,
          actions: [
            { id: 'del', label: Lang.T('מחק', 'Eliminar'), cls: 'btn-danger', onClick: () => {

              renderCartTypeOptions();
              renderTypeList();
              Toast.show(Lang.T('סוג נמחק', 'Tipo eliminado'), 'info');

      // container type add / delete
      tabContent.querySelector('#ec-addcontainertype-btn').addEventListener('click', () => {

        renderContainerTypeList();

      });

      tabContent.querySelector('#ec-containertype-list').addEventListener('click', e => {
        const renameBtn = e.target.closest('.ec-renamecontainertype-btn');
        if (renameBtn) {

          Modal.open({

                Toast.show(Lang.T('קטגוריה שונתה', 'Categoría renombrada'), 'success');
              }},
              { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }

          title: Lang.T('מחיקת קטגוריה', 'Eliminar categoría'),

          actions: [
            { id: 'del', label: Lang.T('מחק', 'Eliminar'), cls: 'btn-danger', onClick: () => {
              DB.deleteContainerType(delBtn.dataset.type);
              Modal.close();
              renderContainerTypeOptions();
              renderContainerTypeList();
              renderList();
              Toast.show(Lang.T('קטגוריה נמחקה', 'Categoría eliminada'), 'info');

            { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }

      // Pre-fill form if navigated here with a cart ID
      if (_prefillCartId) {

          renderParentOptions(cart.cartId);

              <label class="form-label">${Lang.T('שם מיפוי חיצוני', 'Nombre del mapa externo')}</label>
              <div style="display:flex;gap:8px">

                <button id="el-offmap-label-save" class="btn btn-primary" style="white-space:nowrap">${Lang.T('שמור', 'Guardar')}</button>
              </div>
            </div>

      function renderList() {

      // ── Shared alias modal helper ─────────────────────────────────────────
      function showAliasModal(itemName, aliases, onSave) {
        let current = [...aliases];
        function aliasRowsHtml() {
          return current.length
            ? current.map((a, i) => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <span style="flex:1;font-size:0.9rem">${esc(a)}</span>
                <button class="btn-icon alias-rm-btn" data-rm="${i}">✕</button>
              </div>`).join('')
            : `<p style="font-size:0.83rem;color:var(--muted);margin-bottom:4px">${Lang.T('אין שמות חלופיים', 'Sin nombres alternativos')}</p>`;
        }
        function refreshRows() {
          document.getElementById('alias-rows').innerHTML = aliasRowsHtml();
        }
        Modal.open({
          title: `${Lang.T('שמות חלופיים — ', 'Nombres alternativos — ')}${itemName}`,
          html: `
            <p style="font-size:0.83rem;color:var(--muted);margin-bottom:10px">${Lang.T('שמות נוספים שיזוהו בייבוא מיפוי ויומרו לשם הרשמי', 'Nombres adicionales reconocidos al importar mapa, convertidos al nombre oficial')}</p>
            <div id="alias-rows">${aliasRowsHtml()}</div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <input id="alias-new-input" class="form-input" style="flex:1;font-size:0.88rem;padding:6px 10px" placeholder="${Lang.T('שם חלופי חדש', 'Nuevo nombre alternativo')}">
              <button id="alias-add-btn" class="btn btn-outline btn-sm">${Lang.T('הוסף', 'Agregar')}</button>
            </div>`,
          actions: [
            { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => { Modal.close(); onSave(current); Toast.show(Lang.T('נשמר', 'Guardado'), 'success'); } },
            { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
          ]
        });
        const overlay = document.getElementById('modal-overlay');
        overlay.querySelector('#alias-add-btn').addEventListener('click', () => {
          const val = overlay.querySelector('#alias-new-input').value.trim();
          if (!val || current.includes(val)) return;
          current.push(val);
          refreshRows();
          overlay.querySelector('#alias-new-input').value = '';
        });
        overlay.querySelector('#alias-new-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') overlay.querySelector('#alias-add-btn').click();
        });
        overlay.querySelector('#alias-rows').addEventListener('click', e => {
          const rm = e.target.closest('.alias-rm-btn');
          if (rm) { current.splice(parseInt(rm.dataset.rm), 1); refreshRows(); }
        });
      }

      // lock switch
      const lockCheck = tabContent.querySelector('#el-order-lock');
      const lockEmoji = tabContent.querySelector('#el-lock-emoji');
      lockCheck.checked = DB.getMetadata().locationOrderLocked || false;
      lockEmoji.textContent = lockCheck.checked ? '🔒' : '🔓';
      lockCheck.addEventListener('change', () => {
        DB.setLocationOrderLocked(lockCheck.checked);
        lockEmoji.textContent = lockCheck.checked ? '🔒' : '🔓';
      });
      tabContent.querySelector('#el-order-lock-info').addEventListener('click', () => {
        Modal.open({
          title: Lang.T('נעילת סדר', 'Bloquear orden'),
          html: `<p style="line-height:1.6">${Lang.T('כאשר הסדר נעול הסדר של המיקומים יקבע אך ורק על פי הסדר במסך הזה. כאשר הוא לא נעול בעת ייבוא מיפוי הסדר במיפוי הוא שיקבע.', 'Cuando el orden está bloqueado, el orden de las ubicaciones se determina exclusivamente por el orden de esta pantalla. Cuando está desbloqueado, al importar un mapa el orden del mapa es el que prevalece.')}</p>`,
          actions: [{ id: 'close', label: Lang.T('סגור', 'Cerrar'), onClick: Modal.close }]
        });
      });

      // Off-map label setting
      const _offMapInput = tabContent.querySelector('#el-offmap-label');
      _offMapInput.value = DB.getMetadata().offMapLabel || '';
      tabContent.querySelector('#el-offmap-label-save').addEventListener('click', () => {
        const val = _offMapInput.value.trim();

        Toast.show(Lang.T('שם מיפוי חיצוני נשמר', 'Nombre del mapa externo guardado'), 'success');

      // Default load location setting
      const _defLoadLocInput = tabContent.querySelector('#el-default-load-loc');
      makeAutocomplete(_defLoadLocInput, locationSuggestions);

      tabContent.querySelector('#el-default-load-loc-save').addEventListener('click', () => {
        const val = _defLoadLocInput.value.trim();
        DB.getMetadata().defaultLoadLocation = val || '';

      });

      tabContent.querySelector('#el-save').addEventListener('click', () => {
        const name  = tabContent.querySelector('#el-name').value.trim();

        const inMap = tabContent.querySelector('#el-inmap').checked;
        DB.upsertLocation({ name, inMap });
        Toast.show(Lang.T('מיקום נשמר', 'Ubicación guardada'), 'success');
        renderList();
        refreshSubLocSelect();
        tabContent.querySelector('#el-name').value = '';
        tabContent.querySelector('#el-inmap').checked = false;
      });

      // Drag-and-drop reorder for locations
      _initReorder(tabContent.querySelector('#el-list'), {
        handleSelector: '.reorder-handle',
        itemSelector: '.reorder-item',
        onReorder: (fromIdx, toIdx) => {
          const locs = DB.getMetadata().locations;
          const names = locs.map(l => l.name);
          const [moved] = names.splice(fromIdx, 1);
          names.splice(toIdx, 0, moved);
          DB.setLocationOrder(names);
          renderList();
          refreshSubLocSelect();
        }
      });

      tabContent.querySelector('#el-list').addEventListener('click', e => {
        const menuBtn = e.target.closest('.el-menu-btn');
        if (!menuBtn) return;
        const locName = menuBtn.dataset.name;
        const loc = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        Modal.open({
          title: locName,
          html: '',
          actions: [
            { id: 'rename', label: Lang.T('שנה שם', 'Renombrar'), onClick: () => {
              Modal.close();
              Modal.open({
                title: Lang.T('שינוי שם מיקום', 'Renombrar ubicación'),
                html: `<div class="form-group"><label class="form-label">${Lang.T('שם חדש', 'Nuevo nombre')}</label><input id="rename-loc-input" class="form-input" value="${esc(locName)}"></div>`,
                actions: [
                  { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                    const newName = document.getElementById('rename-loc-input').value.trim();
                    if (!newName || newName === locName) { Modal.close(); return; }
                    DB.renameLocation(locName, newName);
                    Modal.close();
                    renderList(); refreshSubLocSelect();
                    Toast.show(Lang.T('מיקום שונה', 'Ubicación renombrada'), 'success');
                  }},
                  { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
                ]
              });
            }},
            { id: 'maxplaces', label: loc.maxPlaces ? Lang.T(`מקסימום: ${loc.maxPlaces} (ערוך)`, `Máximo: ${loc.maxPlaces} (editar)`) : Lang.T('הגדר מקסימום מקומות', 'Definir máximo de lugares'), onClick: () => {
              Modal.close();
              Modal.open({
                title: Lang.T('מקסימום מקומות — ', 'Máximo de lugares — ') + locName,
                html: `<p class="card-meta" style="margin-bottom:8px">${Lang.T('המספר המקסימלי של עגלות שיכולות להיות במיקום זה.', 'El número máximo de carretas que pueden estar en esta ubicación.')}</p>
                       <div class="form-group"><label class="form-label">${Lang.T('מקסימום מקומות', 'Máximo de lugares')}</label><input id="maxplaces-input" class="form-input" type="number" min="0" placeholder="${Lang.T('ללא הגבלה', 'Sin límite')}" value="${loc.maxPlaces || ''}"></div>`,
                actions: [
                  { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                    const val = parseInt(document.getElementById('maxplaces-input').value) || 0;
                    DB.upsertLocation({ name: locName, maxPlaces: val || null });
                    Modal.close();
                    renderList();
                    Toast.show(Lang.T('מקסימום עודכן', 'Máximo actualizado'), 'success');
                  }},
                  { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
                ]
              });
            }},
            ...(() => {
              const cf = DB.getCapacityFeature();
              if (!cf) return [];
              const fname = cf.name || 'תכונה';
              return [{ id: 'caplimit', label: loc.capacityLimit ? Lang.T(`מגבלת ${fname}: ${loc.capacityLimit} (ערוך)`, `Límite de ${fname}: ${loc.capacityLimit} (editar)`) : Lang.T(`הגדר מגבלת ${fname}`, `Definir límite de ${fname}`), onClick: () => {
                Modal.close();
                Modal.open({
                  title: Lang.T(`מגבלת ${fname} — ${locName}`, `Límite de ${fname} — ${locName}`),
                  html: `<p class="card-meta" style="margin-bottom:8px">${Lang.T(`סכום ה${fname} המקסימלי המותר במיקום זה.`, `La suma máxima de ${fname} permitida en esta ubicación.`)}</p>
                         <div class="form-group"><label class="form-label">${Lang.T('מגבלה (0 = ללא)', 'Límite (0 = sin límite)')}</label><input id="caplimit-input" class="form-input" type="number" min="0" placeholder="${Lang.T('ללא הגבלה', 'Sin límite')}" value="${loc.capacityLimit || ''}"></div>`,
                  actions: [
                    { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                      const val = parseFloat(document.getElementById('caplimit-input').value) || 0;
                      DB.upsertLocation({ name: locName, capacityLimit: val || null });
                      Modal.close();
                      renderList();
                      Toast.show(Lang.T('מגבלה עודכנה', 'Límite actualizado'), 'success');
                    }},
                    { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
                  ]
                });
              }}];
            })(),
            { id: 'sublocs', label: `${Lang.T('תתי-מיקומים', 'Sub-ubicaciones')} (${(loc.subLocations || []).length})`, onClick: () => {
              Modal.close();
              function openSubModal() {
                function rowsHtml() {
                  const locObj = DB.getMetadata().locations.find(l => l.name === locName);
                  const ss = (locObj && locObj.subLocations) || [];
                  if (!ss.length) return `<p class="card-meta" style="margin:6px 0 10px;text-align:center">${Lang.T('אין תתי-מיקומים', 'Sin sub-ubicaciones')}</p>`;
                  return ss.map(s => `
                    <div class="prop-option-row" style="align-items:center">
                      <span style="flex:1">• ${esc(s)}</span>
                      <div style="display:flex;gap:4px">
                        <button class="btn-icon-edit sl-rename" data-sub="${esc(s)}" title="שנה שם">✏️</button>
                        <button class="btn-icon sl-del" data-sub="${esc(s)}" title="מחק">✕</button>
                      </div>
                    </div>`).join('');
                }
                Modal.open({
                  title: `${Lang.T('תתי-מיקומים — ', 'Sub-ubicaciones — ')}${locName}`,
                  html: `<div id="sl-rows">${rowsHtml()}</div>
                         <div class="prop-add-row" style="margin-top:10px">
                           <input id="sl-new-input" class="form-input btn-sm" placeholder="${Lang.T('שם תת-מיקום חדש', 'Nuevo nombre de sub-ubicación')}">
                           <button id="sl-add-btn" class="btn btn-outline btn-sm">${Lang.T('הוסף', 'Agregar')}</button>
                         </div>`,
                  actions: [{ id: 'sl-close', label: Lang.T('סגור', 'Cerrar'), cls: 'btn-outline', onClick: () => {
                    Modal.close();
                    renderList();
                    const selVal = tabContent.querySelector('#el-sub-loc-sel').value;
                    refreshSubLocSelect();
                    renderSubList(selVal);
                  }}]
                });
                const overlay = document.getElementById('modal-overlay');
                function refreshRows() {
                  overlay.querySelector('#sl-rows').innerHTML = rowsHtml();
                }
                overlay.querySelector('#sl-add-btn').addEventListener('click', () => {
                  const inp = overlay.querySelector('#sl-new-input');
                  const val = inp.value.trim();
                  if (!val) return;
                  const locObj = DB.getMetadata().locations.find(l => l.name === locName);
                  const subs = [...((locObj && locObj.subLocations) || [])];
                  if (!subs.includes(val)) {
                    subs.push(val);
                    DB.upsertLocation({ name: locName, subLocations: subs });
                  }
                  inp.value = '';
                  refreshRows();
                });
                overlay.querySelector('#sl-new-input').addEventListener('keydown', e => {
                  if (e.key === 'Enter') overlay.querySelector('#sl-add-btn').click();
                });
                overlay.querySelector('#sl-rows').addEventListener('click', e => {
                  const renBtn = e.target.closest('.sl-rename');
                  if (renBtn) {
                    const oldSub = renBtn.dataset.sub;
                    Modal.open({
                      title: Lang.T('שינוי שם תת-מיקום', 'Renombrar sub-ubicación'),
                      html: `<div class="form-group"><label class="form-label">${Lang.T('שם חדש', 'Nuevo nombre')}</label><input id="sl-ren-input" class="form-input" value="${esc(oldSub)}"></div>`,
                      actions: [
                        { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                          const newSub = document.getElementById('sl-ren-input').value.trim();
                          if (newSub && newSub !== oldSub) DB.renameSubLocation(locName, oldSub, newSub);
                          Modal.close();
                          openSubModal();
                        }},
                        { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: () => { Modal.close(); openSubModal(); } }
                      ]
                    });
                    return;
                  }
                  const delBtn = e.target.closest('.sl-del');
                  if (delBtn) {
                    const sub = delBtn.dataset.sub;
                    const locObj = DB.getMetadata().locations.find(l => l.name === locName);
                    const subs = ((locObj && locObj.subLocations) || []).filter(s => s !== sub);
                    DB.upsertLocation({ name: locName, subLocations: subs });
                    refreshRows();
                  }
                });
              }
              openSubModal();
            }},
            { id: 'alias', label: Lang.T('שמות חלופיים', 'Nombres alternativos'), onClick: () => {
              Modal.close();
              showAliasModal(locName, (loc && loc.aliases) || [], newAliases => {
                DB.upsertLocation({ name: locName, aliases: newAliases });
                renderList();
              });
            }},
            { id: 'toggle', label: loc.inMap ? Lang.T('הסר ממיפוי', 'Quitar del mapa') : Lang.T('הוסף למיפוי', 'Agregar al mapa'), onClick: () => {
              DB.upsertLocation({ name: locName, inMap: !loc.inMap });
              Modal.close();
              renderList();
            }},
            { id: 'delete', label: Lang.T('מחק', 'Eliminar'), cls: 'btn-danger', onClick: () => {
              DB.deleteLocation(locName);
              Modal.close();
              Toast.show(Lang.T('מיקום נמחק', 'Ubicación eliminada'), 'info');
              renderList();
              refreshSubLocSelect();
              renderSubList(tabContent.querySelector('#el-sub-loc-sel').value);
            }},
            { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
          ]
        });
      });

      // sublocation select change
      tabContent.querySelector('#el-sub-loc-sel').addEventListener('change', e => {
        renderSubList(e.target.value);
      });

      // add sublocation
      tabContent.querySelector('#el-sub-add').addEventListener('click', () => {
        const locName = tabContent.querySelector('#el-sub-loc-sel').value;
        const input   = tabContent.querySelector('#el-sub-input');
        const sub     = input.value.trim();
        if (!locName) { Toast.show(Lang.T('יש לבחור מיקום', 'Elige una ubicación'), 'error'); return; }
        if (!sub)     { Toast.show(Lang.T('יש להזין שם תת-מיקום', 'Ingresa un nombre de sub-ubicación'), 'error'); return; }
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = [...((loc && loc.subLocations) || [])];
        if (!subs.includes(sub)) {
          subs.push(sub);
          DB.upsertLocation({ name: locName, subLocations: subs });
          Toast.show(Lang.T('תת-מיקום נוסף', 'Sub-ubicación agregada'), 'success');
        }
        input.value = '';
        renderSubList(locName);
        renderList();
      });

      // allow Enter in sublocation input
      tabContent.querySelector('#el-sub-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') tabContent.querySelector('#el-sub-add').click();
      });

      // rename / delete / alias sublocation (event delegation on the sub-list)
      tabContent.querySelector('#el-sub-list').addEventListener('click', e => {
        const subAliasBtn = e.target.closest('.el-sub-alias');
        if (subAliasBtn) {
          const locName = subAliasBtn.dataset.loc;
          const subName = subAliasBtn.dataset.sub;
          const loc = DB.getMetadata().locations.find(l => l.name === locName);
          const curAliases = ((loc && loc.subLocationAliases) || {})[subName] || [];
          showAliasModal(subName, curAliases, newAliases => {
            const locObj = DB.getMetadata().locations.find(l => l.name === locName);
            const subLocAliases = Object.assign({}, (locObj && locObj.subLocationAliases) || {});
            if (newAliases.length) subLocAliases[subName] = newAliases;
            else delete subLocAliases[subName];
            DB.upsertLocation({ name: locName, subLocationAliases: subLocAliases });
          });
          return;
        }
        const renameBtn = e.target.closest('.el-sub-rename');
        if (renameBtn) {
          const locName = renameBtn.dataset.loc;
          const oldSub = renameBtn.dataset.sub;
          Modal.open({
            title: Lang.T('שינוי שם תת-מיקום', 'Renombrar sub-ubicación'),
            html: `<div class="form-group"><label class="form-label">שם חדש</label><input id="rename-sub-input" class="form-input" value="${esc(oldSub)}"></div>`,
            actions: [
              { id: 'save', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                const newSub = document.getElementById('rename-sub-input').value.trim();
                if (!newSub || newSub === oldSub) { Modal.close(); return; }
                DB.renameSubLocation(locName, oldSub, newSub);
                Modal.close();
                renderSubList(locName); renderList();
                Toast.show(Lang.T('תת-מיקום שונה', 'Sub-ubicación renombrada'), 'success');
              }},
              { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
            ]
          });
          return;
        }
        const delBtn = e.target.closest('.el-sub-del');
        if (!delBtn) return;
        const locName = delBtn.dataset.loc;
        const sub     = delBtn.dataset.sub;
        const loc     = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        const subs = (loc.subLocations || []).filter(s => s !== sub);
        DB.upsertLocation({ name: locName, subLocations: subs });
        renderSubList(locName);
        renderList();
      });
    }

    // ── Properties Tab ──
    function renderPropertiesTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">${Lang.T('הוספת מאפיין', 'Agregar atributo')}</div>

                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.78rem;font-weight:normal">

                </label>
                <button class="btn-icon" id="ep-order-lock-info" title="מידע" style="font-size:0.85rem;padding:2px 5px;border:1px solid var(--border);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center">i</button>
              </div>
            </div>
            <div id="ep-list"></div>
          </div>

          <div class="card mt-12">

            <p class="card-meta" style="margin-bottom:8px">${Lang.T('כולל מאפיינים + מיקומים שלא במיפוי', 'Incluye atributos + ubicaciones fuera del mapa')}</p>
            <div style="display:flex;gap:8px">

            <div class="form-group">
              <label class="form-label">${Lang.T('שם התכונה', 'Nombre de la característica')}</label>

              </select>

              <div style="font-size:0.85rem;font-weight:600;margin:4px 0 8px;color:var(--muted)">${Lang.T('ערך מספרי לכל אפשרות', 'Valor numérico por opción')}</div>
              <div id="cf-values-rows"></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button id="cf-save" class="btn btn-primary" style="flex:1">${Lang.T('שמור', 'Guardar')}</button>

      `;

      function renderList() {
        const list  = tabContent.querySelector('#ep-list');
        const props = DB.getMetadata().properties;
        if (!props.length) { list.innerHTML = `<div class="empty-state-rich" style="padding:20px 12px"><div class="es-illustration">🏷️</div><div class="es-desc">${Lang.T('הוסף מאפיין ראשון למעלה כדי לסווג פריטים.', 'Agrega el primer atributo arriba para clasificar ítems.')}</div></div>`; return; }
        list.innerHTML = props.map((p, idx) => {
          const aliases = p.aliases || {};
          const conds = normalizeConditions(p.condition);
          const condLabel = conds
            ? Lang.T('תנאי: ', 'Condición: ') + conds.map(c => `${esc(c.prop)} = ${c.value ? esc(c.value) : Lang.T('לא נבחר', 'No seleccionado')}`).join(' או ')

          return `
          <div class="prop-group reorder-item" data-prop="${esc(p.name)}" data-prop-idx="${idx}">
            <div class="prop-group-header">
              <div class="prop-group-header-left" style="flex:1">
                <i class="prop-chevron">▶</i>
                <strong>${esc(p.name)}</strong>
                ${condLabel ? `<span class="card-meta" style="margin-inline-start:8px;font-size:0.72rem">(${condLabel})</span>` : ''}

              <button class="btn-icon-edit ep-rename-prop" data-prop="${esc(p.name)}" title="שנה שם">✏️</button>

              <div class="reorder-handle" data-idx="${idx}"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg></div>
            </div>
            <div class="prop-options">
              <div style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px">
                <button class="btn btn-outline btn-sm ep-condition-btn" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px">${conds ? Lang.T('ערוך תנאי', 'Editar condición') : Lang.T('הוסף תנאי', 'Agregar condición')}</button>
                ${conds ? `<button class="btn btn-outline btn-sm ep-condition-clear" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px;color:var(--danger);border-color:var(--danger)">${Lang.T('הסר תנאי', 'Quitar condición')}</button>` : ''}
                ${p.options.length >= 2 ? `<button class="btn btn-outline btn-sm ep-mixing-btn" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px${p.mixingPairs && p.mixingPairs.length ? ';color:var(--brand);border-color:var(--brand)' : ''}">${Lang.T('ערבוב', 'Mezcla')}${p.mixingPairs && p.mixingPairs.length ? ' (' + p.mixingPairs.length + ')' : ''}</button>` : ''}
              </div>
              ${p.options.map(o => {
                const optAliases = aliases[o] || [];
                return `
                <div class="prop-option-row" style="flex-wrap:wrap">
                  <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
                    <span>• ${esc(o)}</span>
                    <div style="display:flex;align-items:center;gap:4px">
                      <button class="btn-icon-edit ep-rename-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}" title="שנה שם">✏️</button>
                      <button class="btn btn-outline btn-sm ep-aliases-btn" data-prop="${esc(p.name)}" data-opt="${esc(o)}" style="font-size:0.7rem;padding:2px 8px">${Lang.T('שמות חלופיים', 'Nombres alternativos')}</button>
                      <button class="btn-icon ep-del-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}">✕</button>
                    </div>
                  </div>
                  ${optAliases.length ? `<div style="width:100%;padding:2px 16px 0;font-size:0.75rem;color:var(--muted)">${Lang.T('חלופיים:', 'Alternativos:')} ${optAliases.map(a => esc(a)).join(', ')}</div>` : ''}
                </div>`;
              }).join('')}
              <div class="prop-add-row">
                <input class="form-input btn-sm ep-opt-input" data-prop="${esc(p.name)}" placeholder="${Lang.T('אפשרות חדשה', 'Opción nueva')}">
                <button class="btn btn-outline btn-sm ep-add-opt" data-prop="${esc(p.name)}">${Lang.T('הוסף', 'Agregar')}</button>

      function openMixingPairsModal(propName) {
        const propDef = DB.getMetadata().properties.find(p => p.name === propName);
        if (!propDef) return;
        const options = propDef.options || [];
        const pairs = DB.getMixingPairs(propName);
        const pairsHtml = pairs.length
          ? pairs.map(([a, b], pi) => `
              <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6">
                <span style="flex:1;font-weight:500">${esc(a)} ↔ ${esc(b)}</span>
                <button class="btn btn-outline btn-sm ep-mix-rm" data-a="${esc(a)}" data-b="${esc(b)}" style="color:var(--danger);border-color:var(--danger);padding:2px 10px">✕</button>
              </div>`).join('')
          : `<p class="card-meta" style="padding:6px 0">${Lang.T('אין זוגות ערבוב מוגדרים', 'No hay pares de mezcla definidos')}</p>`;
        const addRow = options.length >= 2
          ? `<div style="display:flex;align-items:center;gap:6px;margin-top:10px">
               <select id="mix-sel-a" class="form-input" style="flex:1;font-size:0.88rem">

               <select id="mix-sel-b" class="form-input" style="flex:1;font-size:0.88rem">
                 ${options.map((o, i) => `<option value="${esc(o)}"${i === 1 ? ' selected' : ''}>${esc(o)}</option>`).join('')}
               </select>
               <button id="ep-mix-add" class="btn btn-outline btn-sm" style="white-space:nowrap">${Lang.T('הוסף', 'Agregar')}</button>
             </div>`
          : '';
        Modal.open({
          title: `${Lang.T('ערבוב ערכים — ', 'Mezcla de valores — ')}${esc(propName)}`,
          html: `<p class="card-meta" style="margin-bottom:10px">${Lang.T('זוגות ערכים שניתן לשלב באותה עגלה ללא שייחשב כהבדל בין משבצות.', 'Pares de valores que pueden combinarse en la misma carreta sin considerarse diferencia entre slots.')}</p>
                 <div id="mix-pairs-list">${pairsHtml}</div>${addRow}`,
          actions: [{ id: 'mix-close', label: Lang.T('סגור', 'Cerrar'), onClick: () => {
            Modal.close();
            renderList();
            const g = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
            if (g) g.classList.add('expanded');
          }}]
        });
        setTimeout(() => {
          const addBtn = document.getElementById('ep-mix-add');
          if (addBtn) {
            addBtn.addEventListener('click', () => {
              const selA = document.getElementById('mix-sel-a');
              const selB = document.getElementById('mix-sel-b');

              DB.addMixingPair(propName, selA.value, selB.value);
              openMixingPairsModal(propName);

          const list = document.getElementById('mix-pairs-list');

            actions: [

        // aliases button

            title: Lang.T('שמות חלופיים: ', 'Nombres alternativos: ') + optName,
            html: `
              <p class="card-meta" style="margin-bottom:10px">${Lang.T('הוסף שמות חלופיים לאפשרות', 'Agrega nombres alternativos para la opción')} <strong>${esc(optName)}</strong>.<br>${Lang.T('בייבוא מיפוי, כל השמות החלופיים יומרו אוטומטית לשם הרגיל.', 'Al importar mapa, todos los nombres alternativos se convierten automáticamente al nombre oficial.')}</p>
              <div id="alias-list-container">
                ${currentAliases.map((a, i) => `
                  <div class="form-group" style="display:flex;gap:8px;margin-bottom:6px" data-alias-row>
                    <input class="form-input alias-input" value="${esc(a)}" placeholder="${Lang.T('שם חלופי', 'Nombre alternativo')}" style="flex:1">
                    <button class="btn btn-outline btn-sm alias-remove-btn" type="button">✕</button>
                  </div>
                `).join('')}
              </div>
              <button id="alias-add-row-btn" class="btn btn-outline btn-sm" style="margin-top:6px">${Lang.T('+ הוסף שם חלופי', '+ Agregar nombre alternativo')}</button>
            `,
            actions: [
              { id: 'save-aliases', label: Lang.T('שמור', 'Guardar'), cls: 'btn-primary', onClick: () => {
                const inputs = document.querySelectorAll('#alias-list-container .alias-input');
                const aliases = Array.from(inputs).map(inp => inp.value.trim()).filter(Boolean);
                DB.setOptionAliases(propName, optName, aliases);
                Modal.close();
                renderList();
                // re-expand the group
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
              }},
              { id: 'cancel', label: Lang.T('ביטול', 'Cancelar'), onClick: Modal.close }
            ]
          });
          // wire up add/remove buttons inside the modal
          setTimeout(() => {
            const container = document.getElementById('alias-list-container');
            const addRowBtn = document.getElementById('alias-add-row-btn');
            if (addRowBtn) {
              addRowBtn.addEventListener('click', () => {
                const row = document.createElement('div');
                row.className = 'form-group';
                row.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
                row.setAttribute('data-alias-row', '');
                row.innerHTML = `<input class="form-input alias-input" placeholder="${Lang.T('שם חלופי', 'Nombre alternativo')}" style="flex:1"><button class="btn btn-outline btn-sm alias-remove-btn" type="button">✕</button>`;
                container.appendChild(row);
                row.querySelector('.alias-input').focus();
              });
