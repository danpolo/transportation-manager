        <!-- ═══ UNLOAD SECTION ═══ -->
        <div id="lu-unload-section" hidden>
          <div id="lu-unload-cart-form-host"></div>
          <div id="lu-unload-fields" hidden>
            <div id="lu-unload-cart-info" class="card" style="margin:0 0 14px;"></div>
            <button id="lu-empty-cart" class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger);margin-bottom:12px">ריקון עגלה</button>
            <div id="lu-unload-slots-container"></div>
            <div class="form-group" style="margin-top:16px;">
              <label class="form-label">מיקום יעד (רצפה)</label>
              <input id="lu-unload-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="lu-unload-dest-subloc-group" hidden>
              <label class="form-label">תת-מיקום יעד</label>
              <input id="lu-unload-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="lu-unload-save-only" class="btn btn-outline" style="flex:1">שמור</button>
            <button id="lu-unload-save-btn" class="btn btn-primary" style="flex:2">שמור ושלח 💬</button>
          </div>
        </div>
      </div>
    `;

    let _op            = 'load';  // 'load' | 'unload'
    let _loadType      = 'new';   // 'new'  | 'floor'
    let _srcCart       = null;    // source cart object (unload mode)
    let _unloadCartRef = null;

    // autocomplete + location setups
    makeAutocomplete(screen.querySelector('#lu-src-loc'), () => DB.getMetadata().locations.map(l => l.name));
    makeAutocomplete(screen.querySelector('#lu-dest-cart'), () => DB.getAllCarts().map(c => cartLabel(c)));
    makeAutocomplete(screen.querySelector('#lu-load-move-dest'), () => DB.getMetadata().locations.map(l => l.name));
    setupLocationFields(
      screen.querySelector('#lu-unload-dest-loc'),
      screen.querySelector('#lu-unload-dest-subloc-group'),
      screen.querySelector('#lu-unload-dest-subloc')
    );

    // ── Floor slot helpers ──────────────────────────────────────────
    function _getFloorLoc() { return screen.querySelector('#lu-src-loc').value.trim(); }

    // Find all floor items at the current location
    function _floorItemsAtLoc() {
      const loc = _getFloorLoc();
      if (!loc) return [];
      return DB.getAllFloorItems().filter(fi => fi.location === loc && !fi.isEmpty);
    }

    // Find a serial across ALL floor items
    function _findSerialAnywhere(serial) {
      for (const fi of DB.getAllFloorItems()) {
        if ((fi.itemIds || []).includes(serial)) return fi;
      }
      return null;
    }

    function _getFloorAvail(props) {
      const loc = _getFloorLoc();
      if (!loc) return { count: 0, ids: [] };
      const fi = DB.findFloorItem(loc, props);
      return { count: fi ? (fi.itemCount || 0) : 0, ids: fi ? (fi.itemIds || []) : [] };
    }

    function makeFloorSlotEl(idx) {
      const div = document.createElement('div');
      div.className = 'item-slot-card floor-slot';
      div.dataset.slotIdx = String(idx);
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon floor-slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="floor-slot-props"></div>
        <div class="floor-slot-avail card" style="margin:8px 0;display:none"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input floor-slot-count" type="number" min="0" placeholder="0" value="0">
        </div>
        <div class="item-rows floor-slot-rows"></div>
      `;
      const propsContainer = div.querySelector('.floor-slot-props');
      buildPropertyFields(propsContainer, {});

      const availEl = div.querySelector('.floor-slot-avail');
      const countInput = div.querySelector('.floor-slot-count');
      const rowsContainer = div.querySelector('.floor-slot-rows');

      // Update availability + serial autocomplete when props change
      function refreshAvail() {
        const loc = _getFloorLoc();
        const props = readPropertyFields(propsContainer);
        if (!loc) { availEl.style.display = 'none'; return; }
        const { count, ids } = _getFloorAvail(props);
        availEl.style.display = '';
        availEl.innerHTML = `<div class="card-title">זמין: ${count} פריטים</div><div class="card-meta">${esc(loc)}</div>`;
        // Update autocomplete on existing serial inputs
        div.querySelectorAll('.item-id-input').forEach(inp => {
          makeAutocomplete(inp, () => ids);
        });
      }

      propsContainer.addEventListener('change', refreshAvail);

      // Render serial rows when count changes
      countInput.addEventListener('input', () => {
        const n = parseInt(countInput.value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        renderFloorSerialRows(div, n, prev);
      });

      // Delete slot
      div.querySelector('.floor-slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        renumberFloorSlots(parent);
      });

      return div;
    }

    function renderFloorSerialRows(slotEl, n, existing) {
      const container = slotEl.querySelector('.floor-slot-rows');
      const propsContainer = slotEl.querySelector('.floor-slot-props');
      const loc = _getFloorLoc();
      const props = readPropertyFields(propsContainer);
      const { ids } = _getFloorAvail(props);
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input floor-serial-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
      // Autocomplete on each serial input + auto-fill props on blur
      container.querySelectorAll('.floor-serial-input').forEach(inp => {
        makeAutocomplete(inp, () => ids);
        inp.addEventListener('change', () => {
          const serial = inp.value.trim();
          if (!serial) return;
          autoFillPropsFromSerial(slotEl, serial);
        });
      });
    }

    // When a serial is entered, find it in DB and auto-select its properties
    function autoFillPropsFromSerial(slotEl, serial) {
      const loc = _getFloorLoc();
      const allFIs = DB.getAllFloorItems();
      // First try at current location
      let found = allFIs.find(fi => fi.location === loc && (fi.itemIds || []).includes(serial));
      if (!found) {
        // Try anywhere
        found = allFIs.find(fi => (fi.itemIds || []).includes(serial));
      }
      if (found && found.properties) {
        const propsContainer = slotEl.querySelector('.floor-slot-props');
        propsContainer.querySelectorAll('select[name]').forEach(sel => {
          const val = found.properties[sel.name];
          if (val) {
            sel.value = val;
          }
        });
        // Trigger change to refresh availability
        propsContainer.dispatchEvent(new Event('change', { bubbles: true }));
      }
    }

    function renumberFloorSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.floor-slot');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.floor-slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }

    function readFloorSlot(slotEl) {
      const count      = parseInt(slotEl.querySelector('.floor-slot-count').value) || 0;
      const itemIds    = [...slotEl.querySelectorAll('.floor-serial-input')].map(i => i.value.trim()).filter(Boolean);
      const properties = readPropertyFields(slotEl.querySelector('.floor-slot-props'));
      return { properties, itemCount: count, itemIds };
    }

    function readAllFloorSlots() {
      return [...screen.querySelectorAll('#lu-floor-slots-container .floor-slot')].map(readFloorSlot);
    }

    function initFloorSlots() {
      const container = screen.querySelector('#lu-floor-slots-container');
      container.innerHTML = '';
      container.appendChild(makeFloorSlotEl(0));
      renumberFloorSlots(container);
    }

    // Init floor slots
    initFloorSlots();

    screen.querySelector('#lu-floor-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#lu-floor-slots-container');
      const idx = container.querySelectorAll('.floor-slot').length;
      container.appendChild(makeFloorSlotEl(idx));
      renumberFloorSlots(container);
    });

    // Refresh all floor slots when location changes
    screen.querySelector('#lu-src-loc').addEventListener('change', () => {
      screen.querySelectorAll('#lu-floor-slots-container .floor-slot').forEach(slot => {
        const propsContainer = slot.querySelector('.floor-slot-props');
        propsContainer.dispatchEvent(new Event('change', { bubbles: true }));
      });
    });

    function renderItemRows(container, n, existing) {
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    function copyMsg(msg) {
      Utils.shareOrCopy(msg);
    }

    // ── Slot management (multi-type carts) ──────────────────────────
    function makeSlotEl(idx, slot) {
      const div = document.createElement('div');
      div.className = 'item-slot-card';
      div.dataset.slotIdx = String(idx);
      const existingCount = slot ? (slot.itemCount || 0) : 0;
      const existingIds   = slot ? (slot.itemIds   || []) : [];
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="slot-props"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input slot-count-input" type="number" min="0" placeholder="0" value="${existingCount}">
        </div>
        <div class="item-rows slot-item-rows"></div>
      `;
      buildPropertyFields(div.querySelector('.slot-props'), slot ? (slot.properties || {}) : {});
      renderItemRows(div.querySelector('.slot-item-rows'), existingCount, existingIds);
      div.querySelector('.slot-count-input').addEventListener('input', () => {
        const n    = parseInt(div.querySelector('.slot-count-input').value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        renderItemRows(div.querySelector('.slot-item-rows'), n, prev);
      });
      div.querySelector('.slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        renumberSlots(parent);
      });
      return div;
    }

    function renumberSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.item-slot-card');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }

    function readSlot(slotEl) {
      const count      = parseInt(slotEl.querySelector('.slot-count-input').value) || 0;
      const itemIds    = [...slotEl.querySelectorAll('.item-id-input')].map(i => i.value.trim()).filter(Boolean);
      const properties = readPropertyFields(slotEl.querySelector('.slot-props'));
      return { properties, itemCount: count, itemIds };
    }

    function readAllSlots(container) {
      return [...container.querySelectorAll('.item-slot-card')].map(readSlot);
    }

    function populateSlots(container, cart) {
      container.innerHTML = '';
      const slots = [
        { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
        ...(cart.extraItems || [])
      ];
      slots.forEach((slot, idx) => container.appendChild(makeSlotEl(idx, slot)));
      renumberSlots(container);
    }

    function initEmptySlots(container) {
      container.innerHTML = '';
      container.appendChild(makeSlotEl(0, null));
      renumberSlots(container);
    }

    // initialise load slots
    initEmptySlots(screen.querySelector('#lu-slots-container'));

    screen.querySelector('#lu-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#lu-slots-container');
      const idx = container.querySelectorAll('.item-slot-card').length;
      container.appendChild(makeSlotEl(idx, null));
      renumberSlots(container);
    });

    function setOp(op) {
      _op = op;
      screen.querySelectorAll('#lu-op-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.op === op));
      screen.querySelector('#lu-load-section').hidden      = (op !== 'load');
      screen.querySelector('#lu-container-section').hidden = (op !== 'container');
      screen.querySelector('#lu-unload-section').hidden    = (op !== 'unload');
    }

    function setLoadType(lt) {
      _loadType = lt;
      screen.querySelectorAll('#lu-load-type-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.lt === lt));
      screen.querySelector('#lu-new-item-section').hidden  = (lt !== 'new');
      screen.querySelector('#lu-floor-src-section').hidden = (lt !== 'floor');
    }

    screen.querySelector('#lu-op-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-op]');
      if (btn) setOp(btn.dataset.op);
    });

    screen.querySelector('#lu-load-type-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-lt]');
      if (btn) setLoadType(btn.dataset.lt);
    });

    // ── Container on cart section ──────────────────────────────────
    let _ctCart = null; // the container cart object once loaded
    const ctIdInput = screen.querySelector('#lu-ct-id');
    const ctInfoEl  = screen.querySelector('#lu-ct-info');
    const ctSlotsContainer = screen.querySelector('#lu-ct-slots-container');

    // Get non-default container types for autocomplete
    function _containerCarts() {
      return DB.getAllCarts().filter(c => c.containerType && c.containerType !== DEFAULT_CONTAINER);
    }
    makeAutocomplete(ctIdInput, () => _containerCarts().map(c => cartLabel(c)));
    makeAutocomplete(screen.querySelector('#lu-ct-parent-cart'), () => DB.getAllCarts().filter(c => !c.containerType || c.containerType === DEFAULT_CONTAINER).map(c => cartLabel(c)));
    makeAutocomplete(screen.querySelector('#lu-ct-move-dest'), () => DB.getMetadata().locations.map(l => l.name));

    function initCtSlots() {
      ctSlotsContainer.innerHTML = '';
      ctSlotsContainer.appendChild(makeSlotEl(0, null));
      renumberSlots(ctSlotsContainer);
    }
    initCtSlots();

    screen.querySelector('#lu-ct-add-slot-btn').addEventListener('click', () => {
      const idx = ctSlotsContainer.querySelectorAll('.item-slot-card').length;
      ctSlotsContainer.appendChild(makeSlotEl(idx, null));
      renumberSlots(ctSlotsContainer);
    });

    // When container ID is entered, look it up and auto-populate
    function loadContainerCart() {
      const raw = ctIdInput.value.trim();
      const cid = raw.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!cid) { ctInfoEl.style.display = 'none'; _ctCart = null; initCtSlots(); return; }
      const cart = DB.getCart(cid);
      _ctCart = cart;
      if (cart) {
        ctInfoEl.style.display = '';
        const total = cartTotalCount(cart);
        ctInfoEl.innerHTML = `
          <div class="card-title">${esc(containerName(cart))}: ${esc(cartLabel(cart))}</div>
          <div class="card-meta">מיקום: ${esc(cart.location || 'לא ידוע')} · ${total} פריטים</div>
          ${cart.parentCartId ? `<div class="card-meta">טעון על: ${esc((() => { const p = DB.getCart(cart.parentCartId); return p ? cartLabel(p) : cart.parentCartId; })())}</div>` : ''}
        `;
        // Auto-populate slots with existing items
        populateSlots(ctSlotsContainer, cart);
      } else {
        ctInfoEl.style.display = '';
        ctInfoEl.innerHTML = `<div class="card-meta">מכולה חדשה: ${esc(cid)}</div>`;
        initCtSlots();
      }
    }
    ctIdInput.addEventListener('change', loadContainerCart);

    // Container save logic
    async function doContainerSave() {
      const rawCtId = ctIdInput.value.trim();
      const ctId = rawCtId.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!ctId) { Toast.show('יש להזין מספר משטח / מכולה', 'error'); return null; }

      const rawParent = screen.querySelector('#lu-ct-parent-cart').value.trim();
      const parentCartId = rawParent.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!parentCartId) { Toast.show('יש להזין מספר עגלה', 'error'); return null; }

      // Read all slots
      const allSlots = readAllSlots(ctSlotsContainer);
      const slot0 = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
      const extras = allSlots.slice(1);

      // Determine container type
      const existingCt = DB.getCart(ctId);
      const ctType = existingCt ? (existingCt.containerType || 'משטח') : 'משטח';
      const ctLocation = existingCt ? (existingCt.location || '') : '';

      // Upsert the container cart with items and parent
      DB.upsertCart({
        cartId: ctId,
        containerType: ctType,
        itemCount: slot0.itemCount, itemIds: slot0.itemIds, properties: slot0.properties,
        extraItems: extras,
        parentCartId: parentCartId,
        isEmpty: !allSlots.some(s => s.itemCount > 0)
      });

      // Make sure parent cart exists
      const parentCart = DB.getCart(parentCartId);
      if (!parentCart) {
        DB.upsertCart({ cartId: parentCartId, containerType: DEFAULT_CONTAINER, isEmpty: true, itemCount: 0, itemIds: [], properties: {} });
      }

      // Build message
      const destCart = DB.getCart(parentCartId);
      const parentLabel = destCart ? cartLabel(destCart) : parentCartId;
      const parentCtName = destCart ? containerName(destCart) : 'עגלה';
      const loc = destCart ? (destCart.location || '?') : (ctLocation || '?');
      const msgLines = [`${ctType} ${ctId}`, `טעון על ${parentCtName} ${parentLabel}`, `מיקום: ${loc}`];
      allSlots.filter(sl => sl.itemCount).forEach(sl => {
        const ps = Object.values(sl.properties).filter(Boolean).join(' ');
        msgLines.push(`${sl.itemCount}${ps ? ' ' + ps : ''}`);
        (sl.itemIds || []).forEach(id => msgLines.push(id));
      });

      // Optional destination — move parent cart
      const moveDest = screen.querySelector('#lu-ct-move-dest').value.trim();
      if (moveDest) {
        DB.upsertCart({ cartId: parentCartId, location: moveDest });
        // Also update container's location
        DB.upsertCart({ cartId: ctId, location: moveDest });
        msgLines.push('מועברת ל' + moveDest);
      }

      const msg = msgLines.join('\n');
      Toast.show(ctType + ' הועמס על ' + parentCtName, 'success');

      // Reset
      ctIdInput.value = '';
      screen.querySelector('#lu-ct-parent-cart').value = '';
      screen.querySelector('#lu-ct-move-dest').value = '';
      ctInfoEl.style.display = 'none';
      _ctCart = null;
      initCtSlots();
      return msg;
    }

    screen.querySelector('#lu-ct-save-btn').addEventListener('click', async () => {
      const msg = await doContainerSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-ct-save-only').addEventListener('click', async () => {
      await doContainerSave();
    });

    // unload cart form
    _unloadCartRef = CartForm(screen.querySelector('#lu-unload-cart-form-host'), {
      onCartLoaded(cart) {
        _srcCart = cart || null;
        const fields = screen.querySelector('#lu-unload-fields');
        if (!cart) { fields.hidden = true; return; }
        fields.hidden = false;
        const total = cartTotalCount(cart);
        screen.querySelector('#lu-unload-cart-info').innerHTML = `
          <div class="card-title">${esc(containerName(cart))}: ${esc(cartLabel(cart))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(cart.location || 'לא ידוע')} · ${total} פריטים</div>
          ${cart.comment ? `<div class="card-meta" style="color:var(--muted);font-style:italic">${esc(cart.comment)}</div>` : ''}
        `;
        populateSlots(screen.querySelector('#lu-unload-slots-container'), cart);
      }
    });

    // ── load save logic ──
    function _confirmUnknownSerial(serial, loc, props) {
      return new Promise(resolve => {
        const propStr = Object.values(props).filter(Boolean).join(' ');
        Modal.open({
          title: 'מספר סידורי לא נמצא',
          html: `<p class="card-meta">"${esc(serial)}" לא נמצא ב${esc(loc)}${propStr ? ' (' + esc(propStr) + ')' : ''}.</p>
                 <p class="card-meta" style="margin-top:8px">להמשיך בכל זאת? אם הפריט קיים במיקום אחר הוא יועבר.</p>`,
          actions: [
            { id: 'yes', label: 'כן, המשך', cls: 'btn-primary', onClick: () => { Modal.close(); resolve(true); } },
            { id: 'no', label: 'ביטול', onClick: () => { Modal.close(); resolve(false); } }
          ]
        });
      });
    }

    async function doLoadSave() {
      const rawDest    = screen.querySelector('#lu-dest-cart').value.trim();
      const destCartId = rawDest.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!destCartId) { Toast.show('יש להזין יעד להעמסה', 'error'); return null; }

      let msg;

      if (_loadType === 'new') {
        const slotsContainer = screen.querySelector('#lu-slots-container');
        const allSlots = readAllSlots(slotsContainer);
        const slot0    = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras   = allSlots.slice(1);
        DB.upsertCart({
          cartId: destCartId,
          itemCount: slot0.itemCount, itemIds: slot0.itemIds, properties: slot0.properties,
          extraItems: extras
        });
        const destCart = DB.getCart(destCartId);
        const label    = destCart ? cartLabel(destCart) : destCartId;
        const ctName = destCart ? containerName(destCart) : 'עגלה';
        const loc = destCart ? (destCart.location || '?') : '?';
        const msgLines = [`${ctName} ${label}`, `מועמסת ב${loc}`];
        allSlots.filter(sl => sl.itemCount).forEach(sl => {
          const ps = Object.values(sl.properties).filter(Boolean).join(' ');
          msgLines.push(`${sl.itemCount}${ps ? ' ' + ps : ''}`);
          (sl.itemIds || []).forEach(id => msgLines.push(id));
        });
        msg = msgLines.join('\n');
        Toast.show('פריטים הועמסו', 'success');
        initEmptySlots(slotsContainer);
      } else {
        // Floor mode: multi-slot
        const loc = _getFloorLoc();
        if (!loc) { Toast.show('יש להזין מיקום מקור', 'error'); return null; }
        const floorSlots = readAllFloorSlots();
        if (!floorSlots.some(s => s.itemCount > 0)) { Toast.show('יש להזין כמות', 'error'); return null; }

        // Validate serials — check for unknowns
        for (const slot of floorSlots) {
          const srcFI = DB.findFloorItem(loc, slot.properties);
          const knownIds = srcFI ? (srcFI.itemIds || []) : [];
          const allKnown = knownIds.length >= (srcFI ? (srcFI.itemCount || 0) : 0);
          for (const serial of slot.itemIds) {
            if (!knownIds.includes(serial) && allKnown && knownIds.length > 0) {
              // All serials are tracked and this one isn't among them
              const ok = await _confirmUnknownSerial(serial, loc, slot.properties);
              if (!ok) return null;
              // Check if it exists elsewhere — if so it will be moved automatically below
            }
          }
        }

        // Process each floor slot
        const msgLines = [];
        for (const slot of floorSlots) {
          if (!slot.itemCount) continue;
          const props = slot.properties;

          // Remove from source floor
          const srcFI = DB.findFloorItem(loc, props);
          if (srcFI) {
            const remainIds = (srcFI.itemIds || []).filter(id => !slot.itemIds.includes(id));
            const remaining = Math.max(0, (srcFI.itemCount || 0) - slot.itemCount);
            DB.upsertFloorItem({ location: loc, properties: props,
                                 itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
          }

          // For serials not found at source, check other locations and move them
          for (const serial of slot.itemIds) {
            const srcHas = srcFI && (srcFI.itemIds || []).includes(serial);
            if (!srcHas) {
              const otherFI = _findSerialAnywhere(serial);
              if (otherFI) {
                const oRemainIds = (otherFI.itemIds || []).filter(id => id !== serial);
                const oRemain = Math.max(0, (otherFI.itemCount || 0) - 1);
                DB.upsertFloorItem({ location: otherFI.location, properties: otherFI.properties,
                                     subLocation: otherFI.subLocation,
                                     itemCount: oRemain, itemIds: oRemainIds, isEmpty: oRemain === 0 });
              }
            }
          }

          // Build message part
          const ps = Object.values(props).filter(Boolean).join(' ');
          msgLines.push(`${slot.itemCount}${ps ? ' ' + ps : ''}`);
          slot.itemIds.forEach(id => msgLines.push(id));
        }

        // Add all items to destination cart
        const existingCart = DB.getCart(destCartId);
        const slot0 = floorSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras = floorSlots.slice(1).filter(s => s.itemCount > 0);

        if (floorSlots.length === 1) {
          // Single slot: merge into cart
          const existingIds = existingCart ? (existingCart.itemIds || []) : [];
          const existingCount = existingCart ? (existingCart.itemCount || 0) : 0;
          DB.upsertCart({ cartId: destCartId,
                          itemCount: existingCount + slot0.itemCount,
                          itemIds: [...existingIds, ...slot0.itemIds],
                          properties: slot0.properties, isEmpty: false });
        } else {
          // Multi-slot: set as main slot + extras
          DB.upsertCart({ cartId: destCartId,
                          itemCount: slot0.itemCount, itemIds: slot0.itemIds,
                          properties: slot0.properties, extraItems: extras, isEmpty: false });
        }

        const destCart = DB.getCart(destCartId);
        const label = destCart ? cartLabel(destCart) : destCartId;
        const ctName = destCart ? containerName(destCart) : 'עגלה';
        const cartLoc = destCart ? (destCart.location || '?') : '?';
        msg = [`${ctName} ${label}`, `מועמסת ב${cartLoc}`, ...msgLines].join('\n');
        Toast.show('פריטים הועמסו מרצפה', 'success');
        initFloorSlots();
      }
      // Optional destination — move cart and append to message
      const moveDest = screen.querySelector('#lu-load-move-dest').value.trim();
      if (moveDest) {
        DB.upsertCart({ cartId: destCartId, location: moveDest });
        msg += '\nמועברת ל' + moveDest;
      }
      screen.querySelector('#lu-dest-cart').value = '';
      screen.querySelector('#lu-load-move-dest').value = '';
      screen.querySelector('#lu-src-loc').value = '';
      return msg;
    }

    screen.querySelector('#lu-load-save-btn').addEventListener('click', async () => {
      const msg = await doLoadSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-load-save-only').addEventListener('click', async () => {
      await doLoadSave();
    });

    // ── unload save logic ──
    function doUnloadSave() {
      if (!_srcCart) { Toast.show('יש לבחור מקור לפירוק', 'error'); return null; }
      const destLoc = screen.querySelector('#lu-unload-dest-loc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return null; }
      const destSubLoc = screen.querySelector('#lu-unload-dest-subloc-group').hidden
        ? '' : screen.querySelector('#lu-unload-dest-subloc').value.trim();

      const slotsContainer = screen.querySelector('#lu-unload-slots-container');
      const allSlots = readAllSlots(slotsContainer);

      const unload0 = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
      const unload0Set   = new Set(unload0.itemIds);
      const remain0Ids   = (_srcCart.itemIds || []).filter(id => !unload0Set.has(id));
      const remain0Count = Math.max(0, (_srcCart.itemCount || 0) - unload0.itemCount);

      const newExtras = (_srcCart.extraItems || []).map((ex, idx) => {
        const unloadSlot = allSlots[idx + 1];
        if (!unloadSlot) return ex;
        const unloadedSet = new Set(unloadSlot.itemIds);
        const newIds      = (ex.itemIds || []).filter(id => !unloadedSet.has(id));
        const newCount    = Math.max(0, (ex.itemCount || 0) - unloadSlot.itemCount);
        return { ...ex, itemCount: newCount, itemIds: newIds };
      });

      const msgParts = [];
      for (const slot of allSlots) {
        if (!slot.itemCount) continue;
        const destFI   = DB.findFloorItem(destLoc, slot.properties);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + slot.itemCount;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), ...slot.itemIds];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: slot.properties, isEmpty: false });
        const propStr = Object.values(slot.properties).filter(Boolean).join(' ');
        msgParts.push(`${slot.itemCount}${propStr ? ' ' + propStr : ''}`);
      }

      DB.upsertCart({ cartId: _srcCart.cartId,
                      itemCount: remain0Count, itemIds: remain0Ids,
                      extraItems: newExtras });

      const label = cartLabel(_srcCart);
      const unloadDest = destSubLoc || destLoc;
      const msg   = [`${containerName(_srcCart)} ${label}`, ...msgParts, `פורקו ל${unloadDest}`].join('\n');
      Toast.show('פריטים פורקו לרצפה', 'success');

      _srcCart = null;
      screen.querySelector('#lu-unload-fields').hidden = true;
      screen.querySelector('#lu-unload-dest-loc').value = '';
      screen.querySelector('#lu-unload-dest-subloc').value = '';
      if (_unloadCartRef) _unloadCartRef.clear();
      return msg;
    }

    screen.querySelector('#lu-unload-save-btn').addEventListener('click', () => {
      const msg = doUnloadSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-unload-save-only').addEventListener('click', () => {
      doUnloadSave();
    });

    // empty cart (unload screen)
    screen.querySelector('#lu-empty-cart').addEventListener('click', () => {
      if (!_srcCart) { Toast.show('בחר עגלה', 'error'); return; }
      DB.upsertCart({ cartId: _srcCart.cartId, itemCount: 0, itemIds: [], properties: {}, isEmpty: true, extraItems: [] });
      Toast.show('עגלה רוקנה', 'success');
      _srcCart = null;
      screen.querySelector('#lu-unload-fields').hidden = true;
    });

    Router.register('loadunload', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setOp('unload');
          setTimeout(() => _unloadCartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setOp('load');
          setLoadType('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#lu-src-loc').value = fi.location || '';
              // Set properties on first floor slot
              const firstSlot = screen.querySelector('#lu-floor-slots-container .floor-slot');
              if (firstSlot) {
                buildPropertyFields(firstSlot.querySelector('.floor-slot-props'), fi.properties || {});
                firstSlot.querySelector('.floor-slot-props').dispatchEvent(new Event('change', { bubbles: true }));
              }
            }
          }, 50);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 8 — Screen: Search
  ════════════════════════════════════════════════════ -->
  <script>
  function initSearch() {
    const screen = document.getElementById('screen-search');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔍</span>
        <h1>חיפוש</h1>
      </div>
      <div class="sr-search-inputs" id="sr-search-inputs">
        <div class="sr-suggest-wrap"><input id="sr-inc-1" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 1"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-2" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 2"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-3" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 3"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-4" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 4"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-5" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 5"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-1" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 1 (לא לכלול)"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-2" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 2 (לא לכלול)"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-3" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 3 (לא לכלול)"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-4" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 4 (לא לכלול)"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-5" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 5 (לא לכלול)"></div>
        <label class="sr-empty-label" style="padding:4px 0;">
          <input type="checkbox" id="sr-empty-check"> הצג ריקות בלבד
        </label>
      </div>
      <div class="sr-filter-actions">
        <span id="sr-filter-count" class="sr-filter-count">כל הפריטים</span>
        <button id="sr-clear-btn" class="btn btn-sm btn-outline" style="display:none">נקה סינון</button>
      </div>
      <div style="display:flex;gap:6px;padding:0 12px 8px;flex-wrap:wrap">
        <button id="sr-copy-results" class="btn btn-sm btn-outline">העתק תוצאות</button>
        <button id="sr-copy-summary" class="btn btn-sm btn-outline">העתק סיכום</button>
        <button id="sr-laizko" class="btn btn-sm btn-outline">לאיצקו</button>
      </div>
      <div id="sr-summary" hidden></div>
      <div id="sr-results"></div>
    `;

    // ── State ──────────────────────────────────────────────
    const state = {
      includeTerms: [],   // lowercase normalized strings
      excludeTerms: [],
      emptyOnly: false
    };

    const _selectedItems = new Set(); // 'cart:ID' or 'fi:ID'

    const incInputs = [1,2,3,4,5].map(n => screen.querySelector('#sr-inc-' + n));
    const excInputs = [1,2,3,4,5].map(n => screen.querySelector('#sr-exc-' + n));

    // ── Pinned location groups ────────────────────────────────────
    const PIN_KEY = 'shinua_pinned_groups';
    let _pinnedGroups = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem(PIN_KEY) || '[]');
      if (Array.isArray(raw)) _pinnedGroups = new Set(raw);
    } catch { /* ignore */ }
    function _savePins() { localStorage.setItem(PIN_KEY, JSON.stringify([..._pinnedGroups])); }

    // ── Suggestion pool ───────────────────────────────────────────
    let _suggestions = [];
    function buildSuggestionPool() {
      const pool = new Set();
      const meta = DB.getMetadata();
      const carts = DB.getAllCarts();
      const fis = DB.getAllFloorItems();
      // locations & sub-locations
      (meta.locations || []).forEach(l => {
        pool.add(l.name);
        (l.subLocations || []).forEach(s => pool.add(s));
      });
      // cart types, container types
      (meta.cartTypes || []).forEach(t => pool.add(t));
      (meta.containerTypes || []).forEach(t => pool.add(t));
      // property options
      (meta.properties || []).forEach(p => (p.options || []).forEach(o => pool.add(o)));
      // cart IDs, serial numbers
      carts.forEach(c => {
        pool.add(c.cartId);
        if (c.cartType) pool.add(c.cartType);
        (c.itemIds || []).forEach(id => pool.add(id));
        (c.extraItems || []).forEach(ex => (ex.itemIds || []).forEach(id => pool.add(id)));
      });
      // floor item serial numbers
      fis.forEach(fi => {
        (fi.itemIds || []).forEach(id => pool.add(id));
      });
      _suggestions = [...pool].filter(Boolean).sort();
    }

    // ── Autocomplete ─────────────────────────────────────────────
    let _activeDropdown = null;

    function showSuggestions(input, query) {
      closeSuggestions();
      if (!query) return;
      const lower = query.toLowerCase();
      const matches = _suggestions.filter(s => s.toLowerCase().includes(lower)).slice(0, 15);
      if (!matches.length) return;

      const wrap = input.closest('.sr-suggest-wrap');
      const list = document.createElement('div');
      list.className = 'sr-suggest-list open';
      matches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'sr-suggest-item';
        item.textContent = m;
        item.addEventListener('pointerdown', e => {
          e.preventDefault();
          input.value = m;
          closeSuggestions();
          onSearchInput();
        });
        list.appendChild(item);
      });
      wrap.appendChild(list);
      _activeDropdown = list;
    }

    function closeSuggestions() {
      if (_activeDropdown) { _activeDropdown.remove(); _activeDropdown = null; }
    }

    // ── Debounced search input handler ────────────────────────────
    let _debounceTimer = null;
    function onSearchInput() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(() => {
        state.includeTerms = incInputs.map(i => i.value.trim().toLowerCase()).filter(Boolean);
        state.excludeTerms = excInputs.map(i => i.value.trim().toLowerCase()).filter(Boolean);
        updateActionsBar();
        renderResults();
      }, 150);
    }

    // Wire up input events
    [...incInputs, ...excInputs].forEach(input => {
      input.addEventListener('input', () => {
        const q = input.value.trim();
        if (q.length >= 1) showSuggestions(input, q);
        else closeSuggestions();
        onSearchInput();
      });
      input.addEventListener('focus', () => {
        const q = input.value.trim();
        if (q.length >= 1) showSuggestions(input, q);
      });
      input.addEventListener('blur', () => {
        setTimeout(closeSuggestions, 150);
      });
    });

    // Empty-only checkbox
    screen.querySelector('#sr-empty-check').addEventListener('change', e => {
      state.emptyOnly = e.target.checked;
      updateActionsBar();
      renderResults();
    });

    // ── Actions bar ───────────────────────────────────────────────
    function countActive() {
      return state.includeTerms.length + state.excludeTerms.length + (state.emptyOnly ? 1 : 0);
    }
    function updateActionsBar() {
      const count    = countActive();
      const label    = document.getElementById('sr-filter-count');
      const clearBtn = document.getElementById('sr-clear-btn');
      label.textContent = count ? count + ' סינונים פעילים' : 'כל הפריטים';
      clearBtn.style.display = count ? '' : 'none';
    }

    // ── Filter logic ──────────────────────────────────────────────
    function buildSearchableParts(item) {
      const parts = [item.cartId, item.location, item.subLocation,
        item.cartType, item.containerType, item.comment || '',
        ...Object.values(item.properties || {}).filter(Boolean),
        ...(item.itemIds || [])];
      if (item.extraItems) {
        item.extraItems.forEach(ex => {
          parts.push(...Object.values(ex.properties || {}).filter(Boolean));
          parts.push(...(ex.itemIds || []));
        });
      }
      // Include child carts' data so parent shows up in searches for child content
      if (item.cartId) {
        DB.getChildCarts(item.cartId).forEach(ch => {
          parts.push(ch.cartId);
          parts.push(...Object.values(ch.properties || {}).filter(Boolean));
          parts.push(...(ch.itemIds || []));
          if (ch.extraItems) {
            ch.extraItems.forEach(ex => {
              parts.push(...Object.values(ex.properties || {}).filter(Boolean));
              parts.push(...(ex.itemIds || []));
            });
          }
        });
      }
      if (item.itemCount != null) parts.push(String(item.itemCount));
      return parts.filter(Boolean).map(p => p.toLowerCase());
    }

    function termMatchesParts(term, parts) {
      // Match if any part equals the term exactly, or if a multi-word part
      // contains the term as a whole word (not as substring within a hyphenated/compound word)
      for (const part of parts) {
        if (part === term) return true;
        // Check whole-word match: term must be bounded by start/end or whitespace
        if (part.length > term.length) {
          const idx = part.indexOf(term);
          if (idx === -1) continue;
          let pos = idx;
          while (pos !== -1) {
            const before = pos === 0 || part[pos - 1] === ' ';
            const after = (pos + term.length) === part.length || part[pos + term.length] === ' ';
            if (before && after) return true;
            pos = part.indexOf(term, pos + 1);
          }
        }
      }
      return false;
    }

    function itemPasses(item) {
      if (state.emptyOnly && !item.isEmpty) return false;
      if (!state.includeTerms.length && !state.excludeTerms.length) return true;
      const parts = buildSearchableParts(item);
      for (const t of state.includeTerms) { if (!termMatchesParts(t, parts)) return false; }
      for (const t of state.excludeTerms) { if (termMatchesParts(t, parts)) return false; }
      return true;
    }

    // ── Highlight helper ─────────────────────────────────────────
    function highlightText(text, terms) {
      if (!terms.length || !text) return esc(text);
      const lower = text.toLowerCase();
      const ranges = [];
      for (const term of terms) {
        let from = 0;
        while (from < lower.length) {
          const idx = lower.indexOf(term, from);
          if (idx === -1) break;
          ranges.push({ start: idx, end: idx + term.length });
          from = idx + term.length;
        }
      }
      if (!ranges.length) return esc(text);
      // merge overlapping
      ranges.sort((a, b) => a.start - b.start);
      const merged = [ranges[0]];
      for (let i = 1; i < ranges.length; i++) {
        const prev = merged[merged.length - 1];
        if (ranges[i].start <= prev.end) {
          prev.end = Math.max(prev.end, ranges[i].end);
        } else {
          merged.push(ranges[i]);
        }
      }
      let out = '', cursor = 0;
      for (const r of merged) {
        out += esc(text.slice(cursor, r.start));
        out += '<mark>' + esc(text.slice(r.start, r.end)) + '</mark>';
        cursor = r.end;
      }
      out += esc(text.slice(cursor));
      return out;
    }

    // ── Summary panel ─────────────────────────────────────────────
    function renderSummary(carts, fis) {
      const el = document.getElementById('sr-summary');
      const all = [...carts, ...fis];
      if (!all.length) { el.hidden = true; el.innerHTML = ''; return; }

      const totalItems  = all.reduce((s, x) => s + (x.itemCount || 0), 0);
      const cartItems   = carts.reduce((s, c) => s + (c.itemCount || 0), 0);
      const floorItems  = fis.reduce((s, f) => s + (f.itemCount || 0), 0);
      const emptyCount  = all.filter(x => x.isEmpty).length;

      const locStats = {};
      all.forEach(item => {
        const loc = item.location || 'ללא מיקום';
        if (!locStats[loc]) locStats[loc] = { items: 0, empty: 0 };
        locStats[loc].items += (item.itemCount || 0);
        if (item.isEmpty) locStats[loc].empty++;
      });
      const locEntries = Object.entries(locStats).sort((a,b) => b[1].items - a[1].items);
      const maxLocItems = Math.max(1, ...locEntries.map(([,s]) => s.items));

      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const comboStats = {};
      all.filter(x => !x.isEmpty && x.itemCount).forEach(item => {
        const key   = propDefs.map(p => (item.properties || {})[p.name] || '').join('|');
        const label = propDefs.map(p => (item.properties || {})[p.name]).filter(Boolean).join(' · ');
        if (!comboStats[key]) comboStats[key] = { label: label || 'ללא מאפיינים', total: 0 };
        comboStats[key].total += item.itemCount;
      });
      const comboEntries = Object.values(comboStats).sort((a,b) => b.total - a.total);

      let html = '<div class="sr-summary">';
      if (totalItems > 0) {
        const showSplit = carts.length && fis.length;
        html += `
          <div class="sr-total-card">
            <div class="sr-total-num">${totalItems}</div>
            <div class="sr-total-label">פריטים</div>
            ${showSplit ? `
            <div class="sr-total-split">
              <div class="sr-split-item"><span class="sr-split-num">${cartItems}</span><span class="sr-split-lbl">בעגלות</span></div>
              <div class="sr-split-item"><span class="sr-split-num">${floorItems}</span><span class="sr-split-lbl">ברצפה</span></div>
            </div>` : ''}
          </div>`;
      }
      if (emptyCount > 0) {
        html += `<div class="sr-empty-card"><div class="sr-empty-card-num">${emptyCount}</div><div class="sr-empty-card-lbl">ריקות</div></div>`;
      }
      if (locEntries.length > 1) {
        html += '<div class="sr-section-title">לפי מיקום</div>';
        html += locEntries.map(([loc, s]) => {
          const pct = Math.round((s.items / maxLocItems) * 100);
          const countLabel = s.items > 0 ? s.items + (s.empty ? ` (+${s.empty} ריקות)` : '') : s.empty + ' ריקות';
          return `<div class="sr-loc-row"><span class="sr-loc-name">${esc(loc)}</span><div class="sr-loc-bar-wrap"><div class="sr-loc-bar-fill" style="width:${pct}%"></div></div><span class="sr-loc-count">${countLabel}</span></div>`;
        }).join('');
      }
      if (comboEntries.length > 1 && propDefs.length) {
        html += '<div class="sr-section-title">לפי שילוב מאפיינים</div>';
        html += comboEntries.map(c => `<div class="sr-combo-row"><span class="sr-combo-label">${esc(c.label)}</span><span class="sr-combo-count">${c.total} פריטים</span></div>`).join('');
      }
      html += '</div>';
      el.innerHTML = html;
      el.hidden = false;
    }

    // ── Render results ────────────────────────────────────────────
    function propSummary(props) {
      return Object.values(props || {}).filter(Boolean).join(' · ');
    }
    function renderResults() {
      const results = document.getElementById('sr-results');
      const carts   = DB.getAllCarts().filter(itemPasses);
      const fis     = DB.getAllFloorItems().filter(itemPasses);

      renderSummary(carts, fis);

      if (!carts.length && !fis.length) {
        results.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">${countActive() ? 'לא נמצאו תוצאות לסינון הנוכחי' : 'אין פריטים במערכת'}</div>
          </div>`;
        return;
      }

      const terms = state.includeTerms; // highlight include terms only

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '||' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c  => addItem(c,  'cart'));
      fis.forEach(fi   => addItem(fi, 'fi'));

      const sortedGroups = Object.values(groups).sort((a,b) => {
        const aKey = a.loc + '||' + a.sub;
        const bKey = b.loc + '||' + b.sub;
        const aPin = _pinnedGroups.has(aKey) ? 0 : 1;
        const bPin = _pinnedGroups.has(bKey) ? 0 : 1;
        if (aPin !== bPin) return aPin - bPin;
        return a.loc.localeCompare(b.loc) || a.sub.localeCompare(b.sub);
      });

      results.innerHTML = sortedGroups.map(g => {
        const gKey = g.loc + '||' + g.sub;
        const isPinned = _pinnedGroups.has(gKey);
        return `
        <div class="loc-group">
          <div class="loc-group-header">
            ${highlightText(g.loc + (g.sub ? ' / ' + g.sub : ''), terms)}
            <button class="sr-pin-btn${isPinned ? ' pinned' : ''}" data-pin-key="${esc(gKey)}" title="${isPinned ? 'בטל הצמדה' : 'הצמד למעלה'}">${isPinned ? '\u2605' : '\u2606'}</button>
          </div>
          ${g.items.map(({ data, type }) => {
            if (type === 'cart') {
              const children = DB.getChildCarts(data.cartId);
              const allSlots = [
                { properties: data.properties || {}, itemCount: data.itemCount || 0 },
                ...(data.extraItems || []).filter(ex => ex.itemCount)
              ];
              // Include child cart slots for display
              children.forEach(ch => {
                allSlots.push({ properties: ch.properties || {}, itemCount: ch.itemCount || 0 });
                (ch.extraItems || []).filter(ex => ex.itemCount).forEach(ex => allSlots.push(ex));
              });
              const ownTotal = cartTotalCount(data);
              const childTotal = children.reduce((s, ch) => s + cartTotalCount(ch), 0);
              const grandTotal = ownTotal + childTotal;
              const subParts = [];
              if (data.isEmpty && !childTotal) {
                subParts.push('ריקה');
              } else if (allSlots.length > 1) {
                // Multi-slot: find common vs differing properties
                const meta = DB.getMetadata();
                const propDefs = meta.properties || [];
                const commonParts = [];
                const diffParts = [];
                propDefs.forEach(p => {
                  const vals = allSlots.map(s => (s.properties || {})[p.name] || '');
                  const unique = [...new Set(vals.filter(Boolean))];
                  if (unique.length === 1) {
                    commonParts.push(unique[0]);
                  } else if (unique.length > 1) {
                    unique.forEach(v => {
                      const cnt = allSlots.filter(s => (s.properties || {})[p.name] === v).reduce((s, sl) => s + (sl.itemCount || 0), 0);
                      diffParts.push(cnt + ' ' + v);
                    });
                  }
                });
                if (grandTotal) subParts.push(grandTotal + ' פריטים');
                if (commonParts.length) subParts.push(commonParts.join(' '));
                if (diffParts.length) subParts.push('(' + diffParts.join(', ') + ')');
              } else {
                const ps = propSummary(data.properties);
                if (grandTotal) subParts.push(grandTotal + ' פריטים');
                if (ps) subParts.push(ps);
              }
              if (data.parentCartId) {
                const pc = DB.getCart(data.parentCartId);
                subParts.push('על ' + (pc ? cartLabel(pc) : data.parentCartId));
              }
              if (children.length) subParts.push(children.length + ' טעונות');
              const ctBadge = (data.containerType && data.containerType !== DEFAULT_CONTAINER)
                ? `<span style="background:var(--area-bg);color:var(--brand);padding:1px 6px;border-radius:4px;font-size:0.75rem;margin-left:6px;">${esc(data.containerType)}</span>` : '';
              return `
                <div class="list-item sr-item${_selectedItems.has('cart:'+data.cartId) ? ' sr-checked' : ''}" data-type="cart" data-id="${esc(data.cartId)}" style="cursor:pointer">
                  <input type="checkbox" class="sr-check" data-sel-type="cart" data-sel-id="${esc(data.cartId)}"${_selectedItems.has('cart:'+data.cartId) ? ' checked' : ''}>
                  <div class="list-item-body">
                    <div class="list-item-title">${ctBadge}${highlightText(cartLabel(data), terms)}</div>
                    <div class="list-item-sub">${highlightText(subParts.join(' · '), terms)}</div>
                    ${data.comment ? `<div class="list-item-sub" style="color:var(--muted);font-style:italic">${highlightText(data.comment, terms)}</div>` : ''}
                  </div>
                  <span>›</span>
                </div>`;
            } else {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item${_selectedItems.has('fi:'+data.id) ? ' sr-checked' : ''}" data-type="fi" data-id="${esc(data.id)}" style="cursor:pointer">
                  <input type="checkbox" class="sr-check" data-sel-type="fi" data-sel-id="${esc(data.id)}"${_selectedItems.has('fi:'+data.id) ? ' checked' : ''}>
                  <div class="list-item-body">
                    <div class="list-item-title"><span class="badge badge-floor">רצפה</span> ${highlightText(ps || data.id, terms)}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + ' פריטים' : '')}</div>
                  </div>
                  <span>›</span>
                </div>`;
            }
          }).join('')}
        </div>
      `;
      }).join('');

      // Wire pin buttons directly
      results.querySelectorAll('.sr-pin-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const key = btn.dataset.pinKey;
          if (_pinnedGroups.has(key)) _pinnedGroups.delete(key);
          else _pinnedGroups.add(key);
          _savePins();
          renderResults();
        });
      });

      // Wire checkboxes
      results.querySelectorAll('.sr-check').forEach(cb => {
        cb.addEventListener('click', e => {
          e.stopPropagation();
          const key = cb.dataset.selType + ':' + cb.dataset.selId;
          if (cb.checked) _selectedItems.add(key);
          else _selectedItems.delete(key);
          cb.closest('.sr-item').classList.toggle('sr-checked', cb.checked);
        });
      });
    }

    // ── Clear all ─────────────────────────────────────────────────
    document.getElementById('sr-clear-btn').addEventListener('click', () => {
      incInputs.forEach(i => { i.value = ''; });
      excInputs.forEach(i => { i.value = ''; });
      state.includeTerms = [];

    // ── Copy results (plain text) ─────────────────────────────────
    document.getElementById('sr-copy-results').addEventListener('click', () => {
      let carts = DB.getAllCarts().filter(itemPasses);
      let fis   = DB.getAllFloorItems().filter(itemPasses);
      // If checkboxes are ticked, copy only selected items
      if (_selectedItems.size) {
        carts = carts.filter(c => _selectedItems.has('cart:' + c.cartId));
        fis = fis.filter(fi => _selectedItems.has('fi:' + fi.id));
      }
      if (!carts.length && !fis.length) { Toast.show('אין תוצאות', 'error'); return; }

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '||' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c => addItem(c, 'cart'));
      fis.forEach(fi => addItem(fi, 'fi'));

      const sorted = Object.values(groups).sort((a,b) => a.loc.localeCompare(b.loc) || a.sub.localeCompare(b.sub));
      let lineNo = 1;
      const text = sorted.map(g => {
        const header = g.loc + (g.sub ? ' / ' + g.sub : '') + ` (${g.items.length} שורות)`;
        const lines = g.items.map(({ data, type }) => {
          const num = lineNo++;
          if (type === 'cart') {
            const ps = propSummary(data.properties);
            const count = cartTotalCount(data);
            return `${num}. ${cartLabel(data)}: ${data.isEmpty ? 'ריקה' : (count ? count + (ps ? ' ' + ps : '') : ps)}`;
          } else {
            const ps = propSummary(data.properties);
            return `${num}. [רצפה] ${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + (ps ? ' ' + ps : '') : ps)}`;
          }
        }).join('\n');
        return header + '\n' + lines;
      }).join('\n\n');

      Utils.copyToClipboard(text).then(() => Toast.show('תוצאות הועתקו', 'success')).catch(() => Toast.show('שגיאה בהעתקה', 'error'));
    });

    // ── Copy summary text ──────────────────────────────────────────
    document.getElementById('sr-copy-summary').addEventListener('click', () => {
      const carts = DB.getAllCarts().filter(itemPasses);
      const fis   = DB.getAllFloorItems().filter(itemPasses);
      const all   = [...carts, ...fis];
      if (!all.length) { Toast.show('אין תוצאות', 'error'); return; }

      const totalItems = all.reduce((s, x) => s + (x.itemCount || 0), 0);
      const emptyCount = all.filter(x => x.isEmpty).length;
      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const comboStats = {};
      all.filter(x => !x.isEmpty && x.itemCount).forEach(item => {
        const label = propDefs.map(p => (item.properties || {})[p.name]).filter(Boolean).join(' ');
        const key = label || 'ללא מאפיינים';
        if (!comboStats[key]) comboStats[key] = 0;
        comboStats[key] += item.itemCount;
      });
      const lines = [`סה"כ: ${totalItems} פריטים, ${all.length} מכולות${emptyCount ? ', ' + emptyCount + ' ריקות' : ''}`];
      Object.entries(comboStats).sort((a,b) => b[1] - a[1]).forEach(([label, count]) => {
        lines.push(`${count} ${label}`);
      });
      const text = lines.join('\n');
      Utils.copyToClipboard(text).then(() => Toast.show('סיכום הועתק', 'success')).catch(() => Toast.show('שגיאה בהעתקה', 'error'));
    });

    // ── לאיצקו (CSV download) ──────────────────────────────────────
    document.getElementById('sr-laizko').addEventListener('click', () => {
      const carts = DB.getAllCarts().filter(itemPasses);
      const fis   = DB.getAllFloorItems().filter(itemPasses);
      if (!carts.length && !fis.length) { Toast.show('אין תוצאות', 'error'); return; }

      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const csvEscape = v => { const s = String(v == null ? '' : v); return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
      const rows = [['מיקום', 'סוג', 'מזהה', ...propDefs.map(p => p.name), 'כמות']];

      const addRow = (item, type) => {
        const loc = (item.location || '') + (item.subLocation ? ' / ' + item.subLocation : '');
        const id = type === 'cart' ? cartLabel(item) : 'רצפה';
        const kind = type === 'cart' ? (item.containerType || 'עגלה') : 'רצפה';
        const propVals = propDefs.map(p => (item.properties || {})[p.name] || '');
        const count = item.isEmpty ? 0 : (item.itemCount || 0);
        rows.push([loc, kind, id, ...propVals, count]);
        // extra items for multi-slot carts
        if (type === 'cart' && item.extraItems) {
          item.extraItems.forEach(ex => {
            if (!ex.itemCount) return;
            const exProps = propDefs.map(p => (ex.properties || {})[p.name] || '');
            rows.push([loc, kind, id, ...exProps, ex.itemCount]);
          });
        }
      };
      carts.forEach(c => addRow(c, 'cart'));
      fis.forEach(fi => addRow(fi, 'fi'));

      const csv = '\uFEFF' + rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
      const d = new Date();
      const ts = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '-' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `laizko-${ts}.csv`; a.click();
      URL.revokeObjectURL(url);
      Toast.show('CSV הורד', 'success');
    });

    // ── Edit cart contents in-place ─────────────────────────────
    function openEditCartModal(cart) {
      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const propFieldsHtml = propDefs.map(p => {
        const opts = (p.options || []).map(o => `<option value="${esc(o)}"${(cart.properties || {})[p.name] === o ? ' selected' : ''}></option>`).join('');

      }).join('');
      const count = cart.itemCount || 0;
      const ids = (cart.itemIds || []);
      const idRows = Array.from({length: Math.max(count, ids.length)}, (_, i) =>
        `<div class="item-row"><span class="item-row-num">${i+1}</span><input class="item-id-input ec-id" placeholder="מספר סידורי" value="${esc(ids[i] || '')}"></div>`
      ).join('');
      Modal.open({
        title: `עריכת ${containerName(cart)} ${esc(cartLabel(cart))}`,
        html: `
          <div class="form-group"><label class="form-label">מספר פריטים</label><input id="ec-count" class="form-input" type="number" min="0" value="${count}"></div>
          <div id="ec-id-rows">${idRows}</div>

        `,

          { id: 'ec-save', label: 'שמור', cls: 'btn-primary', onClick: () => {
