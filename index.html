              <button class="btn-icon-edit ep-rename-prop" data-prop="${esc(p.name)}" title="שנה שם">✏️</button>
              <button class="btn-icon ep-del-prop" data-prop="${esc(p.name)}" title="מחק מאפיין">✕</button>
              <div class="reorder-handle" data-idx="${idx}"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg></div>
            </div>
            <div class="prop-options">
              <div style="margin-bottom:8px">
                <button class="btn btn-outline btn-sm ep-condition-btn" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px">${conds ? 'ערוך תנאי' : 'הוסף תנאי'}</button>
                ${conds ? `<button class="btn btn-outline btn-sm ep-condition-clear" data-prop="${esc(p.name)}" style="font-size:0.72rem;padding:2px 10px;color:var(--danger);border-color:var(--danger);margin-inline-start:4px">הסר תנאי</button>` : ''}
              </div>
              ${p.options.map(o => {
                const optAliases = aliases[o] || [];
                return `
                <div class="prop-option-row" style="flex-wrap:wrap">
                  <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
                    <span>• ${esc(o)}</span>
                    <div style="display:flex;align-items:center;gap:4px">
                      <button class="btn-icon-edit ep-rename-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}" title="שנה שם">✏️</button>
                      <button class="btn btn-outline btn-sm ep-aliases-btn" data-prop="${esc(p.name)}" data-opt="${esc(o)}" style="font-size:0.7rem;padding:2px 8px">שמות חלופיים</button>
                      <button class="btn-icon ep-del-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}">✕</button>
                    </div>
                  </div>
                  ${optAliases.length ? `<div style="width:100%;padding:2px 16px 0;font-size:0.75rem;color:var(--muted)">חלופיים: ${optAliases.map(a => esc(a)).join(', ')}</div>` : ''}
                </div>`;
              }).join('')}
              <div class="prop-add-row">
                <input class="form-input btn-sm ep-opt-input" data-prop="${esc(p.name)}" placeholder="אפשרות חדשה">
                <button class="btn btn-outline btn-sm ep-add-opt" data-prop="${esc(p.name)}">הוסף</button>
              </div>
            </div>
          </div>`;
        }).join('');
      }
      renderList();

      // property order lock switch
      const epLockCheck = tabContent.querySelector('#ep-order-lock');
      const epLockEmoji = tabContent.querySelector('#ep-lock-emoji');
      epLockCheck.checked = DB.getMetadata().propertyOrderLocked || false;
      epLockEmoji.textContent = epLockCheck.checked ? '🔒' : '🔓';
      epLockCheck.addEventListener('change', () => {
        DB.setPropertyOrderLocked(epLockCheck.checked);
        epLockEmoji.textContent = epLockCheck.checked ? '🔒' : '🔓';
      });
      tabContent.querySelector('#ep-order-lock-info').addEventListener('click', () => {
        Modal.open({
          title: 'נעילת סדר',
          html: '<p style="line-height:1.6">כאשר הסדר נעול הסדר של המאפיינים יקבע אך ורק על פי הסדר במסך הזה. כאשר הוא לא נעול בעת ייבוא מיפוי הסדר במיפוי הוא שיקבע.</p>',
          actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
        });
      });

      tabContent.querySelector('#ep-save').addEventListener('click', () => {
        const name = tabContent.querySelector('#ep-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מאפיין', 'error'); return; }
        DB.upsertProperty({ name, options: [] });
        Toast.show('מאפיין נוסף', 'success');
        renderList();
        tabContent.querySelector('#ep-name').value = '';
      });

      // Drag-and-drop reorder for properties
      _initReorder(tabContent.querySelector('#ep-list'), {
        handleSelector: '.reorder-handle',
        itemSelector: '.reorder-item',
        onReorder: (fromIdx, toIdx) => {
          const props = DB.getMetadata().properties;
          const names = props.map(p => p.name);
          const [moved] = names.splice(fromIdx, 1);
          names.splice(toIdx, 0, moved);
          DB.setPropertyOrder(names);
          renderList();
        }
      });

      tabContent.querySelector('#ep-list').addEventListener('click', e => {
        // expand/collapse
        const header = e.target.closest('.prop-group-header');
        if (header && !e.target.closest('button') && !e.target.closest('.reorder-handle')) {
          header.closest('.prop-group').classList.toggle('expanded');
          return;
        }
        // rename property
        const renameProp = e.target.closest('.ep-rename-prop');
        if (renameProp) {
          const oldName = renameProp.dataset.prop;
          Modal.open({
            title: 'שינוי שם מאפיין',
            html: `<div class="form-group"><label class="form-label">שם חדש</label><input id="rename-prop-input" class="form-input" value="${esc(oldName)}"></div>`,
            actions: [
              { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const newName = document.getElementById('rename-prop-input').value.trim();
                if (!newName || newName === oldName) { Modal.close(); return; }
                DB.renameProperty(oldName, newName);
                Modal.close();
                renderList();
                Toast.show('מאפיין שונה', 'success');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          return;
        }
        // delete property
        const delProp = e.target.closest('.ep-del-prop');
        if (delProp) {
          DB.deleteProperty(delProp.dataset.prop);
          Toast.show('מאפיין נמחק', 'info');
          renderList();
          return;
        }
        // rename option
        const renameOpt = e.target.closest('.ep-rename-opt');
        if (renameOpt) {
          const propName = renameOpt.dataset.prop;
          const oldOpt = renameOpt.dataset.opt;
          Modal.open({
            title: 'שינוי שם אפשרות',
            html: `<div class="form-group"><label class="form-label">שם חדש ל-"${esc(oldOpt)}"</label><input id="rename-opt-input" class="form-input" value="${esc(oldOpt)}"></div>`,
            actions: [
              { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const newOpt = document.getElementById('rename-opt-input').value.trim();
                if (!newOpt || newOpt === oldOpt) { Modal.close(); return; }
                DB.renamePropertyOption(propName, oldOpt, newOpt);
                Modal.close();
                renderList();
                // re-expand the group
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
                Toast.show('אפשרות שונתה', 'success');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          return;
        }
        // delete option
        const delOpt = e.target.closest('.ep-del-opt');
        if (delOpt) {
          DB.removePropertyOption(delOpt.dataset.prop, delOpt.dataset.opt);
          renderList();
          return;
        }
        // aliases button
        const aliasBtn = e.target.closest('.ep-aliases-btn');
        if (aliasBtn) {
          const propName = aliasBtn.dataset.prop;
          const optName = aliasBtn.dataset.opt;
          const currentAliases = DB.getOptionAliases(propName, optName);
          Modal.open({
            title: 'שמות חלופיים: ' + optName,
            html: `
              <p class="card-meta" style="margin-bottom:10px">הוסף שמות חלופיים לאפשרות <strong>${esc(optName)}</strong>.<br>בייבוא מיפוי, כל השמות החלופיים יומרו אוטומטית לשם הרגיל.</p>
              <div id="alias-list-container">
                ${currentAliases.map((a, i) => `
                  <div class="form-group" style="display:flex;gap:8px;margin-bottom:6px" data-alias-row>
                    <input class="form-input alias-input" value="${esc(a)}" placeholder="שם חלופי" style="flex:1">
                    <button class="btn btn-outline btn-sm alias-remove-btn" type="button">✕</button>
                  </div>
                `).join('')}
              </div>
              <button id="alias-add-row-btn" class="btn btn-outline btn-sm" style="margin-top:6px">+ הוסף שם חלופי</button>
            `,
            actions: [
              { id: 'save-aliases', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const inputs = document.querySelectorAll('#alias-list-container .alias-input');
                const aliases = Array.from(inputs).map(inp => inp.value.trim()).filter(Boolean);
                DB.setOptionAliases(propName, optName, aliases);
                Modal.close();
                renderList();
                // re-expand the group
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          // wire up add/remove buttons inside the modal
          setTimeout(() => {
            const container = document.getElementById('alias-list-container');
            const addRowBtn = document.getElementById('alias-add-row-btn');
            if (addRowBtn) {
              addRowBtn.addEventListener('click', () => {
                const row = document.createElement('div');
                row.className = 'form-group';
                row.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
                row.setAttribute('data-alias-row', '');
                row.innerHTML = '<input class="form-input alias-input" placeholder="שם חלופי" style="flex:1"><button class="btn btn-outline btn-sm alias-remove-btn" type="button">✕</button>';
                container.appendChild(row);
                row.querySelector('.alias-input').focus();
              });
            }
            if (container) {
              container.addEventListener('click', ev => {
                const removeBtn = ev.target.closest('.alias-remove-btn');
                if (removeBtn) removeBtn.closest('[data-alias-row]').remove();
              });
            }
          }, 50);
          return;
        }
        // add option
        const addOpt = e.target.closest('.ep-add-opt');
        if (addOpt) {
          const propName = addOpt.dataset.prop;
          const input = Array.from(tabContent.querySelectorAll('.ep-opt-input')).find(el => el.dataset.prop === propName);
          const val   = input ? input.value.trim() : '';
          if (!val) return;
          DB.addPropertyOption(propName, val);
          renderList();
          // re-expand the group
          const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
          if (group) group.classList.add('expanded');
          return;
        }
        // condition button
        const condBtn = e.target.closest('.ep-condition-btn');
        if (condBtn) {
          const propName = condBtn.dataset.prop;
          const allProps = DB.getMetadata().properties;
          const thisProp = allProps.find(p => p.name === propName);
          const otherProps = allProps.filter(p => p.name !== propName);
          if (!otherProps.length) { Toast.show('אין מאפיינים אחרים להגדרת תנאי', 'error'); return; }
          const currentConds = normalizeConditions(thisProp.condition) || [{ prop: '', value: '' }];
          Modal.open({
            title: 'תנאי להצגת: ' + propName,
            html: `
              <p class="card-meta" style="margin-bottom:10px">מאפיין זה יוצג כאשר לפחות אחד מהתנאים מתקיים (או).</p>
              <div id="cond-rows-container"></div>
              <button id="cond-add-row" class="btn btn-outline btn-sm" style="margin-top:8px;font-size:0.78rem">+ הוסף תנאי נוסף (או)</button>
            `,
            actions: [
              { id: 'save-cond', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const rows = document.querySelectorAll('.cond-row');
                const conditions = [];
                rows.forEach(row => {
                  const cp = row.querySelector('.cond-prop-sel').value;
                  const cv = row.querySelector('.cond-val-sel').value;
                  if (cp) conditions.push({ prop: cp, value: cv });
                });
                if (conditions.length) {
                  DB.upsertProperty({ name: propName, condition: conditions });
                } else {
                  const db2 = DB.getMetadata();
                  const p2 = db2.properties.find(pp => pp.name === propName);
                  if (p2) { delete p2.condition; DB.upsertProperty(p2); }
                }
                Modal.close();
                renderList();
                const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
                if (group) group.classList.add('expanded');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          setTimeout(() => {
            const container = document.getElementById('cond-rows-container');
            function makeCondRow(c) {
              const row = document.createElement('div');
              row.className = 'cond-row';
              row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:8px';
              row.innerHTML = `
                <select class="form-select cond-prop-sel" style="flex:1">
                  <option value="">— מאפיין —</option>
                  ${otherProps.map(op => `<option value="${esc(op.name)}" ${c.prop === op.name ? 'selected' : ''}>${esc(op.name)}</option>`).join('')}
                </select>
                <select class="form-select cond-val-sel" style="flex:1">
                  <option value="">— ערך —</option>
                </select>
                <button class="btn-icon cond-remove-row" title="הסר" style="flex-shrink:0">✕</button>
              `;
              const propSel = row.querySelector('.cond-prop-sel');
              const valSel = row.querySelector('.cond-val-sel');
              function updateValOpts() {
                const selProp = allProps.find(p => p.name === propSel.value);
                valSel.innerHTML = '<option value="">— ערך —</option>';
                if (selProp) {
                  selProp.options.forEach(o => {
                    const opt = document.createElement('option');
                    opt.value = o; opt.textContent = o;
                    if (propSel.value === c.prop && c.value === o) opt.selected = true;
                    valSel.appendChild(opt);
                  });
                }
              }
              updateValOpts();
              propSel.addEventListener('change', () => { c = { prop: '', value: '' }; updateValOpts(); });
              row.querySelector('.cond-remove-row').addEventListener('click', () => {
                row.remove();
                updateRemoveButtons();
              });
              container.appendChild(row);
              updateRemoveButtons();
            }
            function updateRemoveButtons() {
              const rows = container.querySelectorAll('.cond-row');
              rows.forEach(r => {
                r.querySelector('.cond-remove-row').style.visibility = rows.length <= 1 ? 'hidden' : 'visible';
              });
            }
            currentConds.forEach(c => makeCondRow(c));
            document.getElementById('cond-add-row').addEventListener('click', () => {
              makeCondRow({ prop: '', value: '' });
            });
          }, 50);
          return;
        }
        // clear condition
        const condClear = e.target.closest('.ep-condition-clear');
        if (condClear) {
          const propName = condClear.dataset.prop;
          const thisProp = DB.getMetadata().properties.find(p => p.name === propName);
          if (thisProp) { delete thisProp.condition; DB.upsertProperty(thisProp); }
          renderList();
          const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
          if (group) group.classList.add('expanded');
          return;
        }
      });

      // allow Enter in option input
      tabContent.querySelector('#ep-list').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const addBtn = e.target.closest('.ep-opt-input');
          if (addBtn) {
            const propName = addBtn.dataset.prop;
            const btn = Array.from(tabContent.querySelectorAll('.ep-add-opt')).find(el => el.dataset.prop === propName);
            if (btn) btn.click();
          }
        }
      });

      // export definitions (properties + non-map locations)
      tabContent.querySelector('#ep-export-defs').addEventListener('click', () => {
        const meta = DB.getMetadata();
        const defs = {
          properties: meta.properties || [],
          locations: (meta.locations || []).filter(l => !l.inMap)
        };
        const text = JSON.stringify(defs, null, 2);
        Utils.copyToClipboard(text)
          .then(() => Toast.show('הגדרות הועתקו ללוח', 'success'))
          .catch(() => Toast.show('שגיאה בהעתקה', 'error'));
      });

      // import definitions
      tabContent.querySelector('#ep-import-defs').addEventListener('click', () => {
        Modal.open({
          title: 'ייבוא הגדרות',
          html: `
            <p class="card-meta" style="margin-bottom:10px">הדבק כאן את טקסט ההגדרות שהועתק בייצוא:</p>
            <textarea id="ep-import-area" rows="6"
              style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                     font-size:0.82rem;font-family:monospace;direction:ltr;text-align:left;resize:vertical"></textarea>
          `,
          actions: [
            { id: 'do-import-defs', label: 'ייבא', cls: 'btn-primary', onClick: () => {
              let text = document.getElementById('ep-import-area').value.trim();
              if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
              // Sanitize pasted text: remove BOM, zero-width chars, directional marks, replace smart quotes
              text = text.replace(/[\uFEFF\u200B\u200C\u200D\u00A0\u200E\u200F\u202A-\u202E\u2066-\u2069\u061C]/g, '');
              text = text.replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"');
              text = text.replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'");
              try {
                const defs = JSON.parse(text);
                // merge properties
                (defs.properties || []).forEach(prop => {
                  const existing = DB.getMetadata().properties.find(p => p.name.toLowerCase() === prop.name.toLowerCase());
                  if (!existing) {
                    DB.upsertProperty({ name: prop.name, options: prop.options || [], aliases: prop.aliases || {} });
                  } else {
                    (prop.options || []).forEach(o => {
                      if (!existing.options.some(e => e.toLowerCase() === o.toLowerCase())) {
                        DB.addPropertyOption(existing.name, o);
                      }
                    });
                    // merge aliases
                    if (prop.aliases) {
                      Object.entries(prop.aliases).forEach(([opt, aliasList]) => {
                        const currentAliases = DB.getOptionAliases(existing.name, opt);
                        const merged = [...new Set([...currentAliases, ...aliasList])];
                        DB.setOptionAliases(existing.name, opt, merged);
                      });
                    }
                  }
                });
                // merge non-map locations
                (defs.locations || []).forEach(loc => {
                  const existing = DB.getMetadata().locations.find(l => l.name === loc.name);
                  if (!existing) {
                    DB.upsertLocation({ name: loc.name, inMap: false, subLocations: loc.subLocations || [] });
                  } else {
                    (loc.subLocations || []).forEach(s => {
                      if (!existing.subLocations) existing.subLocations = [];
                      if (!existing.subLocations.includes(s)) existing.subLocations.push(s);
                    });
                    DB.upsertLocation(existing);
                  }
                });
                Modal.close();
                Toast.show('הגדרות יובאו בהצלחה', 'success');
                renderList();
              } catch(err) {
                Toast.show('שגיאה: ' + err.message, 'error');
              }
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
      });
    }

    // ── Floor Items Tab ──────────────────────────────────────
    Router.register('edit', {
      onShow(params) {
        if (params && params.cartId) {
          _prefillCartId = params.cartId;
          renderTab('carts');
          _prefillCartId = null;
        } else {
          renderTab(activeTab);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 6 — Screen: Transfer
  ════════════════════════════════════════════════════ -->
  <script>
  function initTransfer() {
    const screen = document.getElementById('screen-transfer');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔄</span>
        <h1>${Lang.T('העברה / פריטים', 'Traslado / Ítems')}</h1>
        <button class="undo-btn" title="${Lang.T('בטל פעולה', 'Deshacer')}">↩</button>
        <button class="help-btn" data-screen="transfer" title="${Lang.T('עזרה', 'Ayuda')}">❓</button>
      </div>
      <div class="p-screen">
        <div class="form-group">
          <div class="pill-toggle" id="tr-mode-toggle">
            <button class="active" data-mode="cart">עגלה</button>
            <button data-mode="container">משטח</button>
            <button data-mode="floor">רצפה</button>
          </div>
        </div>

        <!-- cart mode -->
        <div id="tr-cart-section">
          <div id="tr-cart-form-host"></div>
        </div>

        <!-- container mode -->
        <div id="tr-container-section" hidden>
          <div id="tr-container-form-host"></div>
        </div>

        <!-- floor mode: pick source by location + properties + batch transfer -->
        <div id="tr-floor-section" hidden>
          <div class="form-group">
            <label class="form-label">מיקום מקור</label>
            <input id="tr-floor-src-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div class="form-group" id="tr-floor-src-subloc-group" hidden>
            <label class="form-label">תת-מיקום מקור</label>
            <input id="tr-floor-src-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>
          <div id="tr-floor-src-props" class="mt-12"></div>
          <div id="tr-floor-avail" class="card" style="margin:14px 0;" hidden></div>
          <div class="form-group">
            <label class="form-label">כמות להעברה</label>
            <input id="tr-floor-count" class="form-input" type="number" min="0" placeholder="0">
          </div>
          <div id="tr-floor-item-rows" class="item-rows"></div>
        </div>

        <!-- shared fields (destination + cart item fields) -->
        <div id="tr-shared-fields" hidden>
          <div id="tr-current-info" class="card" style="margin:0 0 14px;"></div>
          <button id="tr-empty-cart" class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger);margin-bottom:12px">ריקון עגלה</button>

          <div class="form-group">
            <label class="form-label">מיקום יעד</label>
            <input id="tr-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div class="form-group" id="tr-dest-subloc-group" hidden>
            <label class="form-label">תת-מיקום יעד</label>
            <input id="tr-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>
          <div class="form-group" id="tr-dest-subloc2-group" hidden>
            <label class="form-label">תת-מיקום נוסף (אופציונלי)</label>
            <input id="tr-dest-subloc2" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>

          <!-- cart-mode: multi-slot support -->
          <div id="tr-cart-item-fields">
            <div id="tr-slots-container"></div>
            <button id="tr-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          </div>

          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="tr-save-only-btn" class="btn btn-outline" style="flex:1">שמור</button>
            <button id="tr-save-btn" class="btn btn-primary" style="flex:2">שמור ושלח 💬</button>
          </div>
        </div>
      </div>
    `;

    let _mode = 'cart';       // 'cart' | 'floor'
    let _cartRef = null;      // CartForm instance
    let _currentData = null;  // current cart object (cart mode) or floor source info (floor mode)
    let _currentType = null;  // 'cart' | 'fi'

    // Set up destination location autocomplete
    setupLocationFields(
      screen.querySelector('#tr-dest-loc'),
      screen.querySelector('#tr-dest-subloc-group'),
      screen.querySelector('#tr-dest-subloc'),
      screen.querySelector('#tr-dest-subloc2-group'),
      screen.querySelector('#tr-dest-subloc2')
    );

    // Floor source: location + sublocation + property pickers
    setupLocationFields(
      screen.querySelector('#tr-floor-src-loc'),
      screen.querySelector('#tr-floor-src-subloc-group'),
      screen.querySelector('#tr-floor-src-subloc')
    );
    buildPropertyFields(screen.querySelector('#tr-floor-src-props'), {});

    function _getFloorSrcSubloc() {
      const grp = screen.querySelector('#tr-floor-src-subloc-group');
      return (!grp || grp.hidden) ? '' : screen.querySelector('#tr-floor-src-subloc').value.trim();
    }

    function updateFloorDisplay() {
      const loc    = screen.querySelector('#tr-floor-src-loc').value.trim();
      const subloc = _getFloorSrcSubloc();
      const props  = readPropertyFields(screen.querySelector('#tr-floor-src-props'));
      const avail  = screen.querySelector('#tr-floor-avail');
      if (!loc) {
        avail.hidden = true; _currentData = null; _currentType = null;
        screen.querySelector('#tr-shared-fields').hidden = true; return;
      }
      const fi     = DB.findFloorItem(loc, props, subloc || undefined);
      const total  = fi ? (fi.itemCount || 0) : 0;
      const allIds = fi ? (fi.itemIds || []) : [];
      _currentData = { location: loc, subLocation: subloc, properties: props, itemCount: total, itemIds: allIds };
      _currentType = 'fi';
      avail.hidden = false;
      const locLabel = loc + (subloc ? ' / ' + subloc : '');
      avail.innerHTML = `<div class="card-title">נמצאו ${total} פריטים</div><div class="card-meta">${esc(locLabel)}</div>`;
      showSharedFields(_currentData, 'fi');
    }

    function renderFloorItemRows(n, existingIds) {
      const container = screen.querySelector('#tr-floor-item-rows');
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input floor-serial-input" placeholder="מספר סידורי" value="${esc(existingIds[i] || '')}">
            <button class="scan-btn" title="סרוק ברקוד">📷</button>
          </div>
        `);
      }
      container.innerHTML = rows.join('');
      // add autocomplete for each serial input from source IDs
      if (_currentData && _currentData.itemIds) {
        const allIds = _currentData.itemIds;
        container.querySelectorAll('.floor-serial-input').forEach(inp => {
          makeAutocomplete(inp, () => allIds);
        });
      }
    }

    screen.querySelector('#tr-floor-count').addEventListener('input', () => {
      const n = parseInt(screen.querySelector('#tr-floor-count').value) || 0;
      const existing = [...screen.querySelectorAll('.floor-serial-input')].map(i => i.value);
      renderFloorItemRows(n, existing);
    });

    screen.querySelector('#tr-floor-src-loc').addEventListener('change', updateFloorDisplay);
    screen.querySelector('#tr-floor-src-subloc').addEventListener('change', updateFloorDisplay);
    screen.querySelector('#tr-floor-src-props').addEventListener('change', updateFloorDisplay);

    function setMode(mode) {
      _mode = mode;
      screen.querySelectorAll('#tr-mode-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode));
      screen.querySelector('#tr-cart-section').hidden      = (mode !== 'cart');
      screen.querySelector('#tr-container-section').hidden = (mode !== 'container');
      screen.querySelector('#tr-floor-section').hidden     = (mode !== 'floor');
      screen.querySelector('#tr-shared-fields').hidden = true;
      screen.querySelector('#tr-cart-item-fields').hidden = (mode === 'floor');
      _currentData = null; _currentType = null;
    }

    function showSharedFields(data, type) {
      _currentData = data;
      _currentType = type;
      const shared = screen.querySelector('#tr-shared-fields');
      shared.hidden = false;

      const info = screen.querySelector('#tr-current-info');
      if (type === 'cart') {
        info.innerHTML = `
          <div class="card-title">${esc(containerName(data))}: ${esc(cartLabel(data))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(data.location || 'לא ידוע')}</div>
          ${data.comment ? `<div class="card-meta" style="color:var(--muted);font-style:italic">${esc(data.comment)}</div>` : ''}
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = false;
        _trPopulateSlots(data);
      } else {
        const propStr = Utils.orderedPropValues(data.properties, DB.getMetadata().properties || []);
        info.innerHTML = `
          <div class="card-title">על משטח ${esc(propStr)} · ${data.itemCount || 0} פריטים</div>
          <div class="card-meta">מיקום: ${esc(data.location || 'לא ידוע')}</div>
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = true;
      }
    }

    // ── Multi-slot helpers (mirrors load/unload screen) ───────────
    function _trRenderItemRows(container, n, existing) {
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
            <button class="scan-btn" title="סרוק ברקוד">📷</button>
            <button class="btn-icon item-dest-btn" title="יעד ספציפי לפריט זה">+</button>
          </div>
          <div class="item-dest-row" hidden>
            <input class="item-dest-input form-input" placeholder="יעד ספציפי..." autocomplete="off">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
      container.querySelectorAll('.item-dest-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const destRow = btn.closest('.item-row').nextElementSibling;
          const open = destRow.hidden;
          destRow.hidden = !open;
          btn.classList.toggle('active', open);
          if (open) {
            const inp = destRow.querySelector('.item-dest-input');
            makeAutocomplete(inp, locationSuggestions);
            inp.focus();
          }
        });
      });
    }
    function _trMakeSlotEl(idx, slot) {
      const div = document.createElement('div');
      div.className = 'item-slot-card';
      div.dataset.slotIdx = String(idx);
      const existingCount = slot ? (slot.itemCount || 0) : 0;
      const existingIds   = slot ? (slot.itemIds   || []) : [];
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="slot-props"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input slot-count-input" type="number" min="0" placeholder="0" value="${existingCount}">
        </div>
        <div class="item-rows slot-item-rows"></div>
      `;
      buildPropertyFields(div.querySelector('.slot-props'), slot ? (slot.properties || {}) : {});
      _trRenderItemRows(div.querySelector('.slot-item-rows'), existingCount, existingIds);
      div.querySelector('.slot-count-input').addEventListener('input', () => {
        const n    = parseInt(div.querySelector('.slot-count-input').value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        _trRenderItemRows(div.querySelector('.slot-item-rows'), n, prev);
      });
      div.querySelector('.slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        _trRenumberSlots(parent);
      });
      return div;
    }
    function _trRenumberSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.item-slot-card');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }
    function _trReadAllSlots() {
      return [...screen.querySelectorAll('#tr-slots-container .item-slot-card')].map(el => {
        const idInputs = [...el.querySelectorAll('.item-id-input')];
        const itemIds  = idInputs.map(i => i.value.trim()).filter(Boolean);
        const itemDests = idInputs.map(inp => {
          const destRow = inp.closest('.item-row').nextElementSibling;
          if (!destRow || destRow.hidden) return '';
          return destRow.querySelector('.item-dest-input')?.value.trim() || '';
        });
        return {
          properties: readPropertyFields(el.querySelector('.slot-props')),
          itemCount:  parseInt(el.querySelector('.slot-count-input').value) || 0,
          itemIds,
          itemDests,
        };
      });
    }
    function _trPopulateSlots(cart) {
      const container = screen.querySelector('#tr-slots-container');
      container.innerHTML = '';
      const slots = [
        { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
        ...(cart.extraItems || [])
      ];
      slots.forEach((slot, idx) => container.appendChild(_trMakeSlotEl(idx, slot)));
      _trRenumberSlots(container);
    }
    function _trInitSlots() {
      const container = screen.querySelector('#tr-slots-container');
      container.innerHTML = '';
      container.appendChild(_trMakeSlotEl(0, null));
      _trRenumberSlots(container);
    }
    _trInitSlots();
    screen.querySelector('#tr-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#tr-slots-container');
      const idx = container.querySelectorAll('.item-slot-card').length;
      container.appendChild(_trMakeSlotEl(idx, null));
      _trRenumberSlots(container);
    });

    // mode toggle
    screen.querySelector('#tr-mode-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-mode]');
      if (btn) setMode(btn.dataset.mode);
    });

    // cart form
    _cartRef = CartForm(screen.querySelector('#tr-cart-form-host'), {
      cartFilter: c => !c.containerType || c.containerType === DEFAULT_CONTAINER,
      onCartLoaded(cart) {
        if (cart) {
          showSharedFields(cart, 'cart');
        } else {
          screen.querySelector('#tr-shared-fields').hidden = true;
        }
      }
    });

    // container form (like cart form but autocompletes only non-עגלה container types)
    let _containerRef = null;
    (function() {
      const host = screen.querySelector('#tr-container-form-host');
      host.innerHTML = `
        <div class="form-group">
          <label class="form-label">מספר משטח</label>
          <input id="tr-container-id" class="form-input" placeholder="מספר מזהה" autocomplete="off">
        </div>
      `;
      const input = host.querySelector('#tr-container-id');
      makeAutocomplete(input, () =>
        DB.getAllCarts()
          .filter(c => c.containerType && c.containerType !== DEFAULT_CONTAINER)
          .map(c => cartLabel(c))
      );
      function lookup() {
        const raw = input.value.trim();
        const id  = raw.replace(/\s*\[[^\]]+\]\s*$/g, '').replace(/\([^)]+\)\s*$/, '').trim();
        if (!id) {
          // No ID — show fields for anonymous container
          showSharedFields({ cartId: '', containerType: 'משטח', location: '', isEmpty: true }, 'cart');
          return;
        }
        const cart = DB.getCart(id) || DB.getCart(raw);
        if (cart) {
          showSharedFields(cart, 'cart');
        } else {
          screen.querySelector('#tr-shared-fields').hidden = true;
          _currentData = null; _currentType = null;
        }
      }
      input.addEventListener('change', lookup);
      input.addEventListener('input', () => {
        const raw = input.value.trim();
        const id  = raw.replace(/\s*\[[^\]]+\]\s*$/g, '').replace(/\([^)]+\)\s*$/, '').trim();
        if (DB.getCart(id) || DB.getCart(raw)) lookup();
      });
      _containerRef = {
        getValue() { return input.value.trim(); },
        clear()    { input.value = ''; },
        setValue(val) { input.value = val; input.dispatchEvent(new Event('change', { bubbles: true })); }
      };
    })();

    // transfer save logic (returns msg or null on error)
    function doTransferSave() {
      if (!_currentData) { Toast.show('בחר עגלה, משטח או מקור רצפה', 'error'); return null; }
      const destLoc    = screen.querySelector('#tr-dest-loc').value.trim();
      const _dSub1 = screen.querySelector('#tr-dest-subloc-group').hidden ? '' : screen.querySelector('#tr-dest-subloc').value.trim();
      const _dSub2 = screen.querySelector('#tr-dest-subloc2-group').hidden ? '' : screen.querySelector('#tr-dest-subloc2').value.trim();
      const destSubLoc = (_dSub1 && _dSub2) ? `${_dSub1}/${_dSub2}` : _dSub1;
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return null; }

      let msg;

      if (_currentType === 'cart') {
        const allSlots = _trReadAllSlots();
        const slot0    = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras   = allSlots.slice(1);
        if (_currentData.cartId) {
          DB.upsertCart({
            cartId:      _currentData.cartId,
            location:    destLoc,
            subLocation: destSubLoc,
            itemCount:   slot0.itemCount,
            itemIds:     slot0.itemIds,
            properties:  slot0.properties,
            extraItems:  extras,
            isEmpty:     !allSlots.some(s => s.itemCount > 0)
          });
          DB.cascadeLocationUpdate(_currentData.cartId, destLoc, destSubLoc);
        }
        const fromLabel = waMsgLoc(_currentData.location, _currentData.subLocation);
        const toLabel   = waMsgLoc(destLoc, destSubLoc);
        const _propDefs = DB.getMetadata().properties || [];
        const _ctName = containerName(_currentData);
        const isEmpty = !allSlots.some(s => s.itemCount > 0);
        if (isEmpty) {
          msg = `${_ctName} ${msgCartLabel(_currentData)} ריקה מועברת מ${fromLabel || '?'} ל${toLabel || '?'}`;
        } else {
          // Collect per-item specific destinations
          const itemDestMap = {}; // id → destLabel
          allSlots.forEach(s => {
            (s.itemIds || []).forEach((id, i) => {
              const d = (s.itemDests || [])[i];
              if (id && d) itemDestMap[id] = d;
            });
          });
          const hasSpecific = Object.keys(itemDestMap).length > 0;

          const _msgLines = [_ctName + ' ' + msgCartLabel(_currentData)];
          allSlots.filter(s => s.itemCount).forEach(s => {
            const ps = Utils.orderedPropValues(s.properties, _propDefs);
            _msgLines.push(`${s.itemCount}${ps ? ' ' + ps : ''}`);
            if (!hasSpecific) (s.itemIds || []).forEach(id => _msgLines.push(id));
          });

          if (hasSpecific) {
            _msgLines.push('היחידות יורדות בנקודות הבאות:');
            allSlots.filter(s => s.itemCount).forEach(s => {
              (s.itemIds || []).forEach((id, i) => {
                const rawD = (s.itemDests || [])[i];
                const d = rawD ? waMsgLocRaw(rawD) : (toLabel || '?');
                _msgLines.push(`${id} - ל${d}`);
              });
            });
            _msgLines.push(`${_ctName} נשארת ב${toLabel || '?'}`);
          } else {
            if (fromLabel || toLabel) _msgLines.push(`מועברת מ${fromLabel || '?'} ל${toLabel || '?'}`);
          }
          msg = _msgLines.join('\n');
        }
        Toast.show(containerName(_currentData) + ' הועברה', 'success');
      } else {
        const moveCount = parseInt(screen.querySelector('#tr-floor-count').value) || 0;
        if (moveCount <= 0) { Toast.show('יש להזין כמות להעברה', 'error'); return null; }
        const serials = [...screen.querySelectorAll('.floor-serial-input')].map(i => i.value.trim()).filter(Boolean);

        // Remove items from source
        const srcSubLoc = _currentData.subLocation || undefined;
        const srcFI = DB.findFloorItem(_currentData.location, _currentData.properties, srcSubLoc);
        if (srcFI) {
          let remainIds = [...(srcFI.itemIds || [])];
          serials.forEach(s => {
            const idx = remainIds.indexOf(s);
            if (idx >= 0) remainIds.splice(idx, 1);
          });
          const remaining = Math.max(0, (srcFI.itemCount || 0) - moveCount);
          DB.upsertFloorItem({ location: _currentData.location, subLocation: srcSubLoc,
                               properties: _currentData.properties,
                               itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
        }

        // Add items to destination
        const destFI   = DB.findFloorItem(destLoc, _currentData.properties, destSubLoc || undefined);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + moveCount;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), ...serials];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: _currentData.properties, isEmpty: false });

        const propStr = Utils.orderedPropValues(_currentData.properties, DB.getMetadata().properties || []);
        const floorFrom = waMsgLoc(_currentData.location, _currentData.subLocation);
        const floorTo   = waMsgLoc(destLoc, destSubLoc);
        const serialStr = serials.length ? '\n' + serials.join('\n') : '';
        msg = `על משטח ${moveCount} ${propStr}\nמ${floorFrom} ל${floorTo}${serialStr}`.trim();
        Toast.show(moveCount + ' פריטי רצפה הועברו', 'success');
        screen.querySelector('#tr-floor-count').value = '';
        screen.querySelector('#tr-floor-item-rows').innerHTML = '';
        updateFloorDisplay();
      }

      // Reset screen to initial state
      _currentData = null;
      _currentType = null;
      screen.querySelector('#tr-shared-fields').hidden = true;
      screen.querySelector('#tr-dest-loc').value = '';
      screen.querySelector('#tr-dest-subloc').value = '';
      screen.querySelector('#tr-dest-subloc2').value = '';
      if (_cartRef) _cartRef.clear();
      if (_containerRef) _containerRef.clear();
      return msg;
    }

    // save + send
    screen.querySelector('#tr-save-btn').addEventListener('click', () => {
      const msg = doTransferSave();
      if (msg) Utils.shareOrCopy(msg);
    });

    // save only (no WhatsApp)
    screen.querySelector('#tr-save-only-btn').addEventListener('click', () => {
      doTransferSave();
    });

    // empty cart / container
    screen.querySelector('#tr-empty-cart').addEventListener('click', () => {
      if (!_currentData || _currentType !== 'cart') { Toast.show('בחר עגלה או משטח', 'error'); return; }
      DB.upsertCart({ cartId: _currentData.cartId, itemCount: 0, itemIds: [], properties: {}, isEmpty: true, extraItems: [] });
      const entityName = containerName(_currentData);
      Toast.show(entityName + ' רוקן/ה', 'success');
      screen.querySelector('#tr-shared-fields').hidden = true;
      if (_mode === 'container' && _containerRef) _containerRef.clear();
      _currentData = null; _currentType = null;
    });

    Router.register('transfer', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setMode('cart');
          setTimeout(() => _cartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setMode('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#tr-floor-src-loc').value = fi.location || '';
              screen.querySelector('#tr-floor-src-loc').dispatchEvent(new Event('change'));
              buildPropertyFields(screen.querySelector('#tr-floor-src-props'), fi.properties || {});
              updateFloorDisplay();
            }
          }, 50);
        } else {
          setMode(_mode);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 7 — Screen: Load/Unload
  ════════════════════════════════════════════════════ -->
  <script>
  function initLoadUnload() {
    const screen = document.getElementById('screen-loadunload');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">📦</span>
        <h1>${Lang.T('העמסה / פירוק', 'Carga / Descarga')}</h1>
        <button class="undo-btn" title="${Lang.T('בטל פעולה', 'Deshacer')}">↩</button>
        <button class="help-btn" data-screen="loadunload" title="${Lang.T('עזרה', 'Ayuda')}">❓</button>
      </div>
      <div class="p-screen">
        <div class="form-group">
          <div class="pill-toggle" id="lu-op-toggle">
            <button class="active" data-op="load">${Lang.T('העמסה', 'Carga')}</button>
            <button data-op="container">${Lang.T('משטח על עגלה', 'Palé en carreta')}</button>
            <button data-op="unload">${Lang.T('פירוק', 'Descarga')}</button>
          </div>
        </div>

        <!-- ═══ LOAD SECTION ═══ -->
        <div id="lu-load-section">
          <!-- destination cart at top -->
          <div class="form-group">
            <label class="form-label">יעד להעמסה</label>
            <input id="lu-dest-cart" class="form-input" placeholder="8-6(110)" autocomplete="off">
          </div>

          <div class="form-group">
            <div class="pill-toggle" id="lu-load-type-toggle">
              <button class="active" data-lt="new">פריט חדש</button>
              <button data-lt="floor">מרצפה</button>
            </div>
          </div>

          <!-- new item sub-section -->
          <div id="lu-new-item-section">
            <div id="lu-slots-container"></div>
            <button id="lu-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          </div>

          <!-- floor source sub-section: multi-slot with auto-fill -->
          <div id="lu-floor-src-section" hidden>
            <div class="form-group">
              <label class="form-label">מיקום מקור</label>
              <input id="lu-src-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="lu-src-subloc-group" hidden>
              <label class="form-label">תת-מיקום מקור</label>
              <input id="lu-src-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
            <div id="lu-floor-slots-container"></div>
            <button id="lu-floor-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          </div>

          <!-- optional destination for move -->
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">יעד העברה (אופציונלי)</label>
            <input id="lu-load-move-dest" class="form-input" placeholder="העברה ל..." autocomplete="off">
          </div>
          <div class="form-group" id="lu-load-move-dest-subloc-group" hidden>

        <!-- ═══ CONTAINER ON CART SECTION ═══ -->
        <div id="lu-container-section" hidden>

          <button id="lu-ct-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">טעינה על עגלה</label>
            <input id="lu-ct-parent-cart" class="form-input" placeholder="מספר עגלה" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">יעד העברה (אופציונלי)</label>
            <input id="lu-ct-move-dest" class="form-input" placeholder="העברה ל..." autocomplete="off">
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="lu-ct-save-only" class="btn btn-outline" style="flex:1">שמור</button>
            <button id="lu-ct-save-btn" class="btn btn-primary" style="flex:2">שמור ושלח 💬</button>

        <!-- ═══ UNLOAD SECTION ═══ -->
        <div id="lu-unload-section" hidden>
          <div id="lu-unload-cart-form-host"></div>
          <div id="lu-unload-fields" hidden>
            <div id="lu-unload-cart-info" class="card" style="margin:0 0 14px;"></div>
            <button id="lu-empty-cart" class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger);margin-bottom:12px">ריקון עגלה</button>
            <div id="lu-unload-slots-container"></div>
            <div class="form-group" style="margin-top:16px;">
              <label class="form-label">מיקום יעד (רצפה)</label>
              <input id="lu-unload-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="lu-unload-dest-subloc-group" hidden>
              <label class="form-label">תת-מיקום יעד</label>
              <input id="lu-unload-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
            <div class="form-group" id="lu-unload-dest-subloc2-group" hidden>
              <label class="form-label">תת-מיקום נוסף (אופציונלי)</label>
              <input id="lu-unload-dest-subloc2" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <button id="lu-unload-save-only" class="btn btn-outline" style="flex:1">שמור</button>
            <button id="lu-unload-save-btn" class="btn btn-primary" style="flex:2">שמור ושלח 💬</button>
          </div>
        </div>
      </div>
    `;

    let _op            = 'load';  // 'load' | 'unload'
    let _loadType      = 'new';   // 'new'  | 'floor'
    let _srcCart       = null;    // source cart object (unload mode)
    let _unloadCartRef = null;

    // autocomplete + location setups
    setupLocationFields(
      screen.querySelector('#lu-src-loc'),
      screen.querySelector('#lu-src-subloc-group'),
      screen.querySelector('#lu-src-subloc')
    );
    makeAutocomplete(screen.querySelector('#lu-dest-cart'), () => DB.getAllCarts().map(c => cartLabel(c)));
    setupLocationFields(
      screen.querySelector('#lu-load-move-dest'),
      screen.querySelector('#lu-load-move-dest-subloc-group'),
      screen.querySelector('#lu-load-move-dest-subloc'),
      screen.querySelector('#lu-load-move-dest-subloc2-group'),
      screen.querySelector('#lu-load-move-dest-subloc2')
    );
    setupLocationFields(
      screen.querySelector('#lu-unload-dest-loc'),
      screen.querySelector('#lu-unload-dest-subloc-group'),
      screen.querySelector('#lu-unload-dest-subloc'),
      screen.querySelector('#lu-unload-dest-subloc2-group'),
      screen.querySelector('#lu-unload-dest-subloc2')
    );

    // ── Floor slot helpers ──────────────────────────────────────────
    function _getFloorLoc() { return screen.querySelector('#lu-src-loc').value.trim(); }
    function _getFloorSubloc() {
      const grp = screen.querySelector('#lu-src-subloc-group');
      return (!grp || grp.hidden) ? '' : screen.querySelector('#lu-src-subloc').value.trim();
    }

    // Find all floor items at the current location (+ subloc)
    function _floorItemsAtLoc() {
      const loc = _getFloorLoc();
      const subloc = _getFloorSubloc();
      if (!loc) return [];
      return DB.getAllFloorItems().filter(fi =>
        fi.location === loc && (!subloc || (fi.subLocation || '') === subloc) && !fi.isEmpty);
    }

    // Find a serial across ALL floor items
    function _findSerialAnywhere(serial) {
      for (const fi of DB.getAllFloorItems()) {
        if ((fi.itemIds || []).includes(serial)) return fi;
      }
      return null;
    }

    function _getFloorAvail(props) {
      const loc = _getFloorLoc();
      const subloc = _getFloorSubloc();
      if (!loc) return { count: 0, ids: [] };
      const fi = DB.findFloorItem(loc, props, subloc || undefined);
      return { count: fi ? (fi.itemCount || 0) : 0, ids: fi ? (fi.itemIds || []) : [] };
    }

    function makeFloorSlotEl(idx) {
      const div = document.createElement('div');
      div.className = 'item-slot-card floor-slot';
      div.dataset.slotIdx = String(idx);
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon floor-slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="floor-slot-props"></div>
        <div class="floor-slot-avail card" style="margin:8px 0;display:none"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input floor-slot-count" type="number" min="0" placeholder="0" value="0">
        </div>
        <div class="item-rows floor-slot-rows"></div>
      `;
      const propsContainer = div.querySelector('.floor-slot-props');
      buildPropertyFields(propsContainer, {});

      const availEl = div.querySelector('.floor-slot-avail');
      const countInput = div.querySelector('.floor-slot-count');
      const rowsContainer = div.querySelector('.floor-slot-rows');

      // Update availability + serial autocomplete when props change
      function refreshAvail() {
        const loc = _getFloorLoc();
        const props = readPropertyFields(propsContainer);
        if (!loc) { availEl.style.display = 'none'; return; }
        const { count, ids } = _getFloorAvail(props);
        availEl.style.display = '';
        availEl.innerHTML = `<div class="card-title">זמין: ${count} פריטים</div><div class="card-meta">${esc(loc)}</div>`;
        // Update autocomplete on existing serial inputs
        div.querySelectorAll('.item-id-input').forEach(inp => {
          makeAutocomplete(inp, () => ids);
        });
      }

      propsContainer.addEventListener('change', refreshAvail);

      // Render serial rows when count changes
      countInput.addEventListener('input', () => {
        const n = parseInt(countInput.value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        renderFloorSerialRows(div, n, prev);
      });

      // Delete slot
      div.querySelector('.floor-slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        renumberFloorSlots(parent);
      });

      return div;
    }

    function renderFloorSerialRows(slotEl, n, existing) {
      const container = slotEl.querySelector('.floor-slot-rows');
      const propsContainer = slotEl.querySelector('.floor-slot-props');
      const loc = _getFloorLoc();
      const props = readPropertyFields(propsContainer);
      const { ids } = _getFloorAvail(props);
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input floor-serial-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
            <button class="scan-btn" title="סרוק ברקוד">📷</button>
          </div>
        `);
      }
      container.innerHTML = rows.join('');
      // Autocomplete on each serial input + auto-fill props on blur
      container.querySelectorAll('.floor-serial-input').forEach(inp => {
        makeAutocomplete(inp, () => ids);
        inp.addEventListener('change', () => {
          const serial = inp.value.trim();
          if (!serial) return;
          autoFillPropsFromSerial(slotEl, serial);
        });
      });
    }

    // When a serial is entered, find it in DB and auto-select its properties
    function autoFillPropsFromSerial(slotEl, serial) {
      const loc = _getFloorLoc();
      const allFIs = DB.getAllFloorItems();
      // First try at current location
      let found = allFIs.find(fi => fi.location === loc && (fi.itemIds || []).includes(serial));
      if (!found) {
        // Try anywhere
        found = allFIs.find(fi => (fi.itemIds || []).includes(serial));
      }
      if (found && found.properties) {
        const propsContainer = slotEl.querySelector('.floor-slot-props');
        propsContainer.querySelectorAll('select[name]').forEach(sel => {
          const val = found.properties[sel.name];
          if (val) {
            sel.value = val;
          }
        });
        // Trigger change to refresh availability
        propsContainer.dispatchEvent(new Event('change', { bubbles: true }));
      }
    }

    function renumberFloorSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.floor-slot');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.floor-slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }

    function readFloorSlot(slotEl) {
      const count      = parseInt(slotEl.querySelector('.floor-slot-count').value) || 0;
      const itemIds    = [...slotEl.querySelectorAll('.floor-serial-input')].map(i => i.value.trim()).filter(Boolean);
      const properties = readPropertyFields(slotEl.querySelector('.floor-slot-props'));
      return { properties, itemCount: count, itemIds };
    }

    function readAllFloorSlots() {
      return [...screen.querySelectorAll('#lu-floor-slots-container .floor-slot')].map(readFloorSlot);
    }

    function initFloorSlots() {
      const container = screen.querySelector('#lu-floor-slots-container');
      container.innerHTML = '';
      container.appendChild(makeFloorSlotEl(0));
      renumberFloorSlots(container);
    }

    // Init floor slots
    initFloorSlots();

    screen.querySelector('#lu-floor-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#lu-floor-slots-container');
      const idx = container.querySelectorAll('.floor-slot').length;
      container.appendChild(makeFloorSlotEl(idx));
      renumberFloorSlots(container);
    });

    // Refresh all floor slots when location or sublocation changes
    function _refreshAllFloorSlots() {
      screen.querySelectorAll('#lu-floor-slots-container .floor-slot').forEach(slot => {
        const propsContainer = slot.querySelector('.floor-slot-props');
        propsContainer.dispatchEvent(new Event('change', { bubbles: true }));
      });
    }
    screen.querySelector('#lu-src-loc').addEventListener('change', _refreshAllFloorSlots);
    screen.querySelector('#lu-src-subloc').addEventListener('change', _refreshAllFloorSlots);

    function renderItemRows(container, n, existing) {
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
            <button class="scan-btn" title="סרוק ברקוד">📷</button>
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    function copyMsg(msg) {
      Utils.shareOrCopy(msg);
    }

    // ── Slot management (multi-type carts) ──────────────────────────
    function makeSlotEl(idx, slot) {
      const div = document.createElement('div');
      div.className = 'item-slot-card';
      div.dataset.slotIdx = String(idx);
      const existingCount = slot ? (slot.itemCount || 0) : 0;
      const existingIds   = slot ? (slot.itemIds   || []) : [];
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="slot-props"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input slot-count-input" type="number" min="0" placeholder="0" value="${existingCount}">
        </div>
        <div class="item-rows slot-item-rows"></div>
      `;
      buildPropertyFields(div.querySelector('.slot-props'), slot ? (slot.properties || {}) : {});
      renderItemRows(div.querySelector('.slot-item-rows'), existingCount, existingIds);
      div.querySelector('.slot-count-input').addEventListener('input', () => {
        const n    = parseInt(div.querySelector('.slot-count-input').value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        renderItemRows(div.querySelector('.slot-item-rows'), n, prev);
      });
      div.querySelector('.slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        renumberSlots(parent);
      });
      return div;
    }

    function renumberSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.item-slot-card');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }

    function readSlot(slotEl) {
      const count      = parseInt(slotEl.querySelector('.slot-count-input').value) || 0;
      const itemIds    = [...slotEl.querySelectorAll('.item-id-input')].map(i => i.value.trim()).filter(Boolean);
      const properties = readPropertyFields(slotEl.querySelector('.slot-props'));
      return { properties, itemCount: count, itemIds };
    }

    function readAllSlots(container) {
      return [...container.querySelectorAll('.item-slot-card')].map(readSlot);
    }

    function populateSlots(container, cart) {
      container.innerHTML = '';
      const slots = [
        { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
        ...(cart.extraItems || [])
      ];
      slots.forEach((slot, idx) => container.appendChild(makeSlotEl(idx, slot)));
      renumberSlots(container);
    }

    function initEmptySlots(container) {
      container.innerHTML = '';
      container.appendChild(makeSlotEl(0, null));
      renumberSlots(container);
    }

    // initialise load slots
    initEmptySlots(screen.querySelector('#lu-slots-container'));

    screen.querySelector('#lu-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#lu-slots-container');
      const idx = container.querySelectorAll('.item-slot-card').length;
      container.appendChild(makeSlotEl(idx, null));
      renumberSlots(container);
    });

    function setOp(op) {
      _op = op;
      screen.querySelectorAll('#lu-op-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.op === op));
      screen.querySelector('#lu-load-section').hidden      = (op !== 'load');
      screen.querySelector('#lu-container-section').hidden = (op !== 'container');
      screen.querySelector('#lu-unload-section').hidden    = (op !== 'unload');
    }

    function setLoadType(lt) {
      _loadType = lt;
      screen.querySelectorAll('#lu-load-type-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.lt === lt));
      screen.querySelector('#lu-new-item-section').hidden  = (lt !== 'new');
      screen.querySelector('#lu-floor-src-section').hidden = (lt !== 'floor');
    }

    screen.querySelector('#lu-op-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-op]');
      if (btn) setOp(btn.dataset.op);
    });

    screen.querySelector('#lu-load-type-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-lt]');
      if (btn) setLoadType(btn.dataset.lt);
    });

    // ── Container on cart section ──────────────────────────────────
    let _ctCart = null; // the container cart object once loaded
    const ctIdInput = screen.querySelector('#lu-ct-id');
    const ctInfoEl  = screen.querySelector('#lu-ct-info');
    const ctSlotsContainer = screen.querySelector('#lu-ct-slots-container');

    // Get non-default container types for autocomplete
    function _containerCarts() {
      return DB.getAllCarts().filter(c => c.containerType && c.containerType !== DEFAULT_CONTAINER);
    }
    makeAutocomplete(ctIdInput, () => _containerCarts().map(c => cartLabel(c)));
    makeAutocomplete(screen.querySelector('#lu-ct-parent-cart'), () => DB.getAllCarts().filter(c => !c.containerType || c.containerType === DEFAULT_CONTAINER).map(c => cartLabel(c)));
    makeAutocomplete(screen.querySelector('#lu-ct-move-dest'), locationSuggestions);

    function initCtSlots() {
      ctSlotsContainer.innerHTML = '';
      ctSlotsContainer.appendChild(makeSlotEl(0, null));
      renumberSlots(ctSlotsContainer);
    }
    initCtSlots();

    screen.querySelector('#lu-ct-add-slot-btn').addEventListener('click', () => {
      const idx = ctSlotsContainer.querySelectorAll('.item-slot-card').length;
      ctSlotsContainer.appendChild(makeSlotEl(idx, null));
      renumberSlots(ctSlotsContainer);
    });

    // When container ID is entered, look it up and auto-populate
    function loadContainerCart() {
      const raw = ctIdInput.value.trim();
      const cid = raw.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!cid) { ctInfoEl.style.display = 'none'; _ctCart = null; initCtSlots(); return; }
      const cart = DB.getCart(cid);
      _ctCart = cart;
      if (cart) {
        ctInfoEl.style.display = '';
        const total = cartTotalCount(cart);
        ctInfoEl.innerHTML = `
          <div class="card-title">${esc(containerName(cart))}: ${esc(cartLabel(cart))}</div>
          <div class="card-meta">מיקום: ${esc(cart.location || 'לא ידוע')} · ${total} פריטים</div>
          ${cart.parentCartId ? `<div class="card-meta">טעון על: ${esc((() => { const p = DB.getCart(cart.parentCartId); return p ? cartLabel(p) : cart.parentCartId; })())}</div>` : ''}
        `;
        // Auto-populate slots with existing items
        populateSlots(ctSlotsContainer, cart);
      } else {
        ctInfoEl.style.display = '';
        ctInfoEl.innerHTML = `<div class="card-meta">קטגוריה חדשה: ${esc(cid)}</div>`;
        initCtSlots();
      }
    }
    ctIdInput.addEventListener('change', loadContainerCart);

    // Container save logic
    async function doContainerSave() {
      const rawCtId = ctIdInput.value.trim();
      const ctId = rawCtId.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();

      const rawParent = screen.querySelector('#lu-ct-parent-cart').value.trim();
      const parentCartId = rawParent.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!parentCartId) { Toast.show('יש להזין מספר עגלה', 'error'); return null; }

      // Read all slots
      const allSlots = readAllSlots(ctSlotsContainer);
      const slot0 = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
      const extras = allSlots.slice(1);

      // Determine container type
      const existingCt = ctId ? DB.getCart(ctId) : null;
      const ctType = existingCt ? (existingCt.containerType || 'משטח') : 'משטח';
      const ctLocation = existingCt ? (existingCt.location || '') : '';

      // Upsert the container cart with items and parent (only if an ID was given)
      if (ctId) {
        DB.upsertCart({
          cartId: ctId,
          containerType: ctType,
          itemCount: slot0.itemCount, itemIds: slot0.itemIds, properties: slot0.properties,
          extraItems: extras,
          parentCartId: parentCartId,
          isEmpty: !allSlots.some(s => s.itemCount > 0)
        });
      }

      // Make sure parent cart exists and mark it as occupied (has a container)
      const parentCart = DB.getCart(parentCartId);
      if (!parentCart) {
        DB.upsertCart({ cartId: parentCartId, containerType: DEFAULT_CONTAINER, isEmpty: false, itemCount: 0, itemIds: [], properties: {} });
      } else if (parentCart.isEmpty) {
        DB.upsertCart({ cartId: parentCartId, isEmpty: false });
      }

      // Build message (format: container header, items, loaded-on line, optional move)
      const destCart = DB.getCart(parentCartId);
      const parentLabel = destCart ? msgCartLabel(destCart) : parentCartId;
      const parentCtName = destCart ? containerName(destCart) : 'עגלה';
      const msgLines = [ctId ? `${ctType} ${ctId}` : ctType];
      const _metaProps = DB.getMetadata().properties || [];
      allSlots.filter(sl => sl.itemCount).forEach(sl => {
        const ps = Utils.orderedPropValues(sl.properties, _metaProps);
        msgLines.push(`${sl.itemCount}${ps ? ' ' + ps : ''}`);
        (sl.itemIds || []).forEach(id => msgLines.push(id));
      });
      msgLines.push(`מועמס על ${parentCtName} ${parentLabel}`);

      // Optional destination — move parent cart
      const moveDest = screen.querySelector('#lu-ct-move-dest').value.trim();
      if (moveDest) {
        DB.upsertCart({ cartId: parentCartId, location: moveDest });
        // Also update container's location
        if (ctId) DB.upsertCart({ cartId: ctId, location: moveDest });
        msgLines.push('מועבר ל' + moveDest);
      }

      const msg = msgLines.join('\n');
      Toast.show((ctId ? ctType + ' ' + ctId : ctType) + ' הועמס על ' + parentCtName, 'success');

      // Reset
      ctIdInput.value = '';
      screen.querySelector('#lu-ct-parent-cart').value = '';
      screen.querySelector('#lu-ct-move-dest').value = '';
      ctInfoEl.style.display = 'none';
      _ctCart = null;
      initCtSlots();
      return msg;
    }

    screen.querySelector('#lu-ct-save-btn').addEventListener('click', async () => {
      const msg = await doContainerSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-ct-save-only').addEventListener('click', async () => {
      await doContainerSave();
    });

    // unload cart form
    _unloadCartRef = CartForm(screen.querySelector('#lu-unload-cart-form-host'), {
      onCartLoaded(cart) {
        _srcCart = cart || null;
        const fields = screen.querySelector('#lu-unload-fields');
        if (!cart) { fields.hidden = true; return; }
        // If cart is empty, switch to load tab with this cart pre-filled
        if (cart.isEmpty && !cart.itemCount && !(cart.extraItems && cart.extraItems.some(e => e.itemCount))) {
          fields.hidden = true;
          if (_unloadCartRef) _unloadCartRef.clear();
          setOp('load');
          screen.querySelector('#lu-dest-cart').value = cartLabel(cart);
          Toast.show('העגלה ריקה — עובר להעמסה', 'info');
          return;
        }
        fields.hidden = false;
        const total = cartTotalCount(cart);
        screen.querySelector('#lu-unload-cart-info').innerHTML = `
          <div class="card-title">${esc(containerName(cart))}: ${esc(cartLabel(cart))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(cart.location || 'לא ידוע')} · ${total} פריטים</div>
          ${cart.comment ? `<div class="card-meta" style="color:var(--muted);font-style:italic">${esc(cart.comment)}</div>` : ''}
        `;
        populateSlots(screen.querySelector('#lu-unload-slots-container'), cart);
      }
    });

    // ── load save logic ──
    function _confirmUnknownSerial(serial, loc, props) {
      return new Promise(resolve => {
        const propStr = Utils.orderedPropValues(props, DB.getMetadata().properties || []);
        Modal.open({
          title: 'מספר סידורי לא נמצא',
          html: `<p class="card-meta">"${esc(serial)}" לא נמצא ב${esc(loc)}${propStr ? ' (' + esc(propStr) + ')' : ''}.</p>
                 <p class="card-meta" style="margin-top:8px">להמשיך בכל זאת? אם הפריט קיים במיקום אחר הוא יועבר.</p>`,
          actions: [
            { id: 'yes', label: 'כן, המשך', cls: 'btn-primary', onClick: () => { Modal.close(); resolve(true); } },
            { id: 'no', label: 'ביטול', onClick: () => { Modal.close(); resolve(false); } }
          ]
        });
      });
    }

    async function doLoadSave() {
      const rawDest    = screen.querySelector('#lu-dest-cart').value.trim();
      const destCartId = rawDest.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!destCartId) { Toast.show('יש להזין יעד להעמסה', 'error'); return null; }

      let msg;

      if (_loadType === 'new') {
        const slotsContainer = screen.querySelector('#lu-slots-container');
        const allSlots = readAllSlots(slotsContainer);
        const slot0    = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras   = allSlots.slice(1);
        DB.upsertCart({
          cartId: destCartId,
          itemCount: slot0.itemCount, itemIds: slot0.itemIds, properties: slot0.properties,
          extraItems: extras
        });
        const destCart = DB.getCart(destCartId);
        const label    = destCart ? msgCartLabel(destCart) : destCartId;
        const ctName = destCart ? containerName(destCart) : 'עגלה';
        const loc = destCart ? (destCart.location || '?') : '?';
        const msgLines = [`${ctName} ${label}`, `מועמסת ב${loc}`];
        const _mProps = DB.getMetadata().properties || [];
        allSlots.filter(sl => sl.itemCount).forEach(sl => {
          const ps = Utils.orderedPropValues(sl.properties, _mProps);
          msgLines.push(`${sl.itemCount}${ps ? ' ' + ps : ''}`);
          (sl.itemIds || []).forEach(id => msgLines.push(id));
        });
        msg = msgLines.join('\n');
        Toast.show('פריטים הועמסו', 'success');
        initEmptySlots(slotsContainer);
      } else {
        // Floor mode: multi-slot
        const loc = _getFloorLoc();
        const subloc = _getFloorSubloc();
        if (!loc) { Toast.show('יש להזין מיקום מקור', 'error'); return null; }
        const floorSlots = readAllFloorSlots();
        if (!floorSlots.some(s => s.itemCount > 0)) { Toast.show('יש להזין כמות', 'error'); return null; }

        // Validate serials — check for unknowns
        for (const slot of floorSlots) {
          const srcFI = DB.findFloorItem(loc, slot.properties, subloc || undefined);
          const knownIds = srcFI ? (srcFI.itemIds || []) : [];
          const allKnown = knownIds.length >= (srcFI ? (srcFI.itemCount || 0) : 0);
          for (const serial of slot.itemIds) {
            if (!knownIds.includes(serial) && allKnown && knownIds.length > 0) {
              // All serials are tracked and this one isn't among them
              const ok = await _confirmUnknownSerial(serial, loc, slot.properties);
              if (!ok) return null;
              // Check if it exists elsewhere — if so it will be moved automatically below
            }
          }
        }

        // Process each floor slot
        const msgLines = [];
        for (const slot of floorSlots) {
          if (!slot.itemCount) continue;
          const props = slot.properties;

          // Remove from source floor
          const srcFI = DB.findFloorItem(loc, props, subloc || undefined);
          if (srcFI) {
            const remainIds = (srcFI.itemIds || []).filter(id => !slot.itemIds.includes(id));
            const remaining = Math.max(0, (srcFI.itemCount || 0) - slot.itemCount);
            DB.upsertFloorItem({ location: loc, subLocation: subloc || undefined, properties: props,
                                 itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
          }

          // For serials not found at source, check other locations and move them
          for (const serial of slot.itemIds) {
            const srcHas = srcFI && (srcFI.itemIds || []).includes(serial);
            if (!srcHas) {
              const otherFI = _findSerialAnywhere(serial);
              if (otherFI) {
                const oRemainIds = (otherFI.itemIds || []).filter(id => id !== serial);
                const oRemain = Math.max(0, (otherFI.itemCount || 0) - 1);
                DB.upsertFloorItem({ location: otherFI.location, properties: otherFI.properties,
                                     subLocation: otherFI.subLocation,
                                     itemCount: oRemain, itemIds: oRemainIds, isEmpty: oRemain === 0 });
              }
            }
          }

          // Build message part
          const ps = Utils.orderedPropValues(props, DB.getMetadata().properties || []);
          msgLines.push(`${slot.itemCount}${ps ? ' ' + ps : ''}`);
          slot.itemIds.forEach(id => msgLines.push(id));
        }

        // Add all items to destination cart
        const existingCart = DB.getCart(destCartId);
        const slot0 = floorSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras = floorSlots.slice(1).filter(s => s.itemCount > 0);

        if (floorSlots.length === 1) {
          // Single slot: merge into cart
          const existingIds = existingCart ? (existingCart.itemIds || []) : [];
          const existingCount = existingCart ? (existingCart.itemCount || 0) : 0;
          DB.upsertCart({ cartId: destCartId,
                          itemCount: existingCount + slot0.itemCount,
                          itemIds: [...existingIds, ...slot0.itemIds],
                          properties: slot0.properties, isEmpty: false });
        } else {
          // Multi-slot: set as main slot + extras
          DB.upsertCart({ cartId: destCartId,
