                          itemCount: slot0.itemCount, itemIds: slot0.itemIds,
                          properties: slot0.properties, extraItems: extras, isEmpty: false });
        }

        const destCart = DB.getCart(destCartId);
        const label = destCart ? cartLabel(destCart) : destCartId;
        const ctName = destCart ? containerName(destCart) : 'עגלה';
        const cartLoc = destCart ? (destCart.location || '?') : '?';
        msg = [`${ctName} ${label}`, `מועמסת ב${cartLoc}`, ...msgLines].join('\n');
        Toast.show('פריטים הועמסו מרצפה', 'success');
        initFloorSlots();
      }
      // Optional destination — move cart and append to message
      const moveDest = screen.querySelector('#lu-load-move-dest').value.trim();
      if (moveDest) {
        const moveDestSublocGrp = screen.querySelector('#lu-load-move-dest-subloc-group');
        const _mSub1 = (!moveDestSublocGrp || moveDestSublocGrp.hidden)
          ? '' : screen.querySelector('#lu-load-move-dest-subloc').value.trim();
        const _mSub2Grp = screen.querySelector('#lu-load-move-dest-subloc2-group');
        const _mSub2 = (!_mSub2Grp || _mSub2Grp.hidden)
          ? '' : screen.querySelector('#lu-load-move-dest-subloc2').value.trim();
        const moveDestSubloc = (_mSub1 && _mSub2) ? `${_mSub1}/${_mSub2}` : _mSub1;
        DB.upsertCart({ cartId: destCartId, location: moveDest, subLocation: moveDestSubloc });
        msg += '\nמועברת ל' + waMsgLoc(moveDest, moveDestSubloc);
      }
      screen.querySelector('#lu-dest-cart').value = '';
      screen.querySelector('#lu-load-move-dest').value = '';
      screen.querySelector('#lu-load-move-dest-subloc').value = '';
      screen.querySelector('#lu-load-move-dest-subloc2').value = '';
      screen.querySelector('#lu-src-loc').value = '';
      screen.querySelector('#lu-src-subloc').value = '';
      return msg;
    }

    screen.querySelector('#lu-load-save-btn').addEventListener('click', async () => {
      const msg = await doLoadSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-load-save-only').addEventListener('click', async () => {
      await doLoadSave();
    });

    // ── unload save logic ──
    function doUnloadSave() {
      if (!_srcCart) { Toast.show('יש לבחור מקור לפירוק', 'error'); return null; }
      const destLoc = screen.querySelector('#lu-unload-dest-loc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return null; }
      const _uSub1 = screen.querySelector('#lu-unload-dest-subloc-group').hidden ? '' : screen.querySelector('#lu-unload-dest-subloc').value.trim();
      const _uSub2 = screen.querySelector('#lu-unload-dest-subloc2-group').hidden ? '' : screen.querySelector('#lu-unload-dest-subloc2').value.trim();
      const destSubLoc = (_uSub1 && _uSub2) ? `${_uSub1}/${_uSub2}` : _uSub1;

      const slotsContainer = screen.querySelector('#lu-unload-slots-container');
      const allSlots = readAllSlots(slotsContainer);

      const unload0 = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
      const unload0Set   = new Set(unload0.itemIds);
      const remain0Ids   = (_srcCart.itemIds || []).filter(id => !unload0Set.has(id));
      const remain0Count = Math.max(0, (_srcCart.itemCount || 0) - unload0.itemCount);

      const newExtras = (_srcCart.extraItems || []).map((ex, idx) => {
        const unloadSlot = allSlots[idx + 1];
        if (!unloadSlot) return ex;
        const unloadedSet = new Set(unloadSlot.itemIds);
        const newIds      = (ex.itemIds || []).filter(id => !unloadedSet.has(id));
        const newCount    = Math.max(0, (ex.itemCount || 0) - unloadSlot.itemCount);
        return { ...ex, itemCount: newCount, itemIds: newIds };
      });

      const msgParts = [];
      for (const slot of allSlots) {
        if (!slot.itemCount) continue;
        const destFI   = DB.findFloorItem(destLoc, slot.properties);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + slot.itemCount;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), ...slot.itemIds];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: slot.properties, isEmpty: false });
        const propStr = Utils.orderedPropValues(slot.properties, DB.getMetadata().properties || []);
        msgParts.push(`${slot.itemCount}${propStr ? ' ' + propStr : ''}`);
      }

      DB.upsertCart({ cartId: _srcCart.cartId,
                      itemCount: remain0Count, itemIds: remain0Ids,
                      extraItems: newExtras });

      const label = msgCartLabel(_srcCart);
      const unloadDest = waMsgLoc(destLoc, destSubLoc);
      const msg   = [`${containerName(_srcCart)} ${label}`, ...msgParts, `פורקו ל${unloadDest}`].join('\n');
      Toast.show('פריטים פורקו לרצפה', 'success');

      _srcCart = null;
      screen.querySelector('#lu-unload-fields').hidden = true;
      screen.querySelector('#lu-unload-dest-loc').value = '';
      screen.querySelector('#lu-unload-dest-subloc').value = '';
      screen.querySelector('#lu-unload-dest-subloc2').value = '';
      if (_unloadCartRef) _unloadCartRef.clear();
      return msg;
    }

    screen.querySelector('#lu-unload-save-btn').addEventListener('click', () => {
      const msg = doUnloadSave();
      if (msg) copyMsg(msg);
    });
    screen.querySelector('#lu-unload-save-only').addEventListener('click', () => {
      doUnloadSave();
    });

    // empty cart (unload screen)
    screen.querySelector('#lu-empty-cart').addEventListener('click', () => {
      if (!_srcCart) { Toast.show('בחר עגלה', 'error'); return; }
      DB.upsertCart({ cartId: _srcCart.cartId, itemCount: 0, itemIds: [], properties: {}, isEmpty: true, extraItems: [] });
      Toast.show('עגלה רוקנה', 'success');
      _srcCart = null;
      screen.querySelector('#lu-unload-fields').hidden = true;
    });

    Router.register('loadunload', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setOp('unload');
          setTimeout(() => _unloadCartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setOp('load');
          setLoadType('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#lu-src-loc').value = fi.location || '';
              screen.querySelector('#lu-src-loc').dispatchEvent(new Event('change'));
              if (fi.subLocation) {
                screen.querySelector('#lu-src-subloc').value = fi.subLocation;
              }
              // Set properties on first floor slot
              const firstSlot = screen.querySelector('#lu-floor-slots-container .floor-slot');
              if (firstSlot) {
                buildPropertyFields(firstSlot.querySelector('.floor-slot-props'), fi.properties || {});
                firstSlot.querySelector('.floor-slot-props').dispatchEvent(new Event('change', { bubbles: true }));
              }
            }
          }, 50);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 8 — Screen: Search
  ════════════════════════════════════════════════════ -->
  <script>
  function initSearch() {
    const screen = document.getElementById('screen-search');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔍</span>
        <h1>${Lang.T('חיפוש', 'Búsqueda')}</h1>
        <button class="undo-btn" title="${Lang.T('בטל פעולה', 'Deshacer')}">↩</button>
        <button class="help-btn" data-screen="search" title="${Lang.T('עזרה', 'Ayuda')}">❓</button>
      </div>
      <div id="sr-collapse-bar" class="sr-collapse-bar" style="display:none">
        <span class="sr-collapse-summary" id="sr-collapse-summary"></span>
        <span class="sr-collapse-toggle" id="sr-collapse-toggle">הצג סינונים ▼</span>
      </div>
      <div class="sr-search-inputs" id="sr-search-inputs">
        <div class="sr-suggest-wrap"><input id="sr-inc-1" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 1"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-2" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 2"></div>
        <div class="sr-suggest-wrap"><input id="sr-inc-3" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 3"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-inc-4" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 4"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-inc-5" class="sr-search-field" type="text" autocomplete="off" placeholder="סינון חיובי 5"></div>
        <div class="sr-suggest-wrap"><input id="sr-exc-1" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 1 (לא לכלול)"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-exc-2" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 2 (לא לכלול)"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-exc-3" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 3 (לא לכלול)"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-exc-4" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 4 (לא לכלול)"></div>
        <div class="sr-suggest-wrap sr-hidden"><input id="sr-exc-5" class="sr-search-field sr-exclude" type="text" autocomplete="off" placeholder="החרגה 5 (לא לכלול)"></div>
        <div style="display:flex;gap:8px;">
          <div class="sr-add-filter" id="sr-add-filter" style="flex:1"><a>+ הוסף שדה סינון</a></div>
          <div class="sr-add-filter" id="sr-add-exc-filter" style="flex:1"><a>+ הוסף שדה החרגה</a></div>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;padding:4px 0;">
          <label class="sr-empty-label">
            <label class="modern-check"><input type="checkbox" id="sr-empty-check"><span class="modern-check-box"></span></label> ${Lang.T('הצג ריקות בלבד', 'Solo vacías')}
          </label>
          <label class="sr-empty-label">
            <label class="modern-check"><input type="checkbox" id="sr-external-check"><span class="modern-check-box"></span></label> <span id="sr-external-label"></span>
          </label>
        </div>
        <div style="padding:4px 0 2px;">
          <div class="pill-toggle" id="sr-damaged-toggle" style="width:auto;display:inline-flex;">
            <button class="active" data-dmg="all">${Lang.T('הכל', 'Todo')}</button>
            <button data-dmg="ok">${Lang.T('תקין', 'OK')}</button>
            <button data-dmg="damaged">${Lang.T('תקול', 'Roto')}</button>
          </div>
        </div>
      </div>
      <div id="sr-type-filters" class="recent-filters" style="padding-bottom:2px"></div>
      <div id="sr-recent-filters" class="recent-filters"></div>
      <div class="sr-filter-actions">
        <span id="sr-filter-count" class="sr-filter-count">כל הפריטים</span>
        <button id="sr-clear-btn" class="btn btn-sm btn-outline" style="display:none">נקה סינון</button>
      </div>
      <div style="display:flex;gap:6px;padding:0 12px 8px;flex-wrap:wrap">
        <button id="sr-copy-results" class="btn btn-sm btn-outline">העתק תוצאות</button>
        <button id="sr-copy-summary" class="btn btn-sm btn-outline">העתק סיכום</button>
        <button id="sr-laizko" class="btn btn-sm btn-outline">לאיצקו</button>
      </div>
      <div id="sr-summary" hidden></div>
      <div id="sr-results" style="padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 12px)"></div>
    `;

    // ── State ──────────────────────────────────────────────
    const state = {
      includeTerms: [],      // lowercase normalized strings
      excludeTerms: [],
      includeCategories: [], // parallel to includeTerms: propName string or null
      excludeCategories: [], // parallel to excludeTerms: propName string or null
      emptyOnly: false,
      itemTypeFilter: null,  // null=all, 'floor', or container type string
      includeExternal: false,
      damagedFilter: 'all'   // 'all' | 'ok' | 'damaged'
    };

    const _selectedItems = new Set(); // 'cart:ID' or 'fi:ID'
    const _summaryCollapsed = { loc: true, combo: true };

    const incInputs = [1,2,3,4,5].map(n => screen.querySelector('#sr-inc-' + n));
    const excInputs = [1,2,3,4,5].map(n => screen.querySelector('#sr-exc-' + n));
    const incWraps  = incInputs.map(i => i.closest('.sr-suggest-wrap'));
    const excWraps  = excInputs.map(i => i.closest('.sr-suggest-wrap'));
    const allWraps  = [...incWraps, ...excWraps];

    // ── Collapse / expand filters ─────────────────────────────────
    let _filtersCollapsed = false;
    const collapseBar = screen.querySelector('#sr-collapse-bar');
    const collapseSummary = screen.querySelector('#sr-collapse-summary');
    const collapseToggle = screen.querySelector('#sr-collapse-toggle');
    const inputsContainer = screen.querySelector('#sr-search-inputs');

    function updateCollapseBar() {
      const active = countActive();
      if (!active) {
        collapseBar.style.display = 'none';
        inputsContainer.classList.remove('collapsed');
        _filtersCollapsed = false;
        return;
      }
      collapseBar.style.display = '';
      // Build summary text
      const incParts = state.includeTerms.map(t => t);
      const excParts = state.excludeTerms.map(t => t);
      let summary = incParts.join(', ');
      if (excParts.length) {
        summary += (summary ? ' | ' : '') + 'לא כולל: ' + excParts.join(', ');
      }
      if (state.emptyOnly) {
        summary += (summary ? ' | ' : '') + 'ריקות בלבד';
      }
      collapseSummary.textContent = summary;
      collapseToggle.textContent = _filtersCollapsed ? 'הצג סינונים ▼' : 'הסתר סינונים ▲';
    }

    collapseBar.addEventListener('click', () => {
      _filtersCollapsed = !_filtersCollapsed;
      inputsContainer.classList.toggle('collapsed', _filtersCollapsed);
      updateCollapseBar();
    });

    // ── Add filter fields on demand ────────────────────────────────
    function revealNextHidden() {
      const hidden = incWraps.filter(w => w.classList.contains('sr-hidden'));
      if (hidden.length) hidden[0].classList.remove('sr-hidden');
      if (incWraps.every(w => !w.classList.contains('sr-hidden')))
        screen.querySelector('#sr-add-filter').style.display = 'none';
    }
    function revealNextHiddenExc() {
      const hidden = excWraps.filter(w => w.classList.contains('sr-hidden'));
      if (hidden.length) hidden[0].classList.remove('sr-hidden');
      if (excWraps.every(w => !w.classList.contains('sr-hidden')))
        screen.querySelector('#sr-add-exc-filter').style.display = 'none';
    }
    screen.querySelector('#sr-add-filter').addEventListener('click', revealNextHidden);
    screen.querySelector('#sr-add-exc-filter').addEventListener('click', revealNextHiddenExc);

    // ── Pinned location groups ────────────────────────────────────
    const PIN_KEY = 'shinua_pinned_groups';
    let _pinnedGroups = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem(PIN_KEY) || '[]');
      if (Array.isArray(raw)) _pinnedGroups = new Set(raw);
    } catch { /* ignore */ }
    function _savePins() { localStorage.setItem(PIN_KEY, JSON.stringify([..._pinnedGroups])); }

    // ── Recent filter combos ──────────────────────────────────────
    const RECENT_KEY = 'shinua_recent_filters';
    const MAX_RECENT = 5;
    function _loadRecent() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); }
      catch { return []; }
    }
    function _saveRecentFilter() {
      if (!state.includeTerms.length && !state.excludeTerms.length && !state.emptyOnly) return;
      const entry = {
        inc: state.includeTerms.slice(),
        exc: state.excludeTerms.slice(),
        empty: state.emptyOnly,
        ts: Date.now()
      };
      const label = _recentLabel(entry);
      if (!label) return;
      let recents = _loadRecent();
      // deduplicate by label
      recents = recents.filter(r => _recentLabel(r) !== label);
      recents.unshift(entry);
      if (recents.length > MAX_RECENT) recents = recents.slice(0, MAX_RECENT);
      localStorage.setItem(RECENT_KEY, JSON.stringify(recents));
    }
    function _recentLabel(r) {
      const parts = [];
      if (r.inc && r.inc.length) parts.push(r.inc.join(', '));
      if (r.exc && r.exc.length) parts.push('!' + r.exc.join(', '));
      if (r.empty) parts.push('ריקות');
      return parts.join(' | ');
    }
    function _applyRecent(r) {
      // Reset all fields first
      [...incInputs, ...excInputs].forEach(i => {
        i.value = '';
        _inputCategoryMap.delete(i);
        _updateCatBadge(i, null);
      });
      state.includeCategories = [];
      state.excludeCategories = [];
      (r.inc || []).forEach((t, i) => { if (incInputs[i]) incInputs[i].value = t; });
      (r.exc || []).forEach((t, i) => { if (excInputs[i]) excInputs[i].value = t; });
      state.includeTerms = (r.inc || []).slice();
      state.excludeTerms = (r.exc || []).slice();
      state.emptyOnly = !!r.empty;
      screen.querySelector('#sr-empty-check').checked = state.emptyOnly;
      // Show enough fields
      incWraps.forEach((w, i) => { if (r.inc && i < r.inc.length) w.classList.remove('sr-hidden'); });
      excWraps.forEach((w, i) => { if (r.exc && i < r.exc.length) w.classList.remove('sr-hidden'); });
      _filtersCollapsed = false;
      inputsContainer.classList.remove('collapsed');
      closeSuggestions();
      updateActionsBar();
      renderResults();
    }
    function _removeRecent(label) {
      let recents = _loadRecent();
      recents = recents.filter(r => _recentLabel(r) !== label);
      localStorage.setItem(RECENT_KEY, JSON.stringify(recents));
      renderRecentFilters();
    }
    function renderRecentFilters() {
      const container = screen.querySelector('#sr-recent-filters');
      const recents = _loadRecent();
      // Only show when no active filter
      if (countActive() || !recents.length) { container.innerHTML = ''; return; }
      // Only show recents where all terms still exist in the suggestion pool
      const poolSet = new Set(_suggestions.map(s => s.toLowerCase()));
      const validRecents = recents.filter(r =>
        [...(r.inc || []), ...(r.exc || [])].every(t => poolSet.has(t.toLowerCase()))
      );
      if (!validRecents.length) { container.innerHTML = ''; return; }
      container.innerHTML = validRecents.map(r => {
        const label = _recentLabel(r);
        return `<button class="recent-filter-chip" data-recent='${esc(JSON.stringify(r))}'>
          <span class="rfc-icon">⏱</span>${esc(label)}<span class="rfc-remove" data-remove-label="${esc(label)}">✕</span>
        </button>`;
      }).join('');
      container.querySelectorAll('.recent-filter-chip').forEach(chip => {
        chip.addEventListener('click', e => {
          if (e.target.closest('.rfc-remove')) {
            e.stopPropagation();
            _removeRecent(e.target.dataset.removeLabel);
            return;
          }
          const r = JSON.parse(chip.dataset.recent);
          _applyRecent(r);
        });
      });
    }

    // ── Suggestion pool ───────────────────────────────────────────
    let _suggestions = [];
    function buildSuggestionPool() {
      const pool = new Set();
      const meta = DB.getMetadata();
      const carts = DB.getAllCarts();
      const fis = DB.getAllFloorItems();
      // locations & sub-locations + their aliases
      (meta.locations || []).forEach(l => {
        pool.add(l.name);
        (l.aliases || []).forEach(a => { if (a.trim()) pool.add(a); });
        (l.subLocations || []).forEach(s => {
          pool.add(s);
          ((l.subLocationAliases || {})[s] || []).forEach(a => { if (a.trim()) pool.add(a); });
        });
      });
      // cart types, container types
      (meta.cartTypes || []).forEach(t => pool.add(t));
      (meta.containerTypes || []).forEach(t => pool.add(t));
      // property options + their aliases
      (meta.properties || []).forEach(p => {
        (p.options || []).forEach(o => pool.add(o));
        Object.values(p.aliases || {}).forEach(aliasList => aliasList.forEach(a => { if (a.trim()) pool.add(a); }));
      });
      // cart IDs, serial numbers
      carts.forEach(c => {
        pool.add(c.cartId);
        if (c.cartType) pool.add(c.cartType);
        (c.itemIds || []).forEach(id => pool.add(id));
        (c.extraItems || []).forEach(ex => (ex.itemIds || []).forEach(id => pool.add(id)));
      });
      // floor item serial numbers
      fis.forEach(fi => {
        (fi.itemIds || []).forEach(id => pool.add(id));
      });
      _suggestions = [...pool].filter(Boolean).sort();
    }

    // Resolve a search term through property/location aliases → canonical form
    function _resolveSearchTerm(term) {
      const meta = DB.getMetadata();
      const lower = term.toLowerCase();
      for (const prop of (meta.properties || [])) {
        for (const [canonical, aliasList] of Object.entries(prop.aliases || {})) {
          if ((aliasList || []).some(a => a.toLowerCase() === lower)) return canonical.toLowerCase();
        }
      }
      for (const loc of (meta.locations || [])) {
        if ((loc.aliases || []).some(a => a.toLowerCase() === lower)) return loc.name.toLowerCase();
        for (const [canonical, aliasList] of Object.entries(loc.subLocationAliases || {})) {
          if ((aliasList || []).some(a => a.toLowerCase() === lower)) return canonical.toLowerCase();
        }
      }
      return term;
    }

    // ── Autocomplete ─────────────────────────────────────────────
    let _activeDropdown = null;

    // Map<HTMLInputElement, string|null> — selected property category per input
    const _inputCategoryMap = new Map();

    // Returns property defs whose options contain `value` (exact, case-insensitive)
    function _getAmbiguousProps(value) {
      const lower = value.toLowerCase();
      return (DB.getMetadata().properties || []).filter(p =>
        (p.options || []).some(o => o.toLowerCase() === lower)
      );
    }

    // Show/hide the category badge below an input
    function _updateCatBadge(input, propName) {
      const wrap = input.closest('.sr-suggest-wrap');
      let badge = wrap.querySelector('.sr-cat-badge');
      if (!propName) {
        if (badge) badge.remove();
        return;
      }
      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'sr-cat-badge';
        wrap.appendChild(badge);
      }
      badge.textContent = `[${propName}] ✕`;
      badge.onclick = () => {
        _inputCategoryMap.delete(input);
        _updateCatBadge(input, null);
        onSearchInput();
      };
    }

    // Show disambiguation picker when a value belongs to multiple property categories
    function showDisambiguation(input, value, ambigProps) {
      closeSuggestions();
      const wrap = input.closest('.sr-suggest-wrap');
      const list = document.createElement('div');
      list.className = 'sr-suggest-list open';

      const header = document.createElement('div');
      header.className = 'sr-disambig-header';
      header.textContent = 'הערך קיים בכמה קטגוריות — בחר:';
      list.appendChild(header);

      // "All categories" option
      const allItem = document.createElement('div');
      allItem.className = 'sr-suggest-item';
      allItem.textContent = 'כל הקטגוריות';
      allItem.addEventListener('pointerdown', e => {
        e.preventDefault();
        _inputCategoryMap.delete(input);
        _updateCatBadge(input, null);
        closeSuggestions();
        onSearchInput();
      });
      list.appendChild(allItem);

      ambigProps.forEach(prop => {
        const item = document.createElement('div');
        item.className = 'sr-suggest-item sr-disambig-item';
        item.textContent = prop.name;
        item.addEventListener('pointerdown', e => {
          e.preventDefault();
          _inputCategoryMap.set(input, prop.name);
          _updateCatBadge(input, prop.name);
          closeSuggestions();
          onSearchInput();
        });
        list.appendChild(item);
      });

      wrap.appendChild(list);
      _activeDropdown = list;
    }

    function showSuggestions(input, query) {
      closeSuggestions();
      if (!query) return;
      const lower = query.toLowerCase();
      const matches = _suggestions.filter(s => s.toLowerCase().includes(lower)).slice(0, 15);
      if (!matches.length) return;

      const wrap = input.closest('.sr-suggest-wrap');
      const list = document.createElement('div');
      list.className = 'sr-suggest-list open';
      matches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'sr-suggest-item';
        item.textContent = m;
        item.addEventListener('pointerdown', e => {
          e.preventDefault();
          input.value = m;
          _inputCategoryMap.delete(input);
          _updateCatBadge(input, null);
          closeSuggestions();
          onSearchInput();
          const ambig = _getAmbiguousProps(m);
          if (ambig.length > 1) setTimeout(() => showDisambiguation(input, m, ambig), 0);
        });
        list.appendChild(item);
      });
      wrap.appendChild(list);
      _activeDropdown = list;
    }

    function closeSuggestions() {
      if (_activeDropdown) { _activeDropdown.remove(); _activeDropdown = null; }
    }

    // ── Debounced search input handler ────────────────────────────
    let _debounceTimer = null;
    function onSearchInput() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(() => {
        const incPairs = incInputs.map(i => ({ term: i.value.trim().toLowerCase(), cat: _inputCategoryMap.get(i) || null })).filter(p => p.term);
        const excPairs = excInputs.map(i => ({ term: i.value.trim().toLowerCase(), cat: _inputCategoryMap.get(i) || null })).filter(p => p.term);
        state.includeTerms = incPairs.map(p => p.term);
        state.includeCategories = incPairs.map(p => p.cat);
        state.excludeTerms = excPairs.map(p => p.term);
        state.excludeCategories = excPairs.map(p => p.cat);
        updateActionsBar();
        renderResults();
        _saveRecentFilter();
        renderRecentFilters();
      }, 150);
    }

    // Wire up input events
    [...incInputs, ...excInputs].forEach(input => {
      input.addEventListener('input', () => {
        // Reset category restriction whenever the user modifies the field
        _inputCategoryMap.delete(input);
        _updateCatBadge(input, null);
        const q = input.value.trim();
        if (q.length >= 1) {
          const ambig = _getAmbiguousProps(q);
          if (ambig.length > 1) showDisambiguation(input, q, ambig);
          else showSuggestions(input, q);
        } else {
          closeSuggestions();
        }
        onSearchInput();
      });
      input.addEventListener('focus', () => {
        const q = input.value.trim();
        if (q.length >= 1) showSuggestions(input, q);
      });
      input.addEventListener('blur', () => {
        setTimeout(closeSuggestions, 150);
      });
    });

    // Empty-only checkbox
    screen.querySelector('#sr-empty-check').addEventListener('change', e => {
      if (navigator.vibrate) navigator.vibrate(10);
      state.emptyOnly = e.target.checked;
      updateActionsBar();
      renderResults();
      _saveRecentFilter();
      renderRecentFilters();
    });

    screen.querySelector('#sr-external-check').addEventListener('change', e => {
      state.includeExternal = e.target.checked;
      renderResults();
    });

    screen.querySelector('#sr-damaged-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-dmg]');
      if (!btn) return;
      state.damagedFilter = btn.dataset.dmg;
      screen.querySelectorAll('#sr-damaged-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.dmg === state.damagedFilter));
      renderResults();
    });

    // ── Actions bar ───────────────────────────────────────────────
    function countActive() {
      return state.includeTerms.length + state.excludeTerms.length + (state.emptyOnly ? 1 : 0);
    }
    function updateActionsBar() {
      const count    = countActive();
      const label    = document.getElementById('sr-filter-count');
      const clearBtn = document.getElementById('sr-clear-btn');
      label.textContent = count ? count + ' סינונים פעילים' : 'כל הפריטים';
      clearBtn.style.display = count ? '' : 'none';
      updateCollapseBar();
      updateCopyBtnLabels();
    }

    function updateCopyBtnLabels() {
      const n = _selectedItems.size;
      const copyBtn = document.getElementById('sr-copy-results');
      const summBtn = document.getElementById('sr-copy-summary');
      copyBtn.textContent = n ? `העתק תוצאות (${n})` : 'העתק תוצאות';
      summBtn.textContent = n ? `העתק סיכום (${n})` : 'העתק סיכום';
    }

    // ── Filter logic ──────────────────────────────────────────────
    function buildSearchableParts(item) {
      const parts = [item.cartId, item.location, item.subLocation,
        item.cartType, item.containerType, item.comment || '',
        ...Object.values(item.properties || {}).filter(Boolean),
        ...(item.itemIds || [])];
      if (item.extraItems) {
        item.extraItems.forEach(ex => {
          parts.push(...Object.values(ex.properties || {}).filter(Boolean));
          parts.push(...(ex.itemIds || []));
        });
      }
      // Include child carts' data so parent shows up in searches for child content
      if (item.cartId) {
        DB.getChildCarts(item.cartId).forEach(ch => {
          parts.push(ch.cartId);
          parts.push(...Object.values(ch.properties || {}).filter(Boolean));
          parts.push(...(ch.itemIds || []));
          if (ch.extraItems) {
            ch.extraItems.forEach(ex => {
              parts.push(...Object.values(ex.properties || {}).filter(Boolean));
              parts.push(...(ex.itemIds || []));
            });
          }
        });
      }
      if (item.itemCount != null) parts.push(String(item.itemCount));
      return parts.filter(Boolean).map(p => p.toLowerCase());
    }

    function termMatchesParts(term, parts) {
      // Match if any part equals the term exactly, or if a multi-word part
      // contains the term as a whole word (not as substring within a hyphenated/compound word)
      for (const part of parts) {
        if (part === term) return true;
        // Check whole-word match: term must be bounded by start/end or whitespace
        if (part.length > term.length) {
          const idx = part.indexOf(term);
          if (idx === -1) continue;
          let pos = idx;
          while (pos !== -1) {
            const before = pos === 0 || part[pos - 1] === ' ';
            const after = (pos + term.length) === part.length || part[pos + term.length] === ' ';
            if (before && after) return true;
            pos = part.indexOf(term, pos + 1);
          }
        }
      }
      return false;
    }

    function _propMatchesTerm(item, propName, term) {
      const topVal = ((item.properties || {})[propName] || '').toLowerCase();
      if (topVal === term) return true;
      return (item.extraItems || []).some(ex => ((ex.properties || {})[propName] || '').toLowerCase() === term);
    }

    function renderTypeFilter() {
      const container = screen.querySelector('#sr-type-filters');
      if (!container) return;
      const meta = DB.getMetadata();
      const ctypes = meta.containerTypes || [DEFAULT_CONTAINER];
      const chips = [
        { label: 'הכל', value: null },
        ...ctypes.map(ct => ({ label: ct, value: ct })),
        { label: 'רצפה', value: 'floor' }
      ];
      container.innerHTML = chips.map(c => {
        const active = state.itemTypeFilter === c.value ? ' active' : '';
        const val = c.value === null ? '' : c.value;
        return `<button class="recent-filter-chip${active}" data-type="${esc(val)}">${esc(c.label)}</button>`;
      }).join('');
      container.querySelectorAll('.recent-filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          state.itemTypeFilter = chip.dataset.type || null;
          renderTypeFilter();
          renderResults();
        });
      });
    }

    function _isDamaged(item) {
      const props = item.properties || {};
      if (Object.values(props).some(v => v && String(v).includes('❌'))) return true;
      if (item.comment && String(item.comment).includes('❌')) return true;
      return false;
    }

    function itemPasses(item) {
      if (!item.location) return false; // cleared items (מחק את השאר)
      // External location filter
      if (!state.includeExternal) {
        const locMeta = DB.getMetadata().locations.find(l => l.name === item.location);
        if (locMeta && !locMeta.inMap) return false;
      }
      // Damaged filter
      if (state.damagedFilter === 'damaged' && !_isDamaged(item)) return false;
      if (state.damagedFilter === 'ok'      &&  _isDamaged(item)) return false;
      if (state.itemTypeFilter) {
        const isCart = !!item.cartId;
        if (state.itemTypeFilter === 'floor') {
          if (isCart) return false;
        } else {
          if (!isCart) return false;
          const ct = item.containerType || DEFAULT_CONTAINER;
          if (ct !== state.itemTypeFilter) return false;
        }
      }
      if (state.emptyOnly && !item.isEmpty) return false;
      if (!state.includeTerms.length && !state.excludeTerms.length) return true;
      const parts = buildSearchableParts(item);
      for (let i = 0; i < state.includeTerms.length; i++) {
        const t = _resolveSearchTerm(state.includeTerms[i]), cat = state.includeCategories[i];
        if (cat ? !_propMatchesTerm(item, cat, t) : !termMatchesParts(t, parts)) return false;
      }
      for (let i = 0; i < state.excludeTerms.length; i++) {
        const t = _resolveSearchTerm(state.excludeTerms[i]), cat = state.excludeCategories[i];
        if (cat ? _propMatchesTerm(item, cat, t) : termMatchesParts(t, parts)) return false;
      }
      return true;
    }

    // ── Highlight helper ─────────────────────────────────────────
    function highlightText(text, terms) {
      if (!terms.length || !text) return esc(text);
      const lower = text.toLowerCase();
      const ranges = [];
      for (const term of terms) {
        let from = 0;
        while (from < lower.length) {
          const idx = lower.indexOf(term, from);
          if (idx === -1) break;
          ranges.push({ start: idx, end: idx + term.length });
          from = idx + term.length;
        }
      }
      if (!ranges.length) return esc(text);
      // merge overlapping
      ranges.sort((a, b) => a.start - b.start);
      const merged = [ranges[0]];
      for (let i = 1; i < ranges.length; i++) {
        const prev = merged[merged.length - 1];
        if (ranges[i].start <= prev.end) {
          prev.end = Math.max(prev.end, ranges[i].end);
        } else {
          merged.push(ranges[i]);
        }
      }
      let out = '', cursor = 0;
      for (const r of merged) {
        out += esc(text.slice(cursor, r.start));
        out += '<mark>' + esc(text.slice(r.start, r.end)) + '</mark>';
        cursor = r.end;
      }
      out += esc(text.slice(cursor));
      return out;
    }

    // ── Summary panel ─────────────────────────────────────────────
    function renderSummary(carts, fis) {
      const el = document.getElementById('sr-summary');
      const all = [...carts, ...fis];
      if (!all.length) { el.hidden = true; el.innerHTML = ''; return; }

      const totalItems  = all.reduce((s, x) => s + (x.itemCount || 0), 0);
      const cartItems   = carts.reduce((s, c) => s + (c.itemCount || 0), 0);
      const floorItems  = fis.reduce((s, f) => s + (f.itemCount || 0), 0);
      const emptyCount  = all.filter(x => x.isEmpty).length;

      const locStats = {};
      all.forEach(item => {
        const loc = item.location || 'ללא מיקום';
        if (!locStats[loc]) locStats[loc] = { items: 0, empty: 0 };
        locStats[loc].items += (item.itemCount || 0);
        if (item.isEmpty) locStats[loc].empty++;
      });
      const locEntries = Object.entries(locStats).sort((a,b) => b[1].items - a[1].items);
      const maxLocItems = Math.max(1, ...locEntries.map(([,s]) => s.items));

      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const comboStats = {};
      all.filter(x => !x.isEmpty && x.itemCount).forEach(item => {
        const key   = propDefs.map(p => (item.properties || {})[p.name] || '').join('|');
        const label = propDefs.map(p => (item.properties || {})[p.name]).filter(Boolean).join(' · ');
        if (!comboStats[key]) comboStats[key] = { label: label || 'ללא מאפיינים', total: 0 };
        comboStats[key].total += item.itemCount;
      });
      const comboEntries = Object.values(comboStats).sort((a,b) => b.total - a.total);

      let html = '<div class="sr-summary">';
      if (totalItems > 0) {
        const showSplit = carts.length && fis.length;
        html += `
          <div class="sr-total-card">
            <div class="sr-total-num">${totalItems}</div>
            <div class="sr-total-label">פריטים</div>
            ${showSplit ? `
            <div class="sr-total-split">
              <div class="sr-split-item"><span class="sr-split-num">${cartItems}</span><span class="sr-split-lbl">בעגלות</span></div>
              <div class="sr-split-item"><span class="sr-split-num">${floorItems}</span><span class="sr-split-lbl">ברצפה</span></div>
            </div>` : ''}
          </div>`;
      }
      if (emptyCount > 0) {
        html += `<div class="sr-empty-card"><div class="sr-empty-card-num">${emptyCount}</div><div class="sr-empty-card-lbl">ריקות</div></div>`;
      }
      if (locEntries.length > 1) {
        const locCollapsed = _summaryCollapsed.loc ? ' collapsed' : '';
        html += `<div class="sr-section-header${locCollapsed}" data-section="loc"><span class="sr-section-title">לפי מיקום</span><button class="sr-section-toggle">▼</button></div>`;
        html += '<div class="sr-section-body">';
        html += locEntries.map(([loc, s]) => {
          const pct = Math.round((s.items / maxLocItems) * 100);
          const countLabel = s.items > 0 ? s.items + (s.empty ? ` (+${s.empty} ריקות)` : '') : s.empty + ' ריקות';
          return `<div class="sr-loc-row"><span class="sr-loc-name">${esc(loc)}</span><div class="sr-loc-bar-wrap"><div class="sr-loc-bar-fill" style="width:${pct}%"></div></div><span class="sr-loc-count">${countLabel}</span></div>`;
        }).join('');
        html += '</div>';
      }
      if (comboEntries.length > 1 && propDefs.length) {
        const comboCollapsed = _summaryCollapsed.combo ? ' collapsed' : '';
        html += `<div class="sr-section-header${comboCollapsed}" data-section="combo"><span class="sr-section-title">לפי שילוב מאפיינים</span><button class="sr-section-toggle">▼</button></div>`;
        html += '<div class="sr-section-body">';
        html += comboEntries.map(c => `<div class="sr-combo-row"><span class="sr-combo-label">${esc(c.label)}</span><span class="sr-combo-count">${c.total} פריטים</span></div>`).join('');
        html += '</div>';
      }
      html += '</div>';
      el.innerHTML = html;
      el.hidden = false;

      // Wire collapsible section headers
      el.querySelectorAll('.sr-section-header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.dataset.section;
          header.classList.toggle('collapsed');
          _summaryCollapsed[section] = header.classList.contains('collapsed');
          const body = header.nextElementSibling;
          if (body && body.classList.contains('sr-section-body')) {
            if (header.classList.contains('collapsed')) {
              body.style.maxHeight = '0';
            } else {
              body.style.maxHeight = body.scrollHeight + 'px';
            }
          }
        });
        // Set initial max-height for open sections
        const body = header.nextElementSibling;
        if (body && body.classList.contains('sr-section-body')) {
          if (header.classList.contains('collapsed')) {
            body.style.maxHeight = '0';
          } else {
            body.style.maxHeight = body.scrollHeight + 'px';
          }
        }
      });
    }

    // ── Render results ────────────────────────────────────────────
    function propSummary(props) {
      if (!props) return '';
      const propDefs = DB.getMetadata().properties || [];
      const ordered = propDefs.map(p => props[p.name]).filter(Boolean);
      // Include any props not in metadata
      const metaNames = new Set(propDefs.map(p => p.name));
      Object.entries(props).forEach(([k, v]) => { if (v && !metaNames.has(k)) ordered.push(v); });
      return ordered.join(' · ');
    }
    function renderResults() {
      const results = document.getElementById('sr-results');
      const carts   = DB.getAllCarts().filter(itemPasses);
      const fis     = DB.getAllFloorItems().filter(itemPasses);

      renderSummary(carts, fis);

      if (!carts.length && !fis.length) {
        if (countActive()) {
          results.innerHTML = `
            <div class="empty-state-rich">
              <div class="es-illustration">🔍</div>
              <div class="es-title">לא נמצאו תוצאות</div>
              <div class="es-desc">נסה לשנות את מילות הסינון או להסיר סינונים</div>
              <div class="es-actions">
                <button class="btn btn-sm btn-outline" id="sr-empty-clear">נקה סינון</button>
              </div>
            </div>`;
          const ecBtn = results.querySelector('#sr-empty-clear');
          if (ecBtn) ecBtn.addEventListener('click', () => document.getElementById('sr-clear-btn').click());
        } else {
          results.innerHTML = `
            <div class="empty-state-rich">
              <div class="es-illustration">📦</div>
              <div class="es-title">אין פריטים במערכת</div>
              <div class="es-desc">התחל בייבוא נתונים או הוספת עגלות ומיקומים</div>
              <div class="es-actions">
                <button class="btn btn-sm btn-primary" id="sr-empty-import">📥 ייבוא נתונים</button>
                <button class="btn btn-sm btn-outline" id="sr-empty-edit">✏️ הוספת עגלה</button>
              </div>
            </div>`;
          const impBtn = results.querySelector('#sr-empty-import');
          const edBtn = results.querySelector('#sr-empty-edit');
          if (impBtn) impBtn.addEventListener('click', () => { Router.navigate('main'); history.replaceState(null, '', '#main'); });
          if (edBtn) edBtn.addEventListener('click', () => { Router.navigate('edit'); history.replaceState(null, '', '#edit'); });
        }
        return;
      }

      const terms = state.includeTerms; // highlight include terms only

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '||' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c  => addItem(c,  'cart'));
      fis.forEach(fi   => addItem(fi, 'fi'));

      // Build location order index from metadata
      const metaLocs = DB.getMetadata().locations;
      const locOrderMap = {};
      metaLocs.forEach((l, i) => { locOrderMap[l.name] = i; });
      // For sub-locations, use their order within the parent location
      const subLocOrderMap = {};
      metaLocs.forEach(l => {
        (l.subLocations || []).forEach((s, si) => {
          subLocOrderMap[l.name + '||' + s] = si;
        });
      });

      const sortedGroups = Object.values(groups).sort((a,b) => {
        const aKey = a.loc + '||' + a.sub;
        const bKey = b.loc + '||' + b.sub;
        const aPin = _pinnedGroups.has(aKey) ? 0 : 1;
        const bPin = _pinnedGroups.has(bKey) ? 0 : 1;
        if (aPin !== bPin) return aPin - bPin;
        const aLocIdx = locOrderMap[a.loc] !== undefined ? locOrderMap[a.loc] : 999999;
        const bLocIdx = locOrderMap[b.loc] !== undefined ? locOrderMap[b.loc] : 999999;
        if (aLocIdx !== bLocIdx) return aLocIdx - bLocIdx;
        const aSubIdx = subLocOrderMap[a.loc + '||' + a.sub] !== undefined ? subLocOrderMap[a.loc + '||' + a.sub] : 999999;
        const bSubIdx = subLocOrderMap[b.loc + '||' + b.sub] !== undefined ? subLocOrderMap[b.loc + '||' + b.sub] : 999999;
        return aSubIdx - bSubIdx || a.sub.localeCompare(b.sub);
      });

      const clearSelBar = _selectedItems.size
        ? `<div style="padding:8px 12px;display:flex;justify-content:flex-start">
             <button id="sr-clear-sel" class="btn btn-sm btn-outline">נקה בחירות (${_selectedItems.size})</button>
           </div>`
        : '';
      results.innerHTML = clearSelBar + sortedGroups.map(g => {
        const gKey = g.loc + '||' + g.sub;
        const isPinned = _pinnedGroups.has(gKey);
        return `
        <div class="loc-group">
          <div class="loc-group-header">
            <span style="flex:1">${highlightText(g.loc + (g.sub ? ' / ' + g.sub : ''), terms)}</span>
            <button class="sr-hdr-btn sr-add-btn" data-loc="${esc(g.loc)}" data-sub="${esc(g.sub||'')}" title="הוסף פריטים">+</button>
            <button class="sr-hdr-btn sr-clear-rest-btn" data-loc="${esc(g.loc)}" data-sub="${esc(g.sub||'')}" title="מחק את השאר">✕</button>
            <button class="sr-pin-btn${isPinned ? ' pinned' : ''}" data-pin-key="${esc(gKey)}" title="${isPinned ? 'בטל הצמדה' : 'הצמד למעלה'}">${isPinned ? '\u2605' : '\u2606'}</button>
          </div>
          <div class="sr-loc-add-form" data-form-loc="${esc(g.loc)}" data-form-sub="${esc(g.sub||'')}" hidden>
            <textarea class="sr-loc-add-textarea" rows="4" placeholder="שורות כמו במפה, למשל:&#10;8-6(1k): 3 אדום גדול&#10;אדום גדול - 5"></textarea>
            <div style="display:flex;gap:8px;margin-top:6px">
              <button class="btn btn-sm btn-outline sr-loc-cancel-btn">ביטול</button>
              <button class="btn btn-sm sr-loc-import-btn" style="background:var(--brand);color:#fff">ייבא</button>
            </div>
          </div>
          ${g.items.map(({ data, type }) => {
            if (type === 'cart') {
              const children = DB.getChildCarts(data.cartId);
              const allSlots = [
                { properties: data.properties || {}, itemCount: data.itemCount || 0 },
                ...(data.extraItems || []).filter(ex => ex.itemCount)
              ];
              // Include child cart slots for display
              children.forEach(ch => {
                allSlots.push({ properties: ch.properties || {}, itemCount: ch.itemCount || 0 });
                (ch.extraItems || []).filter(ex => ex.itemCount).forEach(ex => allSlots.push(ex));
              });
              const ownTotal = cartTotalCount(data);
              const childTotal = children.reduce((s, ch) => s + cartTotalCount(ch), 0);
              const grandTotal = ownTotal + childTotal;
              const subParts = [];
              if (data.isEmpty && !childTotal) {
                subParts.push('ריקה');
              } else if (allSlots.length > 1) {
                // Multi-slot: find common vs differing properties
                const meta = DB.getMetadata();
                const propDefs = meta.properties || [];
                const commonParts = [];
                const diffParts = [];
                propDefs.forEach(p => {
                  const vals = allSlots.map(s => (s.properties || {})[p.name] || '');
                  const unique = [...new Set(vals.filter(Boolean))];
                  if (unique.length === 1) {
                    commonParts.push(unique[0]);
                  } else if (unique.length > 1) {
                    unique.forEach(v => {
                      const cnt = allSlots.filter(s => (s.properties || {})[p.name] === v).reduce((s, sl) => s + (sl.itemCount || 0), 0);
                      diffParts.push(cnt + ' ' + v);
                    });
                  }
                });
                if (grandTotal) subParts.push(grandTotal + ' פריטים');
                if (commonParts.length) subParts.push(commonParts.join(' '));
                if (diffParts.length) subParts.push('(' + diffParts.join(', ') + ')');
              } else {
                const ps = propSummary(data.properties);
                if (grandTotal) subParts.push(grandTotal + ' פריטים');
                if (ps) subParts.push(ps);
              }
              if (data.parentCartId) {
                const pc = DB.getCart(data.parentCartId);
                subParts.push('על ' + (pc ? cartLabel(pc) : data.parentCartId));
              }
              if (children.length) subParts.push(children.length + ' טעונות');
              const ctBadge = (data.containerType && data.containerType !== DEFAULT_CONTAINER)
                ? `<span style="background:var(--area-bg);color:var(--brand);padding:1px 6px;border-radius:4px;font-size:0.75rem;margin-left:6px;">${esc(data.containerType)}</span>` : '';
              return `
                <div class="list-item sr-item${_selectedItems.has('cart:'+data.cartId) ? ' sr-checked' : ''}" data-type="cart" data-id="${esc(data.cartId)}" style="cursor:pointer">
                  <label class="modern-check" style="margin-inline-end:8px"><input type="checkbox" class="sr-check" data-sel-type="cart" data-sel-id="${esc(data.cartId)}"${_selectedItems.has('cart:'+data.cartId) ? ' checked' : ''}><span class="modern-check-box"></span></label>
                  <div class="list-item-body">
                    <div class="list-item-title">${ctBadge}${highlightText(cartLabel(data), terms)}</div>
                    <div class="list-item-sub">${highlightText(subParts.join(' · '), terms)}</div>
                    ${data.comment ? `<div class="list-item-sub" style="color:var(--muted);font-style:italic">${highlightText(data.comment, terms)}</div>` : ''}
                  </div>
                  <span>›</span>
                </div>`;
            } else {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item${_selectedItems.has('fi:'+data.id) ? ' sr-checked' : ''}" data-type="fi" data-id="${esc(data.id)}" style="cursor:pointer">
                  <label class="modern-check" style="margin-inline-end:8px"><input type="checkbox" class="sr-check" data-sel-type="fi" data-sel-id="${esc(data.id)}"${_selectedItems.has('fi:'+data.id) ? ' checked' : ''}><span class="modern-check-box"></span></label>
                  <div class="list-item-body">
                    <div class="list-item-title"><span class="badge badge-floor">רצפה</span> ${highlightText(ps || data.id, terms)}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + ' פריטים' : '')}</div>
                    ${data.comment ? `<div class="list-item-sub" style="color:var(--muted);font-style:italic">${highlightText(data.comment, terms)}</div>` : ''}
                  </div>
                  <span>›</span>
                </div>`;
            }
          }).join('')}
        </div>
      `;
      }).join('');

      // Wire pin buttons directly
      results.querySelectorAll('.sr-pin-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const key = btn.dataset.pinKey;
          if (_pinnedGroups.has(key)) _pinnedGroups.delete(key);
          else _pinnedGroups.add(key);
          _savePins();
          renderResults();
        });
      });

      // Wire + (add items) buttons
      results.querySelectorAll('.sr-add-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const loc = btn.dataset.loc, sub = btn.dataset.sub || '';
          const form = results.querySelector(`.sr-loc-add-form[data-form-loc="${esc(loc)}"][data-form-sub="${esc(sub)}"]`);
          if (!form) return;
          form.hidden = !form.hidden;
          if (!form.hidden) form.querySelector('textarea').focus();
        });
      });

      // Wire cancel buttons for add form
      results.querySelectorAll('.sr-loc-cancel-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          btn.closest('.sr-loc-add-form').hidden = true;
        });
      });

      // Wire import buttons for add form
      results.querySelectorAll('.sr-loc-import-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const form = btn.closest('.sr-loc-add-form');
          const loc = form.dataset.formLoc, sub = form.dataset.formSub || '';
          const text = form.querySelector('textarea').value.trim();
          if (!text) return;
          const meta = DB.getMetadata();
          const propDefs = meta.properties || [];
          let mapStr = `מיפוי\n${loc}:\n`;
          if (sub) mapStr += `${sub}:\n`;
          mapStr += text + '\n===\n';
          try {
            const normalized = window._normalizeAliases(mapStr, propDefs);
            const blocks = window._parseMap(normalized);
            const { db: importedDb } = window._buildMapDB(blocks, propDefs);
            DB.importJSON(JSON.stringify(importedDb), 'merge');
            form.hidden = true;
            form.querySelector('textarea').value = '';
            renderResults();
          } catch (err) {
            alert('שגיאה בייבוא: ' + err.message);
          }
        });
      });

      // Wire מחק את השאר buttons
      results.querySelectorAll('.sr-clear-rest-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const loc = btn.dataset.loc, sub = btn.dataset.sub || '';
          const allCarts = DB.getAllCarts().filter(c =>
            c.location === loc && (c.subLocation || '') === sub && !c.parentCartId
          );
          const allFIs = DB.getAllFloorItems().filter(fi =>
            fi.location === loc && (fi.subLocation || '') === sub
          );
          allCarts.forEach(c => {
            if (!_selectedItems.has('cart:' + c.cartId))
              DB.upsertCart({ cartId: c.cartId, location: '', subLocation: '' });
          });
          allFIs.forEach(fi => {
            if (!_selectedItems.has('fi:' + fi.id))
              DB.setFloorItemLocation(fi.id, '', '');
          });
          renderResults();
        });
      });

      // Wire checkboxes
      results.querySelectorAll('.sr-check').forEach(cb => {
        cb.addEventListener('click', e => {
          e.stopPropagation();
          if (navigator.vibrate) navigator.vibrate(10);
          const key = cb.dataset.selType + ':' + cb.dataset.selId;
          if (cb.checked) _selectedItems.add(key);
          else _selectedItems.delete(key);
          cb.closest('.sr-item').classList.toggle('sr-checked', cb.checked);
          updateClearSelBtn();
        });
      });

      // Wire clear-selections button
      const clearSelBtn = results.querySelector('#sr-clear-sel');
      if (clearSelBtn) {
        clearSelBtn.addEventListener('click', () => {
          _selectedItems.clear();
          results.querySelectorAll('.sr-check').forEach(cb => {
            cb.checked = false;
            cb.closest('.sr-item').classList.remove('sr-checked');
          });
          updateClearSelBtn();
        });
      }
    }

    function updateClearSelBtn() {
      const btn = document.getElementById('sr-clear-sel');
      if (!btn && !_selectedItems.size) { updateCopyBtnLabels(); return; }
      if (!btn && _selectedItems.size) { renderResults(); return; }
      if (btn && !_selectedItems.size) { btn.parentElement.remove(); updateCopyBtnLabels(); return; }
      btn.textContent = `נקה בחירות (${_selectedItems.size})`;
      updateCopyBtnLabels();
    }

    // ── Clear all ─────────────────────────────────────────────────
    document.getElementById('sr-clear-btn').addEventListener('click', () => {
      [...incInputs, ...excInputs].forEach(i => {
        i.value = '';
        _inputCategoryMap.delete(i);
        _updateCatBadge(i, null);
      });
      state.includeTerms = [];
      state.excludeTerms = [];
      state.includeCategories = [];
      state.excludeCategories = [];
      state.emptyOnly = false;
      screen.querySelector('#sr-empty-check').checked = false;
      // Reset to initial visible fields (3 inc + 1 exc)
      incWraps.forEach((w, i) => w.classList.toggle('sr-hidden', i >= 3));
      excWraps.forEach((w, i) => w.classList.toggle('sr-hidden', i >= 1));
      screen.querySelector('#sr-add-filter').style.display = '';
      screen.querySelector('#sr-add-exc-filter').style.display = '';
      _filtersCollapsed = false;
      inputsContainer.classList.remove('collapsed');
      closeSuggestions();
      updateActionsBar();
      renderResults();
      renderRecentFilters();
    });

    // ── Copy results (plain text) ─────────────────────────────────
    document.getElementById('sr-copy-results').addEventListener('click', () => {
      let carts = DB.getAllCarts().filter(itemPasses);
      let fis   = DB.getAllFloorItems().filter(itemPasses);
      // If checkboxes are ticked, copy only selected items
      if (_selectedItems.size) {
        carts = carts.filter(c => _selectedItems.has('cart:' + c.cartId));
        fis = fis.filter(fi => _selectedItems.has('fi:' + fi.id));
      }
      if (!carts.length && !fis.length) { Toast.show('אין תוצאות', 'error'); return; }

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '||' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c => addItem(c, 'cart'));
      fis.forEach(fi => addItem(fi, 'fi'));

      const _cpMetaLocs = DB.getMetadata().locations;
      const _cpLocOrder = {};
      _cpMetaLocs.forEach((l, i) => { _cpLocOrder[l.name] = i; });
      const _cpSubOrder = {};
      _cpMetaLocs.forEach(l => { (l.subLocations || []).forEach((s, si) => { _cpSubOrder[l.name + '||' + s] = si; }); });
      const sorted = Object.values(groups).sort((a,b) => {
        const aIdx = _cpLocOrder[a.loc] !== undefined ? _cpLocOrder[a.loc] : 999999;
        const bIdx = _cpLocOrder[b.loc] !== undefined ? _cpLocOrder[b.loc] : 999999;
        if (aIdx !== bIdx) return aIdx - bIdx;
        const aSubIdx = _cpSubOrder[a.loc + '||' + a.sub] !== undefined ? _cpSubOrder[a.loc + '||' + a.sub] : 999999;
        const bSubIdx = _cpSubOrder[b.loc + '||' + b.sub] !== undefined ? _cpSubOrder[b.loc + '||' + b.sub] : 999999;
        return aSubIdx - bSubIdx || a.sub.localeCompare(b.sub);
      });
      let lineNo = 1;
      const text = sorted.map(g => {
        const header = g.loc + (g.sub ? ' / ' + g.sub : '') + ` (${g.items.length} שורות)`;
        const lines = g.items.map(({ data, type }) => {
          const num = lineNo++;
          if (type === 'cart') {
            const ps = propSummary(data.properties);
            const count = cartTotalCount(data);
            return `${num}. ${cartLabel(data)}: ${data.isEmpty ? 'ריקה' : (count ? count + (ps ? ' ' + ps : '') : ps)}`;
          } else {
            const ps = propSummary(data.properties);
            return `${num}. על משטח ${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + (ps ? ' ' + ps : '') : ps)}`;
          }
        }).join('\n');
        return header + '\n' + lines;
      }).join('\n\n');

      Utils.copyToClipboard(text).then(() => Toast.show('תוצאות הועתקו', 'success')).catch(() => Toast.show('שגיאה בהעתקה', 'error'));
    });

    // ── Copy summary text ──────────────────────────────────────────
    document.getElementById('sr-copy-summary').addEventListener('click', () => {
      const carts = DB.getAllCarts().filter(itemPasses);
      const fis   = DB.getAllFloorItems().filter(itemPasses);
      const all   = [...carts, ...fis];
      if (!all.length) { Toast.show('אין תוצאות', 'error'); return; }

      const totalItems = all.reduce((s, x) => s + (x.itemCount || 0), 0);
      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      // Per-container-type breakdown
      const byType = {};
      carts.forEach(c => {
        const ct = c.containerType || 'עגלה';
        if (!byType[ct]) byType[ct] = { count: 0, empty: 0 };
        byType[ct].count++;
        if (c.isEmpty) byType[ct].empty++;
      });
      const containerParts = Object.entries(byType)
        .map(([ct, s]) => `${s.count} ${ct}${s.empty ? ` (${s.empty} ריקות)` : ''}`);
      if (fis.length) {
        const fiEmpty = fis.filter(f => f.isEmpty).length;
        containerParts.push(`${fis.length} פריטי רצפה${fiEmpty ? ` (${fiEmpty} ריקות)` : ''}`);
      }
      const summaryLine = `סה"כ: ${totalItems} פריטים${containerParts.length ? ' | ' + containerParts.join(', ') : ''}`;
      const comboStats = {};
      all.filter(x => !x.isEmpty && x.itemCount).forEach(item => {
        const label = propDefs.map(p => (item.properties || {})[p.name]).filter(Boolean).join(' ');
        const key = label || 'ללא מאפיינים';
        if (!comboStats[key]) comboStats[key] = 0;
        comboStats[key] += item.itemCount;
      });
      const lines = [summaryLine];
      Object.entries(comboStats).sort((a,b) => b[1] - a[1]).forEach(([label, count]) => {
        lines.push(`${count} ${label}`);
      });
      const text = lines.join('\n');
      Utils.copyToClipboard(text).then(() => Toast.show('סיכום הועתק', 'success')).catch(() => Toast.show('שגיאה בהעתקה', 'error'));
    });

    // ── לאיצקו (CSV download) ──────────────────────────────────────
    document.getElementById('sr-laizko').addEventListener('click', () => {
      const carts = DB.getAllCarts().filter(itemPasses);
      const fis   = DB.getAllFloorItems().filter(itemPasses);
      if (!carts.length && !fis.length) { Toast.show('אין תוצאות', 'error'); return; }

      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const csvEscape = v => { const s = String(v == null ? '' : v); return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
      const rows = [['מיקום', 'סוג', 'מזהה', ...propDefs.map(p => p.name), 'כמות']];

      const addRow = (item, type) => {
        const loc = (item.location || '') + (item.subLocation ? ' / ' + item.subLocation : '');
        const id = type === 'cart' ? cartLabel(item) : 'רצפה';
        const kind = type === 'cart' ? (item.containerType || 'עגלה') : 'רצפה';
        const propVals = propDefs.map(p => (item.properties || {})[p.name] || '');
        const count = item.isEmpty ? 0 : (item.itemCount || 0);
        rows.push([loc, kind, id, ...propVals, count]);
        // extra items for multi-slot carts
        if (type === 'cart' && item.extraItems) {
          item.extraItems.forEach(ex => {
            if (!ex.itemCount) return;
            const exProps = propDefs.map(p => (ex.properties || {})[p.name] || '');
            rows.push([loc, kind, id, ...exProps, ex.itemCount]);
          });
        }
      };
      carts.forEach(c => addRow(c, 'cart'));
      fis.forEach(fi => addRow(fi, 'fi'));

      const csv = '\uFEFF' + rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
      const d = new Date();
      const ts = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '-' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `laizko-${ts}.csv`; a.click();
      URL.revokeObjectURL(url);
      Toast.show('CSV הורד', 'success');
    });

    // ── Item click → modal ────────────────────────────────────────
    document.getElementById('sr-results').addEventListener('click', e => {
      if (e.target.closest('.modern-check')) return;
      const item = e.target.closest('.sr-item');
      if (!item) return;
      const type = item.dataset.type;
      const id   = item.dataset.id;

      if (type === 'cart') {
        const cart = DB.getCart(id);
        if (!cart) return;
        const allSlots = [
          { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
          ...(cart.extraItems || [])
        ].filter((s, i) => i === 0 || s.itemCount);
        const slotsHtml = allSlots.map((s, i) => {
          const ps = propSummary(s.properties);
          return `<p class="card-meta">${allSlots.length > 1 ? `סוג ${i+1}: ` : ''}${s.itemCount} פריטים${ps ? ' · ' + ps : ''}</p>`;
        }).join('');
        Modal.open({
          title: `${containerName(cart)} ${esc(cartLabel(cart))}`,
          html: `
            <p class="card-meta">מיקום: ${esc(cart.location || 'לא ידוע')}</p>
            ${cart.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(cart.subLocation)}</p>` : ''}
            ${cart.parentCartId ? `<p class="card-meta">טעון על: ${esc((() => { const p = DB.getCart(cart.parentCartId); return p ? cartLabel(p) : cart.parentCartId; })())}</p>` : ''}
            ${(() => { const ch = DB.getChildCarts(cart.cartId); return ch.length ? `<p class="card-meta">מועמסים: ${ch.map(c => esc(cartLabel(c))).join(', ')}</p>` : ''; })()}
            ${cart.isEmpty ? '<p class="card-meta">ריקה</p>' : slotsHtml}

          actions: [
            { id: 'edit-cart', label: '✏️ עריכת תוכן', cls: 'btn-outline', onClick: () => {
              Modal.close();
              openEditCartModal(cart);
            }},
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { cartId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { cartId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      } else {
        const fi = DB.getFloorItem(id);
        if (!fi) return;
        const ps = propSummary(fi.properties);
        Modal.open({
          title: `פריטי רצפה`,
          html: `
            <p class="card-meta">מיקום: ${esc(fi.location || 'לא ידוע')}</p>
            ${fi.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(fi.subLocation)}</p>` : ''}
            <p class="card-meta">פריטים: ${fi.isEmpty ? 'ריקה' : (fi.itemCount || 0)}</p>
            ${ps ? `<p class="card-meta">מאפיינים: ${ps}</p>` : ''}
            <p class="card-meta" style="font-size:0.75rem;margin-top:8px">עדכון: ${Utils.formatDate(fi.lastUpdated)}</p>
          `,
          actions: [
            { id: 'edit-fi', label: '✏️ עריכה', cls: 'btn-outline', onClick: () => {
              Modal.close();
              const fiEdit = DB.getFloorItem(id);
              if (!fiEdit) return;
              Modal.open({
                title: 'עריכת פריטי רצפה',
                html: `
                  <div class="form-group"><label class="form-label">כמות</label><input id="fi-edit-count" class="form-input" type="number" min="0" value="${fiEdit.itemCount || 0}"></div>
                  <div class="form-group"><label class="form-label">הערה</label><input id="fi-edit-comment" class="form-input" value="${esc(fiEdit.comment || '')}" placeholder="הערה"></div>
                `,
                actions: [
                  { id: 'fi-save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                    const newCount = parseInt(document.getElementById('fi-edit-count').value) || 0;
                    const newComment = (document.getElementById('fi-edit-comment').value || '').trim();
                    DB.upsertFloorItem({ location: fiEdit.location, subLocation: fiEdit.subLocation,
                                         properties: fiEdit.properties, itemCount: newCount,
                                         isEmpty: newCount === 0, comment: newComment });
                    Modal.close();
                    renderResults();
                    Toast.show('פריטי רצפה עודכנו', 'success');
                  }},
                  { id: 'fi-cancel', label: 'ביטול', onClick: Modal.close }
                ]
              });
            }},
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { floorItemId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { floorItemId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      }
    });

    // ── Edit cart contents in-place ─────────────────────────────
    function openEditCartModal(cart) {
      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const propFieldsHtml = propDefs.map(p => {
        const opts = (p.options || []).map(o => `<option value="${esc(o)}"${(cart.properties || {})[p.name] === o ? ' selected' : ''}></option>`).join('');
        return `<div class="form-group"><label class="form-label">${esc(p.name)}</label><input class="form-input ec-prop" data-prop="${esc(p.name)}" list="ec-dl-${esc(p.name)}" value="${esc((cart.properties || {})[p.name] || '')}" autocomplete="off"><datalist id="ec-dl-${esc(p.name)}">${opts}</datalist></div>`;
      }).join('');
      const count = cart.itemCount || 0;
      const ids = (cart.itemIds || []);
      const idRows = Array.from({length: Math.max(count, ids.length)}, (_, i) =>
        `<div class="item-row"><span class="item-row-num">${i+1}</span><input class="item-id-input ec-id" placeholder="מספר סידורי" value="${esc(ids[i] || '')}"><button class="scan-btn" title="סרוק ברקוד">📷</button></div>`
      ).join('');
      Modal.open({
        title: `עריכת ${containerName(cart)} ${esc(cartLabel(cart))}`,
        html: `
          <div class="form-group"><label class="form-label">מספר פריטים</label><input id="ec-count" class="form-input" type="number" min="0" value="${count}"></div>
          <div id="ec-id-rows">${idRows}</div>
          ${propFieldsHtml}
          <div class="form-group"><label class="form-label">הערה</label><textarea id="ec-comment" class="form-input" rows="2" placeholder="הערה חופשית" style="resize:vertical">${esc(cart.comment || '')}</textarea></div>
          <button id="ec-empty-btn" class="btn btn-outline btn-full mt-12" style="color:var(--danger);border-color:var(--danger)">ריקון עגלה</button>
        `,
        actions: [
          { id: 'ec-save', label: 'שמור', cls: 'btn-primary', onClick: () => {
            const newCount = parseInt(document.getElementById('ec-count').value) || 0;
            const newIds = [...document.querySelectorAll('.ec-id')].map(i => i.value.trim()).filter(Boolean);
            const newProps = {};
            document.querySelectorAll('.ec-prop').forEach(i => { if (i.value.trim()) newProps[i.dataset.prop] = i.value.trim(); });
            const newComment = (document.getElementById('ec-comment').value || '').trim();
            DB.upsertCart({ cartId: cart.cartId, itemCount: newCount, itemIds: newIds, properties: newProps, isEmpty: newCount === 0, comment: newComment });
            Modal.close();
            Toast.show('עגלה עודכנה', 'success');
            renderResults();
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
      // dynamic rows on count change
      document.getElementById('ec-count').addEventListener('input', () => {
        const n = parseInt(document.getElementById('ec-count').value) || 0;
        const existing = [...document.querySelectorAll('.ec-id')].map(i => i.value);
        document.getElementById('ec-id-rows').innerHTML = Array.from({length: n}, (_, i) =>
          `<div class="item-row"><span class="item-row-num">${i+1}</span><input class="item-id-input ec-id" placeholder="מספר סידורי" value="${esc(existing[i] || '')}"><button class="scan-btn" title="סרוק ברקוד">📷</button></div>`
        ).join('');
      });
      // empty cart button
      document.getElementById('ec-empty-btn').addEventListener('click', () => {
        DB.upsertCart({ cartId: cart.cartId, itemCount: 0, itemIds: [], properties: {}, isEmpty: true, extraItems: [] });
        Modal.close();
        Toast.show('עגלה רוקנה', 'success');
        renderResults();
      });
    }

    Router.register('search', {
      onShow() {
        // Update off-map label from settings
        const extLabel = document.getElementById('sr-external-label');
        if (extLabel) {
          const offMapWord = DB.getMetadata().offMapLabel || 'חיצוני';
          extLabel.textContent = Lang.T(`כולל ${offMapWord}`, `Incluir ${offMapWord}`);
        }
        buildSuggestionPool();
        renderTypeFilter();
        updateActionsBar();
        renderResults();
        renderRecentFilters();
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════

  <script>

          </div>
