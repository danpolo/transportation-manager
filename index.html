  <script>
  const Router = (() => {
    const _screens = {};
    let _current = null;

    function register(name, handlers) {
      _screens[name] = handlers;
    }

    function navigate(name, params) {
      const screenEl = document.getElementById('screen-' + name);
      if (!screenEl) return;

      // hide ALL other screens (robust against stale _current / tab restore)
      document.querySelectorAll('.screen').forEach(s => {
        s.hidden = (s !== screenEl);
      });

      screenEl.hidden = false;
      _current = name;

      // Reset scroll so the screen header is always visible at top
      const _sc = document.getElementById('screen-container');
      if (_sc) _sc.scrollTop = 0;

      // update nav active state
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.screen === name);
      });

      if (_screens[name] && _screens[name].onShow) {
        _screens[name].onShow(params || {});
      }
    }

    function getCurrent() { return _current; }

    window.addEventListener('hashchange', () => {
      const name = location.hash.replace('#','') || 'main';
      navigate(name);
    });

    return { register, navigate, getCurrent };
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════

  <script>
  // ── Drag-and-drop reorder ──
  function _initReorder(container, opts) {
    const { handleSelector, itemSelector, onReorder } = opts;
    let _dragEl = null, _placeholder = null, _startY = 0, _longPressTimer = null;
    let _dragging = false, _items = [], _fromIdx = -1;

    function getItems() { return [...container.querySelectorAll(itemSelector)]; }

    function haptic() {
      if (navigator.vibrate) navigator.vibrate(15);
    }

    function startDrag(el, clientY) {
      _dragging = true;
      _dragEl = el;
      _items = getItems();
      _fromIdx = _items.indexOf(el);
      _startY = clientY;
      haptic();

      // Create placeholder
      _placeholder = document.createElement('div');
      _placeholder.className = 'reorder-placeholder';
      _placeholder.style.height = el.offsetHeight + 'px';
      el.parentNode.insertBefore(_placeholder, el);

      // Style dragged element
      el.classList.add('dragging');
      el.style.position = 'fixed';
      el.style.left = '0';
      el.style.right = '0';
      el.style.width = container.offsetWidth + 'px';
      const rect = _placeholder.getBoundingClientRect();
      el.style.top = rect.top + 'px';
      el.style.zIndex = '100';
      document.body.appendChild(el);
    }

    function moveDrag(clientY) {
      if (!_dragging || !_dragEl) return;
      const dy = clientY - _startY;
      const placeholderRect = _placeholder.getBoundingClientRect();
      _dragEl.style.top = (placeholderRect.top + dy) + 'px';

      // Find drop target
      const items = getItems();
      for (const item of items) {
        if (item === _dragEl) continue;
        const r = item.getBoundingClientRect();
        const midY = r.top + r.height / 2;
        if (clientY < midY) {
          item.parentNode.insertBefore(_placeholder, item);
          _startY = clientY;
          return;
        }
      }
      // Past last item
      if (items.length) {
        const last = items[items.length - 1];
        if (last !== _dragEl) {
          last.parentNode.insertAfter ? last.parentNode.insertAfter(_placeholder, last) :
            last.parentNode.insertBefore(_placeholder, last.nextSibling);
          _startY = clientY;
        }
      }
    }

    function endDrag() {
      if (!_dragging || !_dragEl) return;
      _dragging = false;

      // Insert element back at placeholder position
      _placeholder.parentNode.insertBefore(_dragEl, _placeholder);
      _placeholder.remove();
      _placeholder = null;

      // Reset styles
      _dragEl.classList.remove('dragging');
      _dragEl.style.position = '';
      _dragEl.style.left = '';
      _dragEl.style.right = '';
      _dragEl.style.width = '';
      _dragEl.style.top = '';
      _dragEl.style.zIndex = '';

      // Compute new index
      const newItems = getItems();
      const toIdx = newItems.indexOf(_dragEl);
      if (toIdx !== -1 && toIdx !== _fromIdx) {
        onReorder(_fromIdx, toIdx);
      }
      _dragEl = null;
    }

    function cancelLongPress() {
      if (_longPressTimer) { clearTimeout(_longPressTimer); _longPressTimer = null; }
    }

    container.addEventListener('pointerdown', e => {
      const handle = e.target.closest(handleSelector);
      if (!handle) return;
      const item = handle.closest(itemSelector);
      if (!item) return;
      e.preventDefault();

      const startY = e.clientY;
      _longPressTimer = setTimeout(() => {
        _longPressTimer = null;
        startDrag(item, startY);
      }, 200); // slightly longer than normal press

      const onMove = ev => {
        if (!_dragging) {
          // If moved too much before long press fires, cancel
          if (Math.abs(ev.clientY - startY) > 5) cancelLongPress();
          return;
        }
        ev.preventDefault();
        moveDrag(ev.clientY);
      };
      const onUp = () => {
        cancelLongPress();
        if (_dragging) endDrag();
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onUp);
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    });
  }

  // ── Autocomplete ──
  // makeAutocomplete(inputEl, getOptions)
  // getOptions: () => string[]  — called lazily on each keystroke
  function makeAutocomplete(input, getOptions) {
    // Remove any existing dropdown for this input (handles re-renders)
    const existId = input.id ? ('ac-' + input.id) : null;
    if (existId) { const old = document.getElementById(existId); if (old) old.remove(); }

    const dropdown = document.createElement('div');
    dropdown.className = 'ac-dropdown';
    if (existId) dropdown.id = existId;
    dropdown.style.cssText = 'position:fixed;z-index:300;display:none';
    document.body.appendChild(dropdown);

    let _isOpen = false;
    let _interacting = false; // true while user is touching/scrolling the dropdown
    let _didScroll = false;   // true if touchmove fired (scroll gesture, not tap)

    function position() {
      const r = input.getBoundingClientRect();
      dropdown.style.top   = r.bottom + 'px';
      dropdown.style.left  = r.left   + 'px';
      dropdown.style.width = r.width  + 'px';
    }

    function render() {
      const opts = getOptions();
      const q = input.value.trim().toLowerCase();
      const filtered = q ? opts.filter(o => String(o).toLowerCase().includes(q)) : opts;
      if (!filtered.length) { hide(); return; }
      position();
      dropdown.innerHTML = filtered.map(o => `<div class="ac-item">${esc(o)}</div>`).join('');
      dropdown.style.display = '';
      _isOpen = true;
      dropdown.querySelectorAll('.ac-item').forEach((item, i) => {
        const pick = () => {
          input.value = filtered[i];
          input.dispatchEvent(new Event('change', { bubbles: true }));
          hide();
        };
        item.addEventListener('mousedown', e => { e.preventDefault(); pick(); });
        item.addEventListener('touchend',  e => { if (_didScroll) return; e.preventDefault(); pick(); });
      });
    }

    function hide() { dropdown.style.display = 'none'; dropdown.innerHTML = ''; _isOpen = false; _interacting = false; }

    // Prevent dropdown's own scroll from closing it; only close on outside scroll
    dropdown.addEventListener('scroll', e => { e.stopPropagation(); }, { passive: true });
    // Track touch interaction on dropdown to prevent blur from closing it
    dropdown.addEventListener('touchstart', () => { _interacting = true; _didScroll = false; }, { passive: true });
    dropdown.addEventListener('touchmove', () => { _didScroll = true; }, { passive: true });
    dropdown.addEventListener('touchend', () => { setTimeout(() => { _interacting = false; }, 100); }, { passive: true });
    dropdown.addEventListener('mousedown', () => { _interacting = true; });
    dropdown.addEventListener('mouseup', () => { setTimeout(() => { _interacting = false; }, 100); });

    // Close dropdown on outside scroll — but not on the dropdown's own scroll
    function onOutsideScroll(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target)) return;
      // Reposition instead of hiding, so scrolling the page keeps the dropdown aligned
      position();
    }
    function addScrollListeners() {
      let el = input.parentElement;
      while (el) { el.addEventListener('scroll', onOutsideScroll, { passive: true }); el = el.parentElement; }
      window.addEventListener('scroll', onOutsideScroll, { passive: true });
    }
    function removeScrollListeners() {
      let el = input.parentElement;
      while (el) { el.removeEventListener('scroll', onOutsideScroll); el = el.parentElement; }
      window.removeEventListener('scroll', onOutsideScroll);
    }

    // Close on tap outside (not on the dropdown or input)
    function onDocumentTouch(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target) || input.contains(e.target)) return;
      hide();
    }
    function onDocumentMousedown(e) {
      if (!_isOpen) return;
      if (dropdown.contains(e.target) || input.contains(e.target)) return;
      hide();
    }

    input.addEventListener('input', render);
    input.addEventListener('focus', () => {
      addScrollListeners();
      document.addEventListener('touchstart', onDocumentTouch, { passive: true });
      document.addEventListener('mousedown', onDocumentMousedown);
      render();
    });
    input.addEventListener('blur', () => {
      // Only hide if not interacting with the dropdown
      setTimeout(() => {
        if (!_interacting) hide();
        removeScrollListeners();
        document.removeEventListener('touchstart', onDocumentTouch);
        document.removeEventListener('mousedown', onDocumentMousedown);
      }, 200);
    });
    input.addEventListener('click', () => { if (!_isOpen) render(); });
    input.addEventListener('keydown', e => { if (e.key === 'Escape') hide(); });
  }

  // ── Location + conditional sublocation ──
  // For non-map locations: autocomplete also offers "loc / subloc" combined entries.
  // Selecting a combined entry auto-fills both fields.
  function locationSuggestions() {
    const locs = DB.getMetadata().locations;
    const out = [];
    for (const l of locs) {
      out.push(l.name);
      if (!l.inMap && l.subLocations && l.subLocations.length) {
        for (const sub of l.subLocations) out.push(`${l.name} / ${sub}`);
      }
    }
    return out;
  }

  // WhatsApp location label: inMap → always main location only; non-inMap → show only subLoc
  function waMsgLoc(locName, subLoc) {
    const loc = DB.getMetadata().locations.find(l => l.name === locName);
    if (!loc) return subLoc || locName || '';
    if (!loc.inMap && subLoc) return subLoc;
    return locName || '';
  }
  // Handle raw "loc / sub" strings from free-text inputs (e.g. per-item dest)
  function waMsgLocRaw(raw) {
    if (!raw) return '';
    const sep = raw.indexOf(' / ');
    if (sep !== -1) return waMsgLoc(raw.slice(0, sep).trim(), raw.slice(sep + 3).trim());
    return waMsgLoc(raw, '');
  }

  function setupLocationFields(locInput, subGroup, subInput, sub2Group, sub2Input) {
    makeAutocomplete(locInput, locationSuggestions);
    makeAutocomplete(subInput, () => {
      const loc = DB.getMetadata().locations.find(l => l.name === locInput.value.trim());
      return (loc && loc.subLocations) || [];
    });
    if (sub2Input) {
      makeAutocomplete(sub2Input, () => {
        const loc = DB.getMetadata().locations.find(l => l.name === locInput.value.trim());
        return (loc && loc.subLocations) || [];
      });
    }

    function updateSub() {
      let locName = locInput.value.trim();
      const sepIdx = locName.indexOf(' / ');
      if (sepIdx !== -1) {
        const mainLoc = locName.slice(0, sepIdx);
        const subVal  = locName.slice(sepIdx + 3);
        locInput.value = mainLoc;
        locName = mainLoc;
        subInput.value = subVal;
      }
      const loc     = DB.getMetadata().locations.find(l => l.name === locName);
      const subs    = loc && loc.subLocations && loc.subLocations.length;
      const offMap  = loc && !loc.inMap;
      subGroup.hidden = !subs;
      if (!subs) subInput.value = '';
      if (sub2Group) {
        sub2Group.hidden = !(subs && offMap);
        if (!(subs && offMap) && sub2Input) sub2Input.value = '';
      }
    }

    locInput.addEventListener('change', updateSub);
    locInput.addEventListener('input',  updateSub);
    updateSub();
  }

  // ── Bottom Nav ──
  const Lang = (() => {
    let _l = localStorage.getItem('shinua-lang') || 'he';
    function T(he, es) { return _l === 'es' ? es : he; }
    function get() { return _l; }
    function set(l) { _l = l; localStorage.setItem('shinua-lang', l); }
    return { T, get, set };
  })();

  const BottomNav = {
    render() {
      const nav = document.getElementById('bottom-nav');
      const items = [
        { screen: 'main',       icon: '📍', label: Lang.T('מיפוי', 'Mapeo') },
        { screen: 'search',     icon: '🔍', label: Lang.T('חיפוש', 'Búsqueda') },
        { screen: 'transfer',   icon: '🔄', label: Lang.T('העברה', 'Traslado') },
        { screen: 'loadunload', icon: '📦', label: Lang.T('העמסה', 'Carga') },
        { screen: 'edit',       icon: '✏️',  label: Lang.T('עריכה', 'Edición') },
      ];
      nav.innerHTML = items.map(item => `
        <button class="nav-item" data-screen="${item.screen}" aria-label="${item.label}">
          <span class="nav-icon">${item.icon}</span>
          <span>${item.label}</span>

      `).join('');
      nav.onclick = e => {

  };

  // ── Modal ──
  const Modal = {
    open({ title = '', html = '', actions = [] } = {}) {
      const overlay = document.getElementById('modal-overlay');
      overlay.innerHTML = `
        <div class="modal-sheet" role="dialog" aria-modal="true">
          <div class="modal-handle"></div>
          ${title ? `<div class="modal-title">${title}</div>` : ''}
          ${html}
          ${actions.length ? `<div class="modal-actions">${actions.map(a =>
            `<button class="btn ${a.cls || 'btn-outline'} btn-full" data-action="${a.id}">${a.label}</button>`
          ).join('')}</div>` : ''}
        </div>
      `;
      overlay.hidden = false;

      // action buttons
      overlay.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = actions.find(a => a.id === btn.dataset.action);
          if (action && action.onClick) action.onClick();
        });
      });

      // backdrop close — clicking outside the sheet
      const backdropHandler = e => {
        if (e.target === overlay) {
          Modal.close();
          overlay.removeEventListener('click', backdropHandler);
        }
      };
      overlay.addEventListener('click', backdropHandler);
    },

    close() {
      const overlay = document.getElementById('modal-overlay');
      overlay.hidden = true;
      overlay.innerHTML = '';
    }
  };

  // ── Toast ──
  const Toast = {
    show(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 2700);
    }
  };

  // ── Container type helpers ──
  const DEFAULT_CONTAINER = 'עגלה';

  function containerName(cart) {
    return (cart && cart.containerType) || DEFAULT_CONTAINER;
  }

  // ── cartLabel ──
  // Returns "cartId(cartType)" or just "cartId", with container type badge if non-default
  function cartLabel(cart) {
    if (!cart) return '';
    let label = cart.cartId + (cart.cartType ? '(' + cart.cartType + ')' : '');
    if (cart.containerType && cart.containerType !== DEFAULT_CONTAINER) {
      label += ' [' + cart.containerType + ']';
    }
    return label;
  }

  // ── msgCartLabel ──
  // Like cartLabel but without the [containerType] bracket — for WhatsApp messages
  function msgCartLabel(cart) {
    if (!cart) return '';
    return cart.cartId + (cart.cartType ? '(' + cart.cartType + ')' : '');
  }

  // ── cartTotalCount ──
  // Total items across all slots (slot 0 + extraItems)
  function cartTotalCount(cart) {
    if (!cart) return 0;
    const slot0  = cart.itemCount || 0;
    const extras = (cart.extraItems || []).reduce((s, e) => s + (e.itemCount || 0), 0);
    return slot0 + extras;
  }

  // ── CartForm ──
  // Creates a cart ID input with autocomplete datalist inside `container`
  let _cartFormSeq = 0;
  function CartForm(container, { onCartLoaded, cartFilter } = {}) {
    const inputId = 'cart-id-input-' + (++_cartFormSeq);
    container.innerHTML = `
      <div class="form-group">
        <label class="form-label">מספר עגלה</label>
        <input id="${inputId}" class="form-input cart-id-input"
               placeholder="8-6(110)" autocomplete="off">
      </div>
    `;
    const input = container.querySelector('.cart-id-input');
    makeAutocomplete(input, () => {
      const all = DB.getAllCarts();
      return (cartFilter ? all.filter(cartFilter) : all).map(c => cartLabel(c));
    });

    function lookup() {
      const raw = input.value.trim();
      // strip trailing "[containerType]" and/or "(cartType)" suffixes added by cartLabel()
      const id  = raw.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (!id) { if (onCartLoaded) onCartLoaded(null); return; }
      // fall back to raw value if stripped ID not found (handles cart IDs that contain parentheses)
      const cart = DB.getCart(id) || DB.getCart(raw);
      const filtered = !cartFilter || !cart || cartFilter(cart);
      if (onCartLoaded) onCartLoaded(filtered ? cart || null : null);
    }

    input.addEventListener('change', lookup);
    input.addEventListener('input', () => {
      // only auto-lookup if the value (after stripping type) exactly matches a known cart
      const raw = input.value.trim();
      const id  = raw.replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\s*\[[^\]]+\]\s*$/, '').replace(/\([^)]+\)\s*$/, '').trim();
      if (DB.getCart(id) || DB.getCart(raw)) lookup();
    });

    return {
      getValue: () => input.value.trim(),
      setValue(val) {
        input.value = val; // val may be "8" or "8(110)" — lookup strips suffix
        input.dispatchEvent(new Event('change', { bubbles: true }));
      },
      clear() { input.value = ''; },
      focus() { input.focus(); }
    };
  }

  // ── buildPropertyFields ──
  // Renders property dropdowns from metadata into a container element
  // Supports conditional visibility: if p.condition is an array of {prop, value},
  // the field is shown when ANY condition matches (OR logic).
  // Legacy single {prop, value} objects are normalized to an array.
  function normalizeConditions(cond) {
    if (!cond) return null;
    if (Array.isArray(cond)) return cond.length ? cond : null;
    if (cond.prop) return [cond];
    return null;
  }
  function buildPropertyFields(container, currentValues) {
    const props = DB.getMetadata().properties;
    if (!props.length) {
      container.innerHTML = '<p class="card-meta" style="padding:8px 0">אין מאפיינים מוגדרים. הוסף מאפיינים בלשונית עריכה.</p>';
      return;
    }
    container.innerHTML = props.map(p => {
      const conds = normalizeConditions(p.condition);
      const condAttr = conds ? `data-cond-json="${esc(JSON.stringify(conds))}"` : '';
      // Initially hidden if conditional and no condition met
      const isVisible = !conds || (currentValues && conds.some(c => c.value ? currentValues[c.prop] === c.value : !currentValues[c.prop]));
      return `
      <div class="form-group prop-field-group" data-field-name="${esc(p.name)}" ${condAttr} ${isVisible ? '' : 'hidden'}>
        <label class="form-label">${esc(p.name)}</label>
        <select class="form-select" name="${esc(p.name)}">
          <option value="">— בחר —</option>
          ${p.options.map(o => `<option value="${esc(o)}" ${(currentValues && currentValues[p.name] === o) ? 'selected' : ''}>${esc(o)}</option>`).join('')}
        </select>
      </div>`;
    }).join('');

    // Wire up conditional visibility: when a select changes, show/hide dependent fields
    function updateConditions() {
      container.querySelectorAll('.prop-field-group[data-cond-json]').forEach(group => {
        const conds = JSON.parse(group.dataset.condJson);
        const show = conds.some(c => {
          const depSel = container.querySelector(`select[name="${CSS.escape(c.prop)}"]`);
          if (!depSel) return false;
          return c.value ? depSel.value === c.value : !depSel.value;
        });
        group.hidden = !show;
        // Clear selection when hidden so it doesn't pollute saved data
        if (!show) {
          const sel = group.querySelector('select');
          if (sel) sel.value = '';
        }
      });
    }
    container.querySelectorAll('select').forEach(sel => {
      sel.addEventListener('change', updateConditions);
    });
  }

  // ── readPropertyFields ──
  function readPropertyFields(container) {
    const result = {};
    container.querySelectorAll('select[name]').forEach(sel => {
      if (sel.value) result[sel.name] = sel.value;
    });
    return result;
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 5 — Screen: Edit

  <script>
  function initEdit() {
    const screen = document.getElementById('screen-edit');
    let activeTab = 'carts';
    let _prefillCartId = null;

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">✏️</span>
        <h1>${Lang.T('עריכת נתונים', 'Edición de datos')}</h1>
        <button class="undo-btn" title="${Lang.T('בטל פעולה', 'Deshacer')}">↩</button>
        <button class="help-btn" data-screen="edit" title="${Lang.T('עזרה', 'Ayuda')}">❓</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="carts">${Lang.T('עגלות', 'Carretas')}</button>
        <button class="tab-btn" data-tab="locations">${Lang.T('מיקומים', 'Ubicaciones')}</button>
        <button class="tab-btn" data-tab="properties">${Lang.T('מאפיינים', 'Atributos')}</button>
      </div>
      <div id="edit-tab-content"></div>
    `;

    const tabContent = screen.querySelector('#edit-tab-content');

    function renderTab(tab) {
      activeTab = tab;
      screen.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      if (tab === 'carts')      renderCartsTab();
      if (tab === 'locations')  renderLocationsTab();
      if (tab === 'properties') renderPropertiesTab();
    }

    screen.querySelector('.tabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (btn) renderTab(btn.dataset.tab);
    });

    // ── Carts Tab ──
    function renderCartsTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title" id="ec-form-title">הוספת / עדכון עגלה</div>
            <div class="form-group">
              <label class="form-label">קטגוריה</label>
              <select id="ec-containertype" class="form-select"></select>
            </div>
            <div class="form-group">
              <label class="form-label">מספר מזהה</label>
              <input id="ec-cartid" class="form-input" placeholder="8-6" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label">סוג</label>
              <select id="ec-carttype" class="form-select">
                <option value="">— ללא —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">מיקום</label>
              <input id="ec-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="ec-subloc-group" hidden>
              <label class="form-label">תת-מיקום</label>
              <input id="ec-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label">מועמס על: (אופציונלי)</label>
              <select id="ec-parent" class="form-select">
                <option value="">— ללא —</option>
              </select>
            </div>
            <button id="ec-save" class="btn btn-primary btn-full">שמור עגלה</button>
          </div>

          <div class="card mt-12">
            <div class="card-title">עגלות קיימות</div>
            <div id="ec-list"></div>
          </div>

          <div class="card mt-12">
            <div class="card-title">סוגים</div>
            <div class="form-group" style="display:flex;gap:8px;">
              <input id="ec-newtype" class="form-input" placeholder="110" autocomplete="off" style="flex:1">
              <button id="ec-addtype-btn" class="btn btn-outline">+ הוסף</button>
            </div>
            <div id="ec-type-list"></div>
          </div>

          <div class="card mt-12">
            <div class="card-title">קטגוריות</div>
            <div class="form-group" style="display:flex;gap:8px;">
              <input id="ec-newcontainertype" class="form-input" placeholder="משטח" autocomplete="off" style="flex:1">
              <button id="ec-addcontainertype-btn" class="btn btn-outline">+ הוסף</button>
            </div>
            <div id="ec-containertype-list"></div>
          </div>
        </div>
      `;

      function renderCartTypeOptions() {
        const sel = tabContent.querySelector('#ec-carttype');
        const types = DB.getMetadata().cartTypes || [];
        sel.innerHTML = '<option value="">— ללא —</option>' +
          types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      }

      function renderTypeList() {
        const container = tabContent.querySelector('#ec-type-list');
        const types = DB.getMetadata().cartTypes || [];
        if (!types.length) { container.innerHTML = '<p class="card-meta">אין סוגים מוגדרים</p>'; return; }
        container.innerHTML = types.map(t => `
          <div class="list-item">
            <div class="list-item-body"><div class="list-item-title">${esc(t)}</div></div>
            <div class="list-item-actions">
              <button class="btn-icon-edit ec-renametype-btn" data-type="${esc(t)}" title="שנה שם">✏️</button>
              <button class="btn-icon ec-deltype-btn" data-type="${esc(t)}" title="מחק">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      function renderContainerTypeOptions() {
        const sel = tabContent.querySelector('#ec-containertype');
        const types = DB.getMetadata().containerTypes || ['עגלה'];
        sel.innerHTML = types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      }

      function renderContainerTypeList() {
        const container = tabContent.querySelector('#ec-containertype-list');
        const types = (DB.getMetadata().containerTypes || ['עגלה']).filter(t => t !== 'עגלה');
        if (!types.length) { container.innerHTML = '<p class="card-meta">רק ברירת מחדל (עגלה)</p>'; return; }
        container.innerHTML = types.map(t => `
          <div class="list-item">
            <div class="list-item-body"><div class="list-item-title">${esc(t)}</div></div>
            <div class="list-item-actions">
              <button class="btn-icon-edit ec-renamecontainertype-btn" data-type="${esc(t)}" title="שנה שם">✏️</button>
              <button class="btn-icon ec-delcontainertype-btn" data-type="${esc(t)}" title="מחק">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      function updateFormLabels() {
        const ct = tabContent.querySelector('#ec-containertype').value || 'עגלה';
        tabContent.querySelector('#ec-form-title').textContent = 'הוספת / עדכון ' + ct;
        tabContent.querySelector('#ec-save').textContent = 'שמור ' + ct;
      }

      // render list
      function renderList() {
        const list = tabContent.querySelector('#ec-list');
        const carts = DB.getAllCarts();
        if (!carts.length) {
          list.innerHTML = '<div class="empty-state-rich" style="padding:20px 12px"><div class="es-illustration">🛒</div><div class="es-desc">עדיין אין עגלות. הוסף עגלה ראשונה למעלה או ייבא מיפוי.</div></div>';
          return;
        }
        list.innerHTML = carts.sort((a,b) => a.cartId.localeCompare(b.cartId)).map(c => {
          const parts = [c.location || 'ללא מיקום'];
          if (cartTotalCount(c)) parts.push(cartTotalCount(c) + ' פריטים');
          if (c.parentCartId) {
            const p = DB.getCart(c.parentCartId);
            parts.push('על ' + (p ? cartLabel(p) : c.parentCartId));
          }
          const childCount = DB.getChildCarts(c.cartId).length;
          if (childCount) parts.push(childCount + ' טעונות');
          const ctBadge = (c.containerType && c.containerType !== DEFAULT_CONTAINER)
            ? ` <span style="background:#E0E7FF;color:#3730A3;padding:1px 6px;border-radius:4px;font-size:0.75rem;margin-right:4px;">${esc(c.containerType)}</span>` : '';
          return `
          <div class="list-item">
            <div class="list-item-body">
              <div class="list-item-title">${ctBadge}${esc(cartLabel(c))}</div>
              <div class="list-item-sub">${parts.join(' · ')}</div>
            </div>
            <div class="list-item-actions">
              <button class="btn-icon ec-edit-btn" data-id="${esc(c.cartId)}" title="ערוך">✏️</button>
              <button class="btn-icon ec-del-btn"  data-id="${esc(c.cartId)}" title="מחק">🗑️</button>
            </div>
          </div>
        `}).join('');
      }

      function getDescendantIds(cartId) {
        const ids = new Set();
        const queue = [cartId];
        while (queue.length) {
          const pid = queue.shift();
          for (const ch of DB.getChildCarts(pid)) {
            if (!ids.has(ch.cartId)) { ids.add(ch.cartId); queue.push(ch.cartId); }
          }
        }
        return ids;
      }

      function renderParentOptions(excludeId) {
        const sel = tabContent.querySelector('#ec-parent');
        const carts = DB.getAllCarts();
        const exclude = new Set();
        if (excludeId) {
          exclude.add(excludeId);
          for (const id of getDescendantIds(excludeId)) exclude.add(id);
        }
        sel.innerHTML = '<option value="">— ללא —</option>' +
          carts.filter(c => !exclude.has(c.cartId))
               .sort((a,b) => a.cartId.localeCompare(b.cartId))
               .map(c => `<option value="${esc(c.cartId)}">${esc(cartLabel(c))}</option>`).join('');
      }

      renderList();
      renderCartTypeOptions();
      renderTypeList();
      renderContainerTypeOptions();
      renderContainerTypeList();
      renderParentOptions(null);
      updateFormLabels();
      makeAutocomplete(tabContent.querySelector('#ec-cartid'), () => DB.getMetadata().carts);
      tabContent.querySelector('#ec-containertype').addEventListener('change', updateFormLabels);
      setupLocationFields(
        tabContent.querySelector('#ec-loc'),
        tabContent.querySelector('#ec-subloc-group'),
        tabContent.querySelector('#ec-subloc')
      );

      // save
      tabContent.querySelector('#ec-save').addEventListener('click', () => {
        const cartId   = tabContent.querySelector('#ec-cartid').value.trim();
        if (!cartId) { Toast.show('יש להזין מספר מזהה', 'error'); return; }
        const containerType = tabContent.querySelector('#ec-containertype').value || 'עגלה';
        const cartType = tabContent.querySelector('#ec-carttype').value;
        const loc      = tabContent.querySelector('#ec-loc').value.trim();
        const subLoc   = tabContent.querySelector('#ec-subloc-group').hidden
          ? '' : tabContent.querySelector('#ec-subloc').value.trim();
        const parentCartId = tabContent.querySelector('#ec-parent').value || null;
        DB.upsertCart({ cartId, cartType, containerType, location: loc, subLocation: subLoc,
                        parentCartId,
                        isEmpty: false, itemCount: 0, itemIds: [], properties: {} });
        Toast.show(containerType + ' נשמרה', 'success');
        renderList();
        renderParentOptions(null);
        tabContent.querySelector('#ec-cartid').value = '';
        tabContent.querySelector('#ec-carttype').value = '';
        tabContent.querySelector('#ec-loc').value = '';
        tabContent.querySelector('#ec-subloc').value = '';
        tabContent.querySelector('#ec-parent').value = '';
      });

      // edit / delete delegation
      tabContent.querySelector('#ec-list').addEventListener('click', e => {
        const editBtn = e.target.closest('.ec-edit-btn');
        const delBtn  = e.target.closest('.ec-del-btn');
        if (editBtn) {
          const cart = DB.getCart(editBtn.dataset.id);
          if (!cart) return;
          tabContent.querySelector('#ec-containertype').value = cart.containerType || 'עגלה';
          updateFormLabels();
          tabContent.querySelector('#ec-cartid').value = cart.cartId;
          tabContent.querySelector('#ec-carttype').value = cart.cartType || '';
          const ecLoc = tabContent.querySelector('#ec-loc');
          ecLoc.value = cart.location || '';
          ecLoc.dispatchEvent(new Event('change', { bubbles: true }));
          tabContent.querySelector('#ec-subloc').value = cart.subLocation || '';
          renderParentOptions(cart.cartId);
          tabContent.querySelector('#ec-parent').value = cart.parentCartId || '';
          tabContent.querySelector('#ec-cartid').scrollIntoView({ behavior: 'smooth' });
        }
        if (delBtn) {
          const delCart = DB.getCart(delBtn.dataset.id) || { cartId: delBtn.dataset.id };
          const delCtName = containerName(delCart);
          Modal.open({
            title: 'מחיקת ' + delCtName,
            html: `<p>האם למחוק את ה${esc(delCtName)} <strong>${esc(cartLabel(delCart))}</strong>?</p>`,
            actions: [
              { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
                DB.deleteCart(delBtn.dataset.id);
                Modal.close();
                Toast.show(delCtName + ' נמחקה', 'info');
                renderList();
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
        }
      });

      // cart type add / delete
      tabContent.querySelector('#ec-addtype-btn').addEventListener('click', () => {
        const val = tabContent.querySelector('#ec-newtype').value.trim();
        if (!val) return;
        DB.addCartType(val);
        tabContent.querySelector('#ec-newtype').value = '';
        renderCartTypeOptions();
        renderTypeList();
        Toast.show('סוג נוסף', 'success');
      });

      tabContent.querySelector('#ec-type-list').addEventListener('click', e => {
        const renameBtn = e.target.closest('.ec-renametype-btn');
        if (renameBtn) {
          const oldName = renameBtn.dataset.type;
          Modal.open({
            title: 'שינוי שם סוג',
            html: `<div class="form-group"><label class="form-label">שם חדש</label><input id="rename-type-input" class="form-input" value="${esc(oldName)}"></div>`,
            actions: [
              { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const newName = document.getElementById('rename-type-input').value.trim();
                if (!newName || newName === oldName) { Modal.close(); return; }
                DB.renameCartType(oldName, newName);
                Modal.close();
                renderCartTypeOptions(); renderTypeList(); renderList();
                Toast.show('סוג שונה', 'success');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          return;
        }
        const delBtn = e.target.closest('.ec-deltype-btn');
        if (!delBtn) return;
        Modal.open({
          title: 'מחיקת סוג',
          html: `<p>האם למחוק את הסוג <strong>${esc(delBtn.dataset.type)}</strong>?</p>`,
          actions: [
            { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
              DB.deleteCartType(delBtn.dataset.type);
              Modal.close();
              renderCartTypeOptions();
              renderTypeList();
              Toast.show('סוג נמחק', 'info');
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }

        });

              renderContainerTypeOptions();
              renderContainerTypeList();
              renderList();
              Toast.show('קטגוריה נמחקה', 'info');

        });

      // Pre-fill form if navigated here with a cart ID
      if (_prefillCartId) {

          tabContent.querySelector('#ec-containertype').value = cart.containerType || 'עגלה';

          tabContent.querySelector('#ec-cartid').value = cart.cartId;
          tabContent.querySelector('#ec-carttype').value = cart.cartType || '';
          const ecLoc = tabContent.querySelector('#ec-loc');

          tabContent.querySelector('#ec-subloc').value = cart.subLocation || '';
          renderParentOptions(cart.cartId);
          tabContent.querySelector('#ec-parent').value = cart.parentCartId || '';
          setTimeout(() => tabContent.querySelector('#ec-form-title').scrollIntoView({ behavior: 'smooth' }), 80);

      function renderList() {

        list.innerHTML = locs.map((l, idx) => {

                <div class="list-item-title">${l.name}</div>

      function refreshSubLocSelect() {

        sel.innerHTML = '<option value="">— בחר מיקום —</option>' +

      }

      function renderSubList(locName) {
        const subList  = tabContent.querySelector('#el-sub-list');
        const addRow   = tabContent.querySelector('#el-sub-add-row');
        if (!locName) { subList.innerHTML = ''; addRow.hidden = true; return; }
        addRow.hidden = false;

        const subs = (loc && loc.subLocations) || [];
        if (!subs.length) {
          subList.innerHTML = '<p class="card-meta" style="margin-bottom:8px">אין תתי-מיקומים</p>';
          return;

      renderList();

      // ── Shared alias modal helper ─────────────────────────────────────────
      function showAliasModal(itemName, aliases, onSave) {
        let current = [...aliases];
        function aliasRowsHtml() {
          return current.length
            ? current.map((a, i) => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <span style="flex:1;font-size:0.9rem">${esc(a)}</span>
                <button class="btn-icon alias-rm-btn" data-rm="${i}">✕</button>
              </div>`).join('')
            : `<p style="font-size:0.83rem;color:var(--muted);margin-bottom:4px">אין שמות חלופיים</p>`;
        }
        function refreshRows() {
          document.getElementById('alias-rows').innerHTML = aliasRowsHtml();
        }
        Modal.open({
          title: `שמות חלופיים — ${itemName}`,
          html: `
            <p style="font-size:0.83rem;color:var(--muted);margin-bottom:10px">שמות נוספים שיזוהו בייבוא מיפוי ויומרו לשם הרשמי</p>
            <div id="alias-rows">${aliasRowsHtml()}</div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <input id="alias-new-input" class="form-input" style="flex:1;font-size:0.88rem;padding:6px 10px" placeholder="שם חלופי חדש">
              <button id="alias-add-btn" class="btn btn-outline btn-sm">הוסף</button>
            </div>`,
          actions: [
            { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => { Modal.close(); onSave(current); Toast.show('נשמר', 'success'); } },
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
        const overlay = document.getElementById('modal-overlay');
        overlay.querySelector('#alias-add-btn').addEventListener('click', () => {
          const val = overlay.querySelector('#alias-new-input').value.trim();
          if (!val || current.includes(val)) return;
          current.push(val);
          refreshRows();
          overlay.querySelector('#alias-new-input').value = '';
        });
        overlay.querySelector('#alias-new-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') overlay.querySelector('#alias-add-btn').click();
        });
        overlay.querySelector('#alias-rows').addEventListener('click', e => {
          const rm = e.target.closest('.alias-rm-btn');
          if (rm) { current.splice(parseInt(rm.dataset.rm), 1); refreshRows(); }
        });
      }

      // lock switch
      const lockCheck = tabContent.querySelector('#el-order-lock');
      const lockEmoji = tabContent.querySelector('#el-lock-emoji');
      lockCheck.checked = DB.getMetadata().locationOrderLocked || false;
      lockEmoji.textContent = lockCheck.checked ? '🔒' : '🔓';
      lockCheck.addEventListener('change', () => {
        DB.setLocationOrderLocked(lockCheck.checked);
        lockEmoji.textContent = lockCheck.checked ? '🔒' : '🔓';
      });
      tabContent.querySelector('#el-order-lock-info').addEventListener('click', () => {
        Modal.open({
          title: 'נעילת סדר',
          html: '<p style="line-height:1.6">כאשר הסדר נעול הסדר של המיקומים יקבע אך ורק על פי הסדר במסך הזה. כאשר הוא לא נעול בעת ייבוא מיפוי הסדר במיפוי הוא שיקבע.</p>',
          actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
        });
      });

      // Off-map label setting
      const _offMapInput = tabContent.querySelector('#el-offmap-label');
      _offMapInput.value = DB.getMetadata().offMapLabel || '';
      tabContent.querySelector('#el-offmap-label-save').addEventListener('click', () => {
        const val = _offMapInput.value.trim();
        DB.getMetadata().offMapLabel = val || '';
        DB.save();
        Toast.show('שם מיפוי חיצוני נשמר', 'success');
      });

      tabContent.querySelector('#el-save').addEventListener('click', () => {
        const name  = tabContent.querySelector('#el-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מיקום', 'error'); return; }
        const inMap = tabContent.querySelector('#el-inmap').checked;
        DB.upsertLocation({ name, inMap });
        Toast.show('מיקום נשמר', 'success');
        renderList();
        refreshSubLocSelect();
        tabContent.querySelector('#el-name').value = '';
        tabContent.querySelector('#el-inmap').checked = false;
      });

      // Drag-and-drop reorder for locations
      _initReorder(tabContent.querySelector('#el-list'), {
        handleSelector: '.reorder-handle',
        itemSelector: '.reorder-item',
        onReorder: (fromIdx, toIdx) => {
          const locs = DB.getMetadata().locations;
          const names = locs.map(l => l.name);
          const [moved] = names.splice(fromIdx, 1);
          names.splice(toIdx, 0, moved);
          DB.setLocationOrder(names);
          renderList();
          refreshSubLocSelect();
        }
      });

      tabContent.querySelector('#el-list').addEventListener('click', e => {
        const menuBtn = e.target.closest('.el-menu-btn');
        if (!menuBtn) return;
        const locName = menuBtn.dataset.name;
        const loc = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        Modal.open({
          title: locName,
          html: '',
          actions: [
            { id: 'rename', label: 'שנה שם', onClick: () => {
              Modal.close();
              Modal.open({
                title: 'שינוי שם מיקום',
                html: `<div class="form-group"><label class="form-label">שם חדש</label><input id="rename-loc-input" class="form-input" value="${esc(locName)}"></div>`,
                actions: [
                  { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                    const newName = document.getElementById('rename-loc-input').value.trim();
                    if (!newName || newName === locName) { Modal.close(); return; }
                    DB.renameLocation(locName, newName);
                    Modal.close();
                    renderList(); refreshSubLocSelect();
                    Toast.show('מיקום שונה', 'success');
                  }},
                  { id: 'cancel', label: 'ביטול', onClick: Modal.close }
                ]
              });
            }},
            { id: 'alias', label: 'שמות חלופיים', onClick: () => {
              Modal.close();
              showAliasModal(locName, (loc && loc.aliases) || [], newAliases => {
                DB.upsertLocation({ name: locName, aliases: newAliases });
                renderList();
              });
            }},
            { id: 'toggle', label: loc.inMap ? 'הסר ממיפוי' : 'הוסף למיפוי', onClick: () => {
              DB.upsertLocation({ name: locName, inMap: !loc.inMap });
              Modal.close();
              renderList();
            }},
            { id: 'delete', label: 'מחק', cls: 'btn-danger', onClick: () => {
              DB.deleteLocation(locName);
              Modal.close();
              Toast.show('מיקום נמחק', 'info');
              renderList();
              refreshSubLocSelect();
              renderSubList(tabContent.querySelector('#el-sub-loc-sel').value);

        });

      tabContent.querySelector('#el-sub-loc-sel').addEventListener('change', e => {
        renderSubList(e.target.value);
      });

      // add sublocation
      tabContent.querySelector('#el-sub-add').addEventListener('click', () => {
        const locName = tabContent.querySelector('#el-sub-loc-sel').value;
        const input   = tabContent.querySelector('#el-sub-input');
        const sub     = input.value.trim();
        if (!locName) { Toast.show('יש לבחור מיקום', 'error'); return; }
        if (!sub)     { Toast.show('יש להזין שם תת-מיקום', 'error'); return; }
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = [...((loc && loc.subLocations) || [])];
        if (!subs.includes(sub)) {
          subs.push(sub);
          DB.upsertLocation({ name: locName, subLocations: subs });
          Toast.show('תת-מיקום נוסף', 'success');
        }
        input.value = '';
        renderSubList(locName);
        renderList();
      });

      // allow Enter in sublocation input
      tabContent.querySelector('#el-sub-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') tabContent.querySelector('#el-sub-add').click();
      });

      // rename / delete / alias sublocation (event delegation on the sub-list)
      tabContent.querySelector('#el-sub-list').addEventListener('click', e => {
        const subAliasBtn = e.target.closest('.el-sub-alias');
        if (subAliasBtn) {
          const locName = subAliasBtn.dataset.loc;
          const subName = subAliasBtn.dataset.sub;
          const loc = DB.getMetadata().locations.find(l => l.name === locName);
          const curAliases = ((loc && loc.subLocationAliases) || {})[subName] || [];
          showAliasModal(subName, curAliases, newAliases => {
            const locObj = DB.getMetadata().locations.find(l => l.name === locName);
            const subLocAliases = Object.assign({}, (locObj && locObj.subLocationAliases) || {});
            if (newAliases.length) subLocAliases[subName] = newAliases;
            else delete subLocAliases[subName];
            DB.upsertLocation({ name: locName, subLocationAliases: subLocAliases });
          });
          return;
        }
        const renameBtn = e.target.closest('.el-sub-rename');
        if (renameBtn) {
          const locName = renameBtn.dataset.loc;
          const oldSub = renameBtn.dataset.sub;
          Modal.open({
            title: 'שינוי שם תת-מיקום',
            html: `<div class="form-group"><label class="form-label">שם חדש</label><input id="rename-sub-input" class="form-input" value="${esc(oldSub)}"></div>`,
            actions: [
              { id: 'save', label: 'שמור', cls: 'btn-primary', onClick: () => {
                const newSub = document.getElementById('rename-sub-input').value.trim();
                if (!newSub || newSub === oldSub) { Modal.close(); return; }
                DB.renameSubLocation(locName, oldSub, newSub);
                Modal.close();
                renderSubList(locName); renderList();
                Toast.show('תת-מיקום שונה', 'success');
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
          return;
        }
        const delBtn = e.target.closest('.el-sub-del');
        if (!delBtn) return;
        const locName = delBtn.dataset.loc;
        const sub     = delBtn.dataset.sub;
        const loc     = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        const subs = (loc.subLocations || []).filter(s => s !== sub);
        DB.upsertLocation({ name: locName, subLocations: subs });
        renderSubList(locName);
        renderList();
      });
    }
