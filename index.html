          <div class="hero-btn-icon" style="background:color-mix(in srgb, var(--success) 12%, var(--card));color:var(--success);">📥</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">${Lang.T('ייבוא נתונים', 'Importar datos')}</div>
            <div class="hero-btn-sub">${Lang.T('הדבק טקסט גיבוי', 'Pegar texto de respaldo')}</div>
          </div>
        </button>

        <button class="hero-btn" id="main-map-action">
          <div class="hero-btn-icon" style="background:color-mix(in srgb, var(--focus) 15%, var(--card));color:var(--focus);">🗺️</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">${Lang.T('מיפוי', 'Mapeo')}</div>
            <div class="hero-btn-sub">${Lang.T('צור, ערוך ושתף מפת מיקומים', 'Crear, editar y compartir mapa')}</div>
          </div>
        </button>

        <button class="hero-btn" id="main-map-import">
          <div class="hero-btn-icon" style="background:color-mix(in srgb, var(--brand-2) 15%, var(--card));color:var(--brand-2);">📋</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">${Lang.T('ייבוא מיפוי', 'Importar mapa')}</div>
            <div class="hero-btn-sub">${Lang.T('הדבק טקסט מיפוי ומזג לנתונים', 'Pegar texto del mapa y fusionar')}</div>
          </div>
        </button>

        <button class="hero-btn" id="main-movements-update">
          <div class="hero-btn-icon" style="background:color-mix(in srgb, var(--brand-2) 12%, var(--card));color:var(--brand-2);">📲</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">${Lang.T('עדכון תנועות', 'Actualizar traslados')}</div>
            <div class="hero-btn-sub">${Lang.T('עדכן מיקומים מהודעות WhatsApp', 'Actualizar ubicaciones de WhatsApp')}</div>
          </div>
        </button>

        <button class="hero-btn" id="main-delete">
          <div class="hero-btn-icon" style="background:color-mix(in srgb, var(--danger) 12%, var(--card));color:var(--danger);">🗑️</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">${Lang.T('מחיקת נתונים', 'Eliminar datos')}</div>
            <div class="hero-btn-sub">${Lang.T('מחק פריטים או איפוס מלא', 'Eliminar ítems o reinicio completo')}</div>
          </div>
        </button>

      </div>
    `;

    // set dynamic off-map label
    const _offMapLabel = () => DB.getMetadata().offMapLabel || 'חיצוני';

    // language toggle
    const langBtn = screen.querySelector('#lang-toggle');
    langBtn.textContent = Lang.get() === 'he' ? '🇮🇱' : '🇨🇱';
    langBtn.addEventListener('click', () => {
      Lang.set(Lang.get() === 'he' ? 'es' : 'he');
      initEdit(); initTransfer(); initLoadUnload(); initSearch(); initMain();
      BottomNav.render();
      Router.navigate(Router.getCurrent() || 'main');
    });

    // version badge — re-wire here so it survives language re-init
    const vBadge = screen.querySelector('.version-badge');
    if (vBadge) vBadge.addEventListener('click', () => location.reload());

    // theme toggle — re-wire here so it survives language re-init
    const themeBtn = screen.querySelector('#theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', toggleTheme);
      setTheme(document.body.getAttribute('data-theme') || 'light');
    }

    // export — copy + WhatsApp
    screen.querySelector('#main-export').addEventListener('click', async () => {
      Progress.show('מייצא נתונים...');
      Progress.update(30);
      try {
        const text = await Utils.generateExportText(DB.getRaw());
        Progress.update(80);
        Utils.shareOrCopy(text);
        Progress.update(100);
        setTimeout(() => { Progress.hide(); Toast.show('גיבוי הועתק ונשלח', 'success'); }, 300);
      } catch(e) {
        Progress.hide();
        Toast.show('שגיאה בייצוא', 'error');
      }
    });

    // import — paste via modal textarea
    screen.querySelector('#main-import').addEventListener('click', () => {
      Modal.open({
        title: 'ייבוא נתונים',
        html: `
          <p class="card-meta" style="margin-bottom:10px">הדבק כאן את טקסט הגיבוי שהועתק בייצוא:</p>
          <textarea id="import-paste-area" rows="6"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:ltr;text-align:left;resize:vertical"></textarea>
        `,
        actions: [
          { id: 'do-import', label: 'ייבא', cls: 'btn-primary', onClick: async () => {
            let text = document.getElementById('import-paste-area').value.trim();
            if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
            // Sanitize: remove directional marks, BOM, zero-width chars (iOS paste issue)
            text = text.replace(/[\uFEFF\u200B\u200C\u200D\u00A0\u200E\u200F\u202A-\u202E\u2066-\u2069\u061C]/g, '');
            Modal.close();
            Progress.show('מייבא נתונים...');
            Progress.update(20);
            try {
              const jsonStr = await Utils.parseImportText(text);
              Progress.update(60);
              DB.importJSON(jsonStr, 'merge');
              Progress.update(100);
              setTimeout(() => { Progress.hide(); Toast.show('נתונים יובאו בהצלחה', 'success'); }, 300);
            } catch(err) {
              Progress.hide();
              Toast.show('שגיאה: ' + err.message, 'error');
            }
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    });

    // map action — choose type then copy + open edit modal
    function _openMapEditModal(mapText) {
      Modal.open({
        title: 'עריכת מיפוי',
        html: `
          <p class="card-meta" style="margin-bottom:10px">ערוך את המיפוי ולחץ שמור. השינויים ימוזגו לנתונים הקיימים.</p>
          <textarea id="map-edit-area" rows="16"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:rtl;text-align:right;resize:vertical;line-height:1.6">${esc(mapText)}</textarea>
        `,
        actions: [
          { id: 'save-map-edit', label: 'שמור', cls: 'btn-primary', onClick: () => {
            const text = document.getElementById('map-edit-area').value.trim();
            if (!text) { Toast.show('אין טקסט', 'error'); return; }
            try {
              const propDefs = DB.getMetadata().properties || [];
              const normalizedText = _normalizeAliases(text, propDefs, DB.getMetadata().locations);
              const blocks = _parseMap(normalizedText);
              if (!blocks.length) { Toast.show('לא נמצאו בלוקים', 'error'); return; }
              const diffs = _getLocationDiffs(blocks);
              const { db: importedDb, unmatchedFloorLines } = _buildMapDB(blocks, propDefs);
              const doActualImport = () => {
                DB.importJSON(JSON.stringify(importedDb), 'merge');
                _applyMapOrdering(blocks, propDefs);
                Modal.close();
                Toast.show('מיפוי נשמר בהצלחה', 'success');
              };
              const doImport = () => {
                if (unmatchedFloorLines.length) { _showUnmatchedFloorModal(unmatchedFloorLines, importedDb, propDefs, doActualImport); return; }
                doActualImport();
              };
              if (diffs.length) { _showLocationDiffModal(diffs, doImport); return; }
              doImport();
            } catch(err) {
              Toast.show('שגיאה: ' + err.message, 'error');
            }
          }},
          { id: 'copy-map-edit', label: 'העתק', cls: 'btn-outline', onClick: () => {
            const text = document.getElementById('map-edit-area').value;
            Utils.copyToClipboard(text).then(() => Toast.show('הועתק ללוח', 'success'));
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    }

    screen.querySelector('#main-map-action').addEventListener('click', () => {
      const label = _offMapLabel();
      Modal.open({
        title: 'מיפוי — בחר סוג',
        html: `
          <div style="display:flex;gap:12px;margin-top:8px;">
            <button id="map-choice-regular" class="btn btn-primary btn-full" style="font-size:1.1rem;padding:18px 8px;">רגיל</button>
            <button id="map-choice-offmap" class="btn btn-outline btn-full" style="font-size:1.1rem;padding:18px 8px;">${esc(label)}</button>
          </div>
        `,
        actions: []
      });
      const overlay = document.getElementById('modal-overlay');
      overlay.querySelector('#map-choice-regular').addEventListener('click', () => {
        Modal.close();
        const raw = DB.load();
        const mapText = Utils.generateMapText(raw);
        Utils.copyToClipboard(mapText).catch(() => {});
        Toast.show('מיפוי הועתק ללוח', 'success');
        _openMapEditModal(mapText);
      });
      overlay.querySelector('#map-choice-offmap').addEventListener('click', () => {
        Modal.close();
        const raw = DB.load();
        const mapText = Utils.generateOffMapText(raw, label);
        Utils.copyToClipboard(mapText).catch(() => {});
        Toast.show(`מיפוי ${label} הועתק ללוח`, 'success');
        _openMapEditModal(mapText);
      });
    });

    // map import — parse map text and merge into DB
    screen.querySelector('#main-map-import').addEventListener('click', () => {
      Modal.open({
        title: 'ייבוא מיפוי',
        html: `
          <p class="card-meta" style="margin-bottom:10px">הדבק כאן טקסט מיפוי (באותו פורמט של יצירת מיפוי):</p>
          <textarea id="map-import-area" rows="10"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:rtl;text-align:right;resize:vertical"></textarea>
        `,
        actions: [
          { id: 'do-map-import', label: 'ייבא מיפוי', cls: 'btn-primary', onClick: () => {
            const text = document.getElementById('map-import-area').value.trim();
            if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
            try {
              const propDefs = DB.getMetadata().properties || [];
              const normalizedText = _normalizeAliases(text, propDefs, DB.getMetadata().locations);
              const blocks = _parseMap(normalizedText);
              if (!blocks.length) { Toast.show('לא נמצאו בלוקים במיפוי', 'error'); return; }
              const diffs = _getLocationDiffs(blocks);
              const { db: importedDb, unmatchedFloorLines } = _buildMapDB(blocks, propDefs);
              const doActualImport = () => {
                DB.importJSON(JSON.stringify(importedDb), 'merge');
                _applyMapOrdering(blocks, propDefs);
                const cartCount = Object.keys(importedDb.carts).length;
                const floorCount = Object.keys(importedDb.floorItems).length;
                Modal.close();
                Toast.show(`יובאו ${cartCount + floorCount} פריטים`, 'success');
              };
              const doImport = () => {
                if (unmatchedFloorLines.length) { _showUnmatchedFloorModal(unmatchedFloorLines, importedDb, propDefs, doActualImport); return; }
                doActualImport();
              };
              if (diffs.length) { _showLocationDiffModal(diffs, doImport); return; }
              doImport();
            } catch(err) {
              Toast.show('שגיאה: ' + err.message, 'error');
            }
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    });

    // ── Location lock validation ──
    // Returns structured diff objects for locations/sub-locations in the import
    // that are missing from settings. Only checks when locationOrderLocked is true.
    // Each diff: { type: 'location'|'sublocation', locName, subLocName?, label }
    function _getLocationDiffs(blocks) {
      const meta = DB.getMetadata();
      if (!meta.locationOrderLocked) return [];

      const knownLocMap = {};
      (meta.locations || []).forEach(l => { knownLocMap[l.name] = new Set(l.subLocations || []); });

      const diffs = [];
      const seenLocs = new Set();
      const seenSubLocs = {};

      for (const block of blocks) {
        if (!block.location) continue;
        seenLocs.add(block.location);
        if (block.subLocation) {
          if (!seenSubLocs[block.location]) seenSubLocs[block.location] = new Set();
          seenSubLocs[block.location].add(block.subLocation);
        }
      }

      for (const locName of seenLocs) {
        if (!(locName in knownLocMap)) {
          diffs.push({ type: 'location', locName, label: `מיקום "${locName}"` });
        } else if (seenSubLocs[locName]) {
          const knownSubs = knownLocMap[locName];
          for (const subLoc of seenSubLocs[locName]) {
            if (!knownSubs.has(subLoc)) {
              diffs.push({ type: 'sublocation', locName, subLocName: subLoc, label: `תת-מיקום "${subLoc}" תחת "${locName}"` });
            }
          }
        }
      }

      return diffs;
    }

    // Show the interactive diff modal. onProceed(checkedDiffs) is called when the user confirms.
    function _showLocationDiffModal(diffs, onProceed) {
      const checkboxRows = diffs.map((d, i) => `
        <label style="display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--border);direction:rtl;cursor:pointer">
          <input type="checkbox" data-diff-idx="${i}" checked style="width:16px;height:16px;flex-shrink:0">
          <span style="font-size:0.9rem">${esc(d.label)}</span>
        </label>`).join('');

      Modal.open({
        title: 'עדכון הגדרות לפני ייבוא 🔒',
        html: `
          <p style="margin-bottom:10px;font-size:0.88rem;color:var(--muted)">המיפוי מכיל מיקומים שאינם בהגדרות. בחר מה להוסיף להגדרות לפני הייבוא:</p>
          <div style="max-height:260px;overflow-y:auto;margin-bottom:4px">${checkboxRows}</div>
        `,
        actions: [
          { id: 'apply-import', label: 'הוסף ויייבא', cls: 'btn-primary', onClick: () => {
            const overlay = document.getElementById('modal-overlay');
            const checked = [...overlay.querySelectorAll('[data-diff-idx]:checked')]
              .map(cb => diffs[+cb.dataset.diffIdx]);
            // Apply location additions first so sublocations have a parent
            for (const d of checked.filter(d => d.type === 'location')) {
              DB.upsertLocation({ name: d.locName, subLocations: [] });
            }
            for (const d of checked.filter(d => d.type === 'sublocation')) {
              const loc = DB.getMetadata().locations.find(l => l.name === d.locName);
              const subs = [...(loc ? loc.subLocations || [] : [])];
              if (!subs.includes(d.subLocName)) subs.push(d.subLocName);
              DB.upsertLocation({ name: d.locName, subLocations: subs });
            }
            Modal.close();
            onProceed();
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    }

    function _showUnmatchedFloorModal(unmatchedItems, importedDb, propDefs, onProceed) {
      const optionsHint = propDefs.map(p => `${p.name}: ${(p.options||[]).join(', ')}`).filter(s => s.includes(':')).join('  |  ');
      const rowsHtml = unmatchedItems.map(item =>
        `<div style="margin-bottom:10px;padding:8px;background:var(--surface2,#f0f0f0);border-radius:6px">
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px">${esc(item.label)} — ${item.itemCount} יח׳</div>
          <input data-fi-id="${esc(item.fiId)}" value="${esc(item.rawProps)}"
            style="width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:4px;font-size:0.9rem;direction:rtl;box-sizing:border-box" />
        </div>`
      ).join('');
      const hintHtml = optionsHint
        ? `<p style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;direction:ltr;text-align:left">${esc(optionsHint)}</p>`
        : '';
      Modal.open({
        title: 'פריטי רצפה עם מאפיינים לא מוכרים',
        html: `
          <p style="font-size:0.84rem;margin-bottom:8px">ערוך את המאפיינים ולחץ המשך, או השאר כפי שהוא:</p>
          ${hintHtml}
          <div style="max-height:300px;overflow-y:auto">${rowsHtml}</div>
        `,
        actions: [
          { id: 'continue-import', label: 'המשך', cls: 'btn-primary', onClick: () => {
            document.querySelectorAll('[data-fi-id]').forEach(inp => {
              const fi = importedDb.floorItems[inp.dataset.fiId];
              if (!fi) return;
              const newRaw = inp.value.trim();
              const newProps = _matchProps(newRaw, propDefs);
              delete newProps['_unmatched'];
              if (newRaw && !Object.values(newProps).some(v => v)) newProps['_unmatched'] = newRaw;
              fi.properties = newProps;
            });
            Modal.close();
            onProceed();
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    }

    // ── Map parser (ported from map2shinua.py) ──
    // Expose parser functions globally so other screens (e.g. search + button) can call them
    window._normalizeAliases = (...a) => _normalizeAliases(...a);
    window._parseMap = (...a) => _parseMap(...a);
    window._buildMapDB = (...a) => _buildMapDB(...a);

    function _normalizeAliases(text, propDefs, locations) {
      // ── Property value aliases ───────────────────────────────────────────────
      const aliasMap = {};
      for (const prop of propDefs) {
        if (!prop.aliases) continue;
        for (const [canonical, aliasList] of Object.entries(prop.aliases)) {
          for (const alias of aliasList) {
            if (alias.trim()) aliasMap[alias.toLowerCase()] = canonical;
          }
        }
      }
      if (Object.keys(aliasMap).length) {
        const sortedAliases = Object.keys(aliasMap).sort((a, b) => b.length - a.length);
        text = text.split('\n').map(line => {
          for (const alias of sortedAliases) {
            const escaped = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp('(^|[\\s,;:])(' + escaped + ')($|[\\s,;:])', 'gi');
            let prev;
            do {
              prev = line;
              line = line.replace(regex, (m, before, match, after) => before + aliasMap[match.toLowerCase()] + after);
            } while (line !== prev);
          }
          return line;
        }).join('\n');
      }

      // ── Location / sub-location aliases ──────────────────────────────────────
      if (locations && locations.length) {
        const locAliasMap = {};
        const subLocAliasMap = {};
        for (const loc of locations) {
          for (const alias of (loc.aliases || [])) {
            if (alias.trim()) locAliasMap[alias.trim().toLowerCase()] = loc.name;
          }
          for (const [canonical, aliasList] of Object.entries(loc.subLocationAliases || {})) {
            for (const alias of (aliasList || [])) {
              if (alias.trim()) subLocAliasMap[alias.trim().toLowerCase()] = canonical;
            }
          }
        }
        if (Object.keys(locAliasMap).length || Object.keys(subLocAliasMap).length) {
          text = text.split('\n').map(line => {
            const t = line.trim();
            // Match header lines: "name:" with nothing after the colon
            if (/^[^:]+:\s*$/.test(t)) {
              const name = t.slice(0, t.lastIndexOf(':')).trim().toLowerCase();
              if (locAliasMap[name]) return locAliasMap[name] + ':';
              if (subLocAliasMap[name]) return subLocAliasMap[name] + ':';
            }
            return line;
          }).join('\n');
        }
      }

      return text;
    }

    function _parseMap(text) {
      const RE_CART_WITH_TYPE = /^(.+\([^)]+\)):\s*(.*)$/;
      const RE_ID_TYPE = /^(.+)\(([^)]+)\)$/;
      const RE_COLON_LINE = /^(.+?):\s*(.*)$/;

      const results = [];
      let location = null, subLocation = '', entries = [], mode = 'normal';
      let multilineCart = null, blockStarted = false;
      let anonCounter = 0, lastWasAnonLine = false;

      function flushEntries() {
        if (location !== null) {
          results.push({ location, subLocation, entries: entries.slice() });
        }
        entries = [];
      }
      function flushMultiline() {
        if (multilineCart) { entries.push(multilineCart); multilineCart = null; }
        if (mode === 'multiline') mode = 'normal';
      }

      for (const raw of text.split('\n')) {
        const line = raw.trim();

        if (!line) { if (mode === 'multiline') flushMultiline(); lastWasAnonLine = false; continue; }
        if (/^מיפוי\s+\d{1,2}:\d{2}/.test(line)) continue;
        if (/^={3,}$/.test(line)) {
          if (mode === 'multiline') flushMultiline();
          flushEntries();
          location = null; subLocation = ''; blockStarted = false; mode = 'normal';
          continue;
        }

        // cart with parenthesized type
        const mCart = RE_CART_WITH_TYPE.exec(line);
        if (mCart) {
          if (mode === 'multiline') flushMultiline();
          const rawId = mCart[1].trim();
          const [rawContent, entryComment] = _stripComment(mCart[2].trim());
          const content = rawContent;
          const mId = RE_ID_TYPE.exec(rawId);
          let cartId = mId ? mId[1].trim() : rawId;
          const cartType = mId ? mId[2].trim() : '';
          if (cartId === '#') {
            if (!lastWasAnonLine) anonCounter++;
            cartId = `#${anonCounter}`;
            lastWasAnonLine = true;
          } else {
            lastWasAnonLine = false;
          }
          if (!content) {
            multilineCart = { type: 'cart', cartId, cartType, containerType: 'עגלה', comment: entryComment, slots: [] };
            mode = 'multiline';
          } else if (content === 'empty') {
            entries.push({ type: 'cart', cartId, cartType, containerType: 'עגלה', comment: entryComment,
              slots: [{ itemCount: 0, isEmpty: true, rawProps: '' }] });
          } else {
            let [count, rawProps, trailingCmt] = _parseCountProps(content);
            if (count === 0 && / - \d+(\s.*)?$/.test(content)) { [count, rawProps, trailingCmt] = _parsePropsDashCount(content); }
            const cmt1 = [entryComment, trailingCmt].filter(Boolean).join(' ');
            entries.push({ type: 'cart', cartId, cartType, containerType: 'עגלה', comment: cmt1,
              slots: [{ itemCount: count, isEmpty: count === 0, rawProps }] });
          }
          continue;
        }

        // indented line (multi-slot or child cart)
        if (mode === 'multiline' && raw.length > 0 && (raw[0] === ' ' || raw[0] === '\t')) {
          const mChild = RE_COLON_LINE.exec(line);
          if (mChild && mChild[2].trim()) {
            // child cart: "containerType cartId: count props"
            const cBefore = mChild[1].trim();
            const [cAfterRaw, cComment] = _stripComment(mChild[2].trim());
            const cParts = cBefore.split(/\s+/);
            const childCt = cParts.length >= 2 ? cParts.slice(0, -1).join(' ') : 'עגלה';
            const childId = cParts[cParts.length - 1];
            if (!multilineCart.children) multilineCart.children = [];
            if (cAfterRaw === 'empty') {
              multilineCart.children.push({ type: 'cart', cartId: childId, containerType: childCt, comment: cComment,
                slots: [{ itemCount: 0, isEmpty: true, rawProps: '' }] });
            } else {
              const [cCount, cRawProps] = _parseCountProps(cAfterRaw);
              multilineCart.children.push({ type: 'cart', cartId: childId, containerType: childCt, comment: cComment,
                slots: [{ itemCount: cCount, isEmpty: cCount === 0, rawProps: cRawProps }] });
            }
          } else {
            // additional slot
            const [count, rawProps] = _parseCountProps(line);
            multilineCart.slots.push({ itemCount: count, isEmpty: count === 0, rawProps });
          }
          continue;
        }

        if (mode === 'multiline') flushMultiline();

        // general "something: ..." line
        const mGen = RE_COLON_LINE.exec(line);
        if (mGen) {
          const before = mGen[1].trim();
          const [afterRaw, genComment] = _stripComment(mGen[2].trim());
          const after = afterRaw;
          if (after) {
            // content after colon → container-type cart
            const parts = before.split(/\s+/);
            let containerType, cId;
            if (parts.length >= 2) {
              containerType = parts.slice(0, -1).join(' ');
              cId = parts[parts.length - 1];
            } else {
              containerType = 'עגלה'; cId = before;
            }
            if (cId === '#') {
              if (!lastWasAnonLine) anonCounter++;
              cId = `#${anonCounter}`;
              lastWasAnonLine = true;
            } else {
              lastWasAnonLine = false;
            }
            if (after === 'empty') {
              entries.push({ type: 'cart', cartId: cId, cartType: '', containerType, comment: genComment,
                slots: [{ itemCount: 0, isEmpty: true, rawProps: '' }] });
            } else {
              let [count, rawProps, trailingCmt2] = _parseCountProps(after);
              if (count === 0 && / - \d+(\s.*)?$/.test(after)) { [count, rawProps, trailingCmt2] = _parsePropsDashCount(after); }
              const cmt2 = [genComment, trailingCmt2].filter(Boolean).join(' ');
              entries.push({ type: 'cart', cartId: cId, cartType: '', containerType, comment: cmt2,
                slots: [{ itemCount: count, isEmpty: count === 0, rawProps }] });
            }
          } else {
            // no content → header
            lastWasAnonLine = false;
            if (!blockStarted) {
              flushEntries(); location = before; subLocation = ''; blockStarted = true; mode = 'normal';
            } else {
              flushEntries(); subLocation = before; mode = 'normal';
            }
          }
          continue;
        }

        // floor item: identified purely by format "props - count [trailing]" (digit after last ' - ')
        lastWasAnonLine = false;
        if (/ - \d+(\s.*)?$/.test(line)) {
          const [count, rawProps, trailingComment] = _parsePropsDashCount(line);
          entries.push({ type: 'floor', itemCount: count, isEmpty: count === 0, rawProps, comment: trailingComment || undefined });
          continue;
        }
      }

      if (mode === 'multiline') flushMultiline();
      flushEntries();
      return results;
    }

    function _stripComment(text) {
      const idx = text.indexOf(' # ');
      return idx >= 0 ? [text.slice(0, idx).trim(), text.slice(idx + 3).trim()] : [text, ''];
    }

    function _parseCountProps(text) {
      const parts = text.split(/\s+/);
      const count = parts.length && /^\d+$/.test(parts[0]) ? parseInt(parts[0]) : 0;
      const rawProps = /^\d+$/.test(parts[0]) ? parts.slice(1).join(' ') : text;
      return [count, rawProps.trim(), ''];
    }

    function _parsePropsDashCount(text) {
      const idx = text.lastIndexOf(' - ');
      if (idx >= 0) {
        const props = text.slice(0, idx).trim();
        const rest = text.slice(idx + 3).trim();
        const mCount = /^(\d+)(?:\s+(.+))?$/.exec(rest);
        if (mCount) {
          return [parseInt(mCount[1]), props, (mCount[2] || '').trim()];
        }
      }
      return [0, text.trim(), ''];
    }

    // Extract parenthesized text from rawProps as a comment; return [cleanedRaw, parenComment]
    // If the inner text matches a known property option/alias it is kept in rawProps (without parens).
    function _extractParenComment(raw, propDefs) {
      const knownOptions = new Set();
      for (const prop of (propDefs || [])) {
        for (const opt of (prop.options || [])) {
          knownOptions.add(opt.toLowerCase());
          for (const alias of ((prop.aliases && prop.aliases[opt]) || [])) {
            if (alias.trim()) knownOptions.add(alias.trim().toLowerCase());
          }
        }
      }
      const comments = [];
      const cleaned = (raw || '').replace(/\(([^)]*)\)/g, (_, inner) => {
        const trimmed = inner.trim();
        if (!trimmed) return '';
        if (knownOptions.has(trimmed.toLowerCase())) return ' ' + trimmed + ' ';
        comments.push(trimmed);
        return '';
      }).replace(/\s+/g, ' ').trim();
      return [cleaned, comments.join(' ')];
    }

    function _matchProps(raw, propDefs) {
      if (!propDefs || !propDefs.length) return {};
      const tokens = raw ? raw.split(/\s+/) : [];
      const hasOptions = propDefs.some(p => p.options && p.options.length);
      if (!hasOptions) {
        const result = {};
        propDefs.forEach((p, i) => { result[p.name] = i < tokens.length ? tokens[i] : ''; });
        return result;
      }
      // Build candidate list: { lower, canonical, propName } sorted longest-first
      const candidates = [];
      for (const prop of propDefs) {
        for (const opt of (prop.options || [])) {
          candidates.push({ lower: opt.toLowerCase(), canonical: opt, propName: prop.name });
          // include aliases
          if (prop.aliases && prop.aliases[opt]) {
            for (const alias of prop.aliases[opt]) {
              if (alias.trim()) candidates.push({ lower: alias.toLowerCase().trim(), canonical: opt, propName: prop.name });
            }
          }
        }
      }
      candidates.sort((a, b) => b.lower.length - a.lower.length);

      const result = {}, assigned = new Set();
      const rawLower = (raw || '').toLowerCase();
      let remaining = rawLower;
      // Greedy longest-match: scan raw string for each candidate
      for (const c of candidates) {
        if (assigned.has(c.propName)) continue;
        // Check if candidate appears as whole word(s) in the raw string
        const escaped = c.lower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp('(?:^|\\s)' + escaped + '(?:\\s|$)');
        if (re.test(rawLower)) {
          result[c.propName] = c.canonical;
          assigned.add(c.propName);
          remaining = remaining.replace(new RegExp('(^|\\s)' + escaped + '(?=\\s|$)', 'g'), ' ');
        }
      }
      remaining = remaining.trim();
      if (remaining) {
        // Map back to original case from the raw string
        const lowerMap = {};
        (raw || '').split(/\s+/).filter(Boolean).forEach(t => { if (!lowerMap[t.toLowerCase()]) lowerMap[t.toLowerCase()] = t; });
        result._unmatchedComment = remaining.split(/\s+/).filter(Boolean).map(t => lowerMap[t] || t).join(' ');
      }
      return result;
    }

    function _buildMapDB(blocks, propDefs) {
      const nowMs = Date.now();
      let fiCounter = 0;
      const carts = {}, floorItems = {};
      const cartIdList = [], locationSet = {}, containerTypesSet = new Set(['עגלה']);
      const unmatchedFloorLines = [];

      for (const block of blocks) {
        const { location: locName, subLocation: subLoc, entries } = block;
        if (locName && !locationSet[locName]) {
          locationSet[locName] = { name: locName, inMap: true, subLocations: [] };
        }
        if (locName && subLoc && locationSet[locName]) {
          const locObj = locationSet[locName];
          if (!locObj.subLocations) locObj.subLocations = [];
          if (!locObj.subLocations.includes(subLoc)) locObj.subLocations.push(subLoc);
        }

        for (const entry of entries) {
          if (entry.type === 'cart') {
            const cid = entry.cartId;
            const ct = entry.containerType || 'עגלה';
            containerTypesSet.add(ct);

            for (let slotIdx = 0; slotIdx < entry.slots.length; slotIdx++) {
              const slot = entry.slots[slotIdx];
              const [cleanSlotRaw, parenCmt] = _extractParenComment(slot.rawProps, propDefs);
              const props = _matchProps(cleanSlotRaw, propDefs);
              const unmatchedComment = props._unmatchedComment || '';
              delete props._unmatchedComment;
              // Unmatched tokens + parenthesized text → comment field
              let slotComment = [entry.comment, parenCmt, unmatchedComment].filter(Boolean).join(' ');
              let slotCount = slot.itemCount;
              let slotEmpty = slot.isEmpty;
              // If single slot and ALL props empty: free-text comment, mark as empty
              if (entry.slots.length === 1 && cleanSlotRaw &&
                  Object.values(props).every(v => !v) && !/^\d/.test(cleanSlotRaw)) {
                slotCount = 0; slotEmpty = true;
              }
              const slotData = {
                properties: props, itemCount: slotCount,
                itemIds: [], isEmpty: slotEmpty
              };

              if (!carts[cid] || (slotIdx === 0 && carts[cid])) {
                if (carts[cid] && slotIdx === 0) {
                  if (carts[cid].location === locName && carts[cid].subLocation === subLoc) {
                    // same cart, same location — additional slot (multi-props format)
                    carts[cid].extraItems.push(slotData);
                    const s0Empty = !carts[cid].itemCount;
                    const exEmpty = carts[cid].extraItems.every(s => !s.itemCount);
                    carts[cid].isEmpty = s0Empty && exEmpty;
                    continue;
                  }
                  // same cartId, different location — overwrite (cart moved)
                  carts[cid].containerType = ct;
                  carts[cid].location = locName;
                  carts[cid].subLocation = subLoc;
                  carts[cid].itemCount = slotCount;
                  carts[cid].properties = props;
                  carts[cid].isEmpty = slotEmpty;
                  carts[cid].comment = slotComment;
                  carts[cid].extraItems = [];
                  carts[cid].lastUpdated = nowMs;
                  if (entry.cartType) carts[cid].cartType = entry.cartType;
                } else {
                  carts[cid] = {
                    cartId: cid, cartType: entry.cartType || '',
                    containerType: ct, location: locName, subLocation: subLoc,
                    parentCartId: null, itemCount: slotCount, itemIds: [],
                    properties: props, isEmpty: slotEmpty, comment: slotComment,
                    extraItems: [], lastUpdated: nowMs
                  };
                  cartIdList.push(cid);
                }
                // create child carts (nested/loaded onto this cart)
                if (slotIdx === 0) {
                  for (const child of (entry.children || [])) {
                    const chId = child.cartId, chCt = child.containerType || 'עגלה';
                    containerTypesSet.add(chCt);
                    for (const chSlot of child.slots) {
                      const chProps = _matchProps(chSlot.rawProps, propDefs);
                      const chSlotData = { properties: chProps, itemCount: chSlot.itemCount, itemIds: [], isEmpty: chSlot.isEmpty };
                      if (!carts[chId]) {
                        carts[chId] = {
                          cartId: chId, cartType: '', containerType: chCt,
                          location: locName, subLocation: subLoc, parentCartId: cid,
                          itemCount: chSlot.itemCount, itemIds: [],
                          properties: chProps, isEmpty: chSlot.isEmpty, comment: child.comment || '',
                          extraItems: [], lastUpdated: nowMs
                        };
                        cartIdList.push(chId);
                      } else {
                        carts[chId].extraItems.push(chSlotData);
                        carts[chId].parentCartId = cid;
                        const ch0E = !carts[chId].itemCount;
                        const chExE = carts[chId].extraItems.every(s => !s.itemCount);
                        carts[chId].isEmpty = ch0E && chExE;
                      }
                    }
                  }
                }
              } else {
                carts[cid].extraItems.push(slotData);
                const s0Empty = !carts[cid].itemCount;
                const exEmpty = carts[cid].extraItems.every(s => !s.itemCount);
                carts[cid].isEmpty = s0Empty && exEmpty;
              }
            }
          } else {
            const [cleanFloorRaw, floorParenCmt] = _extractParenComment(entry.rawProps, propDefs);
            const props = _matchProps(cleanFloorRaw, propDefs);
            const unmatchedComment = props._unmatchedComment || '';
            delete props._unmatchedComment;
            const hasMatch = Object.values(props).some(v => v);
            const fiId = 'fi_' + (nowMs + fiCounter);
            if (cleanFloorRaw && (!hasMatch || unmatchedComment)) {
              const locLabel = locName + (subLoc ? ' / ' + subLoc : '');
              unmatchedFloorLines.push({ fiId, label: locLabel, rawProps: cleanFloorRaw, itemCount: entry.itemCount });
              // For fully-unmatched, keep rawProps as discriminator for round-trip
              if (!hasMatch) props['_unmatched'] = cleanFloorRaw;
            }
            fiCounter++;
            const fiComment = [entry.comment, floorParenCmt, unmatchedComment].filter(Boolean).join(' ') || undefined;
            floorItems[fiId] = {
              id: fiId, location: locName, subLocation: subLoc,
              itemCount: entry.itemCount, itemIds: [],
              properties: props, isEmpty: entry.isEmpty, lastUpdated: nowMs,
              comment: fiComment
            };
          }
        }
      }

      const cartTypes = [...new Set(Object.values(carts).map(c => c.cartType).filter(Boolean))].sort();
      const db = {
        metadata: {
          carts: cartIdList, cartTypes,
          containerTypes: [...containerTypesSet].sort(),
          properties: propDefs,
          locations: Object.values(locationSet)
        },
        carts, floorItems
      };
      return { db, unmatchedFloorLines };
    }

    // Extract unambiguous property category order from parsed map data.
    // For each cart/floor entry with matched properties, record the position index
    // of each property category's value in the raw text. If category A's value always
    // appears before category B's value, then A comes before B. Only unambiguous
    // (consistent) orderings are kept.
    function _extractPropertyOrderFromMap(blocks, propDefs) {
      if (!propDefs || propDefs.length < 2) return propDefs.map(p => p.name);

      // Build option→propName lookup
      const optionToProp = {};
      for (const prop of propDefs) {
        for (const opt of (prop.options || [])) {
          optionToProp[opt.toLowerCase()] = prop.name;
          if (prop.aliases && prop.aliases[opt]) {
            for (const alias of prop.aliases[opt]) {
              if (alias.trim()) optionToProp[alias.toLowerCase().trim()] = prop.name;
            }
          }
        }
      }

      // For each entry, find positions of matched property values in raw text
      // and record pairwise orderings
      const pairCounts = {}; // "A|B" -> { ab: count_A_before_B, ba: count_B_before_A }

      function processRaw(raw) {
        if (!raw) return;
        const rawLower = raw.toLowerCase();
        const positions = {}; // propName -> earliest position in raw

        // Build all candidates sorted longest-first
        const candidates = [];
        for (const prop of propDefs) {
          for (const opt of (prop.options || [])) {
            candidates.push({ lower: opt.toLowerCase(), propName: prop.name });
            if (prop.aliases && prop.aliases[opt]) {
              for (const alias of prop.aliases[opt]) {
                if (alias.trim()) candidates.push({ lower: alias.toLowerCase().trim(), propName: prop.name });
              }
            }
          }
        }
        candidates.sort((a, b) => b.lower.length - a.lower.length);

        for (const c of candidates) {
          if (positions[c.propName] !== undefined) continue;
          const escaped = c.lower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp('(?:^|\\s)' + escaped + '(?:\\s|$)');
          const m = re.exec(rawLower);
          if (m) {
            positions[c.propName] = m.index;
          }
        }

        // Record pairwise orderings
        const found = Object.entries(positions);
        for (let i = 0; i < found.length; i++) {
          for (let j = i + 1; j < found.length; j++) {
            const [nameA, posA] = found[i];
            const [nameB, posB] = found[j];
            const key = [nameA, nameB].sort().join('|');
            if (!pairCounts[key]) pairCounts[key] = {};
            const first = posA < posB ? nameA : nameB;
            pairCounts[key][first] = (pairCounts[key][first] || 0) + 1;
          }
        }
      }

      for (const block of blocks) {
        for (const entry of block.entries) {
          if (entry.type === 'cart') {
            for (const slot of entry.slots) {
              processRaw(slot.rawProps);
            }
            for (const child of (entry.children || [])) {
              for (const chSlot of child.slots) {
                processRaw(chSlot.rawProps);
              }
            }
          } else {
            processRaw(entry.rawProps);
          }
        }
      }

      // Build unambiguous ordering: A before B only if all observations agree
      const before = {}; // propName -> Set of propNames that come after it
      for (const [key, counts] of Object.entries(pairCounts)) {
        const [nameA, nameB] = key.split('|');
        const countA = counts[nameA] || 0;
        const countB = counts[nameB] || 0;
        // Unambiguous only if one direction is observed and not the other
        if (countA > 0 && countB === 0) {
          if (!before[nameA]) before[nameA] = new Set();
          before[nameA].add(nameB);
        } else if (countB > 0 && countA === 0) {
          if (!before[nameB]) before[nameB] = new Set();
          before[nameB].add(nameA);
        }
        // Otherwise ambiguous — no ordering constraint
      }

      // Topological sort with the unambiguous constraints
      const propNames = propDefs.map(p => p.name);
      const sorted = [];
      const visited = new Set();
      const visiting = new Set();

      function visit(name) {
        if (visited.has(name)) return;
        if (visiting.has(name)) return; // cycle — skip
        visiting.add(name);
        // Visit all names that should come after this one
        for (const after of (before[name] || [])) {
          visit(after);
        }
        visiting.delete(name);
        visited.add(name);
        sorted.unshift(name);
      }

      // Start with nodes that have most "before" relationships
      const priority = propNames.slice().sort((a, b) => ((before[b] || new Set()).size) - ((before[a] || new Set()).size));
      for (const name of priority) {
        visit(name);
      }

      // Include any props not reached by the graph
      for (const name of propNames) {
        if (!sorted.includes(name)) sorted.push(name);
      }

      return sorted;
    }

    // Apply location and property ordering from imported map when locks are off
    function _applyMapOrdering(blocks, propDefs) {
      const meta = DB.getMetadata();

      // Location order from map (order of location blocks)
      if (!meta.locationOrderLocked) {
        const mapLocOrder = [];
        for (const block of blocks) {
          if (block.location && !mapLocOrder.includes(block.location)) {
            mapLocOrder.push(block.location);
          }
        }
        if (mapLocOrder.length) {
          // Merge: map order first, then existing locations not in map
          const existingNames = meta.locations.map(l => l.name);
          const fullOrder = [...mapLocOrder];
          existingNames.forEach(n => { if (!fullOrder.includes(n)) fullOrder.push(n); });
          DB.setLocationOrder(fullOrder);
        }

        // Also order sub-locations within each location based on map order
        const subLocOrder = {}; // locName -> [subLoc1, subLoc2, ...]
        for (const block of blocks) {
          if (block.location && block.subLocation) {
            if (!subLocOrder[block.location]) subLocOrder[block.location] = [];
            if (!subLocOrder[block.location].includes(block.subLocation)) {
              subLocOrder[block.location].push(block.subLocation);
            }
          }
        }
        for (const [locName, orderedSubs] of Object.entries(subLocOrder)) {
          const loc = DB.getMetadata().locations.find(l => l.name === locName);
          if (loc && loc.subLocations && loc.subLocations.length > 1) {
            const merged = [...orderedSubs];
            loc.subLocations.forEach(s => { if (!merged.includes(s)) merged.push(s); });
            DB.upsertLocation({ name: locName, subLocations: merged });
          }
        }
      }

      // Property category order from map (unambiguous only)
      if (!meta.propertyOrderLocked) {
        const orderedProps = _extractPropertyOrderFromMap(blocks, propDefs);
        if (orderedProps.length) {
          DB.setPropertyOrder(orderedProps);
        }
      }
    }

    // consolidated delete button — choose items-only or full reset
    screen.querySelector('#main-delete').addEventListener('click', () => {

      const overlay = document.getElementById('modal-overlay');
      overlay.querySelector('#del-choice-cancel').addEventListener('click', Modal.close);
      overlay.querySelector('#del-choice-items').addEventListener('click', () => {

          actions: [

                ]

            }},

    // ── עדכון תנועות ─────────────────────────────────────────────
    screen.querySelector('#main-movements-update').addEventListener('click', () => {
      Modal.open({
        title: 'עדכון תנועות',
        html: `
          <p class="card-meta" style="margin-bottom:10px">הדבק כאן הודעות WhatsApp שנשלחו מהאפליקציה. כל הודעה בנפרד — הפרד בשורה ריקה:</p>
          <textarea id="movements-paste-area" rows="10"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:rtl;text-align:right;resize:vertical;line-height:1.6"></textarea>
          <div id="movements-results" style="margin-top:10px;font-size:0.84rem;display:none"></div>
        `,
        actions: [
          { id: 'do-movements', label: 'עדכן', cls: 'btn-primary', onClick: () => {
            let text = document.getElementById('movements-paste-area').value.trim();
            if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
            // Strip WhatsApp/iOS directional marks
            text = text.replace(/[\uFEFF\u200B\u200C\u200D\u00A0\u200E\u200F\u202A-\u202E\u2066-\u2069\u061C]/g, '');
            const results = _parseAndApplyMovements(text);
            const ok = results.filter(r => r.ok);
            const fail = results.filter(r => !r.ok);
            const resEl = document.getElementById('movements-results');
            resEl.style.display = '';
            const okHtml = ok.length ? `<div style="color:var(--success);margin-bottom:4px">✓ עודכנו ${ok.length} תנועות:<br>${ok.map(r => esc(r.msg)).join('<br>')}</div>` : '';
            const failHtml = fail.length ? `<div style="color:var(--danger)">✗ לא זוהו ${fail.length}:<br>${fail.map(r => esc(r.msg)).join('<br>')}</div>` : '';
            resEl.innerHTML = okHtml + failHtml;
            if (ok.length) Toast.show(`עודכנו ${ok.length} תנועות`, 'success');
          }},
          { id: 'cancel-movements', label: 'סגור', onClick: Modal.close }
        ]
      });
    });

    function _parseAndApplyMovements(text) {
      const allCarts    = DB.getAllCarts();
      const meta        = DB.getMetadata();
      const allLocs     = meta.locations || [];
      const ctypes      = (meta.containerTypes || []).concat(['עגלה']);
      const results     = [];

      function resolveLocLabel(label) {
        label = (label || '').trim();
        if (allLocs.find(l => l.name === label)) return { location: label, subLocation: '' };
        for (const loc of allLocs) {
          if ((loc.subLocations || []).includes(label)) return { location: loc.name, subLocation: label };
          for (const [sub, aliases] of Object.entries(loc.subLocationAliases || {})) {
            if ((aliases || []).includes(label)) return { location: loc.name, subLocation: sub };
          }
        }
        return { location: label, subLocation: '' };
      }

      function extractCartId(line) {
        let stripped = (line || '').trim();
        for (const ct of ctypes) {
          if (stripped.startsWith(ct + ' ')) { stripped = stripped.slice(ct.length + 1).trim(); break; }
        }
        const cartId = stripped.replace(/\([^)]+\)\s*$/, '').trim();
        return allCarts.find(c => c.cartId === cartId) ? cartId : null;
      }

      // Detect and parse WhatsApp multi-message format: [M/D, HH:MM] Name: content
      const waHeaderRe = /^\[\d{1,2}\/\d{1,2},\s*\d{1,2}:\d{2}\]\s*[^:]+:/;
      let processedBlocks;
      if (waHeaderRe.test(text)) {
        const raw = [];
        let cur = null;
        for (const line of text.split('\n')) {
          const hm = line.match(/^\[(\d{1,2})\/(\d{1,2}),\s*(\d{1,2}:\d{2})\]\s*[^:]+:\s*(.*)/);
          if (hm) {
            if (cur) raw.push(cur);
            cur = { time: `${hm[1]}/${hm[2]} ${hm[3]}`, lines: hm[4].trim() ? [hm[4].trim()] : [] };
          } else if (cur) {
            if (line.trim()) cur.lines.push(line.trim());
          }
        }
        if (cur) raw.push(cur);
        processedBlocks = raw.filter(b => b.lines.length);
      } else {
        processedBlocks = text.split(/\n[ \t]*\n/)
          .map(b => ({ time: null, lines: b.trim().split('\n').map(l => l.trim()).filter(Boolean) }))
          .filter(b => b.lines.length);
      }

      for (const { time, lines } of processedBlocks) {
        if (!lines.length) continue;
        const timePrefix = time ? `[${time}] ` : '';
        let handled = false;

        // 1. Empty cart transfer (single line): "עגלה X-Y(Z) ריקה מועברת מA לB"
        const emptyM = lines[0].match(/ריקה\s+מועברת\s+מ(.+?)\s+ל(.+)$/);
        if (!handled && emptyM && lines.length === 1) {
          const beforeRika = lines[0].replace(/\s+ריקה.*$/, '').trim();
          let stripped = beforeRika;
          for (const ct of ctypes) {
            if (stripped.startsWith(ct + ' ')) { stripped = stripped.slice(ct.length + 1).trim(); break; }
          }
          const cartId = stripped.replace(/\([^)]+\)\s*$/, '').trim();
          if (allCarts.find(c => c.cartId === cartId)) {
            const { location, subLocation } = resolveLocLabel(emptyM[2]);
            DB.upsertCart({ cartId, location, subLocation });
            results.push({ ok: true, msg: `${timePrefix}${cartId} → ${location}${subLocation ? '/' + subLocation : ''}` });
          } else {
            results.push({ ok: false, msg: `${timePrefix}עגלה לא נמצאה: ${beforeRika}` });
          }
          handled = true;
        }

        // 2. Cart with "מועברת מX לY" line
        if (!handled) {
          const tLine = lines.find(l => /מועברת\s+מ.+\s+ל/.test(l));
          if (tLine) {
            const m = tLine.match(/מועברת\s+מ(.+?)\s+ל(.+)$/);
            if (m) {
              const cartId = extractCartId(lines[0]);
              if (cartId) {
                const { location, subLocation } = resolveLocLabel(m[2]);
                DB.upsertCart({ cartId, location, subLocation });
                results.push({ ok: true, msg: `${timePrefix}${cartId} → ${location}${subLocation ? '/' + subLocation : ''}` });
              } else {
                results.push({ ok: false, msg: `${timePrefix}עגלה לא נמצאה: ${lines[0]}` });
              }
              handled = true;
            }
          }
        }

        // 3. Load: "מועמסת בX"
        if (!handled) {
          const lLine = lines.find(l => /מועמסת\s+ב/.test(l));
          if (lLine) {
            const m = lLine.match(/מועמסת\s+ב(.+)$/);
            if (m) {
              const cartId = extractCartId(lines[0]);
              if (cartId) {
                const { location, subLocation } = resolveLocLabel(m[1]);
                DB.upsertCart({ cartId, location, subLocation });
                results.push({ ok: true, msg: `${timePrefix}${cartId} → ${location}${subLocation ? '/' + subLocation : ''}` });
              } else {
                results.push({ ok: false, msg: `${timePrefix}עגלה לא נמצאה: ${lines[0]}` });
              }
              handled = true;
            }
          }
        }

        // 4. Floor transfer: "על משטח …\nמX לY"
        if (!handled && lines[0].startsWith('על משטח')) {
          const mLine = lines.find(l => /^מ.+\s+ל/.test(l));
          if (mLine) {
            const m = mLine.match(/^מ(.+?)\s+ל(.+)$/);
            if (m) {
              const { location: srcLoc } = resolveLocLabel(m[1]);
              const { location: destLoc, subLocation: destSub } = resolveLocLabel(m[2]);
              const floorItems = Object.values(DB.load().floorItems).filter(fi => fi.location === srcLoc);
              if (floorItems.length) {
                floorItems.forEach(fi => DB.setFloorItemLocation(fi.id, destLoc, destSub));
                results.push({ ok: true, msg: `${timePrefix}רצפה ${srcLoc} → ${destLoc}${destSub ? '/' + destSub : ''}` });
              } else {
                results.push({ ok: false, msg: `${timePrefix}לא נמצאו פריטי רצפה ב${srcLoc}` });
              }
              handled = true;
            }
          }
        }

        if (!handled) {
          results.push({ ok: false, msg: `${timePrefix}לא זוהה: "${lines[0].slice(0, 40)}"` });
        }
      }
      return results;
    }

    // ── Pull-to-refresh ─────────────────────────────────────────
    const ptrIndicator = document.createElement('div');
    ptrIndicator.className = 'ptr-indicator';
    ptrIndicator.innerHTML = '<span class="ptr-arrow">↓</span><span class="ptr-text">משוך לרענון</span>';
    screen.insertBefore(ptrIndicator, screen.firstChild.nextSibling); // after header

    const PTR_THRESHOLD = 70;
    let _ptrStartY = 0, _ptrDist = 0, _ptrActive = false, _ptrRefreshing = false;
    const scrContainer = document.getElementById('screen-container');

    scrContainer.addEventListener('touchstart', e => {
      if (Router.getCurrent() !== 'main' || _ptrRefreshing) return;
      if (scrContainer.scrollTop > 5) return;
      _ptrStartY = e.touches[0].clientY;
      _ptrActive = true;
      _ptrDist = 0;
      ptrIndicator.classList.add('pulling');
      ptrIndicator.classList.remove('threshold', 'refreshing');
    }, { passive: true });

    scrContainer.addEventListener('touchmove', e => {
      if (!_ptrActive || _ptrRefreshing) return;
      const dy = e.touches[0].clientY - _ptrStartY;
      if (dy < 0 || scrContainer.scrollTop > 5) { _ptrActive = false; ptrIndicator.style.height = '0'; return; }
      _ptrDist = Math.min(dy * 0.5, 100);
      ptrIndicator.style.height = _ptrDist + 'px';
      ptrIndicator.classList.toggle('threshold', _ptrDist >= PTR_THRESHOLD);
      ptrIndicator.querySelector('.ptr-text').textContent = _ptrDist >= PTR_THRESHOLD ? 'שחרר לרענון' : 'משוך לרענון';
    }, { passive: true });

    scrContainer.addEventListener('touchend', () => {
      if (!_ptrActive) return;
      ptrIndicator.classList.remove('pulling');
      if (_ptrDist >= PTR_THRESHOLD && !_ptrRefreshing) {
        _ptrRefreshing = true;
        ptrIndicator.classList.add('refreshing');
        ptrIndicator.querySelector('.ptr-text').textContent = 'מרענן...';
        ptrIndicator.style.height = '44px';
        if (navigator.vibrate) navigator.vibrate(15);
        // Reload the page to pick up the latest version
        setTimeout(() => { location.reload(); }, 600);
      } else {
        ptrIndicator.style.height = '0';
      }
      _ptrActive = false;
      _ptrDist = 0;
    }, { passive: true });

    Router.register('main', {
      onShow() {}
    });
  }
  </script>

  <script>
  // ── Progress indicator ─────────────────────────────
  const Progress = {
    _el: null,
    show(label) {
      this._el = document.getElementById('progress-overlay');
      this._el.innerHTML = `<div class="progress-box"><div class="progress-spinner"></div><div class="progress-label">${label || 'מעבד...'}</div><div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div></div>`;
      this._el.hidden = false;
    },
    update(pct) {
      const fill = document.getElementById('progress-fill');
      if (fill) fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
    },
    hide() {
      if (this._el) { this._el.hidden = true; this._el.innerHTML = ''; }
    }
  };

  // ── Theme management ─────────────────────────────
  const THEME_KEY = 'shinua_theme';

  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') {
      setTheme(saved);
      return;
    }
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(prefersDark ? 'dark' : 'light');
  }

  function setTheme(mode) {
    document.body.setAttribute('data-theme', mode);
    localStorage.setItem(THEME_KEY, mode);
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = mode === 'dark' ? 'מצב בהיר' : 'מצב כהה';
  }

  function toggleTheme() {
    const current = document.body.getAttribute('data-theme') || 'light';
    setTheme(current === 'dark' ? 'light' : 'dark');
  }

  // ─── Help Content ───────────────────────────────────────────────────────
  function _h(icon, text) {
    return `<div class="help-item"><span class="hi">${icon}</span><span>${text}</span></div>`;
  }
  function _sec(title, items) {
    return `<div class="help-section"><h3>${title}</h3>${items}</div>`;
  }

  const HelpContent = {
    main: {
      title: '❓ מסך ראשי — עזרה',
      html: `
        ${_sec('כפתורי המסך הראשי', `
          ${_h('📤', '<b>ייצוא נתונים</b> — מייצר גיבוי מלא של כל הנתונים ומעתיק ללוח.')}
          ${_h('📥', '<b>ייבוא נתונים</b> — הדבק טקסט גיבוי שיוצא קודם לכן — הנתונים יתמזגו.')}
          ${_h('🗺️', '<b>מיפוי</b> — יוצר מפת מיקומים, מעתיק ללוח ופותח עורך טקסט לעריכה ושמירה. בחר "רגיל" לפריטים שבמפה, או "חיצוני" לפריטים שאינם בעמוד המפה. לאחר הבחירה המיפוי מועתק ונפתח לעריכה — שנה ולחץ שמור.')}

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
// ─── BarcodeScanner module ───────────────────────────────────────────────
const BarcodeScanner = (() => {
  let _targetInput = null;
  let _stream = null;
  let _scanRaf = null;
  let _lastResult = null;

  const modal    = document.getElementById('scanner-modal');
  const choice   = document.getElementById('scanner-choice');
  const camView  = document.getElementById('scanner-camera-view');
  const galView  = document.getElementById('scanner-gallery-view');
  const video    = document.getElementById('scanner-video');
  const canvas   = document.getElementById('scanner-canvas');
  const galCanvas= document.getElementById('scanner-gallery-canvas');
  const fileInp  = document.getElementById('sc-file-input');
  const scanFrame= document.getElementById('scan-frame');
  const scanHole = document.getElementById('scan-hole');
  const resultBar= camView.querySelector('#scanner-result-bar');
  const tapHint  = camView.querySelector('#scanner-tap-hint');

  // Native BarcodeDetector (Android Chrome) or ZXing fallback (iOS Safari, Firefox)
  let _detector = null;
  let _zxingReader = null;

  async function _getZXingReader() {
    if (_zxingReader) return _zxingReader;
    if (!window.ZXing) throw new Error('ZXing not loaded');
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    _zxingReader = new ZXing.MultiFormatReader();
    _zxingReader.setHints(hints);
    return _zxingReader;
  }

  async function decodeCanvas(cvs) {
    if ('BarcodeDetector' in window) {
      if (!_detector) _detector = new BarcodeDetector({ formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','qr_code','data_matrix','pdf417','aztec'] });
      return await _detector.detect(cvs);
    }
    // ZXing fallback
    const reader = await _getZXingReader();
    const ctx = cvs.getContext('2d');
    const id = ctx.getImageData(0, 0, cvs.width, cvs.height);
    const lum = new ZXing.RGBLuminanceSource(id.data, cvs.width, cvs.height);
    const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
    try {
      const res = reader.decode(bmp);
      return [{ rawValue: res.getText() }];
    } catch(e) { return []; }
  }

  function open(inputEl) {
    _targetInput = inputEl;
    _lastResult = null;
    showChoice();
    modal.classList.add('open');
  }

  function close() {
    modal.classList.remove('open');
    stopCamera();
    camView.classList.remove('active');
    galView.classList.remove('active');
    choice.style.display = '';
    _lastResult = null;
  }

  function showChoice() {
    choice.style.display = '';
    camView.classList.remove('active');
    galView.classList.remove('active');
    stopCamera();
  }

  async function startCamera() {
    choice.style.display = 'none';
    camView.classList.add('active');
    resultBar.textContent = '';
    tapHint.textContent = 'הכנס ברקוד לתוך המסגרת';
    scanFrame.setAttribute('stroke', '#fff');
    scanHole.setAttribute('fill', 'black');
    _lastResult = null;
    try {
      _stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      video.srcObject = _stream;
      await video.play();
      _scanRaf = requestAnimationFrame(scanLoop);
    } catch(e) {
      Toast.show('לא ניתן לגשת למצלמה', 'error');
      showChoice();
    }
  }

  function stopCamera() {
    if (_scanRaf) { cancelAnimationFrame(_scanRaf); _scanRaf = null; }
    if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
    video.srcObject = null;
  }

  async function scanLoop() {
    if (!_stream) return;
    if (video.readyState < 2) { _scanRaf = requestAnimationFrame(scanLoop); return; }
    try {
      // crop to the scan rectangle area (80% wide, 30% tall centered)
      const vw = video.videoWidth, vh = video.videoHeight;
      const rx = Math.round(vw * 0.10), ry = Math.round(vh * 0.35);
      const rw = Math.round(vw * 0.80), rh = Math.round(vh * 0.30);
      canvas.width = rw; canvas.height = rh;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, rx, ry, rw, rh, 0, 0, rw, rh);
      const codes = await decodeCanvas(canvas);
      if (codes.length) {
        const val = codes[0].rawValue;
        if (val !== _lastResult) {
          _lastResult = val;
          resultBar.textContent = val;
          tapHint.textContent = 'הקש כדי לאשר';
          scanFrame.setAttribute('stroke', '#00e878');
          scanHole.setAttribute('fill', '#00e87822');
        }
      } else if (_lastResult === null) {
        scanFrame.setAttribute('stroke', '#fff');
        scanHole.setAttribute('fill', 'black');
      }
    } catch(e) { /* ignore single frame errors */ }
    _scanRaf = requestAnimationFrame(scanLoop);
  }

  // Gallery mode state
  let _galImg = null;
  let _galRect = null; // {x,y,w,h} in image px
  let _galDrag = null;
  let _galDetected = null;
  const GHANDLE = 44;

  function startGallery() {
    choice.style.display = 'none';
    galView.classList.add('active');
    _galImg = null; _galRect = null; _galDetected = null;
    fileInp.value = '';
    fileInp.click();
  }

  fileInp.addEventListener('change', () => {
    const file = fileInp.files[0];
    if (!file) { showChoice(); return; }
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      _galImg = img;
      _galDetected = null;
      const W = img.naturalWidth, H = img.naturalHeight;
      _galRect = { x: Math.round(W*0.25), y: Math.round(H*0.40), w: Math.round(W*0.50), h: Math.round(H*0.15) };
      drawGallery();
      // auto-detect
      detectGallery();
    };
    img.src = url;
  });

  function galToCanvas(v) {
    if (!_galImg) return 0;
    const cssW = galCanvas.clientWidth;
    return v * (cssW / _galImg.naturalWidth);
  }
  function galToImg(v) {
    if (!_galImg) return 0;
    const cssW = galCanvas.clientWidth;
    return v * (_galImg.naturalWidth / cssW);
  }

  function drawGallery() {
    if (!_galImg) return;
    const cssW = galCanvas.clientWidth || window.innerWidth;
    const ratio = _galImg.naturalHeight / _galImg.naturalWidth;
    galCanvas.width  = cssW;
    galCanvas.height = Math.round(cssW * ratio);
    const ctx = galCanvas.getContext('2d');
    ctx.drawImage(_galImg, 0, 0, galCanvas.width, galCanvas.height);
    const rx = galToCanvas(_galRect.x), ry = galToCanvas(_galRect.y);
    const rw = galToCanvas(_galRect.w), rh = galToCanvas(_galRect.h);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0,0,galCanvas.width,ry);
    ctx.fillRect(0,ry+rh,galCanvas.width,galCanvas.height-ry-rh);
    ctx.fillRect(0,ry,rx,rh);
    ctx.fillRect(rx+rw,ry,galCanvas.width-rx-rw,rh);
    const color = _galDetected ? '#00e878' : '#fff';
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.strokeRect(rx,ry,rw,rh);
    const handles = [
      [rx,ry],[rx+rw,ry],[rx,ry+rh],[rx+rw,ry+rh],   // corners
      [rx+rw/2,ry],[rx+rw/2,ry+rh],                   // top/bottom mid
      [rx,ry+rh/2],[rx+rw,ry+rh/2],                   // left/right mid
    ];
    handles.forEach(([x,y]) => {
      ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    });
    if (_galDetected) {
      ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,galCanvas.height-60,galCanvas.width,60);
      ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
      ctx.fillText(_galDetected, galCanvas.width/2, galCanvas.height-30);
      ctx.font='12px sans-serif'; ctx.fillStyle='rgba(255,255,255,.7)';
      ctx.fillText('הקש פעמיים לאישור', galCanvas.width/2, galCanvas.height-12);
    }
  }

  async function detectGallery() {
    if (!_galImg || !_galRect) return;
    _galDetected = null;
    try {
      const offscreen = document.createElement('canvas');
      offscreen.width = _galRect.w; offscreen.height = _galRect.h;
      offscreen.getContext('2d').drawImage(_galImg, _galRect.x, _galRect.y, _galRect.w, _galRect.h, 0, 0, _galRect.w, _galRect.h);
      const codes = await decodeCanvas(offscreen);
      if (codes.length) { _galDetected = codes[0].rawValue; }
    } catch(e) {}
    drawGallery();
  }

  function galHitCorner(px, py) {
    if (!_galRect) return null;
    const rx=galToCanvas(_galRect.x), ry=galToCanvas(_galRect.y);
    const rw=galToCanvas(_galRect.w), rh=galToCanvas(_galRect.h);
    const handles = [
      {id:'tl', x:rx,      y:ry},
      {id:'tr', x:rx+rw,   y:ry},
      {id:'bl', x:rx,      y:ry+rh},
      {id:'br', x:rx+rw,   y:ry+rh},
      {id:'t',  x:rx+rw/2, y:ry},
      {id:'b',  x:rx+rw/2, y:ry+rh},
      {id:'l',  x:rx,      y:ry+rh/2},
      {id:'r',  x:rx+rw,   y:ry+rh/2},
    ];
    for (const c of handles) {
      if (Math.sqrt((px-c.x)**2+(py-c.y)**2) <= GHANDLE) return c.id;
    }
    if (px>=rx&&px<=rx+rw&&py>=ry&&py<=ry+rh) return 'body';
    return null;
  }

  function galGetPos(e) {
    const r = galCanvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    // Normalize CSS coords to canvas pixel coords in case CSS size ≠ canvas pixel size
    return {
      x: (src.clientX - r.left) * (galCanvas.width  / r.width),
      y: (src.clientY - r.top)  * (galCanvas.height / r.height),
    };
  }

  let _galLastTap = 0;
  function _isDoubleTap() {
    const now = Date.now();
    const dt = now - _galLastTap;
    _galLastTap = now;
    return dt < 350;
  }

  galCanvas.addEventListener('mousedown', e => {
    const p = galGetPos(e);
    const hit = galHitCorner(p.x, p.y);
    if (hit) { _galDrag = { handle: hit, startX: p.x, startY: p.y, orig: {..._galRect} }; return; }
    if (_galDetected && _isDoubleTap()) { confirmGallery(); }
  });
  galCanvas.addEventListener('mousemove', e => {
    if (!_galDrag) return;
    const p = galGetPos(e);
    galMoveDrag(p.x, p.y);
  });
  galCanvas.addEventListener('mouseup', () => endGalDrag());

  galCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const p = galGetPos(e);
    const hit = galHitCorner(p.x, p.y);
    if (hit) { _galDrag = { handle: hit, startX: p.x, startY: p.y, orig: {..._galRect} }; return; }
    if (_galDetected && _isDoubleTap()) { confirmGallery(); }
  }, {passive:false});
  galCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!_galDrag) return;
    const p = galGetPos(e);
    galMoveDrag(p.x, p.y);
  }, {passive:false});
  galCanvas.addEventListener('touchend', e => { e.preventDefault(); endGalDrag(); }, {passive:false});

  function galMoveDrag(px, py) {
    if (!_galDrag || !_galImg) return;
    const dx = galToImg(px - _galDrag.startX);
    const dy = galToImg(py - _galDrag.startY);
    const o  = _galDrag.orig;
    const W = _galImg.naturalWidth, H = _galImg.naturalHeight;
    const r  = {..._galRect};
    if (_galDrag.handle === 'body') { r.x = o.x+dx; r.y = o.y+dy; }
    else {
      if (_galDrag.handle.includes('l')) { r.x = o.x+dx; r.w = o.w-dx; }
      if (_galDrag.handle.includes('r')) { r.w = o.w+dx; }
      if (_galDrag.handle.includes('t')) { r.y = o.y+dy; r.h = o.h-dy; }
      if (_galDrag.handle.includes('b')) { r.h = o.h+dy; }
    }
    if (r.w < 20) r.w = 20;
    if (r.h < 20) r.h = 20;
    if (r.x < 0) { r.w += r.x; r.x = 0; }
    if (r.y < 0) { r.h += r.y; r.y = 0; }
    if (r.x+r.w > W) r.w = W-r.x;
    if (r.y+r.h > H) r.h = H-r.y;
    _galRect = r;
    drawGallery();
  }

  function endGalDrag() {
    if (_galDrag) { _galDrag = null; detectGallery(); }
  }

  function confirmGallery() {
    if (_galDetected && _targetInput) {
      _targetInput.value = _galDetected;
      _targetInput.dispatchEvent(new Event('change', {bubbles:true}));
    }
    close();
  }

  // camera confirm on tap
  camView.addEventListener('click', () => {
    if (_lastResult && _targetInput) {
      _targetInput.value = _lastResult;
      _targetInput.dispatchEvent(new Event('change', {bubbles:true}));
      close();
    }
  });

  // button wiring
  document.getElementById('sc-camera-btn').addEventListener('click', startCamera);
  document.getElementById('sc-gallery-btn').addEventListener('click', startGallery);
  document.getElementById('sc-cam-close').addEventListener('click', e => { e.stopPropagation(); close(); });
  document.getElementById('sc-gal-close').addEventListener('click', close);
  document.getElementById('scanner-back-btn').addEventListener('click', showChoice);

  return { open };
})();

// ─── Global scan-btn handler ─────────────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('.scan-btn');
  if (!btn) return;
  e.preventDefault(); e.stopPropagation();
  const row  = btn.closest('.item-row');
  const inp  = row && row.querySelector('.item-id-input');
  if (inp) BarcodeScanner.open(inp);
});
</script>
</body>
