  <script>
  function initEdit() {
    const screen = document.getElementById('screen-edit');
    let activeTab = 'carts';

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">✏️</span>
        <h1>עריכת נתונים</h1>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="carts">עגלות</button>
        <button class="tab-btn" data-tab="locations">מיקומים</button>
        <button class="tab-btn" data-tab="properties">מאפיינים</button>
      </div>
      <div id="edit-tab-content"></div>
    `;

    const tabContent = screen.querySelector('#edit-tab-content');

    function renderTab(tab) {
      activeTab = tab;
      screen.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      if (tab === 'carts')      renderCartsTab();
      if (tab === 'locations')  renderLocationsTab();
      if (tab === 'properties') renderPropertiesTab();
    }

    screen.querySelector('.tabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (btn) renderTab(btn.dataset.tab);
    });

    // ── Carts Tab ──
    function renderCartsTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">הוספת / עדכון עגלה</div>
            <div class="form-group">
              <label class="form-label">מספר עגלה</label>
              <input id="ec-cartid" class="form-input" placeholder="8-6" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label">סוג עגלה</label>
              <select id="ec-carttype" class="form-select">
                <option value="">— ללא סוג —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">מיקום</label>
              <input id="ec-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="ec-subloc-group" hidden>
              <label class="form-label">תת-מיקום</label>
              <input id="ec-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
            <button id="ec-save" class="btn btn-primary btn-full">שמור עגלה</button>
          </div>

          <div class="card mt-12">
            <div class="card-title">עגלות קיימות</div>
            <div id="ec-list"></div>
          </div>

          <div class="card mt-12">
            <div class="card-title">סוגי עגלות</div>
            <div class="form-group" style="display:flex;gap:8px;">
              <input id="ec-newtype" class="form-input" placeholder="110" autocomplete="off" style="flex:1">
              <button id="ec-addtype-btn" class="btn btn-outline">+ הוסף</button>
            </div>
            <div id="ec-type-list"></div>
          </div>
        </div>
      `;

      function renderCartTypeOptions() {
        const sel = tabContent.querySelector('#ec-carttype');
        const types = DB.getMetadata().cartTypes || [];
        sel.innerHTML = '<option value="">— ללא סוג —</option>' +
          types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
      }

      function renderTypeList() {
        const container = tabContent.querySelector('#ec-type-list');
        const types = DB.getMetadata().cartTypes || [];
        if (!types.length) { container.innerHTML = '<p class="card-meta">אין סוגים מוגדרים</p>'; return; }
        container.innerHTML = types.map(t => `
          <div class="list-item">
            <div class="list-item-body"><div class="list-item-title">${esc(t)}</div></div>
            <div class="list-item-actions">
              <button class="btn-icon ec-deltype-btn" data-type="${esc(t)}" title="מחק">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      // render list
      function renderList() {
        const list = tabContent.querySelector('#ec-list');
        const carts = DB.getAllCarts();
        if (!carts.length) {
          list.innerHTML = '<p class="card-meta">אין עגלות</p>';
          return;
        }
        list.innerHTML = carts.sort((a,b) => a.cartId.localeCompare(b.cartId)).map(c => `
          <div class="list-item">
            <div class="list-item-body">
              <div class="list-item-title">${esc(cartLabel(c))}</div>
              <div class="list-item-sub">${c.location || 'ללא מיקום'}${cartTotalCount(c) ? ' · ' + cartTotalCount(c) + ' פריטים' : ''}</div>
            </div>
            <div class="list-item-actions">
              <button class="btn-icon ec-edit-btn" data-id="${esc(c.cartId)}" title="ערוך">✏️</button>
              <button class="btn-icon ec-del-btn"  data-id="${esc(c.cartId)}" title="מחק">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      renderList();
      renderCartTypeOptions();
      renderTypeList();
      makeAutocomplete(tabContent.querySelector('#ec-cartid'), () => DB.getMetadata().carts);
      setupLocationFields(
        tabContent.querySelector('#ec-loc'),
        tabContent.querySelector('#ec-subloc-group'),
        tabContent.querySelector('#ec-subloc')
      );

      // save
      tabContent.querySelector('#ec-save').addEventListener('click', () => {
        const cartId   = tabContent.querySelector('#ec-cartid').value.trim();
        if (!cartId) { Toast.show('יש להזין מספר עגלה', 'error'); return; }
        const cartType = tabContent.querySelector('#ec-carttype').value;
        const loc      = tabContent.querySelector('#ec-loc').value.trim();
        const subLoc   = tabContent.querySelector('#ec-subloc-group').hidden
          ? '' : tabContent.querySelector('#ec-subloc').value.trim();
        DB.upsertCart({ cartId, cartType, location: loc, subLocation: subLoc,
                        isEmpty: false, itemCount: 0, itemIds: [], properties: {} });
        Toast.show('עגלה נשמרה', 'success');
        renderList();
        tabContent.querySelector('#ec-cartid').value = '';
        tabContent.querySelector('#ec-carttype').value = '';
        tabContent.querySelector('#ec-loc').value = '';
        tabContent.querySelector('#ec-subloc').value = '';
      });

      // edit / delete delegation
      tabContent.querySelector('#ec-list').addEventListener('click', e => {
        const editBtn = e.target.closest('.ec-edit-btn');
        const delBtn  = e.target.closest('.ec-del-btn');
        if (editBtn) {
          const cart = DB.getCart(editBtn.dataset.id);
          if (!cart) return;
          tabContent.querySelector('#ec-cartid').value = cart.cartId;
          tabContent.querySelector('#ec-carttype').value = cart.cartType || '';
          const ecLoc = tabContent.querySelector('#ec-loc');
          ecLoc.value = cart.location || '';
          ecLoc.dispatchEvent(new Event('change', { bubbles: true }));
          tabContent.querySelector('#ec-subloc').value = cart.subLocation || '';
          tabContent.querySelector('#ec-cartid').scrollIntoView({ behavior: 'smooth' });
        }
        if (delBtn) {
          Modal.open({
            title: 'מחיקת עגלה',
            html: `<p>האם למחוק את העגלה <strong>${esc(cartLabel(DB.getCart(delBtn.dataset.id) || { cartId: delBtn.dataset.id }))}</strong>?</p>`,
            actions: [
              { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
                DB.deleteCart(delBtn.dataset.id);
                Modal.close();
                Toast.show('עגלה נמחקה', 'info');
                renderList();
              }},
              { id: 'cancel', label: 'ביטול', onClick: Modal.close }
            ]
          });
        }
      });

      // cart type add / delete
      tabContent.querySelector('#ec-addtype-btn').addEventListener('click', () => {
        const val = tabContent.querySelector('#ec-newtype').value.trim();
        if (!val) return;
        DB.addCartType(val);
        tabContent.querySelector('#ec-newtype').value = '';
        renderCartTypeOptions();
        renderTypeList();
        Toast.show('סוג עגלה נוסף', 'success');
      });

      tabContent.querySelector('#ec-type-list').addEventListener('click', e => {
        const delBtn = e.target.closest('.ec-deltype-btn');
        if (!delBtn) return;
        Modal.open({
          title: 'מחיקת סוג עגלה',
          html: `<p>האם למחוק את הסוג <strong>${esc(delBtn.dataset.type)}</strong>?</p>`,
          actions: [
            { id: 'del', label: 'מחק', cls: 'btn-danger', onClick: () => {
              DB.deleteCartType(delBtn.dataset.type);
              Modal.close();
              renderCartTypeOptions();
              renderTypeList();
              Toast.show('סוג נמחק', 'info');
            }},
            { id: 'cancel', label: 'ביטול', onClick: Modal.close }
          ]
        });
      });
    }

    // ── Locations Tab ──
    function renderLocationsTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">הוספת מיקום</div>
            <div class="form-group">
              <label class="form-label">שם מיקום</label>
              <input id="el-name" class="form-input" placeholder="משני">
            </div>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer">
              <input type="checkbox" id="el-inmap"> הצג במיפוי
            </label>
            <button id="el-save" class="btn btn-primary btn-full">שמור מיקום</button>
          </div>

          <div class="card mt-12">
            <div class="card-title">מיקומים קיימים</div>
            <div id="el-list"></div>
          </div>

          <div class="card mt-12">
            <div class="card-title">ניהול תתי-מיקומים</div>
            <div class="form-group">
              <label class="form-label">בחר מיקום</label>
              <select id="el-sub-loc-sel" class="form-select">
                <option value="">— בחר מיקום —</option>
              </select>
            </div>
            <div id="el-sub-list"></div>
            <div id="el-sub-add-row" class="prop-add-row" hidden>
              <input id="el-sub-input" class="form-input btn-sm" placeholder="שם תת-מיקום">
              <button id="el-sub-add" class="btn btn-outline btn-sm">הוסף</button>
            </div>
          </div>
        </div>
      `;

      function renderList() {
        const list = tabContent.querySelector('#el-list');
        const locs = DB.getMetadata().locations;
        if (!locs.length) { list.innerHTML = '<p class="card-meta">אין מיקומים</p>'; return; }
        list.innerHTML = locs.map(l => {
          const subs = (l.subLocations || []);
          const subStr = subs.length ? subs.join(', ') : '';
          return `
            <div class="list-item">
              <div class="list-item-body">
                <div class="list-item-title">${l.name}</div>
                <div class="list-item-sub">${l.inMap ? '✓ מוצג במיפוי' : ''}${subStr ? (l.inMap ? ' · ' : '') + subStr : ''}</div>
              </div>
              <div class="list-item-actions">
                <button class="btn-icon el-toggle-btn" data-name="${esc(l.name)}" title="${l.inMap ? 'הסר ממיפוי' : 'הוסף למיפוי'}">${l.inMap ? '🗺️' : '📍'}</button>
                <button class="btn-icon el-del-btn" data-name="${esc(l.name)}" title="מחק">🗑️</button>
              </div>
            </div>
          `;
        }).join('');
      }

      function refreshSubLocSelect() {
        const sel  = tabContent.querySelector('#el-sub-loc-sel');
        const locs = DB.getMetadata().locations;
        const prev = sel.value;
        sel.innerHTML = '<option value="">— בחר מיקום —</option>' +
          locs.map(l => `<option value="${esc(l.name)}" ${l.name === prev ? 'selected' : ''}>${esc(l.name)}</option>`).join('');
      }

      function renderSubList(locName) {
        const subList  = tabContent.querySelector('#el-sub-list');
        const addRow   = tabContent.querySelector('#el-sub-add-row');
        if (!locName) { subList.innerHTML = ''; addRow.hidden = true; return; }
        addRow.hidden = false;
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = (loc && loc.subLocations) || [];
        if (!subs.length) {
          subList.innerHTML = '<p class="card-meta" style="margin-bottom:8px">אין תתי-מיקומים</p>';
          return;
        }
        subList.innerHTML = subs.map(s => `
          <div class="prop-option-row">
            <span>• ${s}</span>
            <button class="btn-icon el-sub-del" data-loc="${esc(locName)}" data-sub="${esc(s)}">✕</button>
          </div>
        `).join('');
      }

      renderList();
      refreshSubLocSelect();

      tabContent.querySelector('#el-save').addEventListener('click', () => {
        const name  = tabContent.querySelector('#el-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מיקום', 'error'); return; }
        const inMap = tabContent.querySelector('#el-inmap').checked;
        DB.upsertLocation({ name, inMap });
        Toast.show('מיקום נשמר', 'success');
        renderList();
        refreshSubLocSelect();
        tabContent.querySelector('#el-name').value = '';
        tabContent.querySelector('#el-inmap').checked = false;
      });

      tabContent.querySelector('#el-list').addEventListener('click', e => {
        const toggleBtn = e.target.closest('.el-toggle-btn');
        const delBtn    = e.target.closest('.el-del-btn');
        if (toggleBtn) {
          const name = toggleBtn.dataset.name;
          const loc  = DB.getMetadata().locations.find(l => l.name === name);
          if (loc) { DB.upsertLocation({ name, inMap: !loc.inMap }); renderList(); }
        }
        if (delBtn) {
          DB.deleteLocation(delBtn.dataset.name);
          Toast.show('מיקום נמחק', 'info');
          renderList();
          refreshSubLocSelect();
          renderSubList(tabContent.querySelector('#el-sub-loc-sel').value);
        }
      });

      // sublocation select change
      tabContent.querySelector('#el-sub-loc-sel').addEventListener('change', e => {
        renderSubList(e.target.value);
      });

      // add sublocation
      tabContent.querySelector('#el-sub-add').addEventListener('click', () => {
        const locName = tabContent.querySelector('#el-sub-loc-sel').value;
        const input   = tabContent.querySelector('#el-sub-input');
        const sub     = input.value.trim();
        if (!locName) { Toast.show('יש לבחור מיקום', 'error'); return; }
        if (!sub)     { Toast.show('יש להזין שם תת-מיקום', 'error'); return; }
        const loc  = DB.getMetadata().locations.find(l => l.name === locName);
        const subs = [...((loc && loc.subLocations) || [])];
        if (!subs.includes(sub)) {
          subs.push(sub);
          DB.upsertLocation({ name: locName, subLocations: subs });
          Toast.show('תת-מיקום נוסף', 'success');
        }
        input.value = '';
        renderSubList(locName);
        renderList();
      });

      // allow Enter in sublocation input
      tabContent.querySelector('#el-sub-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') tabContent.querySelector('#el-sub-add').click();
      });

      // delete sublocation (event delegation on the sub-list)
      tabContent.querySelector('#el-sub-list').addEventListener('click', e => {
        const delBtn = e.target.closest('.el-sub-del');
        if (!delBtn) return;
        const locName = delBtn.dataset.loc;
        const sub     = delBtn.dataset.sub;
        const loc     = DB.getMetadata().locations.find(l => l.name === locName);
        if (!loc) return;
        const subs = (loc.subLocations || []).filter(s => s !== sub);
        DB.upsertLocation({ name: locName, subLocations: subs });
        renderSubList(locName);
        renderList();
      });
    }

    // ── Properties Tab ──
    function renderPropertiesTab() {
      tabContent.innerHTML = `
        <div class="p-screen">
          <div class="card">
            <div class="card-title">הוספת מאפיין</div>
            <div class="form-group">
              <label class="form-label">שם מאפיין</label>
              <input id="ep-name" class="form-input" placeholder="מרעום">
            </div>
            <button id="ep-save" class="btn btn-primary btn-full">הוסף מאפיין</button>
          </div>

          <div class="card mt-12">
            <div class="card-title">מאפיינים קיימים</div>
            <div id="ep-list"></div>
          </div>
        </div>
      `;

      function renderList() {
        const list  = tabContent.querySelector('#ep-list');
        const props = DB.getMetadata().properties;
        if (!props.length) { list.innerHTML = '<p class="card-meta">אין מאפיינים</p>'; return; }
        list.innerHTML = props.map(p => `
          <div class="prop-group" data-prop="${esc(p.name)}">
            <div class="prop-group-header">
              <div class="prop-group-header-left">
                <i class="prop-chevron">▶</i>
                <strong>${esc(p.name)}</strong>
              </div>
              <button class="btn-icon ep-del-prop" data-prop="${esc(p.name)}" title="מחק מאפיין">✕</button>
            </div>
            <div class="prop-options">
              ${p.options.map(o => `
                <div class="prop-option-row">
                  <span>• ${esc(o)}</span>
                  <button class="btn-icon ep-del-opt" data-prop="${esc(p.name)}" data-opt="${esc(o)}">✕</button>
                </div>
              `).join('')}
              <div class="prop-add-row">
                <input class="form-input btn-sm ep-opt-input" data-prop="${esc(p.name)}" placeholder="אפשרות חדשה">
                <button class="btn btn-outline btn-sm ep-add-opt" data-prop="${esc(p.name)}">הוסף</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      renderList();

      tabContent.querySelector('#ep-save').addEventListener('click', () => {
        const name = tabContent.querySelector('#ep-name').value.trim();
        if (!name) { Toast.show('יש להזין שם מאפיין', 'error'); return; }
        DB.upsertProperty({ name, options: [] });
        Toast.show('מאפיין נוסף', 'success');
        renderList();
        tabContent.querySelector('#ep-name').value = '';
      });

      tabContent.querySelector('#ep-list').addEventListener('click', e => {
        // expand/collapse
        const header = e.target.closest('.prop-group-header');
        if (header && !e.target.closest('button')) {
          header.closest('.prop-group').classList.toggle('expanded');
          return;
        }
        // delete property
        const delProp = e.target.closest('.ep-del-prop');
        if (delProp) {
          DB.deleteProperty(delProp.dataset.prop);
          Toast.show('מאפיין נמחק', 'info');
          renderList();
          return;
        }
        // delete option
        const delOpt = e.target.closest('.ep-del-opt');
        if (delOpt) {
          DB.removePropertyOption(delOpt.dataset.prop, delOpt.dataset.opt);
          renderList();
          return;
        }
        // add option
        const addOpt = e.target.closest('.ep-add-opt');
        if (addOpt) {
          const propName = addOpt.dataset.prop;
          const input = Array.from(tabContent.querySelectorAll('.ep-opt-input')).find(el => el.dataset.prop === propName);
          const val   = input ? input.value.trim() : '';
          if (!val) return;
          DB.addPropertyOption(propName, val);
          renderList();
          // re-expand the group
          const group = Array.from(tabContent.querySelectorAll('.prop-group')).find(el => el.dataset.prop === propName);
          if (group) group.classList.add('expanded');
          return;
        }
      });

      // allow Enter in option input
      tabContent.querySelector('#ep-list').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const addBtn = e.target.closest('.ep-opt-input');
          if (addBtn) {
            const propName = addBtn.dataset.prop;
            const btn = Array.from(tabContent.querySelectorAll('.ep-add-opt')).find(el => el.dataset.prop === propName);
            if (btn) btn.click();
          }
        }
      });
    }

    Router.register('edit', {
      onShow() { renderTab(activeTab); }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 6 — Screen: Transfer
  ════════════════════════════════════════════════════ -->
  <script>
  function initTransfer() {
    const screen = document.getElementById('screen-transfer');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔄</span>
        <h1>העברת עגלה / פריטים</h1>
      </div>
      <div class="p-screen">
        <div class="form-group">
          <div class="pill-toggle" id="tr-mode-toggle">
            <button class="active" data-mode="cart">עגלה</button>
            <button data-mode="floor">רצפה</button>
          </div>
        </div>

        <!-- cart mode -->
        <div id="tr-cart-section">
          <div id="tr-cart-form-host"></div>
        </div>

        <!-- floor mode: pick source by location + properties + serial number -->
        <div id="tr-floor-section" hidden>
          <div class="form-group">
            <label class="form-label">מיקום מקור</label>
            <input id="tr-floor-src-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div id="tr-floor-src-props" class="mt-12"></div>
          <div id="tr-floor-avail" class="card" style="margin:14px 0;" hidden></div>
          <div class="form-group">
            <label class="form-label">מספר סידורי</label>
            <input id="tr-floor-serial" class="form-input" placeholder="הקלד מספר סידורי..." autocomplete="off">
          </div>
        </div>

        <!-- shared fields (destination + cart item fields) -->
        <div id="tr-shared-fields" hidden>
          <div id="tr-current-info" class="card" style="margin:0 0 14px;"></div>

          <div class="form-group">
            <label class="form-label">מיקום יעד</label>
            <input id="tr-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div class="form-group" id="tr-dest-subloc-group" hidden>
            <label class="form-label">תת-מיקום יעד</label>
            <input id="tr-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>

          <!-- cart-mode: count + item rows + properties -->
          <div id="tr-cart-item-fields">
            <div class="form-group">
              <label class="form-label">מספר פריטים</label>
              <input id="tr-count" class="form-input" type="number" min="0" placeholder="0">
            </div>
            <div id="tr-item-rows" class="item-rows"></div>
            <div id="tr-prop-fields" class="mt-12"></div>
          </div>

          <button id="tr-save-btn" class="btn btn-primary btn-full mt-16">📋 שמור והעתק</button>
        </div>
      </div>
    `;

    let _mode = 'cart';       // 'cart' | 'floor'
    let _cartRef = null;      // CartForm instance
    let _currentData = null;  // current cart object (cart mode) or floor source info (floor mode)
    let _currentType = null;  // 'cart' | 'fi'

    // Set up destination location autocomplete
    setupLocationFields(
      screen.querySelector('#tr-dest-loc'),
      screen.querySelector('#tr-dest-subloc-group'),
      screen.querySelector('#tr-dest-subloc')
    );

    // Floor source: location + property pickers
    makeAutocomplete(screen.querySelector('#tr-floor-src-loc'),
      () => DB.getMetadata().locations.map(l => l.name));
    buildPropertyFields(screen.querySelector('#tr-floor-src-props'), {});

    function updateFloorDisplay() {
      const loc   = screen.querySelector('#tr-floor-src-loc').value.trim();
      const props = readPropertyFields(screen.querySelector('#tr-floor-src-props'));
      const avail = screen.querySelector('#tr-floor-avail');
      if (!loc) {
        avail.hidden = true; _currentData = null; _currentType = null;
        screen.querySelector('#tr-shared-fields').hidden = true; return;
      }
      const fi     = DB.findFloorItem(loc, props);
      const total  = fi ? (fi.itemCount || 0) : 0;
      const allIds = fi ? (fi.itemIds || []) : [];
      _currentData = { location: loc, properties: props, itemCount: total, itemIds: allIds };
      _currentType = 'fi';
      avail.hidden = false;
      avail.innerHTML = `<div class="card-title">נמצאו ${total} פריטים</div><div class="card-meta">${esc(loc)}</div>`;
      // autocomplete serial number from existing IDs at this location+props
      makeAutocomplete(screen.querySelector('#tr-floor-serial'), () => allIds);
      showSharedFields(_currentData, 'fi');
    }

    screen.querySelector('#tr-floor-src-loc').addEventListener('change', updateFloorDisplay);
    screen.querySelector('#tr-floor-src-props').addEventListener('change', updateFloorDisplay);

    function setMode(mode) {
      _mode = mode;
      screen.querySelectorAll('#tr-mode-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode));
      screen.querySelector('#tr-cart-section').hidden  = (mode !== 'cart');
      screen.querySelector('#tr-floor-section').hidden = (mode !== 'floor');
      screen.querySelector('#tr-shared-fields').hidden = true;
      screen.querySelector('#tr-cart-item-fields').hidden = (mode !== 'cart');
      _currentData = null; _currentType = null;
    }

    function showSharedFields(data, type) {
      _currentData = data;
      _currentType = type;
      const shared = screen.querySelector('#tr-shared-fields');
      shared.hidden = false;

      const info = screen.querySelector('#tr-current-info');
      if (type === 'cart') {
        info.innerHTML = `
          <div class="card-title">עגלה: ${esc(cartLabel(data))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(data.location || 'לא ידוע')}</div>
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = false;
        const countInput = screen.querySelector('#tr-count');
        countInput.value = data.itemCount || 0;
        renderItemRows(data.itemCount || 0, data.itemIds || []);
        buildPropertyFields(screen.querySelector('#tr-prop-fields'), data.properties || {});
      } else {
        const propStr = Object.values(data.properties || {}).filter(Boolean).join(' ');
        info.innerHTML = `
          <div class="card-title">[רצפה] ${esc(propStr)} · ${data.itemCount || 0} פריטים</div>
          <div class="card-meta">מיקום: ${esc(data.location || 'לא ידוע')}</div>
        `;
        screen.querySelector('#tr-cart-item-fields').hidden = true;
      }
    }

    function renderItemRows(n, existing) {
      const container = screen.querySelector('#tr-item-rows');
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    // count input changes (cart mode)
    screen.querySelector('#tr-count').addEventListener('input', () => {
      const n = parseInt(screen.querySelector('#tr-count').value) || 0;
      const existing = [...screen.querySelectorAll('.item-id-input')].map(i => i.value);
      renderItemRows(n, existing);
    });

    // mode toggle
    screen.querySelector('#tr-mode-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-mode]');
      if (btn) setMode(btn.dataset.mode);
    });

    // cart form
    _cartRef = CartForm(screen.querySelector('#tr-cart-form-host'), {
      onCartLoaded(cart) {
        if (cart) {
          showSharedFields(cart, 'cart');
        } else {
          screen.querySelector('#tr-shared-fields').hidden = true;
        }
      }
    });

    // combined save + copy button
    screen.querySelector('#tr-save-btn').addEventListener('click', () => {
      if (!_currentData) { Toast.show('בחר עגלה או מקור רצפה', 'error'); return; }
      const destLoc    = screen.querySelector('#tr-dest-loc').value.trim();
      const destSubLoc = screen.querySelector('#tr-dest-subloc-group').hidden
        ? '' : screen.querySelector('#tr-dest-subloc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return; }

      let msg;

      if (_currentType === 'cart') {
        const count   = parseInt(screen.querySelector('#tr-count').value) || 0;
        const itemIds = [...screen.querySelectorAll('.item-id-input')].map(i => i.value.trim()).filter(Boolean);
        const props   = readPropertyFields(screen.querySelector('#tr-prop-fields'));
        DB.upsertCart({
          cartId:      _currentData.cartId,
          location:    destLoc,
          subLocation: destSubLoc,
          itemCount:   count,
          itemIds,
          properties:  props,
          isEmpty:     count === 0
        });
        msg = Utils.copyMessage(cartLabel(_currentData), count, props, _currentData.location || '', destLoc);
        Toast.show('עגלה הועברה', 'success');
      } else {
        // floor mode: single serial number transfer
        const serial = screen.querySelector('#tr-floor-serial').value.trim();
        if (!serial) { Toast.show('יש להזין מספר סידורי', 'error'); return; }

        const srcFI       = DB.findFloorItem(_currentData.location, _currentData.properties);
        const existsInSrc = srcFI && (srcFI.itemIds || []).includes(serial);
        if (existsInSrc) {
          // deduct from source
          const remaining = Math.max(0, (srcFI.itemCount || 0) - 1);
          const remainIds = (srcFI.itemIds || []).filter(id => id !== serial);
          DB.upsertFloorItem({ location: _currentData.location, properties: _currentData.properties,
                               itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
        }
        // additive update at destination regardless of whether found at source
        const destFI   = DB.findFloorItem(destLoc, _currentData.properties);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + 1;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), serial];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: _currentData.properties, isEmpty: false });
        const propStr = Object.values(_currentData.properties || {}).filter(Boolean).join(' ');
        msg = `[רצפה] ${serial} ${propStr} | מועבר מ${_currentData.location || '?'} ל${destLoc}`.trim();
        Toast.show('פריטי רצפה הועברו', 'success');
        screen.querySelector('#tr-floor-serial').value = '';
        // refresh available count
        updateFloorDisplay();
      }

      // copy the message
      Utils.copyToClipboard(msg)
        .then(() => Toast.show('הועתק ✓', 'success'))
        .catch(() => Modal.open({
          title: 'העתקה ידנית',
          html: `<textarea rows="3" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.9rem;direction:rtl" readonly onclick="this.select()">${esc(msg)}</textarea>`,
          actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
        }));
    });

    Router.register('transfer', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setMode('cart');
          setTimeout(() => _cartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setMode('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#tr-floor-src-loc').value = fi.location || '';
              screen.querySelector('#tr-floor-src-loc').dispatchEvent(new Event('change'));
              buildPropertyFields(screen.querySelector('#tr-floor-src-props'), fi.properties || {});
              updateFloorDisplay();
            }
          }, 50);
        } else {
          setMode(_mode);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 7 — Screen: Load/Unload
  ════════════════════════════════════════════════════ -->
  <script>
  function initLoadUnload() {
    const screen = document.getElementById('screen-loadunload');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">📦</span>
        <h1>העמסה / פירוק</h1>
      </div>
      <div class="p-screen">
        <div class="form-group">
          <div class="pill-toggle" id="lu-op-toggle">
            <button class="active" data-op="load">העמסה</button>
            <button data-op="unload">פירוק</button>
          </div>
        </div>

        <!-- ═══ LOAD SECTION ═══ -->
        <div id="lu-load-section">
          <div class="form-group">
            <div class="pill-toggle" id="lu-load-type-toggle">
              <button class="active" data-lt="new">פריט חדש</button>
              <button data-lt="floor">מרצפה</button>
            </div>
          </div>

          <!-- new item sub-section -->
          <div id="lu-new-item-section">
            <div id="lu-slots-container"></div>
            <button id="lu-add-slot-btn" class="btn btn-outline btn-full" style="margin-bottom:10px;">+ הוסף סוג נוסף</button>
          </div>

          <!-- floor source sub-section: pick by location + properties + serial number -->
          <div id="lu-floor-src-section" hidden>
            <div class="form-group">
              <label class="form-label">מיקום מקור</label>
              <input id="lu-src-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div id="lu-floor-src-props" class="mt-12"></div>
            <div id="lu-floor-avail" class="card" style="margin:14px 0;" hidden>
              <div id="lu-floor-avail-text"></div>
            </div>
            <div class="form-group">
              <label class="form-label">מספר סידורי</label>
              <input id="lu-floor-serial" class="form-input" placeholder="הקלד מספר סידורי..." autocomplete="off">
            </div>
          </div>

          <!-- destination cart (always visible in load section) -->
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">עגלת יעד</label>
            <input id="lu-dest-cart" class="form-input" placeholder="8-6(110)" autocomplete="off">
          </div>
          <button id="lu-load-save-btn" class="btn btn-primary btn-full mt-16">📋 שמור והעתק</button>
        </div>

        <!-- ═══ UNLOAD SECTION ═══ -->
        <div id="lu-unload-section" hidden>
          <div id="lu-unload-cart-form-host"></div>
          <div id="lu-unload-fields" hidden>
            <div id="lu-unload-cart-info" class="card" style="margin:0 0 14px;"></div>
            <div id="lu-unload-slots-container"></div>
            <div class="form-group" style="margin-top:16px;">
              <label class="form-label">מיקום יעד (רצפה)</label>
              <input id="lu-unload-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
            </div>
            <div class="form-group" id="lu-unload-dest-subloc-group" hidden>
              <label class="form-label">תת-מיקום יעד</label>
              <input id="lu-unload-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
            </div>
          </div>
          <button id="lu-unload-save-btn" class="btn btn-primary btn-full mt-16">📋 שמור והעתק</button>
        </div>
      </div>
    `;

    let _op            = 'load';  // 'load' | 'unload'
    let _loadType      = 'new';   // 'new'  | 'floor'
    let _floorSrc      = null;    // { location, properties, availableCount, allIds }
    let _srcCart       = null;    // source cart object (unload mode)
    let _unloadCartRef = null;

    // autocomplete + location setups
    makeAutocomplete(screen.querySelector('#lu-src-loc'), () => DB.getMetadata().locations.map(l => l.name));
    makeAutocomplete(screen.querySelector('#lu-dest-cart'), () => DB.getAllCarts().map(c => cartLabel(c)));
    setupLocationFields(
      screen.querySelector('#lu-unload-dest-loc'),
      screen.querySelector('#lu-unload-dest-subloc-group'),
      screen.querySelector('#lu-unload-dest-subloc')
    );

    buildPropertyFields(screen.querySelector('#lu-floor-src-props'), {});

    // ── Floor source (load-from-floor mode) ──
    function updateFloorSrc() {
      const loc   = screen.querySelector('#lu-src-loc').value.trim();
      const props = readPropertyFields(screen.querySelector('#lu-floor-src-props'));
      const avail = screen.querySelector('#lu-floor-avail');
      if (!loc) { avail.hidden = true; _floorSrc = null; return; }
      const fi     = DB.findFloorItem(loc, props);
      const total  = fi ? (fi.itemCount || 0) : 0;
      const allIds = fi ? (fi.itemIds || []) : [];
      _floorSrc = { location: loc, properties: props, availableCount: total, allIds };
      avail.hidden = false;
      screen.querySelector('#lu-floor-avail-text').innerHTML =
        `<div class="card-title">זמין: ${total} פריטים</div><div class="card-meta">${esc(loc)}</div>`;
      makeAutocomplete(screen.querySelector('#lu-floor-serial'), () => allIds);
    }

    screen.querySelector('#lu-src-loc').addEventListener('change', updateFloorSrc);
    screen.querySelector('#lu-floor-src-props').addEventListener('change', updateFloorSrc);

    function renderItemRows(container, n, existing) {
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${esc(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    function copyMsg(msg) {
      return Utils.copyToClipboard(msg)
        .then(() => Toast.show('הועתק ✓', 'success'))
        .catch(() => Toast.show('נשמר', 'success'));
    }

    // ── Slot management (multi-type carts) ──────────────────────────
    function makeSlotEl(idx, slot) {
      const div = document.createElement('div');
      div.className = 'item-slot-card';
      div.dataset.slotIdx = String(idx);
      const existingCount = slot ? (slot.itemCount || 0) : 0;
      const existingIds   = slot ? (slot.itemIds   || []) : [];
      div.innerHTML = `
        <div class="item-slot-header">
          <span class="card-meta" style="font-weight:600"></span>
          <button class="btn-icon slot-del-btn" title="הסר סוג" style="font-size:1rem;padding:0 4px">✕</button>
        </div>
        <div class="slot-props"></div>
        <div class="form-group" style="margin-top:8px;">
          <label class="form-label">כמות</label>
          <input class="form-input slot-count-input" type="number" min="0" placeholder="0" value="${existingCount}">
        </div>
        <div class="item-rows slot-item-rows"></div>
      `;
      buildPropertyFields(div.querySelector('.slot-props'), slot ? (slot.properties || {}) : {});
      renderItemRows(div.querySelector('.slot-item-rows'), existingCount, existingIds);
      div.querySelector('.slot-count-input').addEventListener('input', () => {
        const n    = parseInt(div.querySelector('.slot-count-input').value) || 0;
        const prev = [...div.querySelectorAll('.item-id-input')].map(i => i.value);
        renderItemRows(div.querySelector('.slot-item-rows'), n, prev);
      });
      div.querySelector('.slot-del-btn').addEventListener('click', () => {
        const parent = div.parentElement;
        div.remove();
        renumberSlots(parent);
      });
      return div;
    }

    function renumberSlots(container) {
      if (!container) return;
      const slots = container.querySelectorAll('.item-slot-card');
      slots.forEach((el, idx) => {
        el.dataset.slotIdx = String(idx);
        const lbl = el.querySelector('.item-slot-header span');
        if (lbl) lbl.textContent = idx === 0 ? 'סוג ראשון' : `סוג ${idx + 1}`;
        const del = el.querySelector('.slot-del-btn');
        if (del) del.hidden = (slots.length === 1);
      });
    }

    function readSlot(slotEl) {
      const count      = parseInt(slotEl.querySelector('.slot-count-input').value) || 0;
      const itemIds    = [...slotEl.querySelectorAll('.item-id-input')].map(i => i.value.trim()).filter(Boolean);
      const properties = readPropertyFields(slotEl.querySelector('.slot-props'));
      return { properties, itemCount: count, itemIds };
    }

    function readAllSlots(container) {
      return [...container.querySelectorAll('.item-slot-card')].map(readSlot);
    }

    function populateSlots(container, cart) {
      container.innerHTML = '';
      const slots = [
        { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
        ...(cart.extraItems || [])
      ];
      slots.forEach((slot, idx) => container.appendChild(makeSlotEl(idx, slot)));
      renumberSlots(container);
    }

    function initEmptySlots(container) {
      container.innerHTML = '';
      container.appendChild(makeSlotEl(0, null));
      renumberSlots(container);
    }

    // initialise load slots
    initEmptySlots(screen.querySelector('#lu-slots-container'));

    screen.querySelector('#lu-add-slot-btn').addEventListener('click', () => {
      const container = screen.querySelector('#lu-slots-container');
      const idx = container.querySelectorAll('.item-slot-card').length;
      container.appendChild(makeSlotEl(idx, null));
      renumberSlots(container);
    });

    function setOp(op) {
      _op = op;
      screen.querySelectorAll('#lu-op-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.op === op));
      screen.querySelector('#lu-load-section').hidden   = (op !== 'load');
      screen.querySelector('#lu-unload-section').hidden = (op !== 'unload');
    }

    function setLoadType(lt) {
      _loadType = lt;
      screen.querySelectorAll('#lu-load-type-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.lt === lt));
      screen.querySelector('#lu-new-item-section').hidden  = (lt !== 'new');
      screen.querySelector('#lu-floor-src-section').hidden = (lt !== 'floor');
      _floorSrc = null;
      screen.querySelector('#lu-floor-avail').hidden = true;
    }

    screen.querySelector('#lu-op-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-op]');
      if (btn) setOp(btn.dataset.op);
    });

    screen.querySelector('#lu-load-type-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-lt]');
      if (btn) setLoadType(btn.dataset.lt);
    });

    // unload cart form
    _unloadCartRef = CartForm(screen.querySelector('#lu-unload-cart-form-host'), {
      onCartLoaded(cart) {
        _srcCart = cart || null;
        const fields = screen.querySelector('#lu-unload-fields');
        if (!cart) { fields.hidden = true; return; }
        fields.hidden = false;
        const total = cartTotalCount(cart);
        screen.querySelector('#lu-unload-cart-info').innerHTML = `
          <div class="card-title">עגלה: ${esc(cartLabel(cart))}</div>
          <div class="card-meta">מיקום נוכחי: ${esc(cart.location || 'לא ידוע')} · ${total} פריטים</div>
        `;
        populateSlots(screen.querySelector('#lu-unload-slots-container'), cart);
      }
    });

    // ── load save ──
    screen.querySelector('#lu-load-save-btn').addEventListener('click', () => {
      const rawDest    = screen.querySelector('#lu-dest-cart').value.trim();
      const destCartId = rawDest.replace(/\([^)]+\)\s*$/, '').trim();
      if (!destCartId) { Toast.show('יש להזין עגלת יעד', 'error'); return; }

      let msg;

      if (_loadType === 'new') {
        const slotsContainer = screen.querySelector('#lu-slots-container');
        const allSlots = readAllSlots(slotsContainer);
        const slot0    = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
        const extras   = allSlots.slice(1);
        DB.upsertCart({
          cartId: destCartId,
          itemCount: slot0.itemCount, itemIds: slot0.itemIds, properties: slot0.properties,
          extraItems: extras
        });
        const destCart = DB.getCart(destCartId);
        const label    = destCart ? cartLabel(destCart) : destCartId;
        const total    = allSlots.reduce((s, sl) => s + sl.itemCount, 0);
        const msgSlots = allSlots.filter(sl => sl.itemCount)
          .map(sl => `${sl.itemCount}${Object.values(sl.properties).filter(Boolean).map(v => ' ' + v).join('')}`);
        msg = `עגלה ${label} | ${msgSlots.join(' + ')} | הועמסו פריטים`.trim();
        Toast.show('פריטים הועמסו', 'success');
        initEmptySlots(slotsContainer);
      } else {
        // load from floor: single serial number
        if (!_floorSrc) { Toast.show('יש להזין מיקום מקור', 'error'); return; }
        const serial = screen.querySelector('#lu-floor-serial').value.trim();
        if (!serial) { Toast.show('יש להזין מספר סידורי', 'error'); return; }

        const srcFI       = DB.findFloorItem(_floorSrc.location, _floorSrc.properties);
        const existsInSrc = srcFI && (srcFI.itemIds || []).includes(serial);
        if (existsInSrc) {
          const remaining = Math.max(0, (srcFI.itemCount || 0) - 1);
          const remainIds = (srcFI.itemIds || []).filter(id => id !== serial);
          DB.upsertFloorItem({ location: _floorSrc.location, properties: _floorSrc.properties,
                               itemCount: remaining, itemIds: remainIds, isEmpty: remaining === 0 });
        }
        // additive update to cart
        props = _floorSrc.properties;
        const existingCart  = DB.getCart(destCartId);
        const existingIds   = existingCart ? (existingCart.itemIds || []) : [];
        const existingCount = existingCart ? (existingCart.itemCount || 0) : 0;
        DB.upsertCart({ cartId: destCartId, itemCount: existingCount + 1,
                        itemIds: [...existingIds, serial], properties: props, isEmpty: false });

        const destCart = DB.getCart(destCartId);
        const label    = destCart ? cartLabel(destCart) : destCartId;
        const propStr  = Object.values(props).filter(Boolean).join(' ');
        msg = `עגלה ${label} | ${serial} ${propStr} | הועמס מ${_floorSrc.location || '?'}`.trim();
        Toast.show('פריט הועמס מרצפה', 'success');

        screen.querySelector('#lu-floor-serial').value = '';
        updateFloorSrc(); // refresh available count
      }
      screen.querySelector('#lu-dest-cart').value = '';
      copyMsg(msg);
    });

    // ── unload save ──
    screen.querySelector('#lu-unload-save-btn').addEventListener('click', () => {
      if (!_srcCart) { Toast.show('יש לבחור עגלת מקור', 'error'); return; }
      const destLoc = screen.querySelector('#lu-unload-dest-loc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return; }
      const destSubLoc = screen.querySelector('#lu-unload-dest-subloc-group').hidden
        ? '' : screen.querySelector('#lu-unload-dest-subloc').value.trim();

      const slotsContainer = screen.querySelector('#lu-unload-slots-container');
      const allSlots = readAllSlots(slotsContainer);

      // Determine what remains on the cart after unloading
      // Slot 0 (primary top-level fields)
      const unload0 = allSlots[0] || { properties: {}, itemCount: 0, itemIds: [] };
      const unload0Set   = new Set(unload0.itemIds);
      const remain0Ids   = (_srcCart.itemIds || []).filter(id => !unload0Set.has(id));
      const remain0Count = Math.max(0, (_srcCart.itemCount || 0) - unload0.itemCount);

      // Extra slots
      const newExtras = (_srcCart.extraItems || []).map((ex, idx) => {
        const unloadSlot = allSlots[idx + 1];
        if (!unloadSlot) return ex;
        const unloadedSet = new Set(unloadSlot.itemIds);
        const newIds      = (ex.itemIds || []).filter(id => !unloadedSet.has(id));
        const newCount    = Math.max(0, (ex.itemCount || 0) - unloadSlot.itemCount);
        return { ...ex, itemCount: newCount, itemIds: newIds };
      });

      // Upsert floor items for each slot being unloaded (additive merge by location+props)
      const msgParts = [];
      for (const slot of allSlots) {
        if (!slot.itemCount) continue;
        const destFI   = DB.findFloorItem(destLoc, slot.properties);
        const newCount = (destFI ? (destFI.itemCount || 0) : 0) + slot.itemCount;
        const newIds   = [...(destFI ? (destFI.itemIds || []) : []), ...slot.itemIds];
        DB.upsertFloorItem({ location: destLoc, subLocation: destSubLoc,
                             itemCount: newCount, itemIds: newIds,
                             properties: slot.properties, isEmpty: false });
        const propStr = Object.values(slot.properties).filter(Boolean).join(' ');
        msgParts.push(`${slot.itemCount}${propStr ? ' ' + propStr : ''}`);
      }

      DB.upsertCart({ cartId: _srcCart.cartId,
                      itemCount: remain0Count, itemIds: remain0Ids,
                      extraItems: newExtras });

      const label = cartLabel(_srcCart);
      const msg   = `עגלה ${label} | ${msgParts.join(' + ')} | פורקו ל${destLoc}`.trim();
      Toast.show('פריטים פורקו לרצפה', 'success');

      _srcCart = null;
      screen.querySelector('#lu-unload-fields').hidden = true;
      screen.querySelector('#lu-unload-dest-loc').value = '';
      screen.querySelector('#lu-unload-dest-subloc').value = '';
      copyMsg(msg);
    });

    Router.register('loadunload', {
      onShow({ cartId, floorItemId } = {}) {
        if (cartId) {
          setOp('unload');
          setTimeout(() => _unloadCartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setOp('load');
          setLoadType('floor');
          setTimeout(() => {
            const fi = DB.getFloorItem(floorItemId);
            if (fi) {
              screen.querySelector('#lu-src-loc').value = fi.location || '';
              buildPropertyFields(screen.querySelector('#lu-floor-src-props'), fi.properties || {});
              updateFloorSrc();
            }
          }, 50);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 8 — Screen: Search
  ════════════════════════════════════════════════════ -->
  <script>
  function initSearch() {
    const screen = document.getElementById('screen-search');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔍</span>
        <h1>סינון</h1>
      </div>
      <div id="sr-filter-panels"></div>
      <div class="sr-filter-actions">
        <span id="sr-filter-count" class="sr-filter-count">כל הפריטים</span>
        <button id="sr-clear-btn" class="btn btn-sm btn-outline" style="display:none">נקה סינון</button>
      </div>
      <div id="sr-summary" hidden></div>
      <div id="sr-results"></div>
    `;

    // ── Filter state ──────────────────────────────────────────────
    const state = {
      locations: new Set(),
      cartIds:   new Set(),
      cartTypes: new Set(),
      props:     {},         // propName → Set<value>
      types:     new Set(),  // 'cart' | 'fi'; empty = both
      emptyOnly: false
    };
    const openPanels = new Set(); // panel IDs kept open across re-renders

    // ── Build panel HTML ──────────────────────────────────────────
    function buildPanelHTML(id, title, items) {
      const sel  = items.filter(i => i.checked).length;
      const open = openPanels.has(id);
      return `
        <div class="filter-panel" id="${esc(id)}">
          <button class="fp-header" aria-expanded="${open}">
            <span class="fp-arrow">▾</span>
            <span class="fp-title">${esc(title)}</span>
            <span class="fp-badge${sel ? '' : ' fp-badge--hidden'}">${sel}</span>
          </button>
          <div class="fp-body${open ? ' open' : ''}">
            ${items.map(item => `
              <label class="fp-check-label">
                <input type="checkbox" class="fp-checkbox"
                  data-filter-key="${item.key}"
                  data-value="${esc(item.value)}"
                  ${item.propName ? `data-prop="${esc(item.propName)}"` : ''}
                  ${item.checked ? 'checked' : ''}>
                <span>${esc(item.label != null ? item.label : item.value)}</span>
              </label>
            `).join('')}
          </div>
        </div>`;
    }

    // ── Rebuild filter panels (called on onShow and clear) ────────
    function buildFilterPanels() {
      const meta  = DB.getMetadata();
      const carts = DB.getAllCarts();
      const container = document.getElementById('sr-filter-panels');

      const allLocations = (meta.locations || []).map(l => l.name);
      const allCartIds   = carts.map(c => c.cartId).sort();
      const allProps     = meta.properties || [];

      let html = '';

      html += buildPanelHTML('sr-fp-type', 'סוג פריט', [
        { key: 'type', value: 'cart', label: 'עגלות',       checked: state.types.has('cart') },
        { key: 'type', value: 'fi',   label: 'פריטי רצפה', checked: state.types.has('fi')   }
      ]);
      if (allLocations.length) {
        html += buildPanelHTML('sr-fp-loc', 'מיקומים',
          allLocations.map(name => ({ key: 'loc', value: name, checked: state.locations.has(name) })));
      }
      if (allCartIds.length) {
        html += buildPanelHTML('sr-fp-cart', 'עגלות',
          allCartIds.map(id => {
            const c = DB.getCart(id);
            return { key: 'cart', value: id, label: c ? cartLabel(c) : id, checked: state.cartIds.has(id) };
          }));
      }
      const allCartTypes = DB.getMetadata().cartTypes || [];
      if (allCartTypes.length) {
        html += buildPanelHTML('sr-fp-carttype', 'סוג עגלה',
          allCartTypes.map(t => ({ key: 'cartType', value: t, checked: state.cartTypes.has(t) })));
      }
      allProps.forEach(prop => {
        const propSet = state.props[prop.name] || new Set();
        const items = (prop.options || []).map(opt => ({
          key: 'prop', propName: prop.name, value: opt, checked: propSet.has(opt)
        }));
        if (items.length) html += buildPanelHTML('sr-fp-prop-' + prop.name, prop.name, items);
      });

      html += `
        <div class="sr-empty-row">
          <label class="sr-empty-label">
            <input type="checkbox" id="sr-empty-check" ${state.emptyOnly ? 'checked' : ''}>
            הצג ריקות בלבד
          </label>
        </div>`;

      container.innerHTML = html;

      document.getElementById('sr-empty-check').addEventListener('change', e => {
        state.emptyOnly = e.target.checked;
        updateActionsBar();
        renderResults();
      });
    }

    // ── Actions bar ───────────────────────────────────────────────
    function countActive() {
      return state.types.size + state.locations.size + state.cartIds.size + state.cartTypes.size +
        Object.values(state.props).reduce((s, set) => s + set.size, 0) +
        (state.emptyOnly ? 1 : 0);
    }
    function updateActionsBar() {
      const count    = countActive();
      const label    = document.getElementById('sr-filter-count');
      const clearBtn = document.getElementById('sr-clear-btn');
      label.textContent = count ? count + ' פילטרים פעילים' : 'כל הפריטים';
      clearBtn.style.display = count ? '' : 'none';
    }

    // ── Filter logic ──────────────────────────────────────────────
    function itemPasses(item) {
      if (state.types.size) {
        const t = item.cartId ? 'cart' : 'fi';
        if (!state.types.has(t)) return false;
      }
      if (state.locations.size && !state.locations.has(item.location)) return false;
      if (state.cartIds.size) {
        if (!item.cartId || !state.cartIds.has(item.cartId)) return false;
      }
      if (state.cartTypes.size && item.cartId) {
        const cart = DB.getCart(item.cartId);
        if (!cart || !state.cartTypes.has(cart.cartType)) return false;
      }
      for (const [propName, valSet] of Object.entries(state.props)) {
        if (!valSet.size) continue;
        if (!valSet.has((item.properties || {})[propName])) return false;
      }
      if (state.emptyOnly && !item.isEmpty) return false;
      return true;
    }

    // ── Summary panel ─────────────────────────────────────────────
    function renderSummary(carts, fis) {
      const el = document.getElementById('sr-summary');
      const all = [...carts, ...fis];
      if (!all.length) { el.hidden = true; el.innerHTML = ''; return; }

      const totalItems  = all.reduce((s, x) => s + (x.itemCount || 0), 0);
      const cartItems   = carts.reduce((s, c) => s + (c.itemCount || 0), 0);
      const floorItems  = fis.reduce((s, f) => s + (f.itemCount || 0), 0);
      const emptyCount  = all.filter(x => x.isEmpty).length;

      // per-location stats
      const locStats = {};
      all.forEach(item => {
        const loc = item.location || 'ללא מיקום';
        if (!locStats[loc]) locStats[loc] = { items: 0, empty: 0 };
        locStats[loc].items += (item.itemCount || 0);
        if (item.isEmpty) locStats[loc].empty++;
      });
      const locEntries = Object.entries(locStats).sort((a,b) => b[1].items - a[1].items);
      const maxLocItems = Math.max(1, ...locEntries.map(([,s]) => s.items));

      // per property-combination stats (non-empty items only)
      const meta = DB.getMetadata();
      const propDefs = meta.properties || [];
      const comboStats = {};
      all.filter(x => !x.isEmpty && x.itemCount).forEach(item => {
        const key   = propDefs.map(p => (item.properties || {})[p.name] || '').join('|');
        const label = propDefs.map(p => (item.properties || {})[p.name]).filter(Boolean).join(' · ');
        if (!comboStats[key]) comboStats[key] = { label: label || 'ללא מאפיינים', total: 0 };
        comboStats[key].total += item.itemCount;
      });
      const comboEntries = Object.values(comboStats).sort((a,b) => b.total - a.total);

      let html = '<div class="sr-summary">';

      // total card (only when there are items)
      if (totalItems > 0) {
        const showSplit = carts.length && fis.length; // both types present
        html += `
          <div class="sr-total-card">
            <div class="sr-total-num">${totalItems}</div>
            <div class="sr-total-label">פריטים</div>
            ${showSplit ? `
            <div class="sr-total-split">
              <div class="sr-split-item">
                <span class="sr-split-num">${cartItems}</span>
                <span class="sr-split-lbl">בעגלות</span>
              </div>
              <div class="sr-split-item">
                <span class="sr-split-num">${floorItems}</span>
                <span class="sr-split-lbl">ברצפה</span>
              </div>
            </div>` : ''}
          </div>`;
      }

      // empty card
      if (emptyCount > 0) {
        html += `
          <div class="sr-empty-card">
            <div class="sr-empty-card-num">${emptyCount}</div>
            <div class="sr-empty-card-lbl">ריקות</div>
          </div>`;
      }

      // location breakdown
      if (locEntries.length > 1) {
        html += '<div class="sr-section-title">לפי מיקום</div>';
        html += locEntries.map(([loc, s]) => {
          const pct = Math.round((s.items / maxLocItems) * 100);
          const countLabel = s.items > 0
            ? s.items + (s.empty ? ` (+${s.empty} ריקות)` : '')
            : s.empty + ' ריקות';
          return `
            <div class="sr-loc-row">
              <span class="sr-loc-name">${esc(loc)}</span>
              <div class="sr-loc-bar-wrap"><div class="sr-loc-bar-fill" style="width:${pct}%"></div></div>
              <span class="sr-loc-count">${countLabel}</span>
            </div>`;
        }).join('');
      }

      // property combination breakdown
      if (comboEntries.length > 1 && propDefs.length) {
        html += '<div class="sr-section-title">לפי שילוב מאפיינים</div>';
        html += comboEntries.map(c => `
          <div class="sr-combo-row">
            <span class="sr-combo-label">${esc(c.label)}</span>
            <span class="sr-combo-count">${c.total} פריטים</span>
          </div>`).join('');
      }

      html += '</div>';
      el.innerHTML = html;
      el.hidden = false;
    }

    // ── Render results ────────────────────────────────────────────
    function propSummary(props) {
      return Object.values(props || {}).filter(Boolean).join(' · ');
    }
    function renderResults() {
      const results = document.getElementById('sr-results');
      const carts   = DB.getAllCarts().filter(itemPasses);
      const fis     = DB.getAllFloorItems().filter(itemPasses);

      renderSummary(carts, fis);

      if (!carts.length && !fis.length) {
        results.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">${countActive() ? 'לא נמצאו תוצאות לסינון הנוכחי' : 'אין פריטים במערכת'}</div>
          </div>`;
        return;
      }

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '\0' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c  => addItem(c,  'cart'));
      fis.forEach(fi   => addItem(fi, 'fi'));

      const sortedGroups = Object.values(groups).sort((a,b) =>
        a.loc.localeCompare(b.loc) || a.sub.localeCompare(b.sub));

      results.innerHTML = sortedGroups.map(g => `
        <div class="loc-group">
          <div class="loc-group-header">
            ${esc(g.loc)}${g.sub ? ' / ' + esc(g.sub) : ''}
          </div>
          ${g.items.map(({ data, type }) => {
            if (type === 'cart') {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item" data-type="cart" data-id="${esc(data.cartId)}" style="cursor:pointer">
                  <div class="list-item-body">
                    <div class="list-item-title">${esc(cartLabel(data))}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (cartTotalCount(data) ? cartTotalCount(data) + ' פריטים' : '')}${ps ? ' · ' + ps : ''}</div>
                  </div>
                  <span>›</span>
                </div>`;
            } else {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item" data-type="fi" data-id="${esc(data.id)}" style="cursor:pointer">
                  <div class="list-item-body">
                    <div class="list-item-title"><span class="badge badge-floor">רצפה</span> ${ps || esc(data.id)}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + ' פריטים' : '')}</div>
                  </div>
                  <span>›</span>
                </div>`;
            }
          }).join('')}
        </div>
      `).join('');
    }

    // ── Event delegation: accordion toggle ───────────────────────
    document.getElementById('sr-filter-panels').addEventListener('click', e => {
      const btn = e.target.closest('.fp-header');
      if (!btn) return;
      const panel  = btn.closest('.filter-panel');
      const body   = btn.nextElementSibling;
      const isOpen = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      body.classList.toggle('open', !isOpen);
      if (!isOpen) openPanels.add(panel.id);
      else         openPanels.delete(panel.id);
    });

    // ── Event delegation: checkbox changes ───────────────────────
    document.getElementById('sr-filter-panels').addEventListener('change', e => {
      const cb = e.target.closest('.fp-checkbox');
      if (!cb) return;
      const key   = cb.dataset.filterKey;
      const value = cb.dataset.value;
      const on    = cb.checked;
      if (key === 'type') {
        on ? state.types.add(value) : state.types.delete(value);
      } else if (key === 'loc') {
        on ? state.locations.add(value) : state.locations.delete(value);
      } else if (key === 'cart') {
        on ? state.cartIds.add(value) : state.cartIds.delete(value);
      } else if (key === 'cartType') {
        on ? state.cartTypes.add(value) : state.cartTypes.delete(value);
      } else if (key === 'prop') {
        const pn = cb.dataset.prop;
        if (!state.props[pn]) state.props[pn] = new Set();
        on ? state.props[pn].add(value) : state.props[pn].delete(value);
        if (!state.props[pn].size) delete state.props[pn];
      }
      // update badge in this panel
      const panel = cb.closest('.filter-panel');
      if (panel) {
        const checked = panel.querySelectorAll('.fp-checkbox:checked').length;
        const badge   = panel.querySelector('.fp-badge');
        if (badge) { badge.textContent = checked; badge.classList.toggle('fp-badge--hidden', !checked); }
      }
      updateActionsBar();
      renderResults();
    });

    // ── Clear all ─────────────────────────────────────────────────
    document.getElementById('sr-clear-btn').addEventListener('click', () => {
      state.types.clear();
      state.locations.clear();
      state.cartIds.clear();
      state.cartTypes.clear();
      state.props   = {};
      state.emptyOnly = false;
      buildFilterPanels();
      updateActionsBar();
      renderResults();
    });

    // ── Item click → modal ────────────────────────────────────────
    document.getElementById('sr-results').addEventListener('click', e => {
      const item = e.target.closest('.sr-item');
      if (!item) return;
      const type = item.dataset.type;
      const id   = item.dataset.id;

      if (type === 'cart') {
        const cart = DB.getCart(id);
        if (!cart) return;
        const allSlots = [
          { properties: cart.properties || {}, itemCount: cart.itemCount || 0, itemIds: cart.itemIds || [] },
          ...(cart.extraItems || [])
        ].filter((s, i) => i === 0 || s.itemCount);
        const slotsHtml = allSlots.map((s, i) => {
          const ps = propSummary(s.properties);
          return `<p class="card-meta">${allSlots.length > 1 ? `סוג ${i+1}: ` : ''}${s.itemCount} פריטים${ps ? ' · ' + ps : ''}</p>`;
        }).join('');
        Modal.open({
          title: `עגלה ${esc(cartLabel(cart))}`,
          html: `
            <p class="card-meta">מיקום: ${esc(cart.location || 'לא ידוע')}</p>
            ${cart.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(cart.subLocation)}</p>` : ''}
            ${cart.isEmpty ? '<p class="card-meta">ריקה</p>' : slotsHtml}
            <p class="card-meta" style="font-size:0.75rem;margin-top:8px">עדכון: ${Utils.formatDate(cart.lastUpdated)}</p>
          `,
          actions: [
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { cartId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { cartId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      } else {
        const fi = DB.getFloorItem(id);
        if (!fi) return;
        const ps = propSummary(fi.properties);
        Modal.open({
          title: `פריטי רצפה`,
          html: `
            <p class="card-meta">מיקום: ${esc(fi.location || 'לא ידוע')}</p>
            ${fi.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(fi.subLocation)}</p>` : ''}
            <p class="card-meta">פריטים: ${fi.isEmpty ? 'ריקה' : (fi.itemCount || 0)}</p>
            ${ps ? `<p class="card-meta">מאפיינים: ${ps}</p>` : ''}
            <p class="card-meta" style="font-size:0.75rem;margin-top:8px">עדכון: ${Utils.formatDate(fi.lastUpdated)}</p>
          `,
          actions: [
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { floorItemId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { floorItemId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      }
    });

    Router.register('search', {
      onShow() {
        buildFilterPanels();
        updateActionsBar();
        renderResults();
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 9 — Screen: Main
  ════════════════════════════════════════════════════ -->
  <script>
  function initMain() {
    const screen = document.getElementById('screen-main');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🛒</span>
        <h1>שינוע</h1>
      </div>
      <div class="p-screen">
        <button class="hero-btn" id="main-export">
          <div class="hero-btn-icon" style="background:#EBF4FF;color:#0F4C81;">📤</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">ייצוא נתונים</div>
            <div class="hero-btn-sub">העתק גיבוי ללוח</div>
          </div>
        </button>

        <button class="hero-btn" id="main-import">

          <div class="hero-btn-body">
            <div class="hero-btn-title">ייבוא נתונים</div>
            <div class="hero-btn-sub">הדבק טקסט גיבוי</div>

        </button>

        <button class="hero-btn" id="main-map">

            <div class="hero-btn-title">יצירת מיפוי</div>

      Utils.copyToClipboard(text)
        .then(() => Toast.show('גיבוי הועתק ללוח', 'success'))
        .catch(() => Modal.open({
          title: 'ייצוא — העתקה ידנית',

                 <textarea rows="6" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:monospace;font-size:0.75rem;direction:ltr;text-align:left" readonly onclick="this.select()">${esc(text)}</textarea>`,
          actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
        }));
    });

    // import — paste via modal textarea
    screen.querySelector('#main-import').addEventListener('click', () => {
      Modal.open({
        title: 'ייבוא נתונים',
        html: `
          <p class="card-meta" style="margin-bottom:10px">הדבק כאן את טקסט הגיבוי שהועתק בייצוא:</p>
          <textarea id="import-paste-area" rows="6"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:ltr;text-align:left;resize:vertical"></textarea>
        `,
        actions: [
          { id: 'do-import', label: 'ייבא', cls: 'btn-primary', onClick: () => {
            const text = document.getElementById('import-paste-area').value.trim();
            if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
            try {
              const jsonStr = Utils.parseImportText(text);
              DB.importJSON(jsonStr, 'merge');
              Modal.close();
              Toast.show('נתונים יובאו בהצלחה', 'success');
            } catch(err) {
              Toast.show('שגיאה: ' + err.message, 'error');
            }
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    });

    // map
    screen.querySelector('#main-map').addEventListener('click', () => {
      const raw = DB.load();
      const mapText = Utils.generateMapText(raw);
      Utils.copyToClipboard(mapText)
        .then(() => Toast.show('מיפוי הועתק ללוח', 'success'))
        .catch(() => {
          // fallback: show in modal
          Modal.open({
            title: 'מיפוי',
            html: `<pre style="font-size:0.82rem;white-space:pre-wrap;word-break:break-word;direction:rtl;text-align:right">${mapText}</pre>`,
            actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
          });
        });
    });

    Router.register('main', {
      onShow() {}
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 10 — Bootstrap + SW Registration
  ════════════════════════════════════════════════════ -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.warn);
    }

    // Build nav
    BottomNav.render();

    // Init all screens
    initEdit();
    initTransfer();
    initLoadUnload();
    initSearch();
    initMain();

    // Navigate to initial screen
    const initial = location.hash.replace('#', '') || 'main';
    Router.navigate(initial);
  });
  </script>
</body>
</html>
