            </div>
            <div class="form-group">
              <label class="form-label">קבוצת רצפה</label>
              <select id="lu-fi-select" class="form-select">
                <option value="">— בחר —</option>
              </select>
            </div>
          </div>
        </div>

        <!-- item details -->
        <div id="lu-item-section" hidden>
          <div id="lu-current-info" class="card" style="margin:0 0 14px;"></div>

          <div class="form-group">
            <label class="form-label">מיקום יעד</label>
            <input id="lu-dest-loc" class="form-input" placeholder="משני" autocomplete="off">
          </div>
          <div class="form-group" id="lu-dest-subloc-group" hidden>
            <label class="form-label">תת-מיקום יעד</label>
            <input id="lu-dest-subloc" class="form-input" placeholder="שוליים" autocomplete="off">
          </div>

          <!-- unload extra: send to floor option -->
          <div id="lu-unload-floor-opt" hidden>
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer">
              <input type="checkbox" id="lu-send-to-floor"> שלח לרצפה ביעד
            </label>
          </div>

          <div class="form-group">
            <label class="form-label">מספר פריטים</label>
            <input id="lu-count" class="form-input" type="number" min="0" placeholder="0">
          </div>
          <div id="lu-item-rows" class="item-rows"></div>
          <div id="lu-prop-fields" class="mt-12"></div>

          <button id="lu-save-btn" class="btn btn-primary btn-full mt-16">💾 שמור</button>
        </div>
      </div>
    `;

    let _op  = 'load';   // 'load' | 'unload'
    let _src = 'cart';   // 'cart' | 'floor'
    let _currentData = null;
    let _currentType = null;
    let _cartRef = null;

    // Location autocomplete for source (floor mode) and destination
    makeAutocomplete(screen.querySelector('#lu-src-loc'), () => DB.getMetadata().locations.map(l => l.name));
    setupLocationFields(
      screen.querySelector('#lu-dest-loc'),
      screen.querySelector('#lu-dest-subloc-group'),
      screen.querySelector('#lu-dest-subloc')
    );

    function refreshFISelect(filterLoc) {
      const sel = screen.querySelector('#lu-fi-select');
      const fis = DB.getAllFloorItems().filter(fi => !filterLoc || fi.location === filterLoc);
      sel.innerHTML = '<option value="">— בחר —</option>';
      fis.forEach(fi => {
        const propStr = Object.values(fi.properties || {}).filter(Boolean).join(' ');
        const opt = document.createElement('option');
        opt.value = fi.id;
        opt.textContent = `[רצפה] ${fi.itemCount || 0} ${propStr}`.trim();
        sel.appendChild(opt);
      });
    }

    function renderItemRows(n, existing) {
      const container = screen.querySelector('#lu-item-rows');
      const rows = [];
      for (let i = 0; i < n; i++) {
        rows.push(`
          <div class="item-row">
            <span class="item-row-num">${i+1}</span>
            <input class="item-id-input" placeholder="מספר סידורי" value="${(existing[i] || '')}">
          </div>
        `);
      }
      container.innerHTML = rows.join('');
    }

    function showItemSection(data, type) {
      _currentData = data;
      _currentType = type;
      screen.querySelector('#lu-item-section').hidden = false;

      const info = screen.querySelector('#lu-current-info');
      if (type === 'cart') {
        info.innerHTML = `
          <div class="card-title">עגלה: ${data.cartId}</div>
          <div class="card-meta">מיקום נוכחי: ${data.location || 'לא ידוע'}</div>
        `;
      } else {
        const propStr = Object.values(data.properties || {}).filter(Boolean).join(' ');
        info.innerHTML = `
          <div class="card-title">[רצפה] ${propStr || data.id}</div>
          <div class="card-meta">מיקום נוכחי: ${data.location || 'לא ידוע'} · ${data.itemCount || 0} פריטים</div>
        `;
      }

      screen.querySelector('#lu-count').value = data.itemCount || 0;
      renderItemRows(data.itemCount || 0, data.itemIds || []);
      buildPropertyFields(screen.querySelector('#lu-prop-fields'), data.properties || {});

      // show/hide unload floor option
      screen.querySelector('#lu-unload-floor-opt').hidden = (_op !== 'unload');
    }

    function setOp(op) {
      _op = op;
      screen.querySelectorAll('#lu-op-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.op === op));
      screen.querySelector('#lu-unload-floor-opt').hidden = (op !== 'unload' || screen.querySelector('#lu-item-section').hidden);
    }

    function setSrc(src) {
      _src = src;
      screen.querySelectorAll('#lu-src-toggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.src === src));
      screen.querySelector('#lu-src-cart').hidden  = (src !== 'cart');
      screen.querySelector('#lu-src-floor').hidden = (src !== 'floor');
      screen.querySelector('#lu-item-section').hidden = true;
      _currentData = null; _currentType = null;
    }

    screen.querySelector('#lu-op-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-op]');
      if (btn) setOp(btn.dataset.op);
    });

    screen.querySelector('#lu-src-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-src]');
      if (btn) setSrc(btn.dataset.src);
    });

    // cart form
    _cartRef = CartForm(screen.querySelector('#lu-cart-form-host'), {
      onCartLoaded(cart) {
        if (cart) showItemSection(cart, 'cart');
        else screen.querySelector('#lu-item-section').hidden = true;
      }
    });

    // src location filter → refresh fi select
    screen.querySelector('#lu-src-loc').addEventListener('change', e => {
      refreshFISelect(e.target.value.trim());
    });

    // fi select
    screen.querySelector('#lu-fi-select').addEventListener('change', e => {
      const fi = DB.getFloorItem(e.target.value);
      if (fi) showItemSection(fi, 'fi');
      else screen.querySelector('#lu-item-section').hidden = true;
    });

    // count → item rows
    screen.querySelector('#lu-count').addEventListener('input', () => {
      const n = parseInt(screen.querySelector('#lu-count').value) || 0;
      const existing = [...screen.querySelectorAll('#lu-item-rows .item-id-input')].map(i => i.value);
      renderItemRows(n, existing);
    });

    // save
    screen.querySelector('#lu-save-btn').addEventListener('click', () => {
      if (!_currentData) { Toast.show('יש לבחור מקור', 'error'); return; }
      const destLoc    = screen.querySelector('#lu-dest-loc').value.trim();
      const destSubLoc = screen.querySelector('#lu-dest-subloc-group').hidden
        ? '' : screen.querySelector('#lu-dest-subloc').value.trim();
      if (!destLoc) { Toast.show('יש להזין מיקום יעד', 'error'); return; }
      const count   = parseInt(screen.querySelector('#lu-count').value) || 0;
      const itemIds = [...screen.querySelectorAll('#lu-item-rows .item-id-input')].map(i => i.value.trim()).filter(Boolean);
      const props   = readPropertyFields(screen.querySelector('#lu-prop-fields'));
      const sendToFloor = screen.querySelector('#lu-send-to-floor').checked;

      if (_op === 'load') {
        // loading items onto a cart
        if (_currentType === 'cart') {
          DB.upsertCart({
            cartId:      _currentData.cartId,
            location:    destLoc,
            subLocation: destSubLoc,
            itemCount:   count,
            itemIds,
            properties:  props,
            isEmpty:     count === 0
          });
        } else {
          // loading from floor — update the floor item group
          DB.upsertFloorItem({
            id:          _currentData.id,
            location:    destLoc,
            subLocation: destSubLoc,
            itemCount:   count,
            itemIds,
            properties:  props,
            isEmpty:     count === 0
          });
        }
        Toast.show('פריטים הועמסו', 'success');
      } else {
        // unload
        if (sendToFloor) {
          // create/update floor item group at destination
          DB.upsertFloorItem({
            location:    destLoc,
            subLocation: destSubLoc,
            itemCount:   count,
            itemIds,
            properties:  props,
            isEmpty:     count === 0
          });
          // mark source as empty
          if (_currentType === 'cart') {
            DB.upsertCart({ cartId: _currentData.cartId, itemCount: 0, itemIds: [], isEmpty: true });
          } else {
            DB.upsertFloorItem({ id: _currentData.id, itemCount: 0, itemIds: [], isEmpty: true });
          }
          Toast.show('פורק לרצפה', 'success');
        } else {
          // unload to existing cart at destination
          if (_currentType === 'cart') {
            DB.upsertCart({
              cartId:      _currentData.cartId,
              location:    destLoc,
              subLocation: destSubLoc,
              itemCount:   count,
              itemIds,
              properties:  props,
              isEmpty:     count === 0
            });
          } else {
            DB.upsertFloorItem({
              id:          _currentData.id,
              location:    destLoc,
              subLocation: destSubLoc,
              itemCount:   count,
              itemIds,
              properties:  props,
              isEmpty:     count === 0
            });
          }
          Toast.show('פריטים פורקו', 'success');
        }
      }
    });

    Router.register('loadunload', {
      onShow({ cartId, floorItemId } = {}) {
        refreshFISelect();
        if (cartId) {
          setSrc('cart');
          setTimeout(() => _cartRef.setValue(cartId), 50);
        } else if (floorItemId) {
          setSrc('floor');
          setTimeout(() => {
            refreshFISelect();
            const sel = screen.querySelector('#lu-fi-select');
            sel.value = floorItemId;
            sel.dispatchEvent(new Event('change'));
          }, 50);
        }
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 8 — Screen: Search
  ════════════════════════════════════════════════════ -->
  <script>
  function initSearch() {
    const screen = document.getElementById('screen-search');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🔍</span>
        <h1>סינון</h1>
      </div>
      <div id="sr-filter-panels"></div>
      <div class="sr-filter-actions">
        <span id="sr-filter-count" class="sr-filter-count">כל הפריטים</span>
        <button id="sr-clear-btn" class="btn btn-sm btn-outline" style="display:none">נקה סינון</button>
      </div>
      <div id="sr-results"></div>
    `;

    // ── Filter state ──────────────────────────────────────────────
    const state = {
      locations: new Set(),
      cartIds:   new Set(),
      props:     {},         // propName → Set<value>
      emptyOnly: false
    };
    const openPanels = new Set(); // panel IDs kept open across re-renders

    // ── Build panel HTML ──────────────────────────────────────────
    function buildPanelHTML(id, title, items) {
      const sel  = items.filter(i => i.checked).length;
      const open = openPanels.has(id);
      return `
        <div class="filter-panel" id="${esc(id)}">
          <button class="fp-header" aria-expanded="${open}">
            <span class="fp-arrow">▾</span>
            <span class="fp-title">${esc(title)}</span>
            <span class="fp-badge${sel ? '' : ' fp-badge--hidden'}">${sel}</span>
          </button>
          <div class="fp-body${open ? ' open' : ''}">
            ${items.map(item => `
              <label class="fp-check-label">
                <input type="checkbox" class="fp-checkbox"
                  data-filter-key="${item.key}"
                  data-value="${esc(item.value)}"
                  ${item.propName ? `data-prop="${esc(item.propName)}"` : ''}
                  ${item.checked ? 'checked' : ''}>
                <span>${esc(item.value)}</span>
              </label>
            `).join('')}
          </div>
        </div>`;
    }

    // ── Rebuild filter panels (called on onShow and clear) ────────
    function buildFilterPanels() {
      const meta  = DB.getMetadata();
      const carts = DB.getAllCarts();
      const container = document.getElementById('sr-filter-panels');

      const allLocations = (meta.locations || []).map(l => l.name);
      const allCartIds   = carts.map(c => c.cartId).sort();
      const allProps     = meta.properties || [];

      let html = '';

      if (allLocations.length) {
        html += buildPanelHTML('sr-fp-loc', 'מיקומים',
          allLocations.map(name => ({ key: 'loc', value: name, checked: state.locations.has(name) })));
      }
      if (allCartIds.length) {
        html += buildPanelHTML('sr-fp-cart', 'עגלות',
          allCartIds.map(id => ({ key: 'cart', value: id, checked: state.cartIds.has(id) })));
      }
      allProps.forEach(prop => {
        const propSet = state.props[prop.name] || new Set();
        const items = (prop.options || []).map(opt => ({
          key: 'prop', propName: prop.name, value: opt, checked: propSet.has(opt)
        }));
        if (items.length) html += buildPanelHTML('sr-fp-prop-' + prop.name, prop.name, items);
      });

      html += `
        <div class="sr-empty-row">
          <label class="sr-empty-label">
            <input type="checkbox" id="sr-empty-check" ${state.emptyOnly ? 'checked' : ''}>
            הצג ריקות בלבד
          </label>
        </div>`;

      container.innerHTML = html;

      document.getElementById('sr-empty-check').addEventListener('change', e => {
        state.emptyOnly = e.target.checked;
        updateActionsBar();
        renderResults();
      });
    }

    // ── Actions bar ───────────────────────────────────────────────
    function countActive() {
      return state.locations.size + state.cartIds.size +
        Object.values(state.props).reduce((s, set) => s + set.size, 0) +
        (state.emptyOnly ? 1 : 0);
    }
    function updateActionsBar() {
      const count    = countActive();
      const label    = document.getElementById('sr-filter-count');
      const clearBtn = document.getElementById('sr-clear-btn');
      label.textContent = count ? count + ' פילטרים פעילים' : 'כל הפריטים';
      clearBtn.style.display = count ? '' : 'none';
    }

    // ── Filter logic ──────────────────────────────────────────────
    function itemPasses(item) {
      if (state.locations.size && !state.locations.has(item.location)) return false;
      if (state.cartIds.size) {
        if (!item.cartId || !state.cartIds.has(item.cartId)) return false;
      }
      for (const [propName, valSet] of Object.entries(state.props)) {
        if (!valSet.size) continue;
        if (!valSet.has((item.properties || {})[propName])) return false;
      }
      if (state.emptyOnly && !item.isEmpty) return false;
      return true;
    }

    // ── Render results ────────────────────────────────────────────
    function propSummary(props) {
      return Object.values(props || {}).filter(Boolean).join(' · ');
    }
    function renderResults() {
      const results = document.getElementById('sr-results');
      const carts   = DB.getAllCarts().filter(itemPasses);
      const fis     = DB.getAllFloorItems().filter(itemPasses);

      if (!carts.length && !fis.length) {
        results.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">${countActive() ? 'לא נמצאו תוצאות לסינון הנוכחי' : 'אין פריטים במערכת'}</div>
          </div>`;
        return;
      }

      const groups = {};
      const addItem = (item, type) => {
        const locKey = item.location || 'ללא מיקום';
        const subKey = item.subLocation || '';
        const gk = locKey + '\0' + subKey;
        if (!groups[gk]) groups[gk] = { loc: locKey, sub: subKey, items: [] };
        groups[gk].items.push({ data: item, type });
      };
      carts.forEach(c  => addItem(c,  'cart'));
      fis.forEach(fi   => addItem(fi, 'fi'));

      const sortedGroups = Object.values(groups).sort((a,b) =>
        a.loc.localeCompare(b.loc) || a.sub.localeCompare(b.sub));

      results.innerHTML = sortedGroups.map(g => `
        <div class="loc-group">
          <div class="loc-group-header">
            ${esc(g.loc)}${g.sub ? ' / ' + esc(g.sub) : ''}
          </div>
          ${g.items.map(({ data, type }) => {
            if (type === 'cart') {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item" data-type="cart" data-id="${esc(data.cartId)}" style="cursor:pointer">
                  <div class="list-item-body">
                    <div class="list-item-title">${esc(data.cartId)}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + ' פריטים' : '')}${ps ? ' · ' + ps : ''}</div>
                  </div>
                  <span>›</span>
                </div>`;
            } else {
              const ps = propSummary(data.properties);
              return `
                <div class="list-item sr-item" data-type="fi" data-id="${esc(data.id)}" style="cursor:pointer">
                  <div class="list-item-body">
                    <div class="list-item-title"><span class="badge badge-floor">רצפה</span> ${ps || esc(data.id)}</div>
                    <div class="list-item-sub">${data.isEmpty ? 'ריקה' : (data.itemCount ? data.itemCount + ' פריטים' : '')}</div>
                  </div>
                  <span>›</span>
                </div>`;
            }
          }).join('')}
        </div>
      `).join('');
    }

    // ── Event delegation: accordion toggle ───────────────────────
    document.getElementById('sr-filter-panels').addEventListener('click', e => {
      const btn = e.target.closest('.fp-header');
      if (!btn) return;
      const panel  = btn.closest('.filter-panel');
      const body   = btn.nextElementSibling;
      const isOpen = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      body.classList.toggle('open', !isOpen);
      if (!isOpen) openPanels.add(panel.id);
      else         openPanels.delete(panel.id);
    });

    // ── Event delegation: checkbox changes ───────────────────────
    document.getElementById('sr-filter-panels').addEventListener('change', e => {
      const cb = e.target.closest('.fp-checkbox');
      if (!cb) return;
      const key   = cb.dataset.filterKey;
      const value = cb.dataset.value;
      const on    = cb.checked;
      if (key === 'loc') {
        on ? state.locations.add(value) : state.locations.delete(value);
      } else if (key === 'cart') {
        on ? state.cartIds.add(value) : state.cartIds.delete(value);
      } else if (key === 'prop') {
        const pn = cb.dataset.prop;
        if (!state.props[pn]) state.props[pn] = new Set();
        on ? state.props[pn].add(value) : state.props[pn].delete(value);
        if (!state.props[pn].size) delete state.props[pn];
      }
      // update badge in this panel
      const panel = cb.closest('.filter-panel');
      if (panel) {
        const checked = panel.querySelectorAll('.fp-checkbox:checked').length;
        const badge   = panel.querySelector('.fp-badge');
        if (badge) { badge.textContent = checked; badge.classList.toggle('fp-badge--hidden', !checked); }
      }
      updateActionsBar();
      renderResults();
    });

    // ── Clear all ─────────────────────────────────────────────────
    document.getElementById('sr-clear-btn').addEventListener('click', () => {
      state.locations.clear();
      state.cartIds.clear();
      state.props   = {};
      state.emptyOnly = false;
      buildFilterPanels();
      updateActionsBar();
      renderResults();
    });

    // ── Item click → modal ────────────────────────────────────────
    document.getElementById('sr-results').addEventListener('click', e => {
      const item = e.target.closest('.sr-item');
      if (!item) return;
      const type = item.dataset.type;
      const id   = item.dataset.id;

      if (type === 'cart') {
        const cart = DB.getCart(id);
        if (!cart) return;
        const ps = propSummary(cart.properties);
        Modal.open({
          title: `עגלה ${esc(cart.cartId)}`,
          html: `
            <p class="card-meta">מיקום: ${esc(cart.location || 'לא ידוע')}</p>
            ${cart.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(cart.subLocation)}</p>` : ''}
            <p class="card-meta">פריטים: ${cart.isEmpty ? 'ריקה' : (cart.itemCount || 0)}</p>
            ${ps ? `<p class="card-meta">מאפיינים: ${ps}</p>` : ''}
            <p class="card-meta" style="font-size:0.75rem;margin-top:8px">עדכון: ${Utils.formatDate(cart.lastUpdated)}</p>
          `,
          actions: [
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { cartId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { cartId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      } else {
        const fi = DB.getFloorItem(id);
        if (!fi) return;
        const ps = propSummary(fi.properties);
        Modal.open({
          title: `פריטי רצפה`,
          html: `
            <p class="card-meta">מיקום: ${esc(fi.location || 'לא ידוע')}</p>
            ${fi.subLocation ? `<p class="card-meta">תת-מיקום: ${esc(fi.subLocation)}</p>` : ''}
            <p class="card-meta">פריטים: ${fi.isEmpty ? 'ריקה' : (fi.itemCount || 0)}</p>
            ${ps ? `<p class="card-meta">מאפיינים: ${ps}</p>` : ''}
            <p class="card-meta" style="font-size:0.75rem;margin-top:8px">עדכון: ${Utils.formatDate(fi.lastUpdated)}</p>
          `,
          actions: [
            { id: 'transfer', label: '🔄 העברה', cls: 'btn-primary', onClick: () => {
              Modal.close();
              Router.navigate('transfer', { floorItemId: id });
              history.replaceState(null, '', '#transfer');
            }},
            { id: 'loadunload', label: '📦 העמסה / פירוק', cls: 'btn-outline', onClick: () => {
              Modal.close();
              Router.navigate('loadunload', { floorItemId: id });
              history.replaceState(null, '', '#loadunload');
            }},
            { id: 'close', label: 'סגור', onClick: Modal.close }
          ]
        });
      }
    });

    Router.register('search', {
      onShow() {
        buildFilterPanels();
        updateActionsBar();
        renderResults();
      }
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 9 — Screen: Main
  ════════════════════════════════════════════════════ -->
  <script>
  function initMain() {
    const screen = document.getElementById('screen-main');

    screen.innerHTML = `
      <div class="screen-header">
        <span class="header-icon">🛒</span>
        <h1>שינוע</h1>
      </div>
      <div class="p-screen">
        <button class="hero-btn" id="main-export">
          <div class="hero-btn-icon" style="background:#EBF4FF;color:#0F4C81;">📤</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">ייצוא נתונים</div>
            <div class="hero-btn-sub">העתק גיבוי ללוח</div>
          </div>
        </button>

        <button class="hero-btn" id="main-import">
          <div class="hero-btn-icon" style="background:#F0FDF4;color:#16A34A;">📥</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">ייבוא נתונים</div>
            <div class="hero-btn-sub">הדבק טקסט גיבוי</div>
          </div>
        </button>

        <button class="hero-btn" id="main-map">
          <div class="hero-btn-icon" style="background:#FFF7ED;color:#FF6B35;">🗺️</div>
          <div class="hero-btn-body">
            <div class="hero-btn-title">יצירת מיפוי</div>
            <div class="hero-btn-sub">העתק מפת מיקומים ללוח</div>
          </div>
        </button>

      </div>
    `;

    // export — copy to clipboard
    screen.querySelector('#main-export').addEventListener('click', () => {
      const text = Utils.generateExportText(DB.getRaw());
      Utils.copyToClipboard(text)
        .then(() => Toast.show('גיבוי הועתק ללוח', 'success'))
        .catch(() => Modal.open({
          title: 'ייצוא — העתקה ידנית',
          html: `<p class="card-meta" style="margin-bottom:8px">לחץ על התיבה ובחר הכל:</p>
                 <textarea rows="6" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:monospace;font-size:0.75rem;direction:ltr;text-align:left" readonly onclick="this.select()">${esc(text)}</textarea>`,
          actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
        }));
    });

    // import — paste via modal textarea
    screen.querySelector('#main-import').addEventListener('click', () => {
      Modal.open({
        title: 'ייבוא נתונים',
        html: `
          <p class="card-meta" style="margin-bottom:10px">הדבק כאן את טקסט הגיבוי שהועתק בייצוא:</p>
          <textarea id="import-paste-area" rows="6"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
                   font-size:0.82rem;font-family:monospace;direction:ltr;text-align:left;resize:vertical"></textarea>
        `,
        actions: [
          { id: 'do-import', label: 'ייבא', cls: 'btn-primary', onClick: () => {
            const text = document.getElementById('import-paste-area').value.trim();
            if (!text) { Toast.show('לא הודבק טקסט', 'error'); return; }
            try {
              const jsonStr = Utils.parseImportText(text);
              DB.importJSON(jsonStr, 'merge');
              Modal.close();
              Toast.show('נתונים יובאו בהצלחה', 'success');
            } catch(err) {
              Toast.show('שגיאה: ' + err.message, 'error');
            }
          }},
          { id: 'cancel', label: 'ביטול', onClick: Modal.close }
        ]
      });
    });

    // map
    screen.querySelector('#main-map').addEventListener('click', () => {
      const raw = DB.load();
      const mapText = Utils.generateMapText(raw);
      Utils.copyToClipboard(mapText)
        .then(() => Toast.show('מיפוי הועתק ללוח', 'success'))
        .catch(() => {
          // fallback: show in modal
          Modal.open({
            title: 'מיפוי',
            html: `<pre style="font-size:0.82rem;white-space:pre-wrap;word-break:break-word;direction:rtl;text-align:right">${mapText}</pre>`,
            actions: [{ id: 'close', label: 'סגור', onClick: Modal.close }]
          });
        });
    });

    Router.register('main', {
      onShow() {}
    });
  }
  </script>

  <!-- ═══════════════════════════════════════════════════
       SCRIPT 10 — Bootstrap + SW Registration
  ════════════════════════════════════════════════════ -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.warn);
    }

    // Build nav
    BottomNav.render();

    // Init all screens
    initEdit();
    initTransfer();
    initLoadUnload();
    initSearch();
    initMain();

    // Navigate to initial screen
    const initial = location.hash.replace('#', '') || 'main';
    Router.navigate(initial);
  });
  </script>
</body>
</html>
