<script>
// ─── BarcodeScanner module ───────────────────────────────────────────────
const BarcodeScanner = (() => {
  let _targetInput = null;
  let _stream = null;
  let _scanRaf = null;
  let _lastResult = null;

  const modal    = document.getElementById('scanner-modal');
  const choice   = document.getElementById('scanner-choice');
  const camView  = document.getElementById('scanner-camera-view');
  const galView  = document.getElementById('scanner-gallery-view');
  const video    = document.getElementById('scanner-video');
  const canvas   = document.getElementById('scanner-canvas');
  const galCanvas= document.getElementById('scanner-gallery-canvas');
  const fileInp  = document.getElementById('sc-file-input');
  const scanFrame= document.getElementById('scan-frame');
  const scanHole = document.getElementById('scan-hole');
  const resultBar= camView.querySelector('#scanner-result-bar');
  const tapHint  = camView.querySelector('#scanner-tap-hint');

  // Native BarcodeDetector (Android Chrome / iOS 17+) or ZXing fallback
  let _detector = null;
  let _detectorFailed = false;

  // ── Debug overlay ──────────────────────────────────────────────────────────
  let _debugMode = false;
  const _debugLog = document.getElementById('scanner-debug-log');
  const _debugLines = [];
  function _dbg(msg) {
    if (!_debugMode) return;
    _debugLines.unshift(msg);
    if (_debugLines.length > 12) _debugLines.pop();
    if (_debugLog) _debugLog.textContent = _debugLines.join('\n');
    console.log('[Scanner]', msg);
  }
  const _debugStatus = document.createElement('div');
  _debugStatus.style.cssText = 'display:none;position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.82);color:#ff0;font:10px monospace;padding:4px 8px;white-space:pre-wrap;z-index:11';

  function _updateDebugStatus() {
    const bd = 'BarcodeDetector' in window;
    const bdFmt = bd ? (() => { try { return BarcodeDetector.getSupportedFormats ? '(async)' : 'ok'; } catch(e){ return 'err'; } })() : 'N/A';
    _debugStatus.textContent =
      `BD: ${bd} ${bdFmt} | bdFail: ${_detectorFailed} | ZXing: ${!!window.ZXing} | Quagga: ${!!(window.Quagga||window.Quagga2)} | vid: ${video.videoWidth||0}x${video.videoHeight||0}\nUA: ${navigator.userAgent.slice(30,80)}`;
  }

  function _toggleDebug() {
    _debugMode = !_debugMode;
    if (!_debugMode) {
      if (_debugLog) _debugLog.style.display = 'none';
      _debugStatus.style.display = 'none';
      _debugLines.length = 0;
    } else {
      // inject status bar into camera view if not already there
      const cv = document.getElementById('scanner-camera-view');
      if (cv && !cv.contains(_debugStatus)) cv.appendChild(_debugStatus);
      _debugStatus.style.display = 'block';
      if (_debugLog) _debugLog.style.display = 'block';
      _updateDebugStatus();
    }
  }

  async function decodeCanvas(cvs) {
    if (!cvs || !cvs.width || !cvs.height) {
      _dbg('skip: 0x0 canvas');
      return [];
    }

    // BarcodeDetector path
    if ('BarcodeDetector' in window && !_detectorFailed) {
      if (!_detector) {
        try {
          const want = ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','qr_code','data_matrix','pdf417','aztec'];
          const supported = (typeof BarcodeDetector.getSupportedFormats === 'function')
            ? await BarcodeDetector.getSupportedFormats() : want;
          const formats = want.filter(f => supported.includes(f));
          _dbg('BD formats: ' + formats.join(','));
          _detector = new BarcodeDetector({ formats: formats.length ? formats : ['qr_code','code_128','ean_13'] });
          _dbg('BD created OK');
        } catch(e) { _detectorFailed = true; _dbg('BD create err: ' + e.message); }
      }
      if (_detector && !_detectorFailed) {
        // Try canvas directly first (Android Chrome), fall back to ImageBitmap (iOS)
        try {
          const result = await _detector.detect(cvs);
          if (result.length) _dbg('BD canvas hit: ' + result[0].rawValue);
          return result;
        } catch(e1) {
          _dbg('BD canvas err: ' + e1.message + ' — trying ImageBitmap');
          if (typeof createImageBitmap === 'function') {
            try {
              const bmp = await createImageBitmap(cvs);
              const result = await _detector.detect(bmp);
              bmp.close();
              if (result.length) _dbg('BD bmp hit: ' + result[0].rawValue);
              return result;
            } catch(e2) {
              _dbg('BD bmp err: ' + e2.message);
              _detector = null; _detectorFailed = true;
            }
          } else {
            _detector = null; _detectorFailed = true;
          }
        }
      }
    }

    // ZXing fallback
    if (!window.ZXing) { _dbg('ZXing not loaded'); return []; }
    try {
      const ctx = cvs.getContext('2d');
      if (!ctx) { _dbg('no ctx'); return []; }
      const id = ctx.getImageData(0, 0, cvs.width, cvs.height);
      if (!id || !id.data || !id.data.length) { _dbg('no imagedata'); return []; }
      // Sample brightness (avg of every 40th pixel) for diagnostics
      let bright = 0;
      for (let i = 0; i < id.data.length; i += 160) bright += (id.data[i] + id.data[i+1] + id.data[i+2]) / 3;
      const avgBright = Math.round(bright / (id.data.length / 160));
      _dbg(`ZXing ${cvs.width}x${cvs.height} avg=${avgBright}`);
      if (_debugMode) _updateDebugStatus();
      const lum = new ZXing.RGBLuminanceSource(id.data, cvs.width, cvs.height);
      const hints = new Map([[ZXing.DecodeHintType.TRY_HARDER, true]]);
      for (const Bin of [ZXing.HybridBinarizer, ZXing.GlobalHistogramBinarizer]) {
        try {
          const reader = new ZXing.MultiFormatReader();
          reader.setHints(hints);
          const bmp = new ZXing.BinaryBitmap(new Bin(lum));
          const val = reader.decode(bmp).getText();
          _dbg('ZXing hit: ' + val);
          return [{ rawValue: val }];
        } catch(e) { _dbg('miss(' + (Bin.name||'?') + '): ' + (e.name||e.message||e)); }
      }
    } catch(e) { _dbg('ZXing err: ' + e.message); }

    // Quagga2 fallback (proven on iOS Safari for 1D barcodes)
    const _Quagga = window.Quagga2 || window.Quagga;
    if (_Quagga && !_quaggaBusy) {
      return _decodeQuagga(_Quagga, cvs);
    }
    return [];
  }

  let _quaggaBusy = false;
  function _decodeQuagga(Q, cvs) {
    _quaggaBusy = true;
    return new Promise(resolve => {
      try {
        Q.decodeSingle({
          decoder: { readers: ['code_128_reader','ean_reader','ean_8_reader','code_39_reader','upc_reader','upc_e_reader','itf_reader'] },
          locate: true,
          src: cvs.toDataURL('image/jpeg', 0.92)
        }, result => {
          _quaggaBusy = false;
          if (result && result.codeResult) {
            _dbg('Quagga hit: ' + result.codeResult.code);
            resolve([{ rawValue: result.codeResult.code }]);
          } else {
            _dbg('Quagga miss');
            resolve([]);
          }
        });
      } catch(e) {
        _quaggaBusy = false;
        _dbg('Quagga err: ' + e.message);
        resolve([]);
      }
    });
  }

  function open(inputEl) {
    _targetInput = inputEl;
    _lastResult = null;
    showChoice();
    modal.classList.add('open');
    // Push a history entry so Android hardware back button closes the scanner
    history.pushState({ scanner: 'open' }, '');
  }

  function close() {
    modal.classList.remove('open');
    stopCamera();
    camView.classList.remove('active');
    galView.classList.remove('active');
    choice.style.display = '';
    _lastResult = null;
  }

  function _backStep() {
    // Called by hardware back: if in camera/gallery view, go to choice; else close
    if (camView.classList.contains('active') || galView.classList.contains('active')) {
      history.pushState({ scanner: 'choice' }, '');
      showChoice();
    } else {
      close();
    }
  }

  function showChoice() {
    choice.style.display = '';
    camView.classList.remove('active');
    galView.classList.remove('active');
    stopCamera();
  }

  async function startCamera() {
    choice.style.display = 'none';
    camView.classList.add('active');
    resultBar.textContent = '';
    tapHint.textContent = Lang.T('הכנס ברקוד לתוך המסגרת', 'Coloca el código de barras dentro del marco');
    scanFrame.setAttribute('stroke', '#fff');
    scanHole.setAttribute('fill', 'black');
    _lastResult = null;
    _scanLoopLogged = false;
    try {
      _stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      video.srcObject = _stream;
      await video.play();
      _scanRaf = requestAnimationFrame(scanLoop);
    } catch(e) {
      Toast.show(Lang.T('לא ניתן לגשת למצלמה', 'No se puede acceder a la cámara'), 'error');
      showChoice();
    }
  }

  function stopCamera() {
    if (_scanRaf) { cancelAnimationFrame(_scanRaf); _scanRaf = null; }
    if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
    video.srcObject = null;
  }

  let _scanLoopLogged = false;
  async function scanLoop() {
    if (!_stream) return;
    if (video.readyState < 2 || !video.videoWidth || !video.videoHeight) { _scanRaf = requestAnimationFrame(scanLoop); return; }
    try {
      // crop to the scan rectangle area (80% wide, 14% tall centered)
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!_scanLoopLogged) { _scanLoopLogged = true; _dbg(`video ${vw}x${vh} rs=${video.readyState}`); }
      const rx = Math.round(vw * 0.10), ry = Math.round(vh * 0.43);
      const rw = Math.round(vw * 0.80), rh = Math.round(vh * 0.14);
      canvas.width = rw; canvas.height = rh;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, rx, ry, rw, rh, 0, 0, rw, rh);
      let codes = await decodeCanvas(canvas);
      // Full-frame fallback when strip fails on ZXing path (iOS: no BarcodeDetector)
      if (!codes.length && !('BarcodeDetector' in window && !_detectorFailed)) {
        canvas.width = vw; canvas.height = vh;
        if (typeof createImageBitmap === 'function') {
          try {
            const bmp = await createImageBitmap(video);
            ctx.drawImage(bmp, 0, 0);
            bmp.close();
            _dbg(`full-frame bmp ${vw}x${vh}`);
          } catch(e) { ctx.drawImage(video, 0, 0, vw, vh); _dbg(`full-frame ctx ${vw}x${vh}`); }
        } else {
          ctx.drawImage(video, 0, 0, vw, vh);
          _dbg(`full-frame ctx ${vw}x${vh}`);
        }
        codes = await decodeCanvas(canvas);
      }
      if (codes.length) {
        const val = codes[0].rawValue;
        if (val !== _lastResult) {
          _lastResult = val;
          resultBar.textContent = val;
          tapHint.textContent = Lang.T('הקש כדי לאשר', 'Toca para confirmar');
          scanFrame.setAttribute('stroke', '#00e878');
          scanHole.setAttribute('fill', '#00e87822');
        }
      } else if (_lastResult === null) {
        scanFrame.setAttribute('stroke', '#fff');
        scanHole.setAttribute('fill', 'black');
      }
    } catch(e) { /* ignore single frame errors */ }
    _scanRaf = requestAnimationFrame(scanLoop);
  }

  // Gallery mode state — pan/zoom model
  let _galImg = null;
  let _galZoom = 1;       // image display width = canvas.width * _galZoom
  let _galPanX = 0, _galPanY = 0; // image top-left in canvas px
  let _galDetected = null;
  let _galDrag = null;    // {startX, startY, panX, panY} single-finger pan
  let _galPinch = null;   // {dist, midX, midY, zoom, panX, panY}
  let _galLastTap = 0;

  function startGallery() {
    choice.style.display = 'none';
    galView.classList.add('active');
    _galImg = null; _galDetected = null; _galDrag = null; _galPinch = null;
    fileInp.value = '';
    fileInp.click();
  }

  fileInp.addEventListener('change', () => {
    const file = fileInp.files[0];
    if (!file) { showChoice(); return; }
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      _galImg = img;
      _galDetected = null;
      _syncGalCanvas();
      // Fit image to canvas width, centered vertically
      _galZoom = 1;
      _galPanX = 0;
      const displayH = galCanvas.width * img.naturalHeight / img.naturalWidth;
      _galPanY = Math.round((galCanvas.height - displayH) / 2);
      drawGallery();
      detectGallery();
    };
    img.src = url;
  });

  function _syncGalCanvas() {
    galCanvas.width  = galCanvas.clientWidth  || window.innerWidth;
    galCanvas.height = galCanvas.clientHeight || Math.round(window.innerHeight * 0.75);
  }

  // Fixed rect in canvas coords (centered, independent of pan/zoom)
  function _galFixedRect() {
    const cw = galCanvas.width, ch = galCanvas.height;
    const rw = Math.round(cw * 0.80);
    const rh = Math.round(ch * 0.14);
    return { x: Math.round((cw - rw) / 2), y: Math.round((ch - rh) / 2), w: rw, h: rh };
  }

  function _galClampPan() {
    if (!_galImg) return;
    const cw = galCanvas.width, ch = galCanvas.height;
    const dw = cw * _galZoom;
    const dh = dw * _galImg.naturalHeight / _galImg.naturalWidth;
    // Keep at least 15% of canvas covered by the image on each side
    const mg = 0.15;
    _galPanX = Math.max(cw * mg - dw, Math.min(cw * (1 - mg), _galPanX));
    _galPanY = Math.max(ch * mg - dh, Math.min(ch * (1 - mg), _galPanY));
  }

  function drawGallery() {
    _syncGalCanvas();
    const ctx = galCanvas.getContext('2d');
    const cw = galCanvas.width, ch = galCanvas.height;
    ctx.clearRect(0, 0, cw, ch);
    if (!_galImg) return;
    const dw = cw * _galZoom;
    const dh = dw * _galImg.naturalHeight / _galImg.naturalWidth;
    ctx.drawImage(_galImg, _galPanX, _galPanY, dw, dh);
    const { x: rx, y: ry, w: rw, h: rh } = _galFixedRect();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0,0,cw,ry);
    ctx.fillRect(0,ry+rh,cw,ch-ry-rh);
    ctx.fillRect(0,ry,rx,rh);
    ctx.fillRect(rx+rw,ry,cw-rx-rw,rh);
    const color = _galDetected ? '#00e878' : '#fff';
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.strokeRect(rx,ry,rw,rh);
    // Corner L-markers
    const len = 18;
    ctx.lineWidth = 3;
    [[rx,ry,1,1],[rx+rw,ry,-1,1],[rx,ry+rh,1,-1],[rx+rw,ry+rh,-1,-1]].forEach(([x,y,dx,dy]) => {
      ctx.beginPath(); ctx.moveTo(x+dx*len,y); ctx.lineTo(x,y); ctx.lineTo(x,y+dy*len); ctx.stroke();
    });
    // Bottom hint bar
    const barH = 32;
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0, ch - barH, cw, barH);
    ctx.fillStyle = 'rgba(255,255,255,.75)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(_galDetected ? 'הקש פעמיים לאישור' : 'גרור להזזה · צבוט לזום', cw/2, ch - barH + 21);
    // Detected value shown prominently below the rect
    if (_galDetected) {
      const labelY = ry + rh + 10;
      const labelH = 44;
      ctx.fillStyle = 'rgba(0,180,80,.92)';
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(rx, labelY, rw, labelH, 8)
                    : ctx.rect(rx, labelY, rw, labelH);
      ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(_galDetected, rx + rw/2, labelY + 30);
    }
  }

  async function detectGallery() {
    if (!_galImg) return;
    _galDetected = null;
    try {
      const { x: rx, y: ry, w: rw, h: rh } = _galFixedRect();
      const cw = galCanvas.width;
      const scale = (cw * _galZoom) / _galImg.naturalWidth; // canvas px per image px
      const imgX = Math.max(0, Math.round((rx - _galPanX) / scale));
      const imgY = Math.max(0, Math.round((ry - _galPanY) / scale));
      const imgW = Math.min(Math.round(rw / scale), _galImg.naturalWidth  - imgX);
      const imgH = Math.min(Math.round(rh / scale), _galImg.naturalHeight - imgY);
      if (imgW > 0 && imgH > 0) {
        const off = document.createElement('canvas');
        off.width = imgW; off.height = imgH;
        off.getContext('2d').drawImage(_galImg, imgX, imgY, imgW, imgH, 0, 0, imgW, imgH);
        const codes = await decodeCanvas(off);
        if (codes.length) _galDetected = codes[0].rawValue;
      }
    } catch(e) {}
    drawGallery();
  }

  function _isDoubleTap() {
    const now = Date.now(), dt = now - _galLastTap;
    _galLastTap = now;
    return dt < 350;
  }

  function _galPinchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function _galPinchMid(e) {
    const r = galCanvas.getBoundingClientRect();
    const sx = galCanvas.width / r.width, sy = galCanvas.height / r.height;
    return {
      x: ((e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left) * sx,
      y: ((e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top)  * sy,
    };
  }

  // Mouse (desktop)
  galCanvas.addEventListener('mousedown', e => {
    if (_galDetected && _isDoubleTap()) { confirmGallery(); return; }
    _galDrag = { startX: e.clientX, startY: e.clientY, panX: _galPanX, panY: _galPanY };
  });
  galCanvas.addEventListener('mousemove', e => {
    if (!_galDrag) return;
    const r = galCanvas.getBoundingClientRect();
    _galPanX = _galDrag.panX + (e.clientX - _galDrag.startX) * (galCanvas.width  / r.width);
    _galPanY = _galDrag.panY + (e.clientY - _galDrag.startY) * (galCanvas.height / r.height);
    _galClampPan(); drawGallery();
  });
  galCanvas.addEventListener('mouseup',    () => { if (_galDrag) { _galDrag = null; detectGallery(); } });
  galCanvas.addEventListener('mouseleave', () => { if (_galDrag) { _galDrag = null; detectGallery(); } });

  // Touch
  galCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      if (_galDetected && _isDoubleTap()) { confirmGallery(); return; }
      const t = e.touches[0];
      _galDrag = { startX: t.clientX, startY: t.clientY, panX: _galPanX, panY: _galPanY };
      _galPinch = null;
    } else if (e.touches.length === 2) {
      _galDrag = null;
      const mid = _galPinchMid(e);
      _galPinch = { dist: _galPinchDist(e), midX: mid.x, midY: mid.y, zoom: _galZoom, panX: _galPanX, panY: _galPanY };
    }
  }, {passive:false});

  galCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && _galDrag) {
      const t = e.touches[0];
      const r = galCanvas.getBoundingClientRect();
      _galPanX = _galDrag.panX + (t.clientX - _galDrag.startX) * (galCanvas.width  / r.width);
      _galPanY = _galDrag.panY + (t.clientY - _galDrag.startY) * (galCanvas.height / r.height);
      _galClampPan(); drawGallery();
    } else if (e.touches.length === 2 && _galPinch) {
      const newDist = _galPinchDist(e);
      const newZoom = Math.max(1, Math.min(8, _galPinch.zoom * newDist / _galPinch.dist));
      // Zoom around pinch midpoint
      _galPanX = _galPinch.midX - (_galPinch.midX - _galPinch.panX) * newZoom / _galPinch.zoom;
      _galPanY = _galPinch.midY - (_galPinch.midY - _galPinch.panY) * newZoom / _galPinch.zoom;
      _galZoom = newZoom;
      _galClampPan(); drawGallery();
    }
  }, {passive:false});

  galCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.touches.length === 0) {
      const wasDragging = _galDrag || _galPinch;
      _galDrag = null; _galPinch = null;
      if (wasDragging) detectGallery();
    } else if (e.touches.length === 1 && _galPinch) {
      // Transition from pinch back to single-finger pan
      _galPinch = null;
      const t = e.touches[0];
      _galDrag = { startX: t.clientX, startY: t.clientY, panX: _galPanX, panY: _galPanY };
    }
  }, {passive:false});

  function confirmGallery() {
    if (_galDetected && _targetInput) {
      _targetInput.value = _galDetected;
      _targetInput.dispatchEvent(new Event('change', {bubbles:true}));
    }
    close();
  }

  // camera confirm on tap
  camView.addEventListener('click', () => {
    if (_lastResult && _targetInput) {
      _targetInput.value = _lastResult;
      _targetInput.dispatchEvent(new Event('change', {bubbles:true}));
      close();
    }
  });

  // button wiring
  document.getElementById('sc-camera-btn').addEventListener('click', startCamera);
  document.getElementById('sc-gallery-btn').addEventListener('click', startGallery);
  document.getElementById('sc-cam-close').addEventListener('click', e => { e.stopPropagation(); close(); });
  document.getElementById('sc-gal-close').addEventListener('click', close);
  document.getElementById('scanner-back-btn').addEventListener('click', showChoice);
  document.getElementById('sc-debug-btn').addEventListener('click', e => { e.stopPropagation(); _toggleDebug(); });

  return { open, _backStep };
})();

// ─── Android hardware back button for scanner ────────────────────────────
window.addEventListener('popstate', e => {
  if (document.getElementById('scanner-modal').classList.contains('open')) {
    BarcodeScanner._backStep();
    e.preventDefault();
  }
});

// ─── Global scan-btn handler ─────────────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('.scan-btn');
  if (!btn) return;
  e.preventDefault(); e.stopPropagation();
  const row  = btn.closest('.item-row');
  const inp  = row && row.querySelector('.item-id-input');
  if (inp) BarcodeScanner.open(inp);
});
</script>
</body>
</html>
